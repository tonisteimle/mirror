name: LLM Fixture Recording

on:
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Pipeline to record'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - nl-translation
          - generation
          - syntax-correction
          - js-builder
      case:
        description: 'Specific case ID (optional, leave empty for all)'
        required: false
        type: string
      overwrite:
        description: 'Overwrite existing fixtures'
        required: false
        default: false
        type: boolean

jobs:
  record:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Record LLM fixtures
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          ARGS=""

          if [ "${{ inputs.pipeline }}" != "all" ]; then
            ARGS="--pipeline=${{ inputs.pipeline }}"
          fi

          if [ -n "${{ inputs.case }}" ]; then
            ARGS="$ARGS --case=${{ inputs.case }}"
          fi

          if [ "${{ inputs.overwrite }}" == "true" ]; then
            ARGS="$ARGS --overwrite"
          fi

          if [ "${{ inputs.pipeline }}" == "all" ]; then
            npm run llm:record -- --pipeline=nl-translation $ARGS
            npm run llm:record -- --pipeline=generation $ARGS
            npm run llm:record -- --pipeline=syntax-correction $ARGS
            npm run llm:record -- --pipeline=js-builder $ARGS
          else
            npm run llm:record -- $ARGS
          fi

      - name: Run LLM evaluation
        run: npm run llm:eval

      - name: Create PR with updated fixtures
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update LLM fixtures (${{ inputs.pipeline }})'
          title: 'Update LLM Fixtures (${{ inputs.pipeline }})'
          body: |
            Automated LLM fixture recording.

            - Pipeline: `${{ inputs.pipeline }}`
            - Case: `${{ inputs.case || 'all' }}`
            - Overwrite: `${{ inputs.overwrite }}`
          branch: llm-fixtures-update
          delete-branch: true
