<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror Flow Diagram Prototype</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      z-index: 100;
    }

    #toolbar h1 {
      font-size: 14px;
      font-weight: 500;
      color: #888;
    }

    #toolbar button {
      padding: 6px 12px;
      background: #333;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    #toolbar button:hover {
      background: #444;
    }

    #canvas-container {
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }

    #canvas {
      position: absolute;
      transform-origin: 0 0;
      cursor: grab;
    }

    #canvas.dragging {
      cursor: grabbing;
    }

    .view-node {
      position: absolute;
      width: 160px;
      height: 120px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .view-node:hover {
      border-color: #2271C1;
      box-shadow: 0 0 0 1px #2271C1;
    }

    .view-node.selected {
      border-color: #2271C1;
      box-shadow: 0 0 0 2px #2271C1;
    }

    .view-node.drop-target {
      border-color: #10b981;
      box-shadow: 0 0 0 2px #10b981;
    }

    .connect-handle {
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      background: #2271C1;
      border: 2px solid #0a0a0a;
      border-radius: 50%;
      cursor: crosshair;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .view-node:hover .connect-handle {
      opacity: 1;
    }

    .connect-line {
      stroke: #2271C1;
      stroke-width: 2;
      stroke-dasharray: 4;
      fill: none;
      pointer-events: none;
    }

    .view-node-header {
      padding: 8px 12px;
      background: #252525;
      border-bottom: 1px solid #333;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .view-node-header .icon {
      width: 14px;
      height: 14px;
      opacity: 0.5;
    }

    .view-node-thumbnail {
      padding: 8px;
      height: 88px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Mini wireframe elements */
    .mini-text {
      height: 6px;
      background: #333;
      border-radius: 2px;
    }

    .mini-text.short { width: 40%; }
    .mini-text.medium { width: 60%; }
    .mini-text.long { width: 80%; }

    .mini-button {
      width: 50px;
      height: 12px;
      background: #2271C1;
      border-radius: 3px;
      margin-top: 4px;
    }

    .mini-input {
      height: 10px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 2px;
    }

    .mini-row {
      display: flex;
      gap: 4px;
    }

    .mini-box {
      width: 20px;
      height: 20px;
      background: #333;
      border-radius: 2px;
    }

    /* SVG edges */
    #edges {
      position: absolute;
      top: 0;
      left: 0;
      overflow: visible;
    }

    .edge {
      fill: none;
      stroke: #333;
      stroke-width: 1.5;
      pointer-events: stroke;
      cursor: pointer;
    }

    .edge:hover {
      stroke: #2271C1;
    }

    .edge.selected {
      stroke: #2271C1;
      stroke-width: 2.5;
    }

    .edge-label {
      font-size: 9px;
      fill: #888;
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .edge-label-bg {
      fill: #0a0a0a;
    }

    /* Zoom indicator */
    #zoom-indicator {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 11px;
      color: #888;
    }

    /* Minimap */
    #minimap {
      position: fixed;
      bottom: 16px;
      left: 16px;
      width: 150px;
      height: 100px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }

    #minimap-content {
      transform-origin: 0 0;
    }

    #minimap-viewport {
      position: absolute;
      border: 1px solid #2271C1;
      background: rgba(34, 113, 193, 0.1);
      pointer-events: none;
    }

    .minimap-node {
      position: absolute;
      background: #333;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>Flow Diagram</h1>
    <button onclick="zoomIn()">Zoom +</button>
    <button onclick="zoomOut()">Zoom -</button>
    <button onclick="resetView()">Reset</button>
    <button onclick="autoLayout()">Auto Layout</button>
  </div>

  <div id="canvas-container">
    <div id="canvas">
      <svg id="edges"></svg>
    </div>
  </div>

  <div id="zoom-indicator">100%</div>

  <div id="minimap">
    <div id="minimap-content"></div>
    <div id="minimap-viewport"></div>
  </div>

  <script>
    // ============================================
    // Flow Data (würde aus dem AST kommen)
    // ============================================

    const flowData = {
      views: [
        { id: 'login', name: 'Login', type: 'form' },
        { id: 'home', name: 'Home', type: 'dashboard' },
        { id: 'profile', name: 'Profile', type: 'detail' },
        { id: 'settings', name: 'Settings', type: 'form' },
        { id: 'products', name: 'Products', type: 'list' },
        { id: 'product-detail', name: 'Product Detail', type: 'detail' },
        { id: 'checkout', name: 'Checkout', type: 'form' },
      ],

      edges: [
        { from: 'login', to: 'home', trigger: 'Button "Login"' },
        { from: 'home', to: 'profile', trigger: 'NavItem "Profile"' },
        { from: 'home', to: 'settings', trigger: 'NavItem "Settings"' },
        { from: 'home', to: 'products', trigger: 'NavItem "Products"' },
        { from: 'products', to: 'product-detail', trigger: 'Row click' },
        { from: 'product-detail', to: 'checkout', trigger: 'Button "Buy"' },
        { from: 'settings', to: 'home', trigger: 'Button "Back"' },
        { from: 'profile', to: 'home', trigger: 'Button "Back"' },
      ]
    };

    // ============================================
    // State
    // ============================================

    let zoom = 1;
    let panX = 50;
    let panY = 50;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let selectedNode = null;
    let selectedEdge = null;

    // Node positions (würde gespeichert werden)
    const nodePositions = new Map();

    // ============================================
    // Canvas Setup
    // ============================================

    const canvas = document.getElementById('canvas');
    const edgesSvg = document.getElementById('edges');
    const container = document.getElementById('canvas-container');

    function updateTransform() {
      canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
      document.getElementById('zoom-indicator').textContent = `${Math.round(zoom * 100)}%`;
      updateMinimap();
    }

    // ============================================
    // Auto Layout (Simple Grid)
    // ============================================

    function autoLayout() {
      // Einfaches hierarchisches Layout
      const levels = new Map();
      const visited = new Set();

      // BFS um Level zu bestimmen
      function assignLevel(nodeId, level) {
        if (visited.has(nodeId)) return;
        visited.add(nodeId);

        const currentLevel = levels.get(nodeId) || 0;
        levels.set(nodeId, Math.max(currentLevel, level));

        flowData.edges
          .filter(e => e.from === nodeId)
          .forEach(e => assignLevel(e.to, level + 1));
      }

      // Start mit Login
      assignLevel('login', 0);

      // Nicht besuchte Nodes hinzufügen
      flowData.views.forEach(v => {
        if (!visited.has(v.id)) {
          assignLevel(v.id, 0);
        }
      });

      // Nodes pro Level gruppieren
      const levelGroups = new Map();
      levels.forEach((level, nodeId) => {
        if (!levelGroups.has(level)) levelGroups.set(level, []);
        levelGroups.get(level).push(nodeId);
      });

      // Positionen berechnen
      const nodeWidth = 160;
      const nodeHeight = 120;
      const gapX = 80;
      const gapY = 60;

      levelGroups.forEach((nodes, level) => {
        const totalWidth = nodes.length * nodeWidth + (nodes.length - 1) * gapX;
        const startX = -totalWidth / 2 + nodeWidth / 2;

        nodes.forEach((nodeId, index) => {
          nodePositions.set(nodeId, {
            x: startX + index * (nodeWidth + gapX) + 400,
            y: level * (nodeHeight + gapY) + 50
          });
        });
      });

      render();
    }

    // ============================================
    // Render
    // ============================================

    function render() {
      // Clear
      canvas.querySelectorAll('.view-node').forEach(n => n.remove());
      edgesSvg.innerHTML = '';

      // Render nodes
      flowData.views.forEach(view => {
        const pos = nodePositions.get(view.id) || { x: 0, y: 0 };
        const node = createViewNode(view, pos);
        canvas.appendChild(node);
      });

      // Render edges
      flowData.edges.forEach(edge => {
        renderEdge(edge);
      });

      updateMinimap();
    }

    function createViewNode(view, pos) {
      const node = document.createElement('div');
      node.className = 'view-node';
      node.dataset.id = view.id;
      node.style.left = `${pos.x}px`;
      node.style.top = `${pos.y}px`;

      node.innerHTML = `
        <div class="view-node-header">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            ${getIconPath(view.type)}
          </svg>
          ${view.name}
        </div>
        <div class="view-node-thumbnail">
          ${getThumbnailContent(view.type)}
        </div>
        <div class="connect-handle" data-handle="${view.id}"></div>
      `;

      // Connect handle drag
      const handle = node.querySelector('.connect-handle');
      handle.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        startConnection(view.id, e);
      });

      // Selection
      node.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.view-node').forEach(n => n.classList.remove('selected'));
        node.classList.add('selected');
        selectedNode = view.id;
      });

      // Drag node
      node.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        e.stopPropagation();

        const startX = e.clientX;
        const startY = e.clientY;
        const startPos = { ...nodePositions.get(view.id) };

        function onMove(e) {
          const dx = (e.clientX - startX) / zoom;
          const dy = (e.clientY - startY) / zoom;
          nodePositions.set(view.id, {
            x: startPos.x + dx,
            y: startPos.y + dy
          });
          node.style.left = `${startPos.x + dx}px`;
          node.style.top = `${startPos.y + dy}px`;
          renderEdges();
          updateMinimap();
        }

        function onUp() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      return node;
    }

    function getIconPath(type) {
      const icons = {
        form: '<rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/>',
        dashboard: '<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>',
        list: '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/>',
        detail: '<rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>'
      };
      return icons[type] || icons.form;
    }

    function getThumbnailContent(type) {
      const templates = {
        form: `
          <div class="mini-text short"></div>
          <div class="mini-input"></div>
          <div class="mini-text short"></div>
          <div class="mini-input"></div>
          <div class="mini-button"></div>
        `,
        dashboard: `
          <div class="mini-row">
            <div class="mini-box"></div>
            <div class="mini-box"></div>
            <div class="mini-box"></div>
          </div>
          <div class="mini-text long"></div>
          <div class="mini-text medium"></div>
        `,
        list: `
          <div class="mini-text long"></div>
          <div class="mini-text long"></div>
          <div class="mini-text long"></div>
          <div class="mini-text medium"></div>
        `,
        detail: `
          <div class="mini-text short"></div>
          <div class="mini-text long"></div>
          <div class="mini-text medium"></div>
          <div class="mini-button"></div>
        `
      };
      return templates[type] || templates.form;
    }

    function renderEdge(edge) {
      const fromPos = nodePositions.get(edge.from);
      const toPos = nodePositions.get(edge.to);
      if (!fromPos || !toPos) return;

      const nodeWidth = 160;
      const nodeHeight = 120;

      // Zentren der Nodes
      const fromCenter = { x: fromPos.x + nodeWidth / 2, y: fromPos.y + nodeHeight / 2 };
      const toCenter = { x: toPos.x + nodeWidth / 2, y: toPos.y + nodeHeight / 2 };

      // Verbindungspunkte an den Rändern
      const fromPoint = getEdgePoint(fromPos, nodeWidth, nodeHeight, toCenter);
      const toPoint = getEdgePoint(toPos, nodeWidth, nodeHeight, fromCenter);

      // Bezier Kurve
      const dx = toPoint.x - fromPoint.x;
      const dy = toPoint.y - fromPoint.y;

      // Control points für sanfte Kurve
      const curvature = 0.5;
      let ctrl1, ctrl2;

      if (Math.abs(dx) > Math.abs(dy)) {
        // Horizontal verbunden
        ctrl1 = { x: fromPoint.x + dx * curvature, y: fromPoint.y };
        ctrl2 = { x: toPoint.x - dx * curvature, y: toPoint.y };
      } else {
        // Vertikal verbunden
        ctrl1 = { x: fromPoint.x, y: fromPoint.y + dy * curvature };
        ctrl2 = { x: toPoint.x, y: toPoint.y - dy * curvature };
      }

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M ${fromPoint.x} ${fromPoint.y} C ${ctrl1.x} ${ctrl1.y}, ${ctrl2.x} ${ctrl2.y}, ${toPoint.x} ${toPoint.y}`);
      path.setAttribute('class', 'edge');
      path.dataset.from = edge.from;
      path.dataset.to = edge.to;

      // Klick = selektieren
      path.addEventListener('click', (e) => {
        e.stopPropagation();
        selectEdge(edge);
      });

      // Doppelklick = Trigger ändern
      path.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        editEdgeTrigger(edge);
      });

      edgesSvg.appendChild(path);

      // Label mit Trigger - auf der Kurve positioniert
      if (edge.trigger) {
        // Punkt auf Bezier bei t=0.5
        const t = 0.5;
        const midX = Math.pow(1-t,3)*fromPoint.x + 3*Math.pow(1-t,2)*t*ctrl1.x + 3*(1-t)*t*t*ctrl2.x + t*t*t*toPoint.x;
        const midY = Math.pow(1-t,3)*fromPoint.y + 3*Math.pow(1-t,2)*t*ctrl1.y + 3*(1-t)*t*t*ctrl2.y + t*t*t*toPoint.y;

        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', midX);
        label.setAttribute('y', midY - 6);
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('class', 'edge-label');
        label.textContent = edge.trigger;
        edgesSvg.appendChild(label);
      }
    }

    function getEdgePoint(nodePos, width, height, targetCenter) {
      const cx = nodePos.x + width / 2;
      const cy = nodePos.y + height / 2;

      const dx = targetCenter.x - cx;
      const dy = targetCenter.y - cy;

      // Welche Seite schneidet der Vektor?
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);

      if (absDx * height > absDy * width) {
        // Links oder rechts
        if (dx > 0) {
          return { x: nodePos.x + width, y: cy };
        } else {
          return { x: nodePos.x, y: cy };
        }
      } else {
        // Oben oder unten
        if (dy > 0) {
          return { x: cx, y: nodePos.y + height };
        } else {
          return { x: cx, y: nodePos.y };
        }
      }
    }

    function renderEdges() {
      edgesSvg.innerHTML = '';
      flowData.edges.forEach(edge => renderEdge(edge));
    }

    // ============================================
    // Pan & Zoom
    // ============================================

    container.addEventListener('mousedown', (e) => {
      if (e.target !== container && e.target !== canvas) return;
      isDragging = true;
      dragStartX = e.clientX - panX;
      dragStartY = e.clientY - panY;
      canvas.classList.add('dragging');
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      panX = e.clientX - dragStartX;
      panY = e.clientY - dragStartY;
      updateTransform();
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      canvas.classList.remove('dragging');
    });

    container.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const newZoom = Math.max(0.1, Math.min(3, zoom * delta));

      // Zoom toward mouse position
      const rect = container.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      panX = mouseX - (mouseX - panX) * (newZoom / zoom);
      panY = mouseY - (mouseY - panY) * (newZoom / zoom);

      zoom = newZoom;
      updateTransform();
    });

    function zoomIn() {
      zoom = Math.min(3, zoom * 1.2);
      updateTransform();
    }

    function zoomOut() {
      zoom = Math.max(0.1, zoom / 1.2);
      updateTransform();
    }

    function resetView() {
      zoom = 1;
      panX = 50;
      panY = 50;
      updateTransform();
    }

    // ============================================
    // Minimap
    // ============================================

    function updateMinimap() {
      const minimap = document.getElementById('minimap-content');
      const viewport = document.getElementById('minimap-viewport');

      // Calculate bounds
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      nodePositions.forEach(pos => {
        minX = Math.min(minX, pos.x);
        minY = Math.min(minY, pos.y);
        maxX = Math.max(maxX, pos.x + 160);
        maxY = Math.max(maxY, pos.y + 120);
      });

      if (!isFinite(minX)) return;

      const padding = 20;
      const contentWidth = maxX - minX + padding * 2;
      const contentHeight = maxY - minY + padding * 2;

      const minimapWidth = 150;
      const minimapHeight = 100;
      const scale = Math.min(minimapWidth / contentWidth, minimapHeight / contentHeight);

      // Render minimap nodes
      minimap.innerHTML = '';
      minimap.style.transform = `scale(${scale})`;

      nodePositions.forEach((pos, id) => {
        const node = document.createElement('div');
        node.className = 'minimap-node';
        node.style.left = `${pos.x - minX + padding}px`;
        node.style.top = `${pos.y - minY + padding}px`;
        node.style.width = '160px';
        node.style.height = '120px';
        minimap.appendChild(node);
      });

      // Viewport indicator
      const containerRect = container.getBoundingClientRect();
      const vpX = (-panX / zoom - minX + padding) * scale;
      const vpY = (-panY / zoom - minY + padding) * scale;
      const vpW = (containerRect.width / zoom) * scale;
      const vpH = (containerRect.height / zoom) * scale;

      viewport.style.left = `${vpX}px`;
      viewport.style.top = `${vpY}px`;
      viewport.style.width = `${vpW}px`;
      viewport.style.height = `${vpH}px`;
    }

    // ============================================
    // Keyboard
    // ============================================

    document.addEventListener('keydown', (e) => {
      if (e.key === '0' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        resetView();
      }
      if (e.key === '=' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        zoomIn();
      }
      if (e.key === '-' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        zoomOut();
      }
    });

    // ============================================
    // Connection Creation
    // ============================================

    let connectingFrom = null;
    let connectLine = null;

    function startConnection(fromId, e) {
      connectingFrom = fromId;

      // Temporäre Linie erstellen
      connectLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      connectLine.setAttribute('class', 'connect-line');

      const fromPos = nodePositions.get(fromId);
      const startX = fromPos.x + 160;
      const startY = fromPos.y + 60;

      connectLine.setAttribute('x1', startX);
      connectLine.setAttribute('y1', startY);
      connectLine.setAttribute('x2', startX);
      connectLine.setAttribute('y2', startY);

      edgesSvg.appendChild(connectLine);

      document.addEventListener('mousemove', onConnectMove);
      document.addEventListener('mouseup', onConnectEnd);
    }

    function onConnectMove(e) {
      if (!connectLine) return;

      const rect = container.getBoundingClientRect();
      const x = (e.clientX - rect.left - panX) / zoom;
      const y = (e.clientY - rect.top - panY) / zoom;

      connectLine.setAttribute('x2', x);
      connectLine.setAttribute('y2', y);

      // Highlight drop target
      document.querySelectorAll('.view-node').forEach(node => {
        node.classList.remove('drop-target');
        const pos = nodePositions.get(node.dataset.id);
        if (pos && node.dataset.id !== connectingFrom) {
          if (x >= pos.x && x <= pos.x + 160 && y >= pos.y && y <= pos.y + 120) {
            node.classList.add('drop-target');
          }
        }
      });
    }

    function onConnectEnd(e) {
      document.removeEventListener('mousemove', onConnectMove);
      document.removeEventListener('mouseup', onConnectEnd);

      // Find target node
      const rect = container.getBoundingClientRect();
      const x = (e.clientX - rect.left - panX) / zoom;
      const y = (e.clientY - rect.top - panY) / zoom;

      let targetId = null;
      nodePositions.forEach((pos, id) => {
        if (id !== connectingFrom && x >= pos.x && x <= pos.x + 160 && y >= pos.y && y <= pos.y + 120) {
          targetId = id;
        }
      });

      // Neue Verbindung erstellen
      if (targetId && connectingFrom) {
        const trigger = prompt('Trigger eingeben (z.B. Button "Weiter"):', 'Button "Action"');
        if (trigger) {
          flowData.edges.push({
            from: connectingFrom,
            to: targetId,
            trigger: trigger
          });
          render();
          console.log('Neue Verbindung:', connectingFrom, '→', targetId, '|', trigger);
        }
      }

      // Cleanup
      if (connectLine) {
        connectLine.remove();
        connectLine = null;
      }
      connectingFrom = null;
      document.querySelectorAll('.view-node').forEach(n => n.classList.remove('drop-target'));
    }

    // ============================================
    // Edge Selection & Editing
    // ============================================

    function selectEdge(edge) {
      selectedEdge = edge;
      selectedNode = null;
      document.querySelectorAll('.view-node').forEach(n => n.classList.remove('selected'));
      render(); // Re-render um Selection zu zeigen
      // Markiere die selektierte Edge
      document.querySelectorAll('.edge').forEach(path => {
        if (path.dataset.from === edge.from && path.dataset.to === edge.to) {
          path.classList.add('selected');
        }
      });
    }

    function editEdgeTrigger(edge) {
      const newTrigger = prompt('Trigger ändern:', edge.trigger || '');
      if (newTrigger !== null) {
        edge.trigger = newTrigger;
        render();
      }
    }

    function deleteSelectedEdge() {
      if (!selectedEdge) return;
      const idx = flowData.edges.findIndex(e => e.from === selectedEdge.from && e.to === selectedEdge.to);
      if (idx !== -1) {
        flowData.edges.splice(idx, 1);
        selectedEdge = null;
        render();
      }
    }

    function editNodeName(viewId) {
      const view = flowData.views.find(v => v.id === viewId);
      if (!view) return;
      const newName = prompt('View umbenennen:', view.name);
      if (newName !== null && newName.trim()) {
        view.name = newName.trim();
        render();
      }
    }

    // ============================================
    // Init
    // ============================================

    autoLayout();
    updateTransform();

    // Deselect on canvas click
    canvas.addEventListener('click', () => {
      document.querySelectorAll('.view-node').forEach(n => n.classList.remove('selected'));
      selectedNode = null;
    });
  </script>
</body>
</html>
