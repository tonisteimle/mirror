<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Inference Prototype</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1f;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      background: #0a0a0f;
      border-bottom: 1px solid #27272a;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    header p {
      font-size: 13px;
      color: #71717a;
      margin-top: 4px;
    }

    .container {
      display: flex;
      flex: 1;
      gap: 24px;
      padding: 24px;
    }

    .preview-area {
      flex: 1;
      background: #27272a;
      border-radius: 8px;
      position: relative;
      min-height: 400px;
      overflow: hidden;
    }

    .preview-area::before {
      content: 'Preview (absolut positionierte Elemente)';
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 11px;
      color: #52525b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .preview-content {
      position: relative;
      width: 100%;
      height: 100%;
      padding-top: 32px;
    }

    /* Draggable elements */
    .element {
      position: absolute;
      cursor: move;
      user-select: none;
      transition: box-shadow 0.15s ease;
    }

    .element:hover {
      box-shadow: 0 0 0 2px #3B82F6;
    }

    .element.dragging {
      opacity: 0.8;
      z-index: 1000;
    }

    .icon-element {
      width: 32px;
      height: 32px;
      background: #3B82F6;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-element svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .text-element {
      padding: 6px 12px;
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 4px;
      font-size: 14px;
      white-space: nowrap;
    }

    .button-element {
      padding: 8px 16px;
      background: #22c55e;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: white;
    }

    /* Inference Indicator Styles */
    .inference-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 9500;
    }

    .inference-connector {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      height: 2px;
      opacity: 0.6;
      transition: opacity 150ms ease;
    }

    .inference-connector:hover {
      opacity: 1;
    }

    .inference-action {
      position: absolute;
      padding: 4px 8px;
      background: #10B981;
      color: white;
      font-size: 11px;
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 500;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 150ms ease;
      cursor: pointer;
      white-space: nowrap;
      z-index: 9501;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .inference-action:hover {
      background: #059669;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #18181b;
      border-radius: 8px;
      padding: 16px;
    }

    .sidebar h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #a1a1aa;
    }

    .sidebar section {
      margin-bottom: 24px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .control-row label {
      font-size: 13px;
      color: #a1a1aa;
    }

    .control-row input[type="range"] {
      width: 120px;
    }

    .control-row input[type="number"] {
      width: 60px;
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 4px;
      padding: 4px 8px;
      color: #e4e4e7;
      font-size: 12px;
    }

    button.action-btn {
      width: 100%;
      padding: 10px;
      background: #3B82F6;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button.action-btn:hover {
      background: #2563EB;
    }

    button.action-btn.secondary {
      background: #27272a;
      border: 1px solid #3f3f46;
    }

    button.action-btn.secondary:hover {
      background: #3f3f46;
    }

    .log {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      background: #0a0a0f;
      border-radius: 4px;
      padding: 12px;
      max-height: 200px;
      overflow-y: auto;
    }

    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #1a1a1f;
      color: #71717a;
    }

    .log-entry.action {
      color: #10B981;
    }

    .log-entry.detect {
      color: #3B82F6;
    }

    /* Status indicator */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #27272a;
      border-radius: 4px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }

    .status-dot.inactive {
      background: #71717a;
    }
  </style>
</head>
<body>
  <header>
    <h1>Layout Inference Prototype</h1>
    <p>Ziehe Elemente nebeneinander um horizontale Ausrichtung zu erkennen</p>
  </header>

  <div class="container">
    <div class="preview-area">
      <div class="preview-content" id="preview">
        <!-- Draggable elements -->
        <div class="element icon-element" data-mirror-id="icon-1" style="left: 50px; top: 100px;">
          <svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        </div>
        <div class="element text-element" data-mirror-id="text-1" style="left: 100px; top: 103px;">
          Label Text
        </div>
        <div class="element button-element" data-mirror-id="btn-1" style="left: 200px; top: 100px;">
          Action
        </div>

        <!-- Second row -->
        <div class="element icon-element" data-mirror-id="icon-2" style="left: 50px; top: 200px;">
          <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <div class="element text-element" data-mirror-id="text-2" style="left: 100px; top: 250px;">
          Nicht ausgerichtet
        </div>

        <!-- Inference overlay -->
        <div class="inference-overlay" id="inference-overlay"></div>
      </div>
    </div>

    <div class="sidebar">
      <section>
        <h2>Status</h2>
        <div class="status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Inference aktiv</span>
        </div>
      </section>

      <section>
        <h2>Einstellungen</h2>
        <div class="controls">
          <div class="control-row">
            <label>Toleranz (px)</label>
            <input type="number" id="tolerance" value="10" min="1" max="50">
          </div>
          <div class="control-row">
            <label>Debounce (ms)</label>
            <input type="number" id="debounce" value="500" min="100" max="2000" step="100">
          </div>
        </div>
      </section>

      <section>
        <h2>Aktionen</h2>
        <div class="controls">
          <button class="action-btn" onclick="detectNow()">Jetzt erkennen</button>
          <button class="action-btn secondary" onclick="resetElements()">Elemente zurücksetzen</button>
        </div>
      </section>

      <section>
        <h2>Log</h2>
        <div class="log" id="log"></div>
      </section>
    </div>
  </div>

  <script>
    // ====================
    // Types & Config
    // ====================
    const EMERALD = '#10B981'
    let tolerance = 10
    let debounceDelay = 500
    let debounceTimer = null

    // ====================
    // Drag & Drop
    // ====================
    const preview = document.getElementById('preview')
    const elements = document.querySelectorAll('.element')

    let draggedElement = null
    let offsetX = 0
    let offsetY = 0

    elements.forEach(el => {
      el.addEventListener('mousedown', startDrag)
    })

    document.addEventListener('mousemove', drag)
    document.addEventListener('mouseup', endDrag)

    function startDrag(e) {
      draggedElement = e.currentTarget
      draggedElement.classList.add('dragging')
      const rect = draggedElement.getBoundingClientRect()
      offsetX = e.clientX - rect.left
      offsetY = e.clientY - rect.top
      hideIndicators()
    }

    function drag(e) {
      if (!draggedElement) return

      const previewRect = preview.getBoundingClientRect()
      let x = e.clientX - previewRect.left - offsetX
      let y = e.clientY - previewRect.top - offsetY

      // Constrain to preview area
      x = Math.max(0, Math.min(x, previewRect.width - draggedElement.offsetWidth))
      y = Math.max(32, Math.min(y, previewRect.height - draggedElement.offsetHeight))

      draggedElement.style.left = x + 'px'
      draggedElement.style.top = y + 'px'
    }

    function endDrag() {
      if (draggedElement) {
        draggedElement.classList.remove('dragging')
        draggedElement = null
        scheduleDetection()
      }
    }

    // ====================
    // Alignment Detection
    // ====================
    function getElementBounds() {
      const bounds = []
      elements.forEach(el => {
        const rect = el.getBoundingClientRect()
        const previewRect = preview.getBoundingClientRect()
        bounds.push({
          nodeId: el.getAttribute('data-mirror-id'),
          element: el,
          left: rect.left - previewRect.left,
          right: rect.right - previewRect.left,
          top: rect.top - previewRect.top,
          bottom: rect.bottom - previewRect.top,
          centerX: rect.left - previewRect.left + rect.width / 2,
          centerY: rect.top - previewRect.top + rect.height / 2,
          width: rect.width,
          height: rect.height
        })
      })
      return bounds
    }

    function areHorizontallyAligned(a, b) {
      const yDiff = Math.abs(a.centerY - b.centerY)
      const noOverlap = a.right < b.left || b.right < a.left
      return yDiff <= tolerance && noOverlap
    }

    function inferGap(elements) {
      if (elements.length < 2) return 0
      const sorted = [...elements].sort((a, b) => a.left - b.left)
      const gaps = []
      for (let i = 0; i < sorted.length - 1; i++) {
        gaps.push(sorted[i + 1].left - sorted[i].right)
      }
      const avg = gaps.reduce((a, b) => a + b, 0) / gaps.length
      return Math.round(avg / 4) * 4
    }

    function detectAlignments() {
      const bounds = getElementBounds()
      const groups = []
      const used = new Set()

      // Sort by Y
      const sorted = [...bounds].sort((a, b) => a.centerY - b.centerY)

      for (let i = 0; i < sorted.length; i++) {
        if (used.has(sorted[i].nodeId)) continue

        const group = [sorted[i]]
        used.add(sorted[i].nodeId)

        for (let j = i + 1; j < sorted.length; j++) {
          if (used.has(sorted[j].nodeId)) continue

          const isAligned = group.some(member => areHorizontallyAligned(member, sorted[j]))
          if (isAligned) {
            group.push(sorted[j])
            used.add(sorted[j].nodeId)
          }
        }

        if (group.length >= 2) {
          group.sort((a, b) => a.left - b.left)
          const gap = inferGap(group)
          groups.push({
            id: 'group-' + i,
            type: 'horizontal',
            elements: group,
            inferredGap: gap,
            suggestedDSL: `hor, gap ${gap}`
          })
        }
      }

      return groups
    }

    // ====================
    // Visualization
    // ====================
    const overlay = document.getElementById('inference-overlay')

    function hideIndicators() {
      overlay.innerHTML = ''
    }

    function showIndicators(groups) {
      hideIndicators()

      groups.forEach(group => {
        // Create connectors between adjacent elements
        for (let i = 0; i < group.elements.length - 1; i++) {
          const a = group.elements[i]
          const b = group.elements[i + 1]

          const connector = document.createElement('div')
          connector.className = 'inference-connector'

          const x1 = a.right
          const x2 = b.left
          const y = (a.centerY + b.centerY) / 2

          Object.assign(connector.style, {
            left: x1 + 'px',
            top: (y - 1) + 'px',
            width: (x2 - x1) + 'px',
            background: `repeating-linear-gradient(90deg, ${EMERALD}, ${EMERALD} 4px, transparent 4px, transparent 8px)`
          })

          overlay.appendChild(connector)
        }

        // Create action button
        const action = document.createElement('div')
        action.className = 'inference-action'
        action.textContent = `→ HStack gap ${group.inferredGap}`

        const minX = Math.min(...group.elements.map(e => e.left))
        const maxX = Math.max(...group.elements.map(e => e.right))
        const avgY = group.elements.reduce((sum, e) => sum + e.centerY, 0) / group.elements.length

        Object.assign(action.style, {
          left: ((minX + maxX) / 2) + 'px',
          top: (avgY - 28) + 'px',
          transform: 'translateX(-50%)'
        })

        action.onclick = () => convertGroup(group)

        // Show action on connector hover
        overlay.querySelectorAll('.inference-connector').forEach(conn => {
          conn.addEventListener('mouseenter', () => {
            action.style.opacity = '1'
            action.style.pointerEvents = 'auto'
          })
          conn.addEventListener('mouseleave', (e) => {
            if (e.relatedTarget !== action) {
              action.style.opacity = '0'
              action.style.pointerEvents = 'none'
            }
          })
        })

        action.addEventListener('mouseenter', () => {
          action.style.opacity = '1'
          action.style.pointerEvents = 'auto'
        })
        action.addEventListener('mouseleave', () => {
          action.style.opacity = '0'
          action.style.pointerEvents = 'none'
        })

        overlay.appendChild(action)
      })
    }

    function convertGroup(group) {
      const nodeIds = group.elements.map(e => e.nodeId).join(', ')
      log(`Konvertiere: ${nodeIds} → Box ${group.suggestedDSL}`, 'action')

      // Visual feedback: highlight elements briefly
      group.elements.forEach(el => {
        el.element.style.outline = `2px solid ${EMERALD}`
        setTimeout(() => {
          el.element.style.outline = ''
        }, 1000)
      })

      hideIndicators()
    }

    // ====================
    // Scheduling
    // ====================
    function scheduleDetection() {
      if (debounceTimer) clearTimeout(debounceTimer)
      debounceTimer = setTimeout(detectNow, debounceDelay)
    }

    function detectNow() {
      const groups = detectAlignments()
      log(`Erkannt: ${groups.length} Gruppe(n)`, 'detect')

      if (groups.length > 0) {
        groups.forEach(g => {
          log(`  ${g.elements.map(e => e.nodeId).join(' + ')} → gap ${g.inferredGap}px`, 'detect')
        })
        showIndicators(groups)
      } else {
        hideIndicators()
      }
    }

    // ====================
    // UI Controls
    // ====================
    document.getElementById('tolerance').addEventListener('change', (e) => {
      tolerance = parseInt(e.target.value)
      log(`Toleranz geändert: ${tolerance}px`)
      detectNow()
    })

    document.getElementById('debounce').addEventListener('change', (e) => {
      debounceDelay = parseInt(e.target.value)
      log(`Debounce geändert: ${debounceDelay}ms`)
    })

    function resetElements() {
      elements[0].style.left = '50px'
      elements[0].style.top = '100px'
      elements[1].style.left = '100px'
      elements[1].style.top = '103px'
      elements[2].style.left = '200px'
      elements[2].style.top = '100px'
      elements[3].style.left = '50px'
      elements[3].style.top = '200px'
      elements[4].style.left = '100px'
      elements[4].style.top = '250px'
      log('Elemente zurückgesetzt')
      detectNow()
    }

    // ====================
    // Logging
    // ====================
    const logEl = document.getElementById('log')

    function log(message, type = '') {
      const entry = document.createElement('div')
      entry.className = 'log-entry' + (type ? ' ' + type : '')
      entry.textContent = `${new Date().toLocaleTimeString()}: ${message}`
      logEl.insertBefore(entry, logEl.firstChild)

      // Keep max 50 entries
      while (logEl.children.length > 50) {
        logEl.removeChild(logEl.lastChild)
      }
    }

    // ====================
    // Init
    // ====================
    log('Prototype gestartet')
    detectNow()
  </script>
</body>
</html>
