<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Inference v2 - Snapping</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e4e4e7;
      min-height: 100vh;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .instructions {
      font-size: 13px;
      color: #71717a;
      margin-bottom: 24px;
    }

    .workspace {
      display: flex;
      gap: 40px;
    }

    .canvas {
      width: 500px;
      height: 400px;
      background: #18181b;
      border-radius: 12px;
      border: 1px solid #27272a;
      position: relative;
      overflow: hidden;
    }

    .element {
      position: absolute;
      background: #27272a;
      border: 2px solid #3f3f46;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 13px;
      cursor: grab;
      user-select: none;
      transition: border-color 0.1s ease, background 0.1s ease;
    }

    .element:hover {
      border-color: #52525b;
    }

    .element.dragging {
      cursor: grabbing;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 1000;
      opacity: 0.95;
      border-color: #3b82f6;
    }

    .element.snap-target {
      border-color: #3b82f6;
      background: #1e3a5f;
    }

    /* Snap Guides */
    .snap-guide {
      position: absolute;
      background: #3b82f6;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s ease;
      z-index: 500;
    }

    .snap-guide.horizontal {
      height: 2px;
      left: 0;
      right: 0;
    }

    .snap-guide.vertical {
      width: 2px;
      top: 0;
      bottom: 0;
    }

    .snap-guide.visible {
      opacity: 1;
    }

    /* Container Preview */
    .container-preview {
      position: absolute;
      border: 2px dashed #3b82f6;
      border-radius: 8px;
      background: rgba(59, 130, 246, 0.08);
      pointer-events: none;
      opacity: 0;
      transition: all 0.15s ease;
      z-index: 100;
    }

    .container-preview.visible {
      opacity: 1;
    }

    .container-preview .label {
      position: absolute;
      top: -24px;
      left: 8px;
      font-size: 11px;
      color: #3b82f6;
      background: #18181b;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    /* Drop Indicator */
    .drop-indicator {
      position: absolute;
      background: #3b82f6;
      border-radius: 2px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s ease;
      z-index: 600;
    }

    .drop-indicator.horizontal {
      width: 4px;
      height: 40px;
    }

    .drop-indicator.vertical {
      height: 4px;
      width: 80px;
    }

    .drop-indicator.visible {
      opacity: 1;
    }

    /* Gap Indicator */
    .gap-indicator {
      position: absolute;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #3b82f6;
      opacity: 0;
      z-index: 550;
    }

    .gap-indicator.visible {
      opacity: 1;
    }

    .gap-indicator .line {
      background: #3b82f6;
      opacity: 0.5;
    }

    .gap-indicator.horizontal .line {
      height: 1px;
      flex: 1;
    }

    .gap-indicator.vertical .line {
      width: 1px;
      flex: 1;
    }

    .gap-indicator .value {
      padding: 0 4px;
      background: #18181b;
    }

    /* Structure Panel */
    .structure-panel {
      width: 280px;
    }

    .structure-panel h2 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 12px;
      color: #a1a1aa;
    }

    .structure-code {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre;
      color: #e4e4e7;
      min-height: 200px;
    }

    .structure-code .keyword {
      color: #f472b6;
    }

    .structure-code .property {
      color: #60a5fa;
    }

    .structure-code .string {
      color: #4ade80;
    }

    .structure-code .number {
      color: #fbbf24;
    }

    .reset-btn {
      margin-top: 16px;
      padding: 8px 16px;
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #e4e4e7;
      font-size: 13px;
      cursor: pointer;
    }

    .reset-btn:hover {
      background: #3f3f46;
    }

    /* Status */
    .status {
      margin-top: 16px;
      padding: 12px;
      background: #27272a;
      border-radius: 6px;
      font-size: 12px;
      color: #a1a1aa;
    }

    .status strong {
      color: #e4e4e7;
    }
  </style>
</head>
<body>
  <h1>Layout Inference v2 - Snapping</h1>
  <p class="instructions">
    Ziehe Elemente. Sie snappen automatisch in horizontale oder vertikale Layouts.
  </p>

  <div class="workspace">
    <div class="canvas" id="canvas">
      <div class="element" data-id="titel" style="left: 24px; top: 24px;">Titel</div>
      <div class="element" data-id="datum" style="left: 24px; top: 80px;">Datum</div>
      <div class="element" data-id="autor" style="left: 24px; top: 136px;">Autor</div>
      <div class="element" data-id="text" style="left: 24px; top: 192px;">Text</div>

      <!-- Snap Guides -->
      <div class="snap-guide horizontal" id="guideH"></div>
      <div class="snap-guide vertical" id="guideV"></div>

      <!-- Container Preview -->
      <div class="container-preview" id="containerPreview">
        <span class="label" id="containerLabel">Box hor gap 16</span>
      </div>

      <!-- Drop Indicator -->
      <div class="drop-indicator" id="dropIndicator"></div>
    </div>

    <div class="structure-panel">
      <h2>Erkannte Struktur</h2>
      <div class="structure-code" id="structureCode"></div>
      <button class="reset-btn" onclick="resetPositions()">Reset</button>

      <div class="status" id="status">
        <strong>Modus:</strong> Bereit
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas')
    const containerPreview = document.getElementById('containerPreview')
    const containerLabel = document.getElementById('containerLabel')
    const dropIndicator = document.getElementById('dropIndicator')
    const guideH = document.getElementById('guideH')
    const guideV = document.getElementById('guideV')
    const structureCode = document.getElementById('structureCode')
    const statusEl = document.getElementById('status')

    const CONFIG = {
      SNAP_THRESHOLD: 24,     // Snap wenn näher als 24px
      GAP: 16,                // Standard Gap
      PADDING: 24,            // Canvas Padding
      ROW_TOLERANCE: 20,      // Gleiche Zeile Toleranz
    }

    let elements = []
    let draggedElement = null
    let draggedData = null
    let dragOffset = { x: 0, y: 0 }
    let originalPositions = new Map()
    let currentSnap = null

    // Initialize
    function init() {
      document.querySelectorAll('.element').forEach(el => {
        const data = {
          id: el.dataset.id,
          el: el,
          x: parseInt(el.style.left),
          y: parseInt(el.style.top),
          w: el.offsetWidth,
          h: el.offsetHeight
        }
        elements.push(data)

        originalPositions.set(el.dataset.id, {
          x: data.x,
          y: data.y
        })

        el.addEventListener('mousedown', startDrag)
      })

      document.addEventListener('mousemove', onDrag)
      document.addEventListener('mouseup', endDrag)

      updateStructure()
    }

    function startDrag(e) {
      draggedElement = e.target
      draggedData = elements.find(el => el.id === draggedElement.dataset.id)
      draggedElement.classList.add('dragging')

      const rect = draggedElement.getBoundingClientRect()
      dragOffset.x = e.clientX - rect.left
      dragOffset.y = e.clientY - rect.top

      setStatus('Ziehen...')
      e.preventDefault()
    }

    function onDrag(e) {
      if (!draggedElement || !draggedData) return

      const canvasRect = canvas.getBoundingClientRect()
      let x = e.clientX - canvasRect.left - dragOffset.x
      let y = e.clientY - canvasRect.top - dragOffset.y

      // Get other elements
      const others = elements.filter(el => el.id !== draggedData.id)

      // Find snap targets
      const snap = findSnapTarget(x, y, draggedData, others)
      currentSnap = snap

      if (snap) {
        // Apply snap position
        x = snap.x
        y = snap.y

        // Show guides
        showSnapGuides(snap)

        // Show container preview
        showContainerPreview(snap, draggedData, others)

        // Highlight snap target
        others.forEach(el => el.el.classList.remove('snap-target'))
        if (snap.targetElement) {
          snap.targetElement.el.classList.add('snap-target')
        }

        setStatus(`Snap: <strong>${snap.type}</strong> ${snap.direction || ''}`)
      } else {
        hideGuides()
        hideContainerPreview()
        others.forEach(el => el.el.classList.remove('snap-target'))
        setStatus('Ziehen...')
      }

      // Constrain to canvas
      x = Math.max(CONFIG.PADDING, Math.min(x, canvas.offsetWidth - draggedData.w - CONFIG.PADDING))
      y = Math.max(CONFIG.PADDING, Math.min(y, canvas.offsetHeight - draggedData.h - CONFIG.PADDING))

      // Update position
      draggedElement.style.left = x + 'px'
      draggedElement.style.top = y + 'px'
      draggedData.x = x
      draggedData.y = y

      updateStructure()
    }

    function findSnapTarget(x, y, dragged, others) {
      const candidates = []

      for (const other of others) {
        // === HORIZONTAL: Rechts von other ===
        const snapRightX = other.x + other.w + CONFIG.GAP
        const snapRightY = other.y + (other.h - dragged.h) / 2 // Vertikal zentriert

        if (Math.abs(x - snapRightX) < CONFIG.SNAP_THRESHOLD &&
            Math.abs(y - snapRightY) < CONFIG.SNAP_THRESHOLD * 2) {
          candidates.push({
            type: 'horizontal',
            direction: 'right-of',
            x: snapRightX,
            y: other.y, // Exakt gleiche Y wie target
            targetElement: other,
            distance: Math.hypot(x - snapRightX, y - snapRightY)
          })
        }

        // === HORIZONTAL: Links von other ===
        const snapLeftX = other.x - dragged.w - CONFIG.GAP
        const snapLeftY = other.y

        if (Math.abs(x - snapLeftX) < CONFIG.SNAP_THRESHOLD &&
            Math.abs(y - snapLeftY) < CONFIG.SNAP_THRESHOLD * 2) {
          candidates.push({
            type: 'horizontal',
            direction: 'left-of',
            x: snapLeftX,
            y: other.y,
            targetElement: other,
            distance: Math.hypot(x - snapLeftX, y - snapLeftY)
          })
        }

        // === VERTIKAL: Unter other ===
        const snapBelowX = other.x
        const snapBelowY = other.y + other.h + CONFIG.GAP

        if (Math.abs(y - snapBelowY) < CONFIG.SNAP_THRESHOLD &&
            Math.abs(x - snapBelowX) < CONFIG.SNAP_THRESHOLD * 2) {
          candidates.push({
            type: 'vertical',
            direction: 'below',
            x: other.x, // Exakt gleiche X wie target
            y: snapBelowY,
            targetElement: other,
            distance: Math.hypot(x - snapBelowX, y - snapBelowY)
          })
        }

        // === VERTIKAL: Über other ===
        const snapAboveX = other.x
        const snapAboveY = other.y - dragged.h - CONFIG.GAP

        if (Math.abs(y - snapAboveY) < CONFIG.SNAP_THRESHOLD &&
            Math.abs(x - snapAboveX) < CONFIG.SNAP_THRESHOLD * 2) {
          candidates.push({
            type: 'vertical',
            direction: 'above',
            x: other.x,
            y: snapAboveY,
            targetElement: other,
            distance: Math.hypot(x - snapAboveX, y - snapAboveY)
          })
        }
      }

      // Return closest snap
      if (candidates.length > 0) {
        candidates.sort((a, b) => a.distance - b.distance)
        return candidates[0]
      }

      return null
    }

    function showSnapGuides(snap) {
      if (snap.type === 'horizontal') {
        guideH.style.top = (snap.y + draggedData.h / 2) + 'px'
        guideH.classList.add('visible')
        guideV.classList.remove('visible')
      } else if (snap.type === 'vertical') {
        guideV.style.left = (snap.x + draggedData.w / 2) + 'px'
        guideV.classList.add('visible')
        guideH.classList.remove('visible')
      }
    }

    function hideGuides() {
      guideH.classList.remove('visible')
      guideV.classList.remove('visible')
    }

    function showContainerPreview(snap, dragged, others) {
      if (!snap.targetElement) {
        hideContainerPreview()
        return
      }

      const target = snap.targetElement

      // Find all elements that would be in this group
      let groupElements = [target]

      if (snap.type === 'horizontal') {
        // Find others on same row
        groupElements = others.filter(el =>
          Math.abs(el.y - target.y) < CONFIG.ROW_TOLERANCE
        )
      }

      // Add dragged element at snap position
      const draggedAtSnap = { ...dragged, x: snap.x, y: snap.y }
      groupElements.push(draggedAtSnap)

      // Calculate bounding box
      const padding = 8
      const minX = Math.min(...groupElements.map(e => e.x)) - padding
      const minY = Math.min(...groupElements.map(e => e.y)) - padding
      const maxX = Math.max(...groupElements.map(e => e.x + e.w)) + padding
      const maxY = Math.max(...groupElements.map(e => e.y + e.h)) + padding

      containerPreview.style.left = minX + 'px'
      containerPreview.style.top = minY + 'px'
      containerPreview.style.width = (maxX - minX) + 'px'
      containerPreview.style.height = (maxY - minY) + 'px'

      containerLabel.textContent = snap.type === 'horizontal'
        ? `Box hor gap ${CONFIG.GAP}`
        : `Box ver gap ${CONFIG.GAP}`

      containerPreview.classList.add('visible')
    }

    function hideContainerPreview() {
      containerPreview.classList.remove('visible')
    }

    function endDrag() {
      if (draggedElement) {
        draggedElement.classList.remove('dragging')

        // Apply final snap if active
        if (currentSnap) {
          draggedData.x = currentSnap.x
          draggedData.y = currentSnap.y
          draggedElement.style.left = currentSnap.x + 'px'
          draggedElement.style.top = currentSnap.y + 'px'
        }

        draggedElement = null
        draggedData = null
        currentSnap = null

        hideGuides()
        hideContainerPreview()

        elements.forEach(el => el.el.classList.remove('snap-target'))

        updateStructure()
        setStatus('Bereit')
      }
    }

    function updateStructure() {
      const layout = inferLayout(elements)
      const code = renderMirror(layout)
      structureCode.innerHTML = syntaxHighlight(code)
    }

    function inferLayout(elements) {
      if (elements.length === 0) return { type: 'box', dir: 'ver', children: [] }

      // Sort by Y, then X
      const sorted = [...elements].sort((a, b) => a.y - b.y || a.x - b.x)

      // Group by row
      const rows = []
      let currentRow = [sorted[0]]

      for (let i = 1; i < sorted.length; i++) {
        if (Math.abs(sorted[i].y - currentRow[0].y) < CONFIG.ROW_TOLERANCE) {
          currentRow.push(sorted[i])
        } else {
          rows.push(currentRow.sort((a, b) => a.x - b.x))
          currentRow = [sorted[i]]
        }
      }
      rows.push(currentRow.sort((a, b) => a.x - b.x))

      // Build structure
      const children = rows.map(row => {
        if (row.length === 1) {
          return { type: 'element', id: row[0].id }
        }

        return {
          type: 'box',
          dir: 'hor',
          gap: CONFIG.GAP,
          children: row.map(el => ({ type: 'element', id: el.id }))
        }
      })

      // Single row with multiple elements
      if (rows.length === 1 && children[0].type === 'box') {
        return children[0]
      }

      return {
        type: 'box',
        dir: 'ver',
        gap: CONFIG.GAP,
        children
      }
    }

    function renderMirror(node, indent = 0) {
      const pad = '  '.repeat(indent)

      if (node.type === 'element') {
        return `${pad}Text "${node.id}"`
      }

      if (node.type === 'box') {
        const gapStr = node.gap ? ` gap ${node.gap}` : ''
        const header = `${pad}Box ${node.dir}${gapStr}`

        if (!node.children || node.children.length === 0) {
          return header
        }

        const childrenStr = node.children
          .map(child => renderMirror(child, indent + 1))
          .join('\n')

        return `${header}\n${childrenStr}`
      }

      return ''
    }

    function syntaxHighlight(code) {
      return code
        .replace(/\b(Box|Text|Slot)\b/g, '<span class="keyword">$1</span>')
        .replace(/\b(ver|hor|gap|w)\b/g, '<span class="property">$1</span>')
        .replace(/"([^"]+)"/g, '<span class="string">"$1"</span>')
        .replace(/\b(\d+)\b/g, '<span class="number">$1</span>')
    }

    function setStatus(html) {
      statusEl.innerHTML = `<strong>Modus:</strong> ${html}`
    }

    function resetPositions() {
      elements.forEach(data => {
        const orig = originalPositions.get(data.id)
        if (orig) {
          data.x = orig.x
          data.y = orig.y
          data.el.style.left = orig.x + 'px'
          data.el.style.top = orig.y + 'px'
        }
      })
      updateStructure()
    }

    // Start
    init()
  </script>
</body>
</html>
