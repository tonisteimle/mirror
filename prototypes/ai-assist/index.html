<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assist Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Mirror AI Assist</h1>
      <div class="status" id="status">Bereit</div>
    </header>

    <main>
      <div class="editor-container">
        <div class="line-numbers" id="lineNumbers">1</div>
        <div class="editor draft" id="editor" contenteditable="true" spellcheck="false"></div>
      </div>

      <div class="controls">
        <div class="mode-indicator draft" id="modeIndicator">
          <span class="dot"></span>
          <span id="modeText">Draft</span>
        </div>

        <label>
          <input type="checkbox" id="autoComplete" checked>
          Auto (nach Enter)
        </label>

        <button id="triggerComplete">AI Validate (Cmd+Enter)</button>

        <span class="latency" id="latency"></span>
      </div>

      <div class="info">
        <p><strong>Konzept:</strong></p>
        <ul>
          <li><span class="draft-text">Grauer Text</span> = Du schreibst (Draft)</li>
          <li><span class="validated-text">Farbiger Text</span> = AI hat validiert/korrigiert</li>
          <li>AI beobachtet und wartet auf <strong>Pause</strong> (1.5s)</li>
          <li>Dann analysiert sie den <strong>ganzen Block</strong></li>
          <li><strong>Cmd+Enter</strong> = sofort AI triggern</li>
          <li><strong>Escape</strong> = AI abbrechen</li>
        </ul>
      </div>
    </main>

    <div class="log" id="log"></div>
  </div>

  <script src="client.js"></script>
</body>
</html>
