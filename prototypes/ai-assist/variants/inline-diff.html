<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AI Assist - 2 Stufen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #333;
    }
    h1 { font-size: 20px; }
    .back { color: #888; text-decoration: none; }
    .back:hover { color: #fff; }
    .status {
      padding: 6px 12px;
      background: #1a1a1a;
      border-radius: 6px;
      font-size: 13px;
    }
    .status.loading { color: #f59e0b; }
    .status.done { color: #10b981; }

    .editor-container {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    /* Zwei Layer: Validated (unten) + Draft Input (oben) */
    .validated-layer {
      padding: 16px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 14px;
      line-height: 1.6;
      min-height: 300px;
      white-space: pre-wrap;
      pointer-events: none;
    }

    .editor {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 14px;
      line-height: 1.6;
      min-height: 300px;
      outline: none;
      white-space: pre-wrap;
      background: transparent;
      caret-color: #fff;
    }
    .editor:empty::before {
      content: 'Schreibe Mirror-Code...';
      color: #444;
    }

    /* Validierter Code - Helle Farben */
    .validated-layer .kw { color: #c792ea; }
    .validated-layer .str { color: #c3e88d; }
    .validated-layer .prop { color: #82aaff; }
    .validated-layer .hex { color: #f78c6c; }
    .validated-layer .num { color: #f78c6c; }
    .validated-layer .punc { color: #89ddff; }

    /* Draft/Neuer Code - Gedämpfte Farben */
    .editor .kw { color: #6b5b7a; }
    .editor .str { color: #5a6b4d; }
    .editor .prop { color: #4a5f7a; }
    .editor .hex { color: #7a5a4a; }
    .editor .num { color: #7a5a4a; }
    .editor .punc { color: #4a6a6a; }
    .editor { color: #555; }

    /* Wenn alles validiert ist, Editor transparent */
    .editor.all-validated {
      color: transparent;
    }
    .editor.all-validated .kw,
    .editor.all-validated .str,
    .editor.all-validated .prop,
    .editor.all-validated .hex,
    .editor.all-validated .num,
    .editor.all-validated .punc {
      color: transparent;
    }

    .info {
      margin-top: 24px;
      padding: 16px;
      background: #111;
      border-radius: 8px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <a href="index.html" class="back">← Zurück</a>
        <h1>AI Assist - 2 Stufen</h1>
      </div>
      <div class="status" id="status">Bereit</div>
    </header>

    <div class="editor-container">
      <!-- Unterer Layer: Validierter Code (hell) -->
      <div class="validated-layer" id="validated"></div>
      <!-- Oberer Layer: Aktueller Input (gedämpft, wird transparent wenn validiert) -->
      <div class="editor" id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

    <div class="info">
      <p><strong>So funktioniert's:</strong></p>
      <p>Tippe Code → <span style="color:#6b5b7a">gedämpfte Farben</span></p>
      <p>Nach AI-Validierung → <span style="color:#c792ea">helle Farben</span></p>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3456'
    const editor = document.getElementById('editor')
    const validated = document.getElementById('validated')
    const status = document.getElementById('status')

    let pauseTimer = null
    let isLoading = false
    let lastValidatedCode = ''

    const KEYWORDS = ['Frame', 'Text', 'Button', 'Icon', 'Input', 'Image', 'Link', 'Card', 'Box', 'Divider', 'Spacer', 'Header', 'Nav', 'Main', 'Section', 'Footer']
    const PROPERTIES = ['bg', 'col', 'pad', 'rad', 'gap', 'w', 'h', 'fs', 'ic', 'is', 'hor', 'ver', 'center', 'spread', 'weight', 'grow', 'shrink', 'shadow', 'opacity', 'bor', 'boc']

    // ===========================================
    // Input Handler - Keine innerHTML-Manipulation!
    // ===========================================
    editor.addEventListener('input', () => {
      clearTimeout(pauseTimer)

      const currentCode = editor.innerText || ''

      // Prüfe ob der aktuelle Code mit dem validierten übereinstimmt
      if (currentCode === lastValidatedCode) {
        editor.classList.add('all-validated')
      } else {
        editor.classList.remove('all-validated')
        status.textContent = 'Tippen...'
        status.className = 'status'
      }

      // Warte auf Pause, dann validiere
      pauseTimer = setTimeout(() => {
        if (currentCode.trim().length > 5) {
          validateWithAI(currentCode)
        }
      }, 1500)
    })

    // ===========================================
    // AI Validation
    // ===========================================
    async function validateWithAI(code) {
      if (isLoading) return
      isLoading = true
      status.textContent = 'AI prüft...'
      status.className = 'status loading'

      try {
        const response = await fetch(`${API_URL}/complete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        })
        const data = await response.json()

        if (data.success) {
          lastValidatedCode = data.code

          // Zeige validierten Code im unteren Layer (hell)
          validated.innerHTML = highlight(data.code)

          // Aktualisiere Editor mit validiertem Code
          editor.innerText = data.code
          editor.classList.add('all-validated')

          // Cursor ans Ende
          const range = document.createRange()
          range.selectNodeContents(editor)
          range.collapse(false)
          const sel = window.getSelection()
          sel.removeAllRanges()
          sel.addRange(range)

          status.textContent = 'Validiert ✓'
          status.className = 'status done'
        }
      } catch (e) {
        status.textContent = 'Fehler'
        status.className = 'status'
      } finally {
        isLoading = false
      }
    }

    // ===========================================
    // Syntax Highlighting (nur für validated layer)
    // ===========================================
    function highlight(code) {
      let result = escapeHtml(code)

      // Strings
      result = result.replace(/"([^"]+)"/g, '<span class="str">"$1"</span>')

      // Hex colors
      result = result.replace(/(#[0-9a-fA-F]{3,8})/g, '<span class="hex">$1</span>')

      // Numbers
      result = result.replace(/\b(\d+)\b/g, '<span class="num">$1</span>')

      // Keywords
      KEYWORDS.forEach(kw => {
        const regex = new RegExp(`(^|\\n)(\\s*)(${kw})\\b`, 'g')
        result = result.replace(regex, `$1$2<span class="kw">${kw}</span>`)
      })

      // Properties
      PROPERTIES.forEach(prop => {
        const regex = new RegExp(`\\b(${prop})\\b`, 'g')
        result = result.replace(regex, '<span class="prop">$1</span>')
      })

      // Punctuation
      result = result.replace(/([,:])/g, '<span class="punc">$1</span>')

      return result
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    }
  </script>
</body>
</html>
