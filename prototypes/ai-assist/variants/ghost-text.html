<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Variante B: Ghost Text</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #333;
    }
    h1 { font-size: 20px; }
    .back { color: #888; text-decoration: none; }
    .back:hover { color: #fff; }
    .status {
      padding: 6px 12px;
      background: #1a1a1a;
      border-radius: 6px;
      font-size: 13px;
    }
    .status.loading { color: #f59e0b; }
    .status.done { color: #10b981; }

    .editor-container {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .editor-wrapper {
      position: relative;
      padding: 16px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 14px;
      line-height: 1.6;
      min-height: 300px;
    }

    .editor {
      position: relative;
      z-index: 2;
      outline: none;
      white-space: pre-wrap;
      min-height: 100%;
    }
    .editor:empty::before {
      content: 'Schreibe Mirror-Code...';
      color: #444;
    }

    /* Ghost text overlay */
    .ghost {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      white-space: pre-wrap;
      color: #444;
      pointer-events: none;
      z-index: 1;
    }

    .ghost-suggestion {
      color: #3d6b3d;
      background: rgba(16, 185, 129, 0.05);
    }

    .hint {
      position: absolute;
      bottom: 8px;
      right: 8px;
      padding: 4px 8px;
      background: #222;
      border-radius: 4px;
      font-size: 11px;
      color: #666;
      z-index: 3;
    }
    .hint kbd {
      background: #333;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: inherit;
    }

    .info {
      margin-top: 24px;
      padding: 16px;
      background: #111;
      border-radius: 8px;
      font-size: 13px;
      color: #888;
    }
    .info kbd {
      background: #333;
      padding: 2px 6px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <a href="index.html" class="back">← Zurück</a>
        <h1>Variante B: Ghost Text</h1>
      </div>
      <div class="status" id="status">Bereit</div>
    </header>

    <div class="editor-container">
      <div class="editor-wrapper">
        <div class="ghost" id="ghost"></div>
        <div class="editor" id="editor" contenteditable="true" spellcheck="false"></div>
      </div>
      <div class="hint" id="hint" style="display: none;">
        <kbd>Tab</kbd> akzeptieren · <kbd>Esc</kbd> ablehnen
      </div>
    </div>

    <div class="info">
      <p><strong>So funktioniert's:</strong></p>
      <p>Schreibe Code, warte 1.5s. AI-Vorschlag erscheint als grauer "Ghost".</p>
      <p><kbd>Tab</kbd> = akzeptieren, <kbd>Esc</kbd> = ablehnen, Weiterschreiben = ignorieren.</p>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3456'
    const editor = document.getElementById('editor')
    const ghost = document.getElementById('ghost')
    const hint = document.getElementById('hint')
    const status = document.getElementById('status')

    let pauseTimer = null
    let isLoading = false
    let currentSuggestion = null
    let userCode = ''

    // Pause detection
    editor.addEventListener('input', () => {
      clearTimeout(pauseTimer)
      userCode = editor.innerText || ''

      // Clear ghost when typing
      if (currentSuggestion) {
        clearSuggestion()
      }

      pauseTimer = setTimeout(() => {
        if (userCode.trim().length > 5) {
          getSuggestion()
        }
      }, 1500)
    })

    async function getSuggestion() {
      if (isLoading) return
      isLoading = true
      status.textContent = 'AI denkt...'
      status.className = 'status loading'

      try {
        const response = await fetch(`${API_URL}/complete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: userCode })
        })
        const data = await response.json()

        if (data.success && data.code !== userCode) {
          showSuggestion(userCode, data.code)
          status.textContent = 'Vorschlag bereit'
          status.className = 'status done'
        } else {
          status.textContent = 'Keine Änderungen'
          status.className = 'status'
        }
      } catch (e) {
        status.textContent = 'Fehler'
      } finally {
        isLoading = false
      }
    }

    function showSuggestion(original, suggested) {
      currentSuggestion = suggested

      // Find where they differ
      let commonPrefix = 0
      while (commonPrefix < original.length &&
             commonPrefix < suggested.length &&
             original[commonPrefix] === suggested[commonPrefix]) {
        commonPrefix++
      }

      // Ghost shows: user text + suggestion continuation
      const ghostText = original + suggested.slice(commonPrefix)
      const suggestionPart = suggested.slice(commonPrefix)

      if (suggestionPart.trim()) {
        ghost.innerHTML = escapeHtml(original) +
          '<span class="ghost-suggestion">' + escapeHtml(suggestionPart) + '</span>'
        hint.style.display = 'block'
      }
    }

    function clearSuggestion() {
      currentSuggestion = null
      ghost.innerHTML = ''
      hint.style.display = 'none'
    }

    function acceptSuggestion() {
      if (currentSuggestion) {
        editor.innerText = currentSuggestion
        clearSuggestion()
        // Move cursor to end
        const range = document.createRange()
        range.selectNodeContents(editor)
        range.collapse(false)
        const sel = window.getSelection()
        sel.removeAllRanges()
        sel.addRange(range)
      }
    }

    // Keyboard handling
    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab' && currentSuggestion) {
        e.preventDefault()
        acceptSuggestion()
      }
      if (e.key === 'Escape' && currentSuggestion) {
        e.preventDefault()
        clearSuggestion()
        status.textContent = 'Abgelehnt'
        status.className = 'status'
      }
    })

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    }
  </script>
</body>
</html>
