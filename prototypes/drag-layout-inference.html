<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Inference Prototype</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e4e4e7;
      min-height: 100vh;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .instructions {
      font-size: 13px;
      color: #71717a;
      margin-bottom: 24px;
    }

    .workspace {
      display: flex;
      gap: 40px;
    }

    .canvas {
      width: 500px;
      height: 400px;
      background: #18181b;
      border-radius: 12px;
      border: 1px solid #27272a;
      position: relative;
      overflow: hidden;
    }

    .element {
      position: absolute;
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 13px;
      cursor: grab;
      user-select: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .element:hover {
      border-color: #52525b;
    }

    .element.dragging {
      cursor: grabbing;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 1000;
      opacity: 0.9;
    }

    .element.will-group {
      border-color: #3b82f6;
      background: #1e3a5f;
    }

    /* Container Preview */
    .container-preview {
      position: absolute;
      border: 2px dashed #3b82f6;
      border-radius: 8px;
      background: rgba(59, 130, 246, 0.05);
      pointer-events: none;
      opacity: 0;
      transition: all 0.15s ease;
    }

    .container-preview.visible {
      opacity: 1;
    }

    .container-preview .label {
      position: absolute;
      top: -24px;
      left: 8px;
      font-size: 11px;
      color: #3b82f6;
      background: #18181b;
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* Drop Zone Indicators */
    .drop-zone {
      position: absolute;
      background: rgba(59, 130, 246, 0.1);
      border: 1px dashed #3b82f6;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s ease;
    }

    .drop-zone.active {
      opacity: 1;
    }

    /* Gap Indicator */
    .gap-indicator {
      position: absolute;
      background: #3b82f6;
      pointer-events: none;
      opacity: 0;
    }

    .gap-indicator.visible {
      opacity: 0.3;
    }

    /* Structure Panel */
    .structure-panel {
      width: 280px;
    }

    .structure-panel h2 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 12px;
      color: #a1a1aa;
    }

    .structure-code {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre;
      color: #e4e4e7;
      min-height: 200px;
    }

    .structure-code .keyword {
      color: #f472b6;
    }

    .structure-code .property {
      color: #60a5fa;
    }

    .structure-code .string {
      color: #4ade80;
    }

    .structure-code .number {
      color: #fbbf24;
    }

    /* Reset Button */
    .reset-btn {
      margin-top: 16px;
      padding: 8px 16px;
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #e4e4e7;
      font-size: 13px;
      cursor: pointer;
    }

    .reset-btn:hover {
      background: #3f3f46;
    }

    /* Slot Preview */
    .slot-preview {
      position: absolute;
      border: 2px dashed #a855f7;
      border-radius: 6px;
      background: rgba(168, 85, 247, 0.05);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #a855f7;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .slot-preview.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1>Layout Inference Prototype</h1>
  <p class="instructions">
    Ziehe Elemente um sie anzuordnen. Das System zeigt live welche Container entstehen würden.
  </p>

  <div class="workspace">
    <div class="canvas" id="canvas">
      <div class="element" data-id="titel" style="left: 20px; top: 20px;">Titel</div>
      <div class="element" data-id="datum" style="left: 20px; top: 70px;">Datum</div>
      <div class="element" data-id="autor" style="left: 20px; top: 120px;">Autor</div>
      <div class="element" data-id="text" style="left: 20px; top: 170px;">Text</div>

      <div class="container-preview" id="containerPreview">
        <span class="label" id="containerLabel">Box hor gap 16</span>
      </div>

      <div class="slot-preview" id="slotPreview">Slot</div>
    </div>

    <div class="structure-panel">
      <h2>Erkannte Struktur</h2>
      <div class="structure-code" id="structureCode">Box ver
  Text "Titel"
  Text "Datum"
  Text "Autor"
  Text "Text"</div>
      <button class="reset-btn" onclick="resetPositions()">Reset</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas')
    const containerPreview = document.getElementById('containerPreview')
    const containerLabel = document.getElementById('containerLabel')
    const slotPreview = document.getElementById('slotPreview')
    const structureCode = document.getElementById('structureCode')

    const CONFIG = {
      Y_TOLERANCE: 20,      // Same row if Y difference < 20px
      GAP_SNAP: [8, 12, 16, 20, 24, 32],
      MIN_SLOT_WIDTH: 60,
    }

    let elements = []
    let draggedElement = null
    let dragOffset = { x: 0, y: 0 }
    let originalPositions = new Map()

    // Initialize
    function init() {
      document.querySelectorAll('.element').forEach(el => {
        elements.push({
          id: el.dataset.id,
          el: el,
          x: parseInt(el.style.left),
          y: parseInt(el.style.top),
          w: el.offsetWidth,
          h: el.offsetHeight
        })

        originalPositions.set(el.dataset.id, {
          x: parseInt(el.style.left),
          y: parseInt(el.style.top)
        })

        el.addEventListener('mousedown', startDrag)
      })

      document.addEventListener('mousemove', onDrag)
      document.addEventListener('mouseup', endDrag)

      updateStructure()
    }

    function startDrag(e) {
      draggedElement = e.target
      draggedElement.classList.add('dragging')

      const rect = draggedElement.getBoundingClientRect()
      const canvasRect = canvas.getBoundingClientRect()

      dragOffset.x = e.clientX - rect.left
      dragOffset.y = e.clientY - rect.top

      e.preventDefault()
    }

    function onDrag(e) {
      if (!draggedElement) return

      const canvasRect = canvas.getBoundingClientRect()
      let x = e.clientX - canvasRect.left - dragOffset.x
      let y = e.clientY - canvasRect.top - dragOffset.y

      // Constrain to canvas
      x = Math.max(0, Math.min(x, canvas.offsetWidth - draggedElement.offsetWidth))
      y = Math.max(0, Math.min(y, canvas.offsetHeight - draggedElement.offsetHeight))

      draggedElement.style.left = x + 'px'
      draggedElement.style.top = y + 'px'

      // Update element data
      const data = elements.find(el => el.id === draggedElement.dataset.id)
      if (data) {
        data.x = x
        data.y = y
      }

      // Update preview
      updatePreview()
      updateStructure()
    }

    function endDrag() {
      if (draggedElement) {
        draggedElement.classList.remove('dragging')
        draggedElement = null

        // Hide previews
        containerPreview.classList.remove('visible')
        slotPreview.classList.remove('visible')

        // Remove grouping highlights
        document.querySelectorAll('.element').forEach(el => {
          el.classList.remove('will-group')
        })
      }
    }

    function updatePreview() {
      if (!draggedElement) return

      const draggedData = elements.find(el => el.id === draggedElement.dataset.id)
      if (!draggedData) return

      // Find elements on same row (potential horizontal group)
      const sameRow = elements.filter(el => {
        if (el.id === draggedData.id) return false
        return Math.abs(el.y - draggedData.y) < CONFIG.Y_TOLERANCE
      })

      if (sameRow.length > 0) {
        // Show container preview around grouped elements
        const allInGroup = [...sameRow, draggedData]
        const minX = Math.min(...allInGroup.map(e => e.x)) - 8
        const minY = Math.min(...allInGroup.map(e => e.y)) - 8
        const maxX = Math.max(...allInGroup.map(e => e.x + e.w)) + 8
        const maxY = Math.max(...allInGroup.map(e => e.y + e.h)) + 8

        containerPreview.style.left = minX + 'px'
        containerPreview.style.top = minY + 'px'
        containerPreview.style.width = (maxX - minX) + 'px'
        containerPreview.style.height = (maxY - minY) + 'px'

        // Calculate gap
        const sorted = allInGroup.sort((a, b) => a.x - b.x)
        let gaps = []
        for (let i = 1; i < sorted.length; i++) {
          gaps.push(sorted[i].x - (sorted[i-1].x + sorted[i-1].w))
        }
        const avgGap = gaps.length > 0 ? Math.round(gaps.reduce((a,b) => a+b, 0) / gaps.length) : 16
        const snappedGap = snapToGrid(avgGap)

        containerLabel.textContent = `Box hor gap ${snappedGap}`
        containerPreview.classList.add('visible')

        // Highlight grouped elements
        sameRow.forEach(el => el.el.classList.add('will-group'))

        slotPreview.classList.remove('visible')
      } else {
        containerPreview.classList.remove('visible')
        document.querySelectorAll('.element').forEach(el => {
          el.classList.remove('will-group')
        })

        // Check for slot (empty space on left)
        if (draggedData.x > CONFIG.MIN_SLOT_WIDTH) {
          slotPreview.style.left = '20px'
          slotPreview.style.top = (draggedData.y) + 'px'
          slotPreview.style.width = (draggedData.x - 36) + 'px'
          slotPreview.style.height = draggedData.h + 'px'
          slotPreview.classList.add('visible')
        } else {
          slotPreview.classList.remove('visible')
        }
      }
    }

    function snapToGrid(value) {
      let closest = CONFIG.GAP_SNAP[0]
      let minDiff = Math.abs(value - closest)
      for (const snap of CONFIG.GAP_SNAP) {
        const diff = Math.abs(value - snap)
        if (diff < minDiff) {
          minDiff = diff
          closest = snap
        }
      }
      return closest
    }

    function updateStructure() {
      const layout = inferLayout(elements)
      const code = renderMirror(layout)
      structureCode.innerHTML = syntaxHighlight(code)
    }

    // Layout Inference (same as before)
    function inferLayout(elements) {
      if (elements.length === 0) return { type: 'box', dir: 'ver', children: [] }

      // Group by row
      const sorted = [...elements].sort((a, b) => a.y - b.y || a.x - b.x)
      const rows = []
      let currentRow = [sorted[0]]

      for (let i = 1; i < sorted.length; i++) {
        if (Math.abs(sorted[i].y - currentRow[0].y) < CONFIG.Y_TOLERANCE) {
          currentRow.push(sorted[i])
        } else {
          rows.push(currentRow.sort((a, b) => a.x - b.x))
          currentRow = [sorted[i]]
        }
      }
      rows.push(currentRow.sort((a, b) => a.x - b.x))

      // Build structure
      const children = rows.map(row => {
        if (row.length === 1) {
          const el = row[0]
          // Check for slot
          if (el.x > CONFIG.MIN_SLOT_WIDTH) {
            return {
              type: 'box',
              dir: 'hor',
              gap: snapToGrid(el.x - 20),
              children: [
                { type: 'slot', width: Math.round(el.x - 20) },
                { type: 'element', id: el.id }
              ]
            }
          }
          return { type: 'element', id: el.id }
        }

        // Multiple elements in row
        let gaps = []
        for (let i = 1; i < row.length; i++) {
          gaps.push(row[i].x - (row[i-1].x + row[i-1].w))
        }
        const avgGap = gaps.length > 0 ? Math.round(gaps.reduce((a,b) => a+b, 0) / gaps.length) : 16

        return {
          type: 'box',
          dir: 'hor',
          gap: snapToGrid(avgGap),
          children: row.map(el => ({ type: 'element', id: el.id }))
        }
      })

      // Calculate vertical gap
      let vGaps = []
      for (let i = 1; i < rows.length; i++) {
        const prevBottom = Math.max(...rows[i-1].map(e => e.y + e.h))
        const currTop = Math.min(...rows[i].map(e => e.y))
        vGaps.push(currTop - prevBottom)
      }
      const vGap = vGaps.length > 0 ? snapToGrid(Math.round(vGaps.reduce((a,b) => a+b, 0) / vGaps.length)) : 16

      return {
        type: 'box',
        dir: 'ver',
        gap: vGap,
        children
      }
    }

    function renderMirror(node, indent = 0) {
      const pad = '  '.repeat(indent)

      if (node.type === 'element') {
        return `${pad}Text "${node.id}"`
      }

      if (node.type === 'slot') {
        return `${pad}Slot w ${node.width}`
      }

      if (node.type === 'box') {
        const gapStr = node.gap ? ` gap ${node.gap}` : ''
        const header = `${pad}Box ${node.dir}${gapStr}`

        if (!node.children || node.children.length === 0) {
          return header
        }

        const childrenStr = node.children
          .map(child => renderMirror(child, indent + 1))
          .join('\n')

        return `${header}\n${childrenStr}`
      }

      return ''
    }

    function syntaxHighlight(code) {
      return code
        .replace(/\b(Box|Text|Slot)\b/g, '<span class="keyword">$1</span>')
        .replace(/\b(ver|hor|gap|w)\b/g, '<span class="property">$1</span>')
        .replace(/"([^"]+)"/g, '<span class="string">"$1"</span>')
        .replace(/\b(\d+)\b/g, '<span class="number">$1</span>')
    }

    function resetPositions() {
      elements.forEach(data => {
        const orig = originalPositions.get(data.id)
        if (orig) {
          data.x = orig.x
          data.y = orig.y
          data.el.style.left = orig.x + 'px'
          data.el.style.top = orig.y + 'px'
        }
      })
      updateStructure()
    }

    // Start
    init()
  </script>
</body>
</html>
