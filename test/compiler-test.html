<!DOCTYPE html>
<html>
<head>
  <title>Mirror Compiler Test</title>
  <link rel="stylesheet" href="../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #666;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 24px 0 12px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
      padding: 12px 16px;
      background: #111;
      border-radius: 4px;
      align-items: center;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.4;
      color: #777;
      white-space: pre;
      overflow-x: auto;
    }

    .example-preview {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .error {
      color: #f55;
      font-size: 11px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
    }
  </style>
</head>
<body>
  <h1>Mirror Compiler Test</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "BASIC PROPERTIES": [
        `Select placeholder "Farbe wählen...":
  Item "Rot"
  Item "Grün"
  Item "Blau"`,
        `Select value "Grün":
  Item "Rot"
  Item "Grün"
  Item "Blau"`,
        `Select value "DE":
  Item "Deutschland" value "DE"
  Item "Österreich" value "AT"
  Item "Schweiz" value "CH"`,
        `Select label "Land", placeholder "Bitte wählen...":
  Item "Deutschland"
  Item "Schweiz"`,
        `Select defaultValue "B":
  Item "A"
  Item "B"
  Item "C"`
      ],
      "MULTIPLE SELECTION": [
        `Select multiple, placeholder "Farben wählen...":
  Item "Rot"
  Item "Grün"
  Item "Blau"
  Item "Gelb"`,
        `Select multiple, defaultValue "JS":
  Item "JS"
  Item "TS"
  Item "React"`
      ],
      "SEARCHABLE": [
        `Select searchable, placeholder "Land suchen...":
  Item "Afghanistan"
  Item "Albanien"
  Item "Algerien"
  Item "Andorra"
  Item "Angola"`,
        `Select searchable, multiple, placeholder "Teammitglieder suchen...":
  Item "Anna Schmidt"
  Item "Max Müller"
  Item "Lisa Weber"
  Item "Tom Fischer"`
      ],
      "CLEARABLE": [
        `Select clearable, placeholder "Optional...":
  Item "Option A"
  Item "Option B"
  Item "Option C"`,
        `Select clearable, value "Option A":
  Item "Option A"
  Item "Option B"`
      ],
      "KEEPOPEN": [
        `Select keepOpen, placeholder "Mehrere anklicken...":
  Item "Eins"
  Item "Zwei"
  Item "Drei"`
      ],
      "DISABLED & READONLY": [
        `Select disabled, placeholder "Nicht verfügbar":
  Item "A"
  Item "B"`,
        `Select readonly, value "Festgelegt":
  Item "Festgelegt"
  Item "Andere Option"`,
        `Select placeholder "Plan wählen...":
  Item "Free"
  Item "Pro" disabled
  Item "Enterprise" disabled`
      ],
      "FORM INTEGRATION": [
        `Select required, label "Land *", name "country", placeholder "Pflichtfeld":
  Item "Deutschland"
  Item "Schweiz"`,
        `Select invalid, placeholder "Bitte auswählen":
  Item "Option A"
  Item "Option B"`,
        `Select name "country", placeholder "Land wählen...":
  Item "Deutschland" value "DE"
  Item "Schweiz" value "CH"`,
        `Select name "category", form "settings-form", placeholder "Kategorie":
  Item "Allgemein"
  Item "Erweitert"`
      ],
      "POSITIONING": [
        `Select placement "top-start", placeholder "Öffnet nach oben":
  Item "Option A"
  Item "Option B"`,
        `Select offset 12, placeholder "12px Abstand":
  Item "A"
  Item "B"`
      ],
      "KOMBINATIONEN": [
        `Select searchable, clearable, placeholder "Suche...":
  Item "React"
  Item "Vue"
  Item "Angular"
  Item "Svelte"`,
        `Select multiple, searchable, clearable, placeholder "Alles kombiniert":
  Item "Design"
  Item "Code"
  Item "Test"
  Item "Deploy"`,
        `Select placeholder "Land wählen":
  Item "Deutschland"
  Item "Österreich"
  Item "Schweiz"
  Item "Frankreich"
  Item "Italien"
  Item "Spanien"
  Item "Portugal"`
      ],
      "CUSTOM ITEMS - Zweizeilig": [
        `Select placeholder "Plan wählen...":
  Item value "free", ver, gap 2, pad 12 14:
    Text "Free" weight medium
    Text "Für Einzelpersonen" fs 12, col #666

  Item value "pro", ver, gap 2, pad 12 14:
    Text "Pro – \$19/Monat" weight medium
    Text "Unbegrenzte Projekte" fs 12, col #666`
      ],
      "CUSTOM ITEMS - Mit Icons": [
        `Select placeholder "Status wählen...":
  Item value "draft":
    Icon "file-text" col #888
    Text "Entwurf"
  Item value "published":
    Icon "check-circle" col #22c55e
    Text "Veröffentlicht"
  Item value "archived":
    Icon "archive" col #888
    Text "Archiviert"`,
        `Select value "medium":
  Item value "urgent": Icon "alert-circle" col #ef4444, Text "Dringend" col #ef4444
  Item value "high": Icon "arrow-up" col #f97316, Text "Hoch"
  Item value "medium": Icon "minus" col #eab308, Text "Mittel"
  Item value "low": Icon "arrow-down" col #22c55e, Text "Niedrig"`
      ],
      "CUSTOM ITEMS - Status & Farben": [
        `Select value "online":
  Item value "online": Box w 8, h 8, rad 4, bg #22c55e, Text "Online"
  Item value "away": Box w 8, h 8, rad 4, bg #eab308, Text "Abwesend"
  Item value "busy": Box w 8, h 8, rad 4, bg #ef4444, Text "Beschäftigt"
  Item value "offline": Box w 8, h 8, rad 4, bg #666, Text "Offline"`,
        `Select placeholder "Farbe wählen...":
  Item value "red": Box w 10, h 10, rad 5, bg #ef4444, Text "Rot"
  Item value "green": Box w 10, h 10, rad 5, bg #22c55e, Text "Grün"
  Item value "blue": Box w 10, h 10, rad 5, bg #3b82f6, Text "Blau"
  Item value "yellow": Box w 10, h 10, rad 5, bg #eab308, Text "Gelb"`
      ],
      "CUSTOM ITEMS - Mit Shortcuts": [
        `Select placeholder "Aktionen...":
  Item value "save" spread:
    Box hor, gap 8: Icon "save", Text "Speichern"
    Text "⌘S" fs 11, col #666
  Item value "copy" spread:
    Box hor, gap 8: Icon "copy", Text "Kopieren"
    Text "⌘C" fs 11, col #666
  Item value "delete" spread:
    Box hor, gap 8: Icon "trash" col #ef4444, Text "Löschen" col #ef4444
    Text "⌫" fs 11, col #666`
      ],
      "CUSTOM ITEMS - Fonts & Währungen": [
        `Select value "inter":
  Item value "inter" spread:
    Text "Inter" font sans
    Text "Aa" font sans, col #666
  Item value "georgia" spread:
    Text "Georgia" font serif
    Text "Aa" font serif, col #666
  Item value "fira" spread:
    Text "Fira Code" font mono
    Text "Aa" font mono, col #666`,
        `Select value "eur":
  Item value "eur": Text "€" w 20 col #888, Text "Euro"
  Item value "usd": Text "\$" w 20 col #888, Text "US Dollar"
  Item value "gbp": Text "£" w 20 col #888, Text "Britisches Pfund"
  Item value "chf": Text "₣" w 20 col #888, Text "Schweizer Franken"`
      ]
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<span class="error">${err.message}</span>`;
          failed++;
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    document.getElementById('stats').textContent =
      `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
  </script>
</body>
</html>
