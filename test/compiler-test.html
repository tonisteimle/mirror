<!DOCTYPE html>
<html>
<head>
  <title>Mirror Compiler Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #1a1a23;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .test-selector {
      display: flex;
      gap: 8px;
    }

    .test-btn {
      padding: 6px 12px;
      background: #2a2a3a;
      border: 1px solid #3a3a4a;
      border-radius: 4px;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 13px;
    }

    .test-btn:hover { background: #3a3a4a; }
    .test-btn.active { background: #4f46e5; border-color: #4f46e5; }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 8px 16px;
      background: #1a1a23;
      border-bottom: 1px solid #2a2a3a;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
    }

    .panel-content {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }

    .code-panel {
      border-right: 1px solid #2a2a3a;
    }

    .code-panel pre {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      color: #b0b0b0;
    }

    .preview-panel .panel-content {
      background: #fff;
      color: #000;
    }

    .divider {
      width: 1px;
      background: #2a2a3a;
    }

    /* Preview area - neutral styling to see Mirror's actual output */
    .preview-container {
      padding: 20px;
    }

    .preview-label {
      font-size: 11px;
      color: #666;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mirror Compiler Test</h1>
    <div class="test-selector" id="testButtons"></div>
  </header>

  <main>
    <div class="panel code-panel">
      <div class="panel-header">Mirror Code</div>
      <div class="panel-content">
        <pre id="codeDisplay"></pre>
      </div>
    </div>

    <div class="panel preview-panel">
      <div class="panel-header">Rendered Output</div>
      <div class="panel-content">
        <div class="preview-container" id="previewContainer"></div>
      </div>
    </div>
  </main>

  <!-- Load Mirror compiler (browser bundle) -->
  <script src="../dist/browser/index.global.js"></script>

  <script>
    // Test Cases
    const testCases = [
      {
        name: 'Select Basic',
        code: `ColorSelect as Select:
  Item "Rot"
  Item "Grün"
  Item "Blau"

ColorSelect placeholder "Wähle eine Farbe"`
      },
      {
        name: 'Select Styled',
        code: `MySelect as Select:
  Trigger:
    bg #1e1e2e, pad 12, rad 6
  Content:
    bg #2a2a3e, rad 6
  Item "Option A"
  Item "Option B"
  Item "Option C"

MySelect placeholder "Auswählen..."`
      },
      {
        name: 'Box Layout',
        code: `Card as Box:
  pad 20, bg #f5f5f5, rad 8

Card
  Text "Hello World"`
      },
      {
        name: 'Button',
        code: `PrimaryBtn as Button:
  bg #4f46e5, col #fff, pad 12 24, rad 6

PrimaryBtn "Click me"`
      },
    ];

    // Use global Mirror compiler (exported as MirrorLang)
    const { compile } = MirrorLang;

    // Render test case
    function renderTest(testCase) {
      // Show code
      document.getElementById('codeDisplay').textContent = testCase.code;

      // Compile and render
      const container = document.getElementById('previewContainer');
      container.innerHTML = '';

      try {
        const jsCode = compile(testCase.code);

        // Execute the generated code
        const execCode = jsCode.replace('export function createUI', 'function createUI');
        const fn = new Function(execCode + '\nreturn createUI();');
        const ui = fn();

        if (ui && ui.root) {
          container.appendChild(ui.root);
        }
      } catch (err) {
        container.innerHTML = `<div style="color:red;font-family:monospace;white-space:pre-wrap">Error: ${err.message}\n\n${err.stack}</div>`;
      }
    }

    // Create test buttons
    const buttonContainer = document.getElementById('testButtons');
    testCases.forEach((tc, i) => {
      const btn = document.createElement('button');
      btn.className = 'test-btn' + (i === 0 ? ' active' : '');
      btn.textContent = tc.name;
      btn.onclick = () => {
        document.querySelectorAll('.test-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTest(tc);
      };
      buttonContainer.appendChild(btn);
    });

    // Render first test
    renderTest(testCases[0]);
  </script>
</body>
</html>
