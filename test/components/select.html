<!DOCTYPE html>
<html>
<head>
  <title>Select Component Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: start;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 60px;
      display: flex;
      align-items: flex-start;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / Select
  </div>
  <h1>Select Component</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "BASIC": [
        `Select placeholder "Choose a fruit"
  Item "Apple"
  Item "Banana"
  Item "Cherry"`,

        `Select placeholder "Select country"
  Item "Germany"
  Item "France"
  Item "Italy"
  Item "Spain"`,
      ],

      "WITH DEFAULT VALUE": [
        `Select defaultValue "banana"
  Item "Apple" value "apple"
  Item "Banana" value "banana"
  Item "Cherry" value "cherry"`,
      ],

      "MULTIPLE SELECTION": [
        `Select multiple, placeholder "Select fruits"
  Item "Apple"
  Item "Banana"
  Item "Cherry"
  Item "Date"`,
      ],

      "STATES": [
        `Select placeholder "Disabled", disabled
  Item "Option 1"
  Item "Option 2"`,

        `Select placeholder "Invalid", invalid
  Item "Option 1"
  Item "Option 2"`,

        `Select placeholder "Required", required
  Item "Option 1"
  Item "Option 2"`,

        `Select placeholder "With disabled item"
  Item "Available"
  Item "Disabled" disabled
  Item "Also available"`,
      ],

      "STYLING TRIGGER": [
        `Select placeholder "Blue trigger"
  Item "Option 1"
  Item "Option 2"
  Trigger: bg #1e3a5f, bor 1 #3b82f6`,

        `Select placeholder "Large trigger"
  Item "Option 1"
  Item "Option 2"
  Trigger: pad 16, fs 16`,

        `Select placeholder "Rounded trigger"
  Item "Option 1"
  Item "Option 2"
  Trigger: rad 20`,
      ],

      "STYLING CONTENT": [
        `Select placeholder "Styled dropdown"
  Item "Option 1"
  Item "Option 2"
  Item "Option 3"
  Content: bg #222, bor 2 #444`,

        `Select placeholder "Wide dropdown"
  Item "Option 1"
  Item "Option 2"
  Content: minw 300`,
      ],

      "STYLING ITEMS": [
        `Select placeholder "Styled items"
  Item "Option 1"
  Item "Option 2"
  Item "Option 3"
  Item: pad 12, rad 6`,

        `Select placeholder "Colored items"
  Item "Option 1"
  Item "Option 2"
  Item: col #60a5fa`,
      ],

      "STYLING INDICATOR": [
        `Select placeholder "Green checkmark"
  Item "Option 1"
  Item "Option 2"
  ItemIndicator: col #22c55e`,

        `Select placeholder "Large indicator"
  Item "Option 1"
  Item "Option 2"
  ItemIndicator: w 20, h 20`,
      ],

      "CUSTOM ICONS": [
        `Select placeholder "Star icon", icon "star"
  Item "Option 1"
  Item "Option 2"
  Item "Option 3"`,

        `Select placeholder "Heart icon", icon "heart"
  Item "Favorite 1"
  Item "Favorite 2"`,

        `Select placeholder "Mixed icons"
  Item "Star" icon "star"
  Item "Heart" icon "heart"
  Item "Check" icon "check"`,
      ],

      "IN CONTEXT - FORM": [
        `Box ver, gap 16, w 300
  Text "Settings" weight bold, fs 14
  Box ver, gap 8
    Text "Language" fs 12, col #888
    Select placeholder "Select language"
      Item "English"
      Item "German"
      Item "French"
  Box ver, gap 8
    Text "Theme" fs 12, col #888
    Select placeholder "Select theme"
      Item "Light"
      Item "Dark"
      Item "System"`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
