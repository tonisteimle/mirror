<!DOCTYPE html>
<html>
<head>
  <title>Input Components Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: start;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 60px;
      display: flex;
      align-items: center;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / Inputs
  </div>
  <h1>Input Components (NumberInput, TagsInput, Editable)</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "NUMBER INPUT - BASIC": [
        `NumberInput`,

        `NumberInput defaultValue 10`,

        `NumberInput placeholder "Enter amount"`,

        `NumberInput label "Quantity"`,
      ],

      "NUMBER INPUT - CONSTRAINTS": [
        `NumberInput min 0, max 100`,

        `NumberInput min 0, max 10, defaultValue 5`,

        `NumberInput step 0.1, defaultValue 0.5`,

        `NumberInput step 5, min 0, max 50`,
      ],

      "NUMBER INPUT - STATES": [
        `NumberInput disabled`,

        `NumberInput readOnly, defaultValue 42`,
      ],

      "TAGS INPUT - BASIC": [
        `TagsInput`,

        `TagsInput placeholder "Add skills..."`,

        `TagsInput label "Tags"`,
      ],

      "TAGS INPUT - INTERACTION": [
        `TagsInput placeholder "Type and press Enter..."`,

        `TagsInput placeholder "Add keywords..." maxTags 5`,
      ],

      "TAGS INPUT - CONSTRAINTS": [
        `TagsInput maxTags 3`,

        `TagsInput allowDuplicate`,
      ],

      "TAGS INPUT - STATES": [
        `TagsInput disabled`,

        `TagsInput readOnly`,
      ],

      "EDITABLE - BASIC": [
        `Editable`,

        `Editable placeholder "Enter your name..."`,

        `Editable defaultValue "Click to edit me"`,
      ],

      "EDITABLE - ACTIVATION MODES": [
        `Editable activationMode click, placeholder "Single click to edit"`,

        `Editable activationMode dblclick, placeholder "Double click to edit"`,
      ],

      "EDITABLE - SUBMIT MODES": [
        `Editable submitMode enter, placeholder "Press Enter to save"`,

        `Editable submitMode blur, placeholder "Click away to save"`,

        `Editable submitMode both, placeholder "Enter or blur to save"`,
      ],

      "EDITABLE - STATES": [
        `Editable disabled, defaultValue "Cannot edit this"`,

        `Editable readOnly, defaultValue "View only"`,
      ],

      "IN CONTEXT - FORMS": [
        `Box ver, gap 16
  Text "Quantity Selector" weight bold, fs 14
  NumberInput min 0, max 99, defaultValue 1`,

        `Box ver, gap 12, pad 16, bg #111, rad 8
  Text "Skills & Expertise" weight bold
  TagsInput placeholder "Add a skill..."
  Text "Press Enter to add" fs 11, col #666`,

        `Box ver, gap 12
  Text "Page Title" fs 12, col #888
  Editable defaultValue "Untitled Page"`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
