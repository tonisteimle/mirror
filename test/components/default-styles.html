<!DOCTYPE html>
<html>
<head>
  <title>Default Styles Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: start;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 60px;
      display: flex;
      align-items: flex-start;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / Default Styles
  </div>
  <h1>Default Styles (All Components)</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      // =========================================================================
      // PRIMITIVES - BUTTONS
      // =========================================================================
      "BUTTON": [
        `Button "Click me"`,

        `Button "Primary" bg #3b82f6`,

        `Button "Disabled" disabled`,

        `Box hor, gap 8
  Button "Save"
  Button "Cancel"
  Button "Delete" bg #ef4444`,

        `Button hor, gap 8
  Icon "plus"
  Text "Add Item"`,
      ],

      // =========================================================================
      // PRIMITIVES - INPUT
      // =========================================================================
      "INPUT": [
        `Input placeholder "Enter text..."`,

        `Input placeholder "Email" type email`,

        `Input placeholder "Disabled" disabled`,

        `Box ver, gap 4
  Label "Username"
  Input placeholder "Enter username"`,

        `Box hor, gap 8
  Input placeholder "Search..." w 200
  Button "Search"`,
      ],

      // =========================================================================
      // PRIMITIVES - TEXTAREA
      // =========================================================================
      "TEXTAREA": [
        `Textarea placeholder "Enter description..."`,

        `Textarea placeholder "Write here..." h 120`,

        `Box ver, gap 4
  Label "Message"
  Textarea placeholder "Your message..."`,
      ],

      // =========================================================================
      // PRIMITIVES - TEXT & LABEL
      // =========================================================================
      "TEXT & LABEL": [
        `Text "Regular text"`,

        `Text "Muted text" col #888`,

        `Text "Bold text" weight bold`,

        `Label "Form Label"`,

        `Box ver, gap 4
  Text "Large" fs 24
  Text "Medium" fs 16
  Text "Small" fs 12`,
      ],

      // =========================================================================
      // PRIMITIVES - HEADINGS
      // =========================================================================
      "HEADINGS": [
        `H1 "Heading 1"`,

        `H2 "Heading 2"`,

        `H3 "Heading 3"`,

        `H4 "Heading 4"`,

        `H5 "Heading 5"`,

        `H6 "Heading 6"`,

        `Box ver, gap 8
  H2 "Article Title"
  Text "Published on March 25, 2024" fs 12, col #888
  Text "Article content goes here..."`,
      ],

      // =========================================================================
      // PRIMITIVES - LINK
      // =========================================================================
      "LINK": [
        `Link "Click here" href "#"`,

        `Box hor, gap 4
  Text "Read the"
  Link "documentation" href "#"
  Text "for more."`,

        `Box ver, gap 4
  Link "Home" href "#"
  Link "About" href "#"
  Link "Contact" href "#"`,
      ],

      // =========================================================================
      // PRIMITIVES - DIVIDER & SPACER
      // =========================================================================
      "DIVIDER & SPACER": [
        `Box ver, gap 8, w 200
  Text "Section 1"
  Divider
  Text "Section 2"`,

        `Box hor, w 300
  Text "Left"
  Spacer
  Text "Right"`,

        `Box hor, w 300, gap 8
  Button "Cancel"
  Spacer
  Button "Save" bg #3b82f6`,
      ],

      // =========================================================================
      // PRIMITIVES - ICON
      // =========================================================================
      "ICON": [
        `Icon "home"`,

        `Box hor, gap 12
  Icon "home"
  Icon "settings"
  Icon "user"
  Icon "bell"`,

        `Box hor, gap 8
  Icon "check" col #22c55e
  Text "Success"`,
      ],

      // =========================================================================
      // SWITCH
      // =========================================================================
      "SWITCH": [
        `Switch label "Dark Mode"`,

        `Switch label "Enabled", checked`,

        `Switch label "Disabled", disabled`,

        `Box ver, gap 12
  Switch label "WiFi", checked
  Switch label "Bluetooth"
  Switch label "Airplane Mode"`,
      ],

      // =========================================================================
      // CHECKBOX
      // =========================================================================
      "CHECKBOX": [
        `Checkbox label "Accept terms"`,

        `Checkbox label "Remember me", checked`,

        `Checkbox label "Indeterminate", indeterminate`,

        `Checkbox label "Disabled", disabled`,

        `Box ver, gap 8
  Checkbox label "Option A", checked
  Checkbox label "Option B"
  Checkbox label "Option C"`,
      ],

      // =========================================================================
      // TABS
      // =========================================================================
      "TABS": [
        `Tabs defaultValue "home"
  Tab "Home" value "home"
    Text "Welcome home"
  Tab "Profile" value "profile"
    Text "Your profile"
  Tab "Settings" value "settings"
    Text "Settings page"`,

        `Tabs orientation "vertical", defaultValue "one"
  Tab "First" value "one"
    Text "First content"
  Tab "Second" value "two"
    Text "Second content"`,
      ],

      // =========================================================================
      // ACCORDION
      // =========================================================================
      "ACCORDION": [
        `Accordion
  AccordionItem "Section 1"
    Text "Content for section 1"
  AccordionItem "Section 2"
    Text "Content for section 2"
  AccordionItem "Section 3"
    Text "Content for section 3"`,

        `Accordion multiple
  AccordionItem "FAQ Question 1"
    Text "Answer to question 1"
  AccordionItem "FAQ Question 2"
    Text "Answer to question 2"`,
      ],

      // =========================================================================
      // LISTBOX
      // =========================================================================
      "LISTBOX": [
        `Listbox
  ListboxItem "Option 1"
  ListboxItem "Option 2"
  ListboxItem "Option 3"`,

        `Listbox multiple
  ListboxItem "Apple"
  ListboxItem "Banana"
  ListboxItem "Cherry"
  ListboxItem "Date"`,

        `Listbox defaultValue "item-1"
  ListboxItem "Light"
  ListboxItem "Dark (selected)"
  ListboxItem "System"`,
      ],

      // =========================================================================
      // SELECT
      // =========================================================================
      "SELECT": [
        `Select placeholder "Choose an option"
  SelectItem "Option 1" value "1"
  SelectItem "Option 2" value "2"
  SelectItem "Option 3" value "3"`,

        `Select placeholder "Select country"
  SelectItem "Germany" value "de"
  SelectItem "France" value "fr"
  SelectItem "Spain" value "es"`,
      ],

      // =========================================================================
      // SLIDER
      // =========================================================================
      "SLIDER (Zag)": [
        `Slider`,

        `Slider defaultValue 50`,

        `Slider min 0, max 100, step 10, defaultValue 30`,

        `Box ver, gap 16
  Text "Volume" fs 12, col #888
  Slider defaultValue 75`,
      ],

      // =========================================================================
      // PROGRESS
      // =========================================================================
      "PROGRESS (Zag)": [
        `Progress value 25`,

        `Progress value 50`,

        `Progress value 75`,

        `Box ver, gap 8
  Text "Uploading..." fs 12, col #888
  Progress value 60`,
      ],

      // =========================================================================
      // NUMBER INPUT
      // =========================================================================
      "NUMBER INPUT": [
        `NumberInput`,

        `NumberInput defaultValue 10`,

        `NumberInput min 0, max 100, step 5`,

        `Box ver, gap 4
  Text "Quantity" fs 12, col #888
  NumberInput min 1, max 99, defaultValue 1`,
      ],

      // =========================================================================
      // TAGS INPUT
      // =========================================================================
      "TAGS INPUT": [
        `TagsInput placeholder "Add tags..."`,

        `TagsInput placeholder "Skills" maxTags 5`,

        `Box ver, gap 4
  Text "Keywords" fs 12, col #888
  TagsInput placeholder "Type and press Enter"`,
      ],

      // =========================================================================
      // EDITABLE
      // =========================================================================
      "EDITABLE": [
        `Editable placeholder "Click to edit"`,

        `Editable defaultValue "Edit this text"`,

        `Box ver, gap 4
  Text "Title" fs 12, col #888
  Editable defaultValue "Untitled Document"`,
      ],

      // =========================================================================
      // DATE PICKER
      // =========================================================================
      "DATE PICKER": [
        `DatePicker placeholder "Select date..."`,

        `DatePicker placeholder "Start date", locale "de-DE"`,

        `Box ver, gap 4
  Text "Event Date" fs 12, col #888
  DatePicker placeholder "Choose a date"`,
      ],

      // =========================================================================
      // COMBINED FORM
      // =========================================================================
      "FORM EXAMPLE": [
        `Box ver, gap 16, pad 20, bg #111, rad 8, w 320
  Text "User Settings" weight bold, fs 16

  Box ver, gap 4
    Text "Display Name" fs 12, col #888
    Editable defaultValue "John Doe"

  Box ver, gap 4
    Text "Items per page" fs 12, col #888
    NumberInput min 5, max 50, step 5, defaultValue 10

  Box ver, gap 4
    Text "Skills" fs 12, col #888
    TagsInput placeholder "Add skill..."

  Box ver, gap 8
    Switch label "Email notifications", checked
    Switch label "Push notifications"
    Checkbox label "Subscribe to newsletter"

  Button "Save Changes"`,
      ],

      // =========================================================================
      // SETTINGS PANEL
      // =========================================================================
      "SETTINGS PANEL": [
        `Box ver, gap 0, w 300
  Text "Preferences" weight bold, fs 14, pad 12

  Accordion
    AccordionItem "Appearance"
      Box ver, gap 12, pad 8
        Box ver, gap 4
          Text "Theme" fs 12, col #888
          Listbox defaultValue "dark"
            ListboxItem "Light" value "light"
            ListboxItem "Dark" value "dark"
            ListboxItem "System" value "system"
        Switch label "Reduce motion"

    AccordionItem "Notifications"
      Box ver, gap 8, pad 8
        Switch label "Email", checked
        Switch label "Push"
        Switch label "SMS"

    AccordionItem "Privacy"
      Box ver, gap 8, pad 8
        Checkbox label "Share usage data"
        Checkbox label "Personalized ads"`,
      ],

      // =========================================================================
      // TABBED SETTINGS
      // =========================================================================
      "TABBED INTERFACE": [
        `Box w 400
  Tabs defaultValue "account"
    Tab "Account" value "account"
      Box ver, gap 12, pad 12
        Box ver, gap 4
          Text "Username" fs 12, col #888
          Editable defaultValue "johndoe"
        Box ver, gap 4
          Text "Email" fs 12, col #888
          Text "john@example.com"
        Switch label "Two-factor auth"

    Tab "Notifications" value "notifications"
      Box ver, gap 8, pad 12
        Switch label "Email notifications", checked
        Switch label "Push notifications", checked
        Switch label "SMS alerts"

    Tab "Billing" value "billing"
      Box ver, gap 12, pad 12
        Text "Current Plan: Pro" weight medium
        Text "Next billing: April 1, 2024" fs 12, col #888
        Button "Upgrade Plan"`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
