<!DOCTYPE html>
<html>
<head>
  <title>Popover Component Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: center;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / Popover
  </div>
  <h1>Popover Component</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "BASIC": [
        `Popover
  Trigger: Button "Open Popover"
  Content: Text "Popover content"`,

        `Popover
  Trigger: Button "Click me"
  Content: Box ver, gap 8
    Text "Title" weight bold
    Text "Some description text"`,
      ],

      "POSITIONING": [
        `Popover positioning "top"
  Trigger: Button "Top"
  Content: Text "Popover on top"`,

        `Popover positioning "bottom"
  Trigger: Button "Bottom"
  Content: Text "Popover on bottom"`,

        `Popover positioning "left"
  Trigger: Button "Left"
  Content: Text "Popover on left"`,

        `Popover positioning "right"
  Trigger: Button "Right"
  Content: Text "Popover on right"`,
      ],

      "CLOSE ON INTERACT OUTSIDE": [
        `Popover closeOnInteractOutside
  Trigger: Button "Click outside to close"
  Content: Text "Click outside this popover"`,
      ],

      "CLOSE ON ESCAPE": [
        `Popover closeOnEscape
  Trigger: Button "Press Escape to close"
  Content: Text "Press Escape key"`,
      ],

      "WITH CLOSE BUTTON": [
        `Popover
  Trigger: Button "Open"
  Content: Box ver, gap 12
    Box hor, spread
      Text "Popover Title" weight bold
      CloseTrigger: Button "X" bg transparent, col #666
    Text "Content goes here"`,
      ],

      "STYLING CONTENT": [
        `Popover
  Trigger: Button "Styled"
  Content: Box pad 16, bg #1a1a1a, rad 8, bor 1 #333
    Text "Custom styled popover"`,

        `Popover
  Trigger: Button "Rich content"
  Content: Box ver, gap 12, pad 16, bg #0d0d0d, rad 12, w 250
    Text "Settings" weight bold, fs 16
    Divider
    Box ver, gap 8
      Box hor, spread
        Text "Notifications"
        Switch
      Box hor, spread
        Text "Dark mode"
        Switch`,
      ],

      "IN CONTEXT - DROPDOWN MENU": [
        `Box hor, gap 8
  Popover positioning "bottom"
    Trigger: Button "File"
    Content: Box ver, pad 4, bg #1a1a1a, rad 6, bor 1 #333, w 150
      Button "New" bg transparent, pad 8 12, w full
      Button "Open" bg transparent, pad 8 12, w full
      Divider
      Button "Save" bg transparent, pad 8 12, w full`,
      ],

      "IN CONTEXT - USER MENU": [
        `Popover positioning "bottom"
  Trigger: Box hor, gap 8, pad 8, rad 8, bg #222, cursor pointer
    Avatar "JD"
    Text "John Doe" fs 14
    Icon "chevron-down" col #666
  Content: Box ver, gap 4, pad 8, bg #1a1a1a, rad 8, bor 1 #333, w 200
    Box hor, gap 12, pad 8
      Avatar "JD" size 40
      Box ver
        Text "John Doe" weight 500
        Text "john@example.com" fs 12, col #666
    Divider
    Button "Profile" bg transparent, pad 8 12, w full
    Button "Settings" bg transparent, pad 8 12, w full
    Divider
    Button "Logout" bg transparent, pad 8 12, w full, col #ef4444`,
      ],

      "IN CONTEXT - COLOR PICKER": [
        `Popover positioning "bottom"
  Trigger: Box w 32, h 32, rad 4, bg #3b82f6, cursor pointer, bor 1 #555
  Content: Box ver, gap 8, pad 12, bg #1a1a1a, rad 8, bor 1 #333
    Text "Pick a color" fs 12, col #888
    Box hor, gap 4, wrap
      Box w 24, h 24, rad 4, bg #ef4444, cursor pointer
      Box w 24, h 24, rad 4, bg #f97316, cursor pointer
      Box w 24, h 24, rad 4, bg #eab308, cursor pointer
      Box w 24, h 24, rad 4, bg #22c55e, cursor pointer
      Box w 24, h 24, rad 4, bg #3b82f6, cursor pointer
      Box w 24, h 24, rad 4, bg #8b5cf6, cursor pointer`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
