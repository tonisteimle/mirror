<!DOCTYPE html>
<html>
<head>
  <title>Dialog Component Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: center;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / Dialog
  </div>
  <h1>Dialog Component</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "BASIC": [
        `Dialog
  Trigger: Button "Open Dialog"
  Content: Text "Dialog content"`,

        `Dialog
  Trigger: Button "Show modal"
  Content: Box ver, gap 8
    Text "Dialog Title" weight bold, fs 18
    Text "This is the dialog content."`,
      ],

      "WITH TITLE AND DESCRIPTION": [
        `Dialog
  Trigger: Button "Open"
  Title: Text "Dialog Title"
  Description: Text "This is the dialog description."
  Content: Text "Main content here"`,
      ],

      "WITH CLOSE BUTTON": [
        `Dialog
  Trigger: Button "Open"
  Content: Box ver, gap 12
    Box hor, spread
      Text "Settings" weight bold, fs 18
      CloseTrigger: Button "X" bg transparent
    Text "Dialog content here"`,
      ],

      "CLOSE ON INTERACT OUTSIDE": [
        `Dialog closeOnInteractOutside
  Trigger: Button "Click outside to close"
  Content: Text "Click outside the dialog to close it"`,
      ],

      "CLOSE ON ESCAPE": [
        `Dialog closeOnEscape
  Trigger: Button "Press Escape to close"
  Content: Text "Press Escape key to close"`,
      ],

      "MODAL (NO CLOSE OPTIONS)": [
        `Dialog
  Trigger: Button "Open modal"
  Content: Box ver, gap 16
    Text "Confirm Action" weight bold, fs 18
    Text "Are you sure you want to proceed?"
    Box hor, gap 8
      CloseTrigger: Button "Cancel"
      Button "Confirm" bg #3b82f6`,
      ],

      "STYLING CONTENT": [
        `Dialog
  Trigger: Button "Styled dialog"
  Content: Box ver, gap 16, pad 24, bg #1a1a1a, rad 16, bor 1 #333, w 400
    Text "Custom Styled" weight bold, fs 20
    Text "This dialog has custom styling applied."
    CloseTrigger: Button "Close" w full, bg #3b82f6`,
      ],

      "STYLING BACKDROP": [
        `Dialog
  Trigger: Button "Custom backdrop"
  Backdrop: bg rgba(0,0,100,0.5)
  Content: Box pad 24, bg #1a1a1a, rad 12
    Text "Dialog with blue backdrop"`,
      ],

      "IN CONTEXT - CONFIRM DELETE": [
        `Dialog
  Trigger: Button "Delete item" bg #ef4444
  Content: Box ver, gap 16, pad 24, bg #1a1a1a, rad 12, w 380
    Box hor, gap 12
      Box w 40, h 40, rad full, bg rgba(239,68,68,0.2), center
        Icon "trash" col #ef4444
      Box ver
        Text "Delete Item" weight bold, fs 16
        Text "This action cannot be undone." col #888, fs 14
    Box hor, gap 8
      CloseTrigger: Button "Cancel" grow
      Button "Delete" bg #ef4444, grow`,
      ],

      "IN CONTEXT - FORM DIALOG": [
        `Dialog
  Trigger: Button "Create new"
  Content: Box ver, gap 16, pad 24, bg #1a1a1a, rad 12, w 400
    Box hor, spread
      Text "Create Project" weight bold, fs 18
      CloseTrigger: Button "X" bg transparent, col #666
    Box ver, gap 12
      Box ver, gap 4
        Label "Project Name"
        Input placeholder "Enter project name"
      Box ver, gap 4
        Label "Description"
        Textarea placeholder "Enter description" h 80
    Box hor, gap 8
      CloseTrigger: Button "Cancel" grow
      Button "Create" bg #3b82f6, grow`,
      ],

      "IN CONTEXT - IMAGE PREVIEW": [
        `Dialog
  Trigger: Box w 100, h 100, bg #333, rad 8, cursor pointer, center
    Text "Click to preview"
  Backdrop: bg rgba(0,0,0,0.9)
  Content: Box ver, gap 8, center
    Box w 400, h 300, bg #222, rad 8
    Text "Image preview" col #888
    CloseTrigger: Button "Close" bg transparent, bor 1 #333`,
      ],

      "IN CONTEXT - SETTINGS DIALOG": [
        `Dialog
  Trigger: Button "Settings"
  Content: Box ver, gap 0, bg #1a1a1a, rad 12, w 480, clip
    Box hor, spread, pad 16, bg #222
      Text "Settings" weight bold, fs 16
      CloseTrigger: Button "X" bg transparent
    Box ver, gap 12, pad 16
      Box hor, spread
        Box ver
          Text "Dark Mode" weight 500
          Text "Enable dark theme" fs 12, col #666
        Switch
      Divider
      Box hor, spread
        Box ver
          Text "Notifications" weight 500
          Text "Receive push notifications" fs 12, col #666
        Switch
      Divider
      Box hor, spread
        Box ver
          Text "Auto-save" weight 500
          Text "Automatically save changes" fs 12, col #666
        Switch
    Box hor, gap 8, pad 16, bg #222
      CloseTrigger: Button "Cancel" grow
      Button "Save changes" bg #3b82f6, grow`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
