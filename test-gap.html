        percent = (clientX - rect.left) / rect.width
      } else {
        percent = 1 - (clientY - rect.top) / rect.height
      }

      percent = Math.min(1, Math.max(0, percent))
      return min + percent * (max - min)
    }

    // ========================================
    // MOUSE/TOUCH EVENTS
    // ========================================

    if (!isDisabled && !isReadOnly) {
      const startDrag = (e) => {
        e.preventDefault()
        el._sliderState.isDragging = true
        thumb.style.cursor = 'grabbing'
        document.body.style.userSelect = 'none'

        const clientX = e.touches ? e.touches[0].clientX : e.clientX
        const clientY = e.touches ? e.touches[0].clientY : e.clientY
        setValue(getValueFromPosition(clientX, clientY))
      }

      const moveDrag = (e) => {
        if (!el._sliderState.isDragging) return

        const clientX = e.touches ? e.touches[0].clientX : e.clientX
        const clientY = e.touches ? e.touches[0].clientY : e.clientY
        setValue(getValueFromPosition(clientX, clientY))
      }

      const endDrag = () => {
        if (!el._sliderState.isDragging) return

        el._sliderState.isDragging = false
        thumb.style.cursor = 'grab'
        document.body.style.userSelect = ''

        el.dispatchEvent(new CustomEvent('changeend', {
          detail: { value: el._sliderState.value },
          bubbles: true
        }))
      }

      // Track click
      track.addEventListener('mousedown', startDrag)
      track.addEventListener('touchstart', startDrag, { passive: false })

      // Document events for dragging
      document.addEventListener('mousemove', moveDrag)
      document.addEventListener('touchmove', moveDrag, { passive: false })
      document.addEventListener('mouseup', endDrag)
      document.addEventListener('touchend', endDrag)

      // Thumb hover
      thumb.addEventListener('mouseenter', () => {
        if (!el._sliderState.isDragging) {
          thumb.style.boxShadow = '0 2px 8px rgba(59, 130, 246, 0.5)'
        }
      })
      thumb.addEventListener('mouseleave', () => {
        if (!el._sliderState.isDragging) {
          thumb.style.boxShadow = '0 2px 4px rgba(0,0,0,0.3)'
        }
      })
    }

    // ========================================
    // KEYBOARD NAVIGATION
    // ========================================

    thumb.addEventListener('keydown', (e) => {
      if (isDisabled || isReadOnly) return

      let newValue = el._sliderState.value

      switch (e.key) {
        case 'ArrowRight':
        case 'ArrowUp':
          e.preventDefault()
          newValue += step
          break
        case 'ArrowLeft':
        case 'ArrowDown':
          e.preventDefault()
          newValue -= step
          break
        case 'Home':
          e.preventDefault()
          newValue = min
          break
        case 'End':
          e.preventDefault()
          newValue = max
          break
        case 'PageUp':
          e.preventDefault()
          newValue += step * 10
          break
        case 'PageDown':
          e.preventDefault()
          newValue -= step * 10
          break
        default:
          return
      }

      setValue(newValue)
    })

    // ========================================
    // INITIAL STATE
    // ========================================

    el.setAttribute('data-orientation', orientation)

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
      thumb.setAttribute('tabindex', '-1')
    }

    // Initial render
    updateUI()
  },

  initPinInputComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const control = el.querySelector('[data-slot="Control"]')
    const inputs = el.querySelectorAll('[data-slot="Input"]')
    const hiddenInput = el.querySelector('[data-slot="HiddenInput"]')

    if (!control || inputs.length === 0) return

    // Configuration
    const length = config.length ?? 4
    const mask = config.mask === true
    const otp = config.otp === true
    const type = config.type || 'numeric' // numeric, alphanumeric, alphabetic
    const isDisabled = config.disabled === true
    const isReadOnly = config.readOnly === true
    const placeholder = config.placeholder || '○'
    const defaultValue = config.defaultValue || config.value || ''

    // State
    el._pinInputState = {
      values: Array(length).fill(''),
      focusedIndex: -1
    }

    // Initialize with default value if provided
    if (defaultValue) {
      const chars = defaultValue.split('').slice(0, length)
      chars.forEach((char, i) => {
        el._pinInputState.values[i] = char
      })
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, value) => {
      if (element && !element.style[prop]) {
        element.style[prop] = value
      }
    }

    // Root styles
    setDefault(el, 'display', 'flex')
    setDefault(el, 'flexDirection', 'column')
    setDefault(el, 'gap', '8px')

    // Control styles (input container)
    setDefault(control, 'display', 'flex')
    setDefault(control, 'gap', '8px')

    // Input styles
    inputs.forEach(input => {
      setDefault(input, 'width', '48px')
      setDefault(input, 'height', '48px')
      setDefault(input, 'textAlign', 'center')
      setDefault(input, 'fontSize', '20px')
      setDefault(input, 'fontWeight', '600')
      setDefault(input, 'border', '2px solid #333')
      setDefault(input, 'borderRadius', '8px')
      setDefault(input, 'background', '#1a1a1a')
      setDefault(input, 'color', '#e0e0e0')
      setDefault(input, 'outline', 'none')
      setDefault(input, 'caretColor', 'transparent')

      if (mask) {
        input.type = 'password'
      }

      if (isDisabled) {
        input.disabled = true
        setDefault(input, 'cursor', 'not-allowed')
        setDefault(input, 'opacity', '0.5')
      }

      if (isReadOnly) {
        input.readOnly = true
      }
    })

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const getValue = () => el._pinInputState.values.join('')

    const updateHiddenInput = () => {
      if (hiddenInput) {
        hiddenInput.value = getValue()
      }
    }

    const updateInputs = () => {
      inputs.forEach((input, i) => {
        const value = el._pinInputState.values[i] || ''
        input.value = value
        input.placeholder = value ? '' : placeholder
      })
      updateHiddenInput()
    }

    const focusInput = (index) => {
      if (index >= 0 && index < inputs.length) {
        inputs[index].focus()
        inputs[index].select()
      }
    }

    const dispatchChange = () => {
      el.dispatchEvent(new CustomEvent('change', {
        detail: { value: getValue(), values: [...el._pinInputState.values] },
        bubbles: true
      }))
    }

    const dispatchComplete = () => {
      const value = getValue()
      if (value.length === length && !el._pinInputState.values.includes('')) {
        el.dispatchEvent(new CustomEvent('complete', {
          detail: { value, values: [...el._pinInputState.values] },
          bubbles: true
        }))
      }
    }

    const isValidChar = (char) => {
      if (type === 'numeric') return /^[0-9]$/.test(char)
      if (type === 'alphabetic') return /^[a-zA-Z]$/.test(char)
      if (type === 'alphanumeric') return /^[a-zA-Z0-9]$/.test(char)
      return true
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    inputs.forEach((input, index) => {
      if (isDisabled || isReadOnly) return

      // Focus styling
      input.addEventListener('focus', () => {
        el._pinInputState.focusedIndex = index
        input.style.borderColor = '#3b82f6'
        input.style.boxShadow = '0 0 0 3px rgba(59, 130, 246, 0.2)'
        input.select()
      })

      input.addEventListener('blur', () => {
        el._pinInputState.focusedIndex = -1
        input.style.borderColor = '#333'
        input.style.boxShadow = 'none'
      })

      // Input handling
      input.addEventListener('input', (e) => {
        const value = e.target.value

        if (value.length > 1) {
          // Handle paste
          const chars = value.split('').filter(isValidChar).slice(0, length - index)
          chars.forEach((char, i) => {
            if (index + i < length) {
              el._pinInputState.values[index + i] = char
            }
          })
          updateInputs()
          dispatchChange()

          const nextIndex = Math.min(index + chars.length, length - 1)
          focusInput(nextIndex)
          dispatchComplete()
        } else if (value.length === 1) {
          if (isValidChar(value)) {
            el._pinInputState.values[index] = value
            updateInputs()
            dispatchChange()

            if (index < length - 1) {
              focusInput(index + 1)
            }
            dispatchComplete()
          } else {
            input.value = el._pinInputState.values[index] || ''
          }
        }
      })

      // Keyboard navigation
      input.addEventListener('keydown', (e) => {
        switch (e.key) {
          case 'Backspace':
            e.preventDefault()
            if (el._pinInputState.values[index]) {
              el._pinInputState.values[index] = ''
              updateInputs()
              dispatchChange()
            } else if (index > 0) {
              el._pinInputState.values[index - 1] = ''
              updateInputs()
              dispatchChange()
              focusInput(index - 1)
            }
            break
          case 'Delete':
            e.preventDefault()
            if (el._pinInputState.values[index]) {
              el._pinInputState.values[index] = ''
              updateInputs()
              dispatchChange()
            }
            break
          case 'ArrowLeft':
            e.preventDefault()
            if (index > 0) {
              focusInput(index - 1)
            }
            break
          case 'ArrowRight':
            e.preventDefault()
            if (index < length - 1) {
              focusInput(index + 1)
            }
            break
          case 'Home':
            e.preventDefault()
            focusInput(0)
            break
          case 'End':
            e.preventDefault()
            focusInput(length - 1)
            break
        }
      })

      // Prevent typing when already has a value
      input.addEventListener('keypress', (e) => {
        if (el._pinInputState.values[index] && e.key.length === 1) {
          e.preventDefault()
          // Replace current value with new one
          if (isValidChar(e.key)) {
            el._pinInputState.values[index] = e.key
            updateInputs()
            dispatchChange()
            if (index < length - 1) {
              focusInput(index + 1)
            }
            dispatchComplete()
          }
        }
      })
    })

    // Handle paste on control
    control.addEventListener('paste', (e) => {
      if (isDisabled || isReadOnly) return

      e.preventDefault()
      const pasted = e.clipboardData.getData('text')
      const chars = pasted.split('').filter(isValidChar).slice(0, length)

      chars.forEach((char, i) => {
        el._pinInputState.values[i] = char
      })

      updateInputs()
      dispatchChange()

      const nextIndex = Math.min(chars.length, length - 1)
      focusInput(nextIndex)
      dispatchComplete()
    })

    // ========================================
    // INITIAL STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
    }

    if (config.invalid) {
      el.setAttribute('data-invalid', 'true')
      inputs.forEach(input => {
        input.style.borderColor = '#ef4444'
      })
    }

    // Initial render
    updateInputs()
  },

    // State
    el._progressState = {

    }

    // ========================================

      setDefault(valueText, 'textAlign', 'center')
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const getPercent = (val) => {
      if (max === min) return 0
      return Math.min(100, Math.max(0, ((val - min) / (max - min)) * 100))
    }

    const updateUI = () => {
      const percent = getPercent(el._progressState.value)
      range.style.width = percent + '%'

      el.setAttribute('aria-valuenow', String(el._progressState.value))
      el.setAttribute('aria-valuemin', String(min))
      el.setAttribute('aria-valuemax', String(max))

      }

      // Set completion state
      if (percent >= 100) {
        el.setAttribute('data-complete', 'true')
      } else {
        el.removeAttribute('data-complete')
      }
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.setValue = (newValue) => {
      el._progressState.value = Math.min(max, Math.max(min, Number(newValue)))
      updateUI()
    }

    el.getValue = () => el._progressState.value

    // ========================================
    // INITIAL STATE
    // ========================================

    el.setAttribute('role', 'progressbar')

      if (words.length === 1) {
        return words[0].charAt(0).toUpperCase()
      }
      return (words[0].charAt(0) + words[words.length - 1].charAt(0)).toUpperCase()
    }

    const updateUI = () => {
      const state = el._avatarState.status

      if (state === 'loaded') {
        image.style.display = 'block'
        fallback.style.display = 'none'
        el.setAttribute('data-state', 'loaded')
      } else if (state === 'error') {
        image.style.display = 'none'
        fallback.style.display = 'flex'
        el.setAttribute('data-state', 'error')
      } else {
        image.style.display = 'none'
        fallback.style.display = 'flex'
        el.setAttribute('data-state', 'loading')
      }
    }

    // ========================================
    // IMAGE LOADING
    // ========================================

    // Set fallback content
    if (fallbackText) {
      fallback.textContent = fallbackText
    } else if (name) {
      fallback.textContent = getInitials(name)
    } else {
      // Default icon (user silhouette)
      fallback.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>'
    }

    if (src) {
      image.onload = () => {
        el._avatarState.status = 'loaded'
        updateUI()
      }

      image.onerror = () => {
        el._avatarState.status = 'error'
        updateUI()
      }

      // Already has src from emit, just handle load state
      if (image.complete && image.naturalWidth > 0) {
        el._avatarState.status = 'loaded'
      }
    } else {
      el._avatarState.status = 'error'
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.setSrc = (newSrc) => {
      if (newSrc) {
        el._avatarState.status = 'loading'
        image.src = newSrc
      } else {
        el._avatarState.status = 'error'
      }
      updateUI()
    }

    el.setName = (newName) => {
      if (!fallbackText) {
        fallback.textContent = getInitials(newName)
      }
    }

    el.getStatus = () => el._avatarState.status

    // ========================================
    // INITIAL STATE
    // ========================================

    updateUI()
  },

      deleteBtn.onmouseleave = () => { deleteBtn.style.backgroundColor = 'transparent'; deleteBtn.style.color = '#666'; }
      deleteBtn.onclick = (e) => {

      // Update dropzone state
      if (el._fileUploadState.isDragging) {
        dropzone.style.borderColor = '#3b82f6'

    }

    const addFiles = (fileList) => {
      const files = Array.from(fileList)

      // Filter by max size
      const validFiles = files.filter(file => {
        if (file.size > maxSize) {
          console.warn(`File "${file.name}" exceeds max size of ${formatSize(maxSize)}`)
          return false
        }
        return true
      })

      // Check max files limit
      const available = maxFiles - el._fileUploadState.files.length
      const toAdd = validFiles.slice(0, available)

      if (toAdd.length < validFiles.length) {
        console.warn(`Only ${available} more file(s) can be added (max: ${maxFiles})`)
      }

      el._fileUploadState.files.push(...toAdd)
      updateUI()
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    // Click on dropzone or trigger opens file picker
    dropzone.onclick = () => hiddenInput.click()
    if (trigger) {
      trigger.onclick = (e) => {
        e.stopPropagation()
        hiddenInput.click()
      }
    }

    // File input change
    hiddenInput.onchange = (e) => {
      if (e.target.files && e.target.files.length > 0) {
        addFiles(e.target.files)
        hiddenInput.value = '' // Reset to allow re-selecting same file
      }
    }

    // Drag events
    dropzone.ondragenter = (e) => {
      e.preventDefault()
      e.stopPropagation()
      el._fileUploadState.isDragging = true
      updateUI()
    }

    dropzone.ondragover = (e) => {
      e.preventDefault()
      e.stopPropagation()
    }

    dropzone.ondragleave = (e) => {
      e.preventDefault()
      e.stopPropagation()
      // Only set to false if leaving the dropzone entirely
      if (!dropzone.contains(e.relatedTarget)) {
        el._fileUploadState.isDragging = false
        updateUI()
      }
    }

    dropzone.ondrop = (e) => {
      e.preventDefault()
      e.stopPropagation()
      el._fileUploadState.isDragging = false

      if (e.dataTransfer && e.dataTransfer.files.length > 0) {
        addFiles(e.dataTransfer.files)
      }
      updateUI()
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.getFiles = () => [...el._fileUploadState.files]

    el.removeFile = (index) => {
      el._fileUploadState.files.splice(index, 1)
      updateUI()
    }

    el.clearFiles = () => {
      el._fileUploadState.files = []
      updateUI()
    }

    el.addFiles = (files) => {
      addFiles(files)
    }

    // ========================================
    // INITIAL STATE
    // ========================================

    updateUI()
  },

  initCarouselComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const viewport = el.querySelector('[data-slot="Viewport"]')
    const itemGroup = el.querySelector('[data-slot="ItemGroup"]')
    const control = el.querySelector('[data-slot="Control"]')
    const prevTrigger = el.querySelector('[data-slot="PrevTrigger"]')
    const nextTrigger = el.querySelector('[data-slot="NextTrigger"]')
    const indicatorGroup = el.querySelector('[data-slot="IndicatorGroup"]')

    if (!viewport || !itemGroup) return

    // Configuration
    const items = config.items || []
    const slidesPerView = Number(config.slidesPerView ?? 1)
    const loop = config.loop !== false
    const autoPlay = config.autoPlay === true
    const autoPlayInterval = Number(config.autoPlayInterval ?? 5000)

    // State
    el._carouselState = {
      currentIndex: 0,
      totalSlides: items.length,
      autoPlayTimer: null
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Root styles
    setDefault(el, 'display', 'flex')
    setDefault(el, 'flexDirection', 'column')
    setDefault(el, 'gap', '16px')
    setDefault(el, 'width', '100%')
    setDefault(el, 'position', 'relative')

    // Viewport styles
    setDefault(viewport, 'overflow', 'hidden')
    setDefault(viewport, 'borderRadius', '8px')

    // ItemGroup styles
    setDefault(itemGroup, 'display', 'flex')
    setDefault(itemGroup, 'transition', 'transform 0.3s ease')

    // Control styles
    if (control) {
      setDefault(control, 'display', 'flex')
      setDefault(control, 'alignItems', 'center')
      setDefault(control, 'justifyContent', 'center')
      setDefault(control, 'gap', '16px')
    }

    // PrevTrigger styles
    if (prevTrigger) {
      setDefault(prevTrigger, 'display', 'flex')
      setDefault(prevTrigger, 'alignItems', 'center')
      setDefault(prevTrigger, 'justifyContent', 'center')
      setDefault(prevTrigger, 'width', '40px')
      setDefault(prevTrigger, 'height', '40px')
      setDefault(prevTrigger, 'borderRadius', '50%')
      setDefault(prevTrigger, 'backgroundColor', '#333')
      setDefault(prevTrigger, 'border', 'none')
      setDefault(prevTrigger, 'cursor', 'pointer')
      setDefault(prevTrigger, 'color', '#e0e0e0')
      prevTrigger.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>'
    }

    // NextTrigger styles
    if (nextTrigger) {
      setDefault(nextTrigger, 'display', 'flex')
      setDefault(nextTrigger, 'alignItems', 'center')
      setDefault(nextTrigger, 'justifyContent', 'center')
      setDefault(nextTrigger, 'width', '40px')
      setDefault(nextTrigger, 'height', '40px')
      setDefault(nextTrigger, 'borderRadius', '50%')
      setDefault(nextTrigger, 'backgroundColor', '#333')
      setDefault(nextTrigger, 'border', 'none')
      setDefault(nextTrigger, 'cursor', 'pointer')
      setDefault(nextTrigger, 'color', '#e0e0e0')
      nextTrigger.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>'
    }

    // IndicatorGroup styles
    if (indicatorGroup) {
      setDefault(indicatorGroup, 'display', 'flex')
      setDefault(indicatorGroup, 'alignItems', 'center')
      setDefault(indicatorGroup, 'gap', '8px')
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const createSlide = (item, index) => {
      const slide = document.createElement('div')
      slide.dataset.slot = 'Item'
      slide.dataset.index = String(index)
      slide.style.cssText = `flex: 0 0 ${100 / slidesPerView}%; min-width: 0;`

      if (typeof item === 'string') {
        // If item is a string (URL), create an image
        const img = document.createElement('img')
        img.src = item
        img.alt = `Slide ${index + 1}`
        img.style.cssText = 'width: 100%; height: 100%; object-fit: cover; display: block;'
        slide.appendChild(img)
      } else if (item.src) {
        // If item is an object with src
        const img = document.createElement('img')
        img.src = item.src
        img.alt = item.alt || `Slide ${index + 1}`
        img.style.cssText = 'width: 100%; height: 100%; object-fit: cover; display: block;'
        slide.appendChild(img)
      } else if (item.content) {
        // If item has content
        slide.innerHTML = item.content
      }

      return slide
    }

    const createIndicator = (index) => {
      const indicator = document.createElement('button')
      indicator.type = 'button'
      indicator.dataset.slot = 'Indicator'
      indicator.dataset.index = String(index)
      indicator.style.cssText = 'width: 8px; height: 8px; border-radius: 50%; background: #444; border: none; cursor: pointer; padding: 0; transition: background 0.2s;'

      indicator.onclick = () => goTo(index)

      return indicator
    }

    const updateUI = () => {
      const { currentIndex, totalSlides } = el._carouselState

      // Update slide position
      const offset = -(currentIndex * (100 / slidesPerView))
      itemGroup.style.transform = `translateX(${offset}%)`

      // Update indicators
      if (indicatorGroup) {
        const indicators = indicatorGroup.querySelectorAll('[data-slot="Indicator"]')
        indicators.forEach((ind, i) => {
          if (i === currentIndex) {
            ind.style.backgroundColor = '#3b82f6'
          } else {
            ind.style.backgroundColor = '#444'
          }
        })
      }

      // Update button states
      if (!loop) {
        if (prevTrigger) {
          prevTrigger.disabled = currentIndex === 0
          prevTrigger.style.opacity = currentIndex === 0 ? '0.5' : '1'
        }
        if (nextTrigger) {
          nextTrigger.disabled = currentIndex >= totalSlides - slidesPerView
          nextTrigger.style.opacity = currentIndex >= totalSlides - slidesPerView ? '0.5' : '1'
        }
      }

      // Set data attributes
      el.setAttribute('data-current', String(currentIndex))
      el.setAttribute('data-total', String(totalSlides))

      // Emit change event
      el.dispatchEvent(new CustomEvent('slide-change', { detail: { index: currentIndex, total: totalSlides } }))
    }

    const goTo = (index) => {
      const { totalSlides } = el._carouselState
      let newIndex = index

      if (loop) {
        if (newIndex < 0) newIndex = totalSlides - 1
        if (newIndex >= totalSlides) newIndex = 0
      } else {
        newIndex = Math.max(0, Math.min(totalSlides - slidesPerView, newIndex))
      }

      el._carouselState.currentIndex = newIndex
      updateUI()
    }

    const next = () => {
      goTo(el._carouselState.currentIndex + 1)
    }

    const prev = () => {
      goTo(el._carouselState.currentIndex - 1)
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    if (prevTrigger) {
      prevTrigger.onclick = prev
    }

    if (nextTrigger) {
      nextTrigger.onclick = next
    }

    // Keyboard navigation
    el.tabIndex = 0
    el.onkeydown = (e) => {
      if (e.key === 'ArrowLeft') {
        e.preventDefault()
        prev()
      } else if (e.key === 'ArrowRight') {
        e.preventDefault()
        next()
      }
    }

    // ========================================
    // AUTO PLAY
    // ========================================

    const startAutoPlay = () => {
      if (!autoPlay) return
      stopAutoPlay()
      el._carouselState.autoPlayTimer = setInterval(next, autoPlayInterval)
    }

    const stopAutoPlay = () => {
      if (el._carouselState.autoPlayTimer) {
        clearInterval(el._carouselState.autoPlayTimer)
        el._carouselState.autoPlayTimer = null
      }
    }

    // Pause on hover
    el.onmouseenter = stopAutoPlay
    el.onmouseleave = startAutoPlay

    // ========================================
    // PUBLIC API
    // ========================================

    el.next = next
    el.prev = prev
    el.goTo = goTo
    el.getCurrentIndex = () => el._carouselState.currentIndex
    el.getTotalSlides = () => el._carouselState.totalSlides

    el.setItems = (newItems) => {
      el._carouselState.totalSlides = newItems.length
      el._carouselState.currentIndex = 0

      // Clear and rebuild
      itemGroup.innerHTML = ''
      if (indicatorGroup) indicatorGroup.innerHTML = ''

      newItems.forEach((item, index) => {
        const slide = createSlide(item, index)
        itemGroup.appendChild(slide)
      })

      if (indicatorGroup) {
        newItems.forEach((_, index) => {
          const indicator = createIndicator(index)
          indicatorGroup.appendChild(indicator)
        })
      }

      updateUI()
    }

    // ========================================
    // INITIAL STATE
    // ========================================

    // Create slides from items
    items.forEach((item, index) => {
      const slide = createSlide(item, index)
      itemGroup.appendChild(slide)
    })

    // Create indicators
    if (indicatorGroup) {
      items.forEach((_, index) => {
        const indicator = createIndicator(index)
        indicatorGroup.appendChild(indicator)
      })
    }

    updateUI()
    startAutoPlay()
  },

      indicator.dataset.slot = 'Indicator'
      indicator.textContent = String(index + 1)
      indicator.style.cssText = 'width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; transition: background-color 0.2s, color 0.2s, border-color 0.2s;'
      trigger.appendChild(indicator)

      // Title
      if (step.title) {
        const title = document.createElement('span')
        title.dataset.slot = 'Title'
        title.textContent = step.title
        title.style.cssText = 'font-size: 14px; font-weight: 500; color: #e0e0e0;'
        trigger.appendChild(title)
      }

      trigger.onclick = () => {
        if (!linear || index <= el._stepsState.currentStep) {
          goTo(index)
        }
      }

      item.appendChild(trigger)

      // Separator (except for last item)
      if (index < steps.length - 1) {
        const separator = document.createElement('div')
        separator.dataset.slot = 'Separator'
        if (orientation === 'vertical') {
          separator.style.cssText = 'width: 2px; height: 24px; background: #333; margin: 8px 0 8px 15px;'
        } else {
          separator.style.cssText = 'flex: 1; height: 2px; background: #333; min-width: 24px; margin: 0 8px;'
        }
        item.appendChild(separator)
      }

      return item
    }

    const updateUI = () => {
      const { currentStep, totalSteps } = el._stepsState

      // Update step items
      const items = list.querySelectorAll('[data-slot="Item"]')
      items.forEach((item, i) => {
        const indicator = item.querySelector('[data-slot="Indicator"]')
        const trigger = item.querySelector('[data-slot="Trigger"]')
        const separator = item.querySelector('[data-slot="Separator"]')

        if (i < currentStep) {
          // Completed
          item.setAttribute('data-state', 'complete')
          if (indicator) {
            indicator.style.backgroundColor = '#22c55e'
            indicator.style.color = '#fff'
            indicator.style.border = 'none'
            indicator.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
          }
          if (separator) {
            separator.style.backgroundColor = '#22c55e'
          }
          if (trigger) {
            trigger.style.cursor = 'pointer'
          }
        } else if (i === currentStep) {
          // Current
          item.setAttribute('data-state', 'current')
          if (indicator) {
            indicator.style.backgroundColor = '#3b82f6'
            indicator.style.color = '#fff'
            indicator.style.border = 'none'
            indicator.textContent = String(i + 1)
          }
          if (separator) {
            separator.style.backgroundColor = '#333'
          }
          if (trigger) {
            trigger.style.cursor = 'pointer'
          }
        } else {
          // Upcoming
          item.setAttribute('data-state', 'upcoming')
          if (indicator) {
            indicator.style.backgroundColor = 'transparent'
            indicator.style.color = '#666'
            indicator.style.border = '2px solid #444'
            indicator.textContent = String(i + 1)
          }
          if (separator) {
            separator.style.backgroundColor = '#333'
          }
          if (trigger) {
            trigger.style.cursor = linear ? 'not-allowed' : 'pointer'
          }
        }
      })

      // Update content
      if (content) {
        content.innerHTML = ''
        if (steps[currentStep]?.content) {
          const stepContent = document.createElement('div')
          stepContent.innerHTML = steps[currentStep].content
          content.appendChild(stepContent)
        }
      }

      // Update button states
      if (prevTrigger) {
        prevTrigger.disabled = currentStep === 0
        prevTrigger.style.opacity = currentStep === 0 ? '0.5' : '1'
        prevTrigger.style.cursor = currentStep === 0 ? 'not-allowed' : 'pointer'
      }
      if (nextTrigger) {
        const isLast = currentStep === totalSteps - 1
        nextTrigger.textContent = isLast ? 'Finish' : 'Next'
      }

      // Set data attributes
      el.setAttribute('data-step', String(currentStep))
      el.setAttribute('data-total', String(totalSteps))

      // Emit change event
      el.dispatchEvent(new CustomEvent('step-change', { detail: { step: currentStep, total: totalSteps } }))
    }

    const goTo = (index) => {
      const { totalSteps } = el._stepsState
      const newIndex = Math.max(0, Math.min(totalSteps - 1, index))
      el._stepsState.currentStep = newIndex
      updateUI()
    }

    const next = () => {
      goTo(el._stepsState.currentStep + 1)
    }

    const prev = () => {
      goTo(el._stepsState.currentStep - 1)
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    if (prevTrigger) {
      prevTrigger.onclick = prev
    }

    if (nextTrigger) {
      nextTrigger.onclick = () => {
        if (el._stepsState.currentStep === el._stepsState.totalSteps - 1) {
          el.dispatchEvent(new CustomEvent('complete'))
        } else {
          next()
        }
      }
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.next = next
    el.prev = prev
    el.goTo = goTo
    el.getCurrentStep = () => el._stepsState.currentStep
    el.getTotalSteps = () => el._stepsState.totalSteps
    el.isComplete = () => el._stepsState.currentStep === el._stepsState.totalSteps - 1

    el.setSteps = (newSteps) => {
      el._stepsState.totalSteps = newSteps.length
      el._stepsState.currentStep = 0

      // Clear and rebuild
      list.innerHTML = ''

      newSteps.forEach((step, index) => {
        const item = createStepItem(step, index)
        list.appendChild(item)
      })

      updateUI()
    }

    // ========================================
    // INITIAL STATE
    // ========================================

    // Create step items
    steps.forEach((step, index) => {
      const item = createStepItem(step, index)
      list.appendChild(item)
    })

    updateUI()
  },

  initPaginationComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const prevTrigger = el.querySelector('[data-slot="PrevTrigger"]')
    const nextTrigger = el.querySelector('[data-slot="NextTrigger"]')
    const itemGroup = el.querySelector('[data-slot="ItemGroup"]')

    if (!itemGroup) return

    // Configuration
    const totalPages = Number(config.count ?? config.totalPages ?? 10)
    const defaultPage = Number(config.page ?? config.defaultPage ?? 1)
    const siblingCount = Number(config.siblingCount ?? 1)

    // State
    el._paginationState = {
      currentPage: defaultPage,
      totalPages: totalPages
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Root styles
    setDefault(el, 'display', 'flex')
    setDefault(el, 'alignItems', 'center')
    setDefault(el, 'gap', '4px')

    // ItemGroup styles
    setDefault(itemGroup, 'display', 'flex')
    setDefault(itemGroup, 'alignItems', 'center')
    setDefault(itemGroup, 'gap', '4px')

    // PrevTrigger styles
    if (prevTrigger) {
      setDefault(prevTrigger, 'display', 'flex')
      setDefault(prevTrigger, 'alignItems', 'center')
      setDefault(prevTrigger, 'justifyContent', 'center')
      setDefault(prevTrigger, 'width', '32px')
      setDefault(prevTrigger, 'height', '32px')
      setDefault(prevTrigger, 'borderRadius', '6px')
      setDefault(prevTrigger, 'backgroundColor', 'transparent')
      setDefault(prevTrigger, 'border', '1px solid #333')
      setDefault(prevTrigger, 'cursor', 'pointer')
      setDefault(prevTrigger, 'color', '#e0e0e0')
      prevTrigger.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>'
    }

    // NextTrigger styles
    if (nextTrigger) {
      setDefault(nextTrigger, 'display', 'flex')
      setDefault(nextTrigger, 'alignItems', 'center')
      setDefault(nextTrigger, 'justifyContent', 'center')
      setDefault(nextTrigger, 'width', '32px')
      setDefault(nextTrigger, 'height', '32px')
      setDefault(nextTrigger, 'borderRadius', '6px')
      setDefault(nextTrigger, 'backgroundColor', 'transparent')
      setDefault(nextTrigger, 'border', '1px solid #333')
      setDefault(nextTrigger, 'cursor', 'pointer')
      setDefault(nextTrigger, 'color', '#e0e0e0')
      nextTrigger.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>'
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const getPageRange = () => {
      const { currentPage, totalPages } = el._paginationState
      const pages = []

      // Always show first page
      pages.push(1)

      // Calculate range around current page
      const leftSibling = Math.max(2, currentPage - siblingCount)
      const rightSibling = Math.min(totalPages - 1, currentPage + siblingCount)

      // Add ellipsis after first if needed
      if (leftSibling > 2) {
        pages.push('...')
      }

      // Add pages in range
      for (let i = leftSibling; i <= rightSibling; i++) {
        if (i !== 1 && i !== totalPages) {
          pages.push(i)
        }
      }

      // Add ellipsis before last if needed
      if (rightSibling < totalPages - 1) {
        pages.push('...')
      }

      // Always show last page (if more than 1 page)
      if (totalPages > 1) {
        pages.push(totalPages)
      }

      return pages
    }

    const createPageItem = (page) => {
      const item = document.createElement('button')
      item.type = 'button'
      item.dataset.slot = 'Item'

      if (page === '...') {
        item.dataset.slot = 'Ellipsis'
        item.textContent = '...'
        item.style.cssText = 'display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: transparent; border: none; color: #666; cursor: default; font-size: 14px;'
        item.disabled = true
      } else {
        item.dataset.page = String(page)
        item.textContent = String(page)
        item.style.cssText = 'display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 6px; background: transparent; border: 1px solid #333; cursor: pointer; color: #e0e0e0; font-size: 14px; transition: background-color 0.2s, border-color 0.2s;'

        item.onmouseenter = () => {
          if (!item.classList.contains('active')) {
            item.style.borderColor = '#555'
          }
        }
        item.onmouseleave = () => {
          if (!item.classList.contains('active')) {
            item.style.borderColor = '#333'
          }
        }

        item.onclick = () => goTo(page)
      }

      return item
    }

    const updateUI = () => {
      const { currentPage, totalPages } = el._paginationState

      // Clear items
      itemGroup.innerHTML = ''

      // Create page items
      const pages = getPageRange()
      pages.forEach(page => {
        const item = createPageItem(page)

        if (page === currentPage) {
          item.classList.add('active')
          item.style.backgroundColor = '#3b82f6'
          item.style.borderColor = '#3b82f6'
          item.style.color = '#fff'
        }

        itemGroup.appendChild(item)
      })

      // Update trigger states
      if (prevTrigger) {
        prevTrigger.disabled = currentPage === 1
        prevTrigger.style.opacity = currentPage === 1 ? '0.5' : '1'
        prevTrigger.style.cursor = currentPage === 1 ? 'not-allowed' : 'pointer'
      }
      if (nextTrigger) {
        nextTrigger.disabled = currentPage === totalPages
        nextTrigger.style.opacity = currentPage === totalPages ? '0.5' : '1'
        nextTrigger.style.cursor = currentPage === totalPages ? 'not-allowed' : 'pointer'
      }

      // Set data attributes
      el.setAttribute('data-page', String(currentPage))
      el.setAttribute('data-total', String(totalPages))

      // Emit change event
      el.dispatchEvent(new CustomEvent('page-change', { detail: { page: currentPage, total: totalPages } }))
    }

    const goTo = (page) => {
      const { totalPages } = el._paginationState
      const newPage = Math.max(1, Math.min(totalPages, Number(page)))
      el._paginationState.currentPage = newPage
      updateUI()
    }

    const next = () => {
      goTo(el._paginationState.currentPage + 1)
    }

    const prev = () => {
      goTo(el._paginationState.currentPage - 1)
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    if (prevTrigger) {
      prevTrigger.onclick = prev
    }

    if (nextTrigger) {
      nextTrigger.onclick = next
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.next = next
    el.prev = prev
    el.goTo = goTo
    el.getCurrentPage = () => el._paginationState.currentPage
    el.getTotalPages = () => el._paginationState.totalPages

    el.setTotalPages = (total) => {
      el._paginationState.totalPages = total
      if (el._paginationState.currentPage > total) {
        el._paginationState.currentPage = total
      }
      updateUI()
    }

    // ========================================
    // INITIAL STATE
    // ========================================

    el.setAttribute('role', 'navigation')
    el.setAttribute('aria-label', 'Pagination')
    updateUI()
  },

  initTreeViewComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}
    const slotStyles = el._slotStyles || {}

    // Get elements
    const tree = el.querySelector('[data-slot="Tree"]')

    if (!tree) return

    // Configuration
    const items = config.items || []
    const selectionMode = config.selectionMode || 'single'
    const expandedKeys = new Set(config.expandedKeys || [])
    const selectedKeys = new Set(config.selectedKeys || [])

    // State
    el._treeViewState = {
      expandedKeys: expandedKeys,
      selectedKeys: selectedKeys
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Apply slot styles
    const applySlotStyles = (element, slotName) => {
      const styles = slotStyles[slotName]
      if (styles) {
        Object.assign(element.style, styles)
      }
    }

    // Root styles
    setDefault(el, 'display', 'block')

    // Tree styles
    setDefault(tree, 'listStyle', 'none')
    setDefault(tree, 'margin', '0')
    setDefault(tree, 'padding', '0')

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const createTreeItem = (item, depth = 0) => {
      const hasChildren = item.children && item.children.length > 0
      const id = item.id || item.value || String(Math.random())
      const label = item.label || item.name || item.text || id

      const li = document.createElement('li')
      li.dataset.slot = hasChildren ? 'Branch' : 'Item'
      li.dataset.itemId = id
      li.setAttribute('role', 'treeitem')
      li.setAttribute('aria-selected', selectedKeys.has(id) ? 'true' : 'false')

      // Apply styles
      applySlotStyles(li, hasChildren ? 'Branch' : 'Item')
      setDefault(li, 'listStyle', 'none')
      setDefault(li, 'margin', '0')
      setDefault(li, 'padding', '0')

      if (hasChildren) {
        // Branch with children
        li.setAttribute('aria-expanded', expandedKeys.has(id) ? 'true' : 'false')

        // BranchTrigger (clickable row)
        const trigger = document.createElement('div')
        trigger.dataset.slot = 'BranchTrigger'
        trigger.dataset.itemId = id
        applySlotStyles(trigger, 'BranchTrigger')
        setDefault(trigger, 'display', 'flex')
        setDefault(trigger, 'alignItems', 'center')
        setDefault(trigger, 'gap', '4px')
        setDefault(trigger, 'padding', '6px 8px')
        setDefault(trigger, 'paddingLeft', (depth * 16 + 8) + 'px')
        setDefault(trigger, 'cursor', 'pointer')
        setDefault(trigger, 'userSelect', 'none')
        setDefault(trigger, 'borderRadius', '4px')
        setDefault(trigger, 'color', '#e0e0e0')

        // Hover effect
        trigger.onmouseenter = () => {
          if (!trigger.classList.contains('selected')) {
            trigger.style.backgroundColor = '#1a1a1a'
          }
        }
        trigger.onmouseleave = () => {
          if (!trigger.classList.contains('selected')) {
            trigger.style.backgroundColor = ''
          }
        }

        // BranchIndicator (expand/collapse icon)
        const indicator = document.createElement('span')
        indicator.dataset.slot = 'BranchIndicator'
        applySlotStyles(indicator, 'BranchIndicator')
        setDefault(indicator, 'display', 'flex')
        setDefault(indicator, 'alignItems', 'center')
        setDefault(indicator, 'justifyContent', 'center')
        setDefault(indicator, 'width', '16px')
        setDefault(indicator, 'height', '16px')
        setDefault(indicator, 'color', '#888')
        setDefault(indicator, 'transition', 'transform 0.15s ease')
        indicator.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>'

        if (expandedKeys.has(id)) {
          indicator.style.transform = 'rotate(90deg)'
        }

        // ItemText
        const text = document.createElement('span')
        text.dataset.slot = 'ItemText'
        text.textContent = label
        applySlotStyles(text, 'ItemText')
        setDefault(text, 'flex', '1')
        setDefault(text, 'fontSize', '14px')

        trigger.appendChild(indicator)
        trigger.appendChild(text)
        li.appendChild(trigger)

        // BranchContent (children container)
        const content = document.createElement('ul')
        content.dataset.slot = 'BranchContent'
        content.dataset.itemId = id
        content.setAttribute('role', 'group')
        applySlotStyles(content, 'BranchContent')
        setDefault(content, 'listStyle', 'none')
        setDefault(content, 'margin', '0')
        setDefault(content, 'padding', '0')
        setDefault(content, 'overflow', 'hidden')

        if (!expandedKeys.has(id)) {
          content.style.display = 'none'
        }

        // Recursively add children
        for (const child of item.children) {
          content.appendChild(createTreeItem(child, depth + 1))
        }

        li.appendChild(content)

        // Click handler for expand/collapse
        trigger.onclick = (e) => {
          e.stopPropagation()
          toggleExpand(id)
          // Also select the item
          selectItem(id, e)
        }

        // Indicator click for expand/collapse only
        indicator.onclick = (e) => {
          e.stopPropagation()
          toggleExpand(id)
        }
      } else {
        // Leaf item (no children)
        const itemContent = document.createElement('div')
        itemContent.dataset.slot = 'ItemContent'
        setDefault(itemContent, 'display', 'flex')
        setDefault(itemContent, 'alignItems', 'center')
        setDefault(itemContent, 'gap', '4px')
        setDefault(itemContent, 'padding', '6px 8px')
        setDefault(itemContent, 'paddingLeft', (depth * 16 + 28) + 'px')
        setDefault(itemContent, 'cursor', 'pointer')
        setDefault(itemContent, 'userSelect', 'none')
        setDefault(itemContent, 'borderRadius', '4px')
        setDefault(itemContent, 'color', '#e0e0e0')

        // Hover effect
        itemContent.onmouseenter = () => {
          if (!itemContent.classList.contains('selected')) {
            itemContent.style.backgroundColor = '#1a1a1a'
          }
        }
        itemContent.onmouseleave = () => {
          if (!itemContent.classList.contains('selected')) {
            itemContent.style.backgroundColor = ''
          }
        }

        // ItemText
        const text = document.createElement('span')
        text.dataset.slot = 'ItemText'
        text.textContent = label
        applySlotStyles(text, 'ItemText')
        setDefault(text, 'flex', '1')
        setDefault(text, 'fontSize', '14px')

        itemContent.appendChild(text)
        li.appendChild(itemContent)

        // Click handler for selection
        itemContent.onclick = (e) => {
          e.stopPropagation()
          selectItem(id, e)
        }
      }

      // Apply selected state
      if (selectedKeys.has(id)) {
        const trigger = li.querySelector('[data-slot="BranchTrigger"], [data-slot="ItemContent"]')
        if (trigger) {
          trigger.classList.add('selected')
          trigger.style.backgroundColor = '#3b82f6'
          trigger.style.color = '#fff'
        }
      }

      return li
    }

    const toggleExpand = (id) => {
      const { expandedKeys } = el._treeViewState
      const branch = tree.querySelector(`[data-item-id="${id}"][data-slot="Branch"]`)
      const content = branch?.querySelector(`[data-slot="BranchContent"][data-item-id="${id}"]`)
      const indicator = branch?.querySelector('[data-slot="BranchIndicator"]')

      if (expandedKeys.has(id)) {
        expandedKeys.delete(id)
        if (content) content.style.display = 'none'
        if (indicator) indicator.style.transform = ''
        if (branch) branch.setAttribute('aria-expanded', 'false')
        el.dispatchEvent(new CustomEvent('collapse', { detail: { id } }))
      } else {
        expandedKeys.add(id)
        if (content) content.style.display = ''
        if (indicator) indicator.style.transform = 'rotate(90deg)'
        if (branch) branch.setAttribute('aria-expanded', 'true')
        el.dispatchEvent(new CustomEvent('expand', { detail: { id } }))
      }
    }

    const selectItem = (id, event) => {
      const { selectedKeys } = el._treeViewState
      const isMultiple = selectionMode === 'multiple'
      const isCtrl = event?.ctrlKey || event?.metaKey

      // Clear previous selection unless multi-select
      if (!isMultiple && !isCtrl) {
        tree.querySelectorAll('[data-slot="BranchTrigger"].selected, [data-slot="ItemContent"].selected').forEach(el => {
          el.classList.remove('selected')
          el.style.backgroundColor = ''
          el.style.color = '#e0e0e0'
        })
        selectedKeys.clear()
      }

      // Toggle selection
      const itemEl = tree.querySelector(`[data-item-id="${id}"]`)
      const trigger = itemEl?.querySelector('[data-slot="BranchTrigger"], [data-slot="ItemContent"]')

      if (selectedKeys.has(id) && (isMultiple || isCtrl)) {
        selectedKeys.delete(id)
        if (trigger) {
          trigger.classList.remove('selected')
          trigger.style.backgroundColor = ''
          trigger.style.color = '#e0e0e0'
        }
        if (itemEl) itemEl.setAttribute('aria-selected', 'false')
      } else {
        selectedKeys.add(id)
        if (trigger) {
          trigger.classList.add('selected')
          trigger.style.backgroundColor = '#3b82f6'
          trigger.style.color = '#fff'
        }
        if (itemEl) itemEl.setAttribute('aria-selected', 'true')
      }

      // Emit change event
      el.dispatchEvent(new CustomEvent('change', {
        detail: {
          selectedKeys: Array.from(selectedKeys),
          value: isMultiple ? Array.from(selectedKeys) : Array.from(selectedKeys)[0]
        }
      }))
    }

    const renderTree = () => {
      tree.innerHTML = ''
      for (const item of items) {
        tree.appendChild(createTreeItem(item))
      }
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.getSelectedKeys = () => Array.from(el._treeViewState.selectedKeys)
    el.getExpandedKeys = () => Array.from(el._treeViewState.expandedKeys)

    el.select = (id) => selectItem(id)
    el.toggle = (id) => toggleExpand(id)

    el.expandAll = () => {
      const getAllIds = (items) => {
        let ids = []
        for (const item of items) {
          if (item.children && item.children.length > 0) {
            ids.push(item.id || item.value)
            ids = ids.concat(getAllIds(item.children))
          }
        }
        return ids
      }
      const allIds = getAllIds(items)
      for (const id of allIds) {
        if (!el._treeViewState.expandedKeys.has(id)) {
          toggleExpand(id)
        }
      }
    }

    el.collapseAll = () => {
      const ids = Array.from(el._treeViewState.expandedKeys)
      for (const id of ids) {
        toggleExpand(id)
      }
    }

    el.setItems = (newItems) => {
      config.items = newItems
      el._treeViewState.expandedKeys.clear()
      el._treeViewState.selectedKeys.clear()
      renderTree()
    }

    // ========================================
    // INITIAL STATE
    // ========================================

    el.setAttribute('role', 'tree')
    renderTree()
  },

  /**
   * Initialize SideNav component
   * Handles selection, keyboard navigation, collapsible groups, and shows-linking
   */
  initSideNavComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}
    const items = el._zagConfig.items || []
    const slotStyles = el._slotStyles || {}
    const collapsed = config.collapsed || false
    const defaultValue = config.defaultValue || config.value

    // Get elements

    const navItems = el.querySelectorAll('[data-slot="Item"]')
    const groups = el.querySelectorAll('[data-slot="Group"]')

      focusedIndex: 0,
    }

    // DEFAULT STYLES (CSS Variables)
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    const applySlotStyles = (element, slotName) => {
      const styles = slotStyles[slotName]
      if (styles) {
        element.setAttribute('data-styled', 'true')
        Object.assign(element.style, styles)
      }
    }

    // Root defaults
    if (!el.hasAttribute('data-styled')) {
      setDefault(el, 'display', 'flex')
      setDefault(el, 'flexDirection', 'column')
      setDefault(el, 'height', '100%')
      setDefault(el, 'width', collapsed ? 'var(--m-sidenav-collapsed-width, 64px)' : 'var(--m-sidenav-width, 240px)')
      setDefault(el, 'backgroundColor', 'var(--m-sidenav-bg, #0a0a0a)')
      setDefault(el, 'borderRight', 'var(--m-sidenav-border, 1px solid #1a1a1a)')
    }

      setDefault(itemList, 'flex', '1')

          setDefault(iconSlot, 'justifyContent', 'center')
          setDefault(iconSlot, 'width', 'var(--m-sidenav-icon-size, 20px)')
          setDefault(iconSlot, 'height', 'var(--m-sidenav-icon-size, 20px)')

        setDefault(item, 'padding', 'var(--m-sidenav-item-padding, 10px 16px)')
        setDefault(item, 'color', 'var(--m-sidenav-item-color, #888)')
        setDefault(item, 'cursor', 'pointer')

      const groupLabel = group.querySelector('[data-slot="GroupLabel"]')
      if (groupLabel) {
        applySlotStyles(groupLabel, 'GroupLabel')
        if (!groupLabel.hasAttribute('data-styled')) {

          setDefault(groupLabel, 'alignItems', 'center')
          setDefault(groupLabel, 'justifyContent', 'space-between')
          setDefault(groupLabel, 'padding', 'var(--m-sidenav-group-label-padding, 8px 16px)')
          setDefault(groupLabel, 'color', 'var(--m-sidenav-group-label-color, #444)')
          setDefault(groupLabel, 'fontSize', 'var(--m-sidenav-group-label-size, 11px)')

    // ========================================

    // Cache for loaded pages to avoid reloading
    const loadedPages = new Map()

    const loadContentFromFile = (filename) => {
      // Find the page container (sibling of SideNav)
      const container = el.parentElement?.querySelector('[data-page-container]')
        || el.nextElementSibling
        || el.parentElement?.querySelector(':not([data-zag-component="sidenav"])')

      if (!container) {
        console.warn('No container found for SideNav page content')
        return
      }

      // Check if already loaded
      if (loadedPages.has(filename)) {
        // Just show the cached content
        const cachedContent = loadedPages.get(filename)
        // Hide all children
        Array.from(container.children).forEach(child => {
          child.style.display = 'none'
        })
        // Show cached
        cachedContent.style.display = ''
        return
      }

      const fullFilename = filename.endsWith('.mirror') ? filename : filename + '.mirror'

      // Try to get readFile callback
      const readFile = window._mirrorReadFile
      if (!readFile) {
        console.warn('No readFile callback available for lazy loading')
        return
      }

      const content = readFile(fullFilename)
      if (!content) {
        console.warn('Page not found: ' + fullFilename)
        return
      }

      // Get Mirror compiler
      const Mirror = window.Mirror
      if (!Mirror?.compile) {
        console.warn('Mirror compiler not available for lazy loading')
        return
      }

      try {
        const pageCode = Mirror.compile(content, { readFile })
        const execCode = pageCode.replace('export function createUI', 'function createUI')
        const fn = new Function(execCode + '\nreturn createUI();')
        const ui = fn()

        if (ui?.root) {
          // Hide all existing children
          Array.from(container.children).forEach(child => {
            child.style.display = 'none'
          })

          // Create wrapper for this page's content
          const pageWrapper = document.createElement('div')
          pageWrapper.dataset.loadedPage = filename

          // Move children from generated root to wrapper
          while (ui.root.firstChild) {
            pageWrapper.appendChild(ui.root.firstChild)
          }

          // Add to container
          container.appendChild(pageWrapper)

          // Cache the wrapper
          loadedPages.set(filename, pageWrapper)
        }
      } catch (err) {
        console.error('Failed to load page ' + fullFilename + ':', err)
      }

    // ========================================

          item.style.backgroundColor = 'var(--m-sidenav-item-selected-bg, #1a1a1a)'
          item.style.color = 'var(--m-sidenav-item-selected-color, #fff)'

          // Update icon color
          const icon = item.querySelector('[data-slot="ItemIcon"]')
          if (icon) {
            icon.style.color = 'var(--m-sidenav-icon-selected-color, #fff)'
          }
        } else {
          item.removeAttribute('aria-current')
          item.style.backgroundColor = ''
          item.style.color = ''

          const icon = item.querySelector('[data-slot="ItemIcon"]')
          if (icon) {
            icon.style.color = ''
          }
        }
      })

      // Handle shows attribute or loadFromFile
      const selectedItem = el.querySelector(`[data-slot="Item"][data-value="${value}"]`)
      if (selectedItem && selectedItem.dataset.shows) {
        const showsTarget = selectedItem.dataset.shows
        // Use getRootNode() to support Shadow DOM (tutorial playgrounds) and main document
        const root = el.getRootNode()

        // Collect all view names from NavItems with data-shows
        const allViewNames = new Set()
        navItems.forEach(item => {
          if (item.dataset.shows) {
            allViewNames.add(item.dataset.shows)
          }
        })

        // Hide all views that are linked to NavItems, show only the target
        allViewNames.forEach(viewName => {
          const viewEls = root.querySelectorAll(`[data-mirror-name="${viewName}"]`)
          viewEls.forEach(viewEl => {
            viewEl.style.display = viewName === showsTarget ? '' : 'none'
          })
        })
      } else if (selectedItem && selectedItem.dataset.loadFromFile) {
        loadContentFromFile(selectedItem.dataset.loadFromFile)
      }

      // Dispatch change event
      el.dispatchEvent(new CustomEvent('change', {
        detail: { value },
        bubbles: true
      }))
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    navItems.forEach((item, index) => {
      if (item.hasAttribute('data-disabled')) return

      item.onclick = (e) => {
        e.preventDefault()
        selectItem(item.dataset.value)
      }

      item.onfocus = () => {
        el._sideNavState.focusedIndex = index
      }
    })

    // ========================================
    // KEYBOARD NAVIGATION
    // ========================================

    const getFocusableItems = () => {
      return Array.from(navItems).filter(item => !item.hasAttribute('data-disabled'))
    }

    const focusItem = (index) => {
      const focusableItems = getFocusableItems()
      if (index < 0) index = focusableItems.length - 1
      if (index >= focusableItems.length) index = 0
      el._sideNavState.focusedIndex = index
      focusableItems[index]?.focus()
    }

    el.onkeydown = (e) => {
      const focusableItems = getFocusableItems()
      const { focusedIndex } = el._sideNavState

      switch (e.key) {
        case 'ArrowDown':
          e.preventDefault()
          focusItem(focusedIndex + 1)
          break
        case 'ArrowUp':
          e.preventDefault()
          focusItem(focusedIndex - 1)
          break
        case 'Home':
          e.preventDefault()
          focusItem(0)
          break
        case 'End':
          e.preventDefault()
          focusItem(focusableItems.length - 1)
          break
        case 'Enter':
        case ' ':
          e.preventDefault()
          const focused = focusableItems[focusedIndex]
          if (focused) selectItem(focused.dataset.value)
          break
      }
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.getValue = () => el._sideNavState.value
    el.setValue = (value) => selectItem(value)
    el.select = (value) => selectItem(value)

    // ========================================
    // INITIAL STATE
    // ========================================

    if (defaultValue) {
      // Defer selection to ensure all view elements are in the DOM
      // (they may be rendered after the SideNav component)
      requestAnimationFrame(() => {
        selectItem(defaultValue)
      })
    }

  initSegmentedControlComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}
    const orientation = config.orientation ?? 'horizontal'
    const disabled = config.disabled ?? false
    const defaultValue = config.value ?? config.defaultValue ?? ''
    const name = config.name ?? `segmented-${el._zagConfig.id}`

    // Get existing elements created by emitter
    const itemEls = el.querySelectorAll('[data-slot="Item"]')
    let indicator = el.querySelector('[data-slot="Indicator"]')

    if (itemEls.length === 0) return

    // State
    el._segmentedState = {
      value: defaultValue
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Root styles
    setDefault(el, 'display', 'inline-flex')
    setDefault(el, 'position', 'relative')
    setDefault(el, 'gap', '0')
    setDefault(el, 'padding', '4px')
    setDefault(el, 'backgroundColor', '#1a1a1a')
    setDefault(el, 'borderRadius', '8px')
    setDefault(el, 'border', '1px solid #333')

    if (orientation === 'vertical') {
      setDefault(el, 'flexDirection', 'column')
    }

    // Indicator styles
    if (indicator) {
      setDefault(indicator, 'position', 'absolute')
      setDefault(indicator, 'backgroundColor', '#3b82f6')
      setDefault(indicator, 'borderRadius', '6px')
      setDefault(indicator, 'transition', 'all 0.2s ease')
      setDefault(indicator, 'zIndex', '0')
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const selectItem = (value) => {
      if (el._segmentedState.value === value) return

      el._segmentedState.value = value
      updateUI()

      // Emit change event
      el.dispatchEvent(new CustomEvent('change', {
        detail: { value },
        bubbles: true
      }))
    }

    const updateUI = () => {
      const { value } = el._segmentedState

      itemEls.forEach(itemEl => {
        const itemValue = itemEl.dataset.value
        const isSelected = itemValue === value

        if (isSelected) {
          itemEl.dataset.selected = 'true'
          itemEl.style.color = '#fff'

          // Update radio input if exists
          const input = itemEl.querySelector('input')
          if (input) input.checked = true

          // Position indicator
          if (indicator) {
            indicator.style.left = itemEl.offsetLeft + 'px'
            indicator.style.top = itemEl.offsetTop + 'px'
            indicator.style.width = itemEl.offsetWidth + 'px'
            indicator.style.height = itemEl.offsetHeight + 'px'
          }
        } else {
          delete itemEl.dataset.selected
          itemEl.style.color = '#888'

          const input = itemEl.querySelector('input')
          if (input) input.checked = false
        }
      })

      // Update data attribute
      el.setAttribute('data-value', value)
    }

    // ========================================
    // SETUP ITEMS
    // ========================================

    itemEls.forEach((itemEl, index) => {
      const isItemDisabled = itemEl.hasAttribute('data-disabled') || disabled
      const text = itemEl.querySelector('[data-slot="ItemText"]')
      const value = itemEl.dataset.value

      // Default item styles
      setDefault(itemEl, 'display', 'flex')
      setDefault(itemEl, 'alignItems', 'center')
      setDefault(itemEl, 'justifyContent', 'center')
      setDefault(itemEl, 'padding', '8px 16px')
      setDefault(itemEl, 'borderRadius', '6px')
      setDefault(itemEl, 'cursor', isItemDisabled ? 'not-allowed' : 'pointer')
      setDefault(itemEl, 'fontSize', '14px')
      setDefault(itemEl, 'fontWeight', '500')
      setDefault(itemEl, 'color', '#888')
      setDefault(itemEl, 'userSelect', 'none')
      setDefault(itemEl, 'transition', 'color 0.2s, background-color 0.2s')
      setDefault(itemEl, 'position', 'relative')
      setDefault(itemEl, 'zIndex', '1')
      setDefault(itemEl, 'backgroundColor', 'transparent')

      // Default text styles
      if (text) {
        setDefault(text, 'whiteSpace', 'nowrap')
      }

      // Disabled state
      if (isItemDisabled) {
        itemEl.style.opacity = '0.5'
        itemEl.style.cursor = 'not-allowed'
      }

      // Click handler
      itemEl.onclick = (e) => {
        if (isItemDisabled) return
        selectItem(value)
      }

      // Hover effects
      itemEl.onmouseenter = () => {
        if (isItemDisabled) return
        if (el._segmentedState.value !== value) {
          itemEl.style.color = '#ccc'
        }
      }
      itemEl.onmouseleave = () => {
        if (el._segmentedState.value !== value) {
          itemEl.style.color = '#888'
        }
      }

    // PUBLIC API
    // ========================================

    el.getValue = () => el._segmentedState.value
    el.setValue = (value) => selectItem(value)

    // INITIAL STATE
    // ========================================

    if (orientation === 'vertical') {
      el.setAttribute('aria-orientation', 'vertical')
    }

    // Initial UI update
    updateUI()

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Root styles
    setDefault(el, 'display', 'inline-flex')
    setDefault(el, 'gap', '4px')
    setDefault(el, 'padding', '4px')
    setDefault(el, 'backgroundColor', '#1a1a1a')
    setDefault(el, 'borderRadius', '8px')
    setDefault(el, 'border', '1px solid #333')

    if (orientation === 'vertical') {
      setDefault(el, 'flexDirection', 'column')
    }

    // HELPER FUNCTIONS
    // ========================================

        } else {
          newSet.add(value)
        }

      } else {

        el._toggleState.value = el._toggleState.value === value ? '' : value

      setDefault(itemEl, 'alignItems', 'center')
      setDefault(itemEl, 'justifyContent', 'center')

      setDefault(itemEl, 'borderRadius', '6px')
      setDefault(itemEl, 'border', 'none')
      setDefault(itemEl, 'backgroundColor', 'transparent')
      setDefault(itemEl, 'cursor', isItemDisabled ? 'not-allowed' : 'pointer')

  // Icon cache and loading
  _iconCache: new Map(),
  _pendingIcons: new Map(),
  _fallbackIcon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m9 9 6 6"/><path d="m15 9-6 6"/></svg>',

  async loadIcon(el, iconName) {
    if (!el || !iconName) return
    const size = el.dataset.iconSize || '16'
    const color = el.dataset.iconColor || 'currentColor'
    const strokeWidth = el.dataset.iconWeight || '2'
    const isFilled = el.dataset.iconFill === 'true'

    // Check cache first
    let svgText = this._iconCache.get(iconName)

    if (!svgText) {
      // Check pending request
      let pending = this._pendingIcons.get(iconName)
      if (!pending) {
        pending = this._fetchIcon(iconName)
        this._pendingIcons.set(iconName, pending)
      }
      svgText = await pending
      this._pendingIcons.delete(iconName)
      if (!svgText) {
        console.warn(`Icon "${iconName}" not found, using fallback`)
        svgText = this._fallbackIcon
      }
    }

    el.innerHTML = svgText
    const svg = el.querySelector('svg')
    if (svg) {
      svg.style.width = size + 'px'
      svg.style.height = size + 'px'
      svg.style.color = color
      svg.style.display = 'block'
      if (isFilled) {
        svg.setAttribute('fill', 'currentColor')
        svg.setAttribute('stroke', 'none')
      } else {
        svg.setAttribute('stroke-width', strokeWidth)
      }
    }
  },

  async _fetchIcon(iconName) {
    try {
      const url = `https://unpkg.com/lucide-static/icons/${iconName}.svg`
      const res = await fetch(url)
      if (!res.ok) return null
      const svgText = await res.text()
      this._iconCache.set(iconName, svgText)
      return svgText
    } catch (err) {
      console.warn(`Failed to load icon "${iconName}":`, err)
      return null
    }
  },

  preloadIcons(names) {
    names.forEach(name => {
      if (!this._iconCache.has(name)) {
        this._fetchIcon(name)
      }
    })

    if (!animation || !animation.name) return
