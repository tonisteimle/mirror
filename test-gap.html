// Aggregation methods for collections
// Helper to get nested property value: "data.stats.value" -> obj.data.stats.value
const $getField = (obj, path) => path.split(".").reduce((o, k) => o?.[k], obj)
const $agg = {
  count: (arr) => Array.isArray(arr) ? arr.length : 0,
  sum: (arr, field) => Array.isArray(arr) ? arr.reduce((s, i) => s + (Number($getField(i, field)) || 0), 0) : 0,
  avg: (arr, field) => { const a = Array.isArray(arr) ? arr : []; return a.length ? $agg.sum(a, field) / a.length : 0 },
  min: (arr, field) => Array.isArray(arr) && arr.length ? Math.min(...arr.map(i => Number($getField(i, field)) || 0)) : 0,
  max: (arr, field) => Array.isArray(arr) && arr.length ? Math.max(...arr.map(i => Number($getField(i, field)) || 0)) : 0,

// $-variable accessor with aggregation support
function $get(name) {

  if (aggMatch) {

    const collection = $get(collectionPath)
    if (Array.isArray(collection)) {

      // Handle post-accessor like .name after .first

  // Check for .current pattern (CRUD selection)

    const coll = $collection(collectionName)

    if (postAccessor && result != null) {

export function createUI(data = {}) {

    setState(key, value) {
      _state[key] = value
      this.update()
    },
    
    getState(key) {
      return _state[key]
    },
    
    update() {
      // Re-render each loops based on state changes

          const { collection, renderItem, filter } = el._eachConfig
          const items = _state[collection] || []
          const filtered = filter ? items.filter(item => eval(filter)) : items

          filtered.forEach((item, index) => el.appendChild(renderItem(item, index)))

// Mirror DOM Runtime
const _runtime = {
  // Property mapping
  _propMap: {
    'bg': 'background',
    'col': 'color',
    'pad': 'padding',
    'rad': 'borderRadius',
    'gap': 'gap',
    'w': 'width',
    'h': 'height',
    'opacity': 'opacity',
  },

  // Alignment helpers
  _alignToCSS(el, prop, value) {
    const dir = el.style.flexDirection || 'column'
    const isRow = dir === 'row'
    const alignMap = { 'left': 'flex-start', 'right': 'flex-end', 'center': 'center', 'top': 'flex-start', 'bottom': 'flex-end' }
    const cssVal = alignMap[value] || value

    if (prop === 'align' || prop === 'hor-align') {
      if (isRow) { el.style.justifyContent = cssVal }
      else { el.style.alignItems = cssVal }
    } else if (prop === 'ver-align') {
      if (isRow) { el.style.alignItems = cssVal }
      else { el.style.justifyContent = cssVal }
    }
  },

  _getAlign(el, prop) {
    const dir = el.style.flexDirection || 'column'
    const isRow = dir === 'row'
    const reverseMap = { 'flex-start': 'left', 'flex-end': 'right', 'center': 'center' }

    if (prop === 'align' || prop === 'hor-align') {
      const val = isRow ? el.style.justifyContent : el.style.alignItems
      return reverseMap[val] || val
    } else if (prop === 'ver-align') {
      const val = isRow ? el.style.alignItems : el.style.justifyContent
      const vertMap = { 'flex-start': 'top', 'flex-end': 'bottom', 'center': 'center' }
      return vertMap[val] || val
    }
  },

  // Element wrapper
  wrap(el) {
    if (!el) return null
    const self = this
    return {
      _el: el,
      get text() { return el.textContent },
      set text(v) { el.textContent = v },
      get value() { return el.value },
      set value(v) { el.value = v },
      get visible() { return el.style.display !== 'none' },
      set visible(v) { el.style.display = v ? '' : 'none' },
      get hidden() { return el.hidden },
      set hidden(v) { el.hidden = v; el.style.display = v ? 'none' : '' },
      get align() { return self._getAlign(el, 'align') },
      set align(v) { self._alignToCSS(el, 'align', v) },
      get verAlign() { return self._getAlign(el, 'ver-align') },
      set verAlign(v) { self._alignToCSS(el, 'ver-align', v) },
      get bg() { return el.style.background },
      set bg(v) { el.style.background = v },
      get col() { return el.style.color },
      set col(v) { el.style.color = v },
      get pad() { return el.style.padding },
      set pad(v) { el.style.padding = typeof v === 'number' ? v + 'px' : v },
      get gap() { return el.style.gap },
      set gap(v) { el.style.gap = typeof v === 'number' ? v + 'px' : v },
      get rad() { return el.style.borderRadius },
      set rad(v) { el.style.borderRadius = typeof v === 'number' ? v + 'px' : v },
      get w() { return el.style.width },
      set w(v) { el.style.width = typeof v === 'number' ? v + 'px' : v },
      get h() { return el.style.height },
      set h(v) { el.style.height = typeof v === 'number' ? v + 'px' : v },
      get opacity() { return el.style.opacity },
      set opacity(v) { el.style.opacity = v },
      get state() { return el.dataset.state || 'default' },
      set state(v) { self.setState(el, v) },
      set onclick(fn) { el.addEventListener('click', fn) },
      set onchange(fn) { el.addEventListener('change', fn) },
      addClass(c) { el.classList.add(c) },
      removeClass(c) { el.classList.remove(c) },
      toggleClass(c) { el.classList.toggle(c) },
      setStyle(prop, val) { el.style[prop] = val },
      getStyle(prop) { return el.style[prop] },
    }

  // Visibility
  toggle(el) {
    if (!el) return
    const currentState = el.dataset.state || el._initialState

      const newState = currentState === 'closed' ? 'open' : 'closed'
      this.setState(el, newState)
    } else if (currentState === 'collapsed' || currentState === 'expanded') {
      const newState = currentState === 'collapsed' ? 'expanded' : 'collapsed'
      this.setState(el, newState)
    } else {
      el.hidden = !el.hidden
      this.applyState(el, el.hidden ? 'off' : 'on')
    }
  },

  show(el) {
    if (!el) return
    el.hidden = false

    el.style.display = el._savedDisplay || ''

  hide(el) {
    if (!el) return

    el.style.display = 'none'

    } else {
      this.hide(el)
    }
  },

  // ============================================
  // POSITIONING FUNCTIONS (Built-in)
  // ============================================

  showBelow(el, trigger, offset = 4) {
    if (typeof el === 'string') {
      el = document.querySelector('[data-mirror-name="' + el + '"]')
    }
    if (!el || !trigger) return

    const rect = trigger.getBoundingClientRect()
    el.style.position = 'fixed'
    el.style.top = (rect.bottom + offset) + 'px'
    el.style.left = rect.left + 'px'
    el.style.zIndex = '1000'
    el.hidden = false
    el.style.display = el._savedDisplay || ''
  },

  showAbove(el, trigger, offset = 4) {
    if (typeof el === 'string') {
      el = document.querySelector('[data-mirror-name="' + el + '"]')
    }
    if (!el || !trigger) return

    const rect = trigger.getBoundingClientRect()
    const elRect = el.getBoundingClientRect()
    el.style.position = 'fixed'
    el.style.top = (rect.top - elRect.height - offset) + 'px'
    el.style.left = rect.left + 'px'
    el.style.zIndex = '1000'
    el.hidden = false
    el.style.display = el._savedDisplay || ''
  },

  showLeft(el, trigger, offset = 4) {
    if (typeof el === 'string') {
      el = document.querySelector('[data-mirror-name="' + el + '"]')
    }
    if (!el || !trigger) return

    const rect = trigger.getBoundingClientRect()
    const elRect = el.getBoundingClientRect()
    el.style.position = 'fixed'
    el.style.top = rect.top + 'px'
    el.style.left = (rect.left - elRect.width - offset) + 'px'
    el.style.zIndex = '1000'
    el.hidden = false
    el.style.display = el._savedDisplay || ''
  },

  showRight(el, trigger, offset = 4) {
    if (typeof el === 'string') {
      el = document.querySelector('[data-mirror-name="' + el + '"]')
    }
    if (!el || !trigger) return

    const rect = trigger.getBoundingClientRect()
    el.style.position = 'fixed'
    el.style.top = rect.top + 'px'
    el.style.left = (rect.right + offset) + 'px'
    el.style.zIndex = '1000'
    el.hidden = false
    el.style.display = el._savedDisplay || ''
  },

  showAt(el, trigger, position = 'below', offset = 4) {
    switch (position) {
      case 'below': return this.showBelow(el, trigger, offset)
      case 'above': return this.showAbove(el, trigger, offset)
      case 'left': return this.showLeft(el, trigger, offset)
      case 'right': return this.showRight(el, trigger, offset)
      default: return this.showBelow(el, trigger, offset)
    }
  },

  showModal(el, backdrop = true) {
    if (typeof el === 'string') {
      el = document.querySelector('[data-mirror-name="' + el + '"]')
    }
    if (!el) return

    // Create backdrop if requested
    if (backdrop) {
      const bd = document.createElement('div')
      bd.dataset.mirrorBackdrop = 'true'
      bd.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999'
      document.body.appendChild(bd)
    }

    el.style.position = 'fixed'
    el.style.top = '50%'
    el.style.left = '50%'
    el.style.transform = 'translate(-50%, -50%)'
    el.style.zIndex = '1000'
    el.hidden = false
    el.style.display = el._savedDisplay || ''
  },

  dismiss(el) {
    if (typeof el === 'string') {
      el = document.querySelector('[data-mirror-name="' + el + '"]')
    }
    if (!el) return

    el.hidden = true
    el.style.display = 'none'
    el.style.position = ''
    el.style.top = ''
    el.style.left = ''
    el.style.transform = ''
    el.style.zIndex = ''

    // Remove backdrop if exists
    const backdrop = document.querySelector('[data-mirror-backdrop]')
    if (backdrop) backdrop.remove()
  },

  // ============================================
  // SCROLL FUNCTIONS (Built-in)
  // ============================================

  scrollTo(el, options = {}) {
    if (typeof el === 'string') {
      el = document.querySelector('[data-mirror-name="' + el + '"]')
    }
    if (!el) return
    el.scrollIntoView({ behavior: options.behavior || 'smooth', block: options.block || 'start' })
  },

  scrollBy(container, x, y, behavior = 'smooth') {
    if (typeof container === 'string') {
      container = document.querySelector('[data-mirror-name="' + container + '"]')
    }
    if (!container) return
    container.scrollBy({ left: x, top: y, behavior: behavior })
  },

  scrollToTop(container) {
    if (typeof container === 'string') {
      container = document.querySelector('[data-mirror-name="' + container + '"]')
    }
    if (container) {
      container.scrollTop = 0
    }
  },

  scrollToBottom(container) {
    if (typeof container === 'string') {
      container = document.querySelector('[data-mirror-name="' + container + '"]')
    }
    if (container) {
      container.scrollTop = container.scrollHeight
    }

  // ============================================
  // VALUE FUNCTIONS (Built-in)

  // Token storage
  _tokens: {},
  _initialTokens: {},
  _tokenWatchers: [],

  registerToken(name, value) {
    this._tokens[name] = value
    this._initialTokens[name] = value
  },

  watchToken(name, el, prop) {
    this._tokenWatchers.push({ name, el, prop })
  },

  _notifyTokenWatchers(name) {
    this._tokenWatchers.forEach(w => {
      if (w.name === name) {
        if (w.prop === 'textContent') {
          w.el.textContent = this._tokens[name]
        } else {
          w.el[w.prop] = this._tokens[name]
        }
      }
    })
  },

  get(name) {
    return this._tokens[name]
  },

  set(name, value) {
    this._tokens[name] = value
    this._notifyTokenWatchers(name)
  },

  increment(name, options = {}) {
    const current = this._tokens[name] || 0
    const step = options.step || 1
    let newVal = current + step
    if (options.max !== undefined && newVal > options.max) {
      newVal = options.max
    }
    this._tokens[name] = newVal
    this._notifyTokenWatchers(name)
  },

  decrement(name, options = {}) {
    const current = this._tokens[name] || 0
    const step = options.step || 1
    let newVal = current - step
    if (options.min !== undefined && newVal < options.min) {
      newVal = options.min
    }
    this._tokens[name] = newVal
    this._notifyTokenWatchers(name)
  },

  reset(name, initialValue) {
    if (initialValue !== undefined) {
      this._tokens[name] = initialValue
    } else {
      this._tokens[name] = this._initialTokens[name]
    }
    this._notifyTokenWatchers(name)
  },

  // ============================================
  // TWO-WAY DATA BINDING
  // ============================================

  // Bindings Registry: path → Set of bound elements
  _inputBindings: new Map(),
  _textBindings: new Map(),

  // Register element for two-way value binding (Input, Textarea)
  bindValue(el, path) {
    if (!el || !path) return
    el._valueBinding = path
    if (!this._inputBindings.has(path)) {
      this._inputBindings.set(path, new Set())
    }
    this._inputBindings.get(path).add(el)
  },

  // Register element for text binding (Text elements that display data)
  bindText(el, path, expression) {
    if (!el || !path) return
    el._textBinding = path
    el._textExpression = expression  // For complex expressions like "Hello, " + $name
    if (!this._textBindings.has(path)) {
      this._textBindings.set(path, new Set())
    }
    this._textBindings.get(path).add(el)
  },

  // Set data value and notify all bound elements
  notifyDataChange(path, value) {
    // Update other inputs (skip active element to avoid cursor jumping)
    const inputElements = this._inputBindings.get(path)
    if (inputElements) {
      for (const el of inputElements) {
        if (el !== document.activeElement) {
          el.value = value ?? ''
        }
      }
    }

    // Update text elements
    const textElements = this._textBindings.get(path)
    if (textElements) {
      for (const el of textElements) {
        if (el._textTemplate) {
          // Re-evaluate expression template with new data
          try {
            const result = el._textTemplate()
            el.textContent = result ?? ''
          } catch (e) {
            el.textContent = value ?? ''
          }
        } else {
          el.textContent = value ?? ''
        }
      }
    }
  },

  // Remove element from bindings (cleanup)
  unbindValue(el) {
    if (!el || !el._valueBinding) return
    const path = el._valueBinding
    const elements = this._inputBindings.get(path)
    if (elements) {
      elements.delete(el)
      if (elements.size === 0) {
        this._inputBindings.delete(path)
      }
    }
    delete el._valueBinding
  },

  // ============================================
  // CLIPBOARD FUNCTIONS (Built-in)
  // ============================================

  async copy(text, triggerEl) {
    const textToCopy = String(text)
    try {
      if (navigator.clipboard) {
        await navigator.clipboard.writeText(textToCopy)
      } else {
        // Fallback for older browsers
        const textarea = document.createElement('textarea')
        textarea.value = textToCopy
        textarea.style.position = 'fixed'
        textarea.style.opacity = '0'
        document.body.appendChild(textarea)
        textarea.select()
        document.execCommand('copy')
        document.body.removeChild(textarea)
      }

      // Apply feedback state to trigger element
      if (triggerEl) {
        const prevState = triggerEl.dataset.state
        triggerEl.dataset.state = 'copied'
        setTimeout(() => {
          if (prevState) {
            triggerEl.dataset.state = prevState
          } else {
            delete triggerEl.dataset.state
          }
        }, 2000)
      }
    } catch (err) {
      console.error('Copy failed:', err)
    }
  },

  // Selection
  select(el) {
    if (!el) return
    if (el.parentElement) {
      Array.from(el.parentElement.children).forEach(sibling => {
        if (sibling !== el && sibling.dataset.selected) {
          this.deselect(sibling)
        }
      })
    }
    el.dataset.selected = 'true'
    this.applyState(el, 'selected')
    this.updateSelectionBinding(el)
  },

  deselect(el) {
    if (!el) return
    delete el.dataset.selected
    this.removeState(el, 'selected')
  },

  // Highlighting
  highlight(el) {
    if (!el) return
    if (el.parentElement) {
      Array.from(el.parentElement.children).forEach(sibling => {
        if (sibling !== el && sibling.dataset.highlighted) {
          this.unhighlight(sibling)
        }
      })
    }
    el.dataset.highlighted = 'true'
    this.applyState(el, 'highlighted')
  },

  unhighlight(el) {
    if (!el) return
    delete el.dataset.highlighted
    this.removeState(el, 'highlighted')
  },

  highlightNext(container) {
    if (!container) return
    const items = this.getHighlightableItems(container)
    if (!items.length) return
    const current = items.findIndex(el => el.dataset.highlighted === 'true')
    const next = current === -1 ? 0 : Math.min(current + 1, items.length - 1)
    this.highlight(items[next])
  },

  highlightPrev(container) {
    if (!container) return
    const items = this.getHighlightableItems(container)
    if (!items.length) return
    const current = items.findIndex(el => el.dataset.highlighted === 'true')
    const prev = current === -1 ? items.length - 1 : Math.max(current - 1, 0)
    this.highlight(items[prev])
  },

  highlightFirst(container) {
    if (!container) return
    const items = this.getHighlightableItems(container)
    if (items.length) this.highlight(items[0])
  },

  highlightLast(container) {
    if (!container) return
    const items = this.getHighlightableItems(container)
    if (items.length) this.highlight(items[items.length - 1])
  },

  getHighlightableItems(container) {
    const findItems = (el, requireHighlightState) => {
      const items = []
      for (const child of el.children) {
        if (child._stateStyles?.highlighted) {
          items.push(child)
        } else if (!requireHighlightState && child.style.cursor === 'pointer') {
          items.push(child)
        } else {
          items.push(...findItems(child, requireHighlightState))
        }
      }
      return items
    }
    let items = findItems(container, true)
    if (!items.length) items = findItems(container, false)
    return items
  },

  selectHighlighted(container) {
    if (!container) return
    const items = this.getHighlightableItems(container)
    const highlighted = items.find(el => el.dataset.highlighted === 'true')
    if (highlighted) this.select(highlighted)
  },

  // Activation
  activate(el) {
    if (!el) return
    el.dataset.active = 'true'
    this.applyState(el, 'active')
  },

  deactivate(el) {
    if (!el) return
    delete el.dataset.active
    this.removeState(el, 'active')
  },

  // State management
  applyState(el, state) {
    if (!el?._stateStyles || !el._stateStyles[state]) return
    Object.assign(el.style, el._stateStyles[state])
  },

  removeState(el, state) {
    if (!el?._baseStyles) return
    Object.assign(el.style, el._baseStyles)
  },

  setState(el, stateName) {
    if (!el) return
    if (!el._baseStyles && el._stateStyles) {
      el._baseStyles = {}
      const stateProps = new Set()
      for (const state of Object.values(el._stateStyles)) {
        for (const prop of Object.keys(state)) stateProps.add(prop)
      }
      for (const prop of stateProps) {
        el._baseStyles[prop] = el.style[prop] || ''
      }
    }
    if (el._baseStyles) Object.assign(el.style, el._baseStyles)
    el.dataset.state = stateName
    if (stateName !== 'default' && el._stateStyles && el._stateStyles[stateName]) {
      Object.assign(el.style, el._stateStyles[stateName])
    }
    this.updateVisibility(el)
  },

  toggleState(el, state1, state2) {
    if (!el) return
    state2 = state2 || 'default'
    const current = el.dataset.state || state2
    const next = current === state1 ? state2 : state1
    this.setState(el, next)
  },

  // State Machine Functions (Interaction Model)
  transitionTo(el, stateName, animation) {
    if (!el?._stateMachine) return
    const sm = el._stateMachine
    const prevStateName = sm.current
    const prevState = sm.states[prevStateName]
    const newState = sm.states[stateName]
    if (!newState) return
    if (prevStateName === stateName) return
    // Store base styles on first transition
    if (!el._baseStyles) {
      el._baseStyles = {}
      const stateProps = new Set()
      for (const state of Object.values(sm.states)) {
        // styles is an object like { 'background': '#2563eb' }
        for (const prop of Object.keys(state.styles || {})) {
          stateProps.add(prop)
        }
      }
      for (const prop of stateProps) {
        el._baseStyles[prop] = el.style[prop] || ''
      }
    }
    // Store base children on first transition (if any state has children)
    // This enables states with completely different children (like Figma Variants)
    if (!el._baseChildren) {
      const hasStateWithChildren = Object.values(sm.states).some(s => s.children)
      if (hasStateWithChildren) {
        el._baseChildren = Array.from(el.children)
      }
    }
    sm.current = stateName
    el.dataset.state = stateName
    // Restore base styles before applying new state
    if (el._baseStyles) {
      Object.assign(el.style, el._baseStyles)
    }
    // Swap children if state has children defined (like Figma Variants)
    if (newState.children) {
      // Remove current children
      while (el.firstChild) {
        el.removeChild(el.firstChild)
      }
      // Add state children (created fresh via factory function)
      const stateChildren = newState.children()
      for (const child of stateChildren) {
        el.appendChild(child)
      }
    } else if (el._baseChildren && prevState?.children) {
      // Previous state had children, restore base children
      while (el.firstChild) {
        el.removeChild(el.firstChild)
      }
      // Re-create base children (clone them since originals may be reused)
      for (const child of el._baseChildren) {
        el.appendChild(child.cloneNode(true))
      }
    }
    Object.assign(el.style, newState.styles)
    // Handle visibility states specially
    if (stateName === 'visible') {
      el.style.display = el._baseDisplay || 'flex'
      el.hidden = false
    } else if (prevStateName === 'visible' && sm.states['visible']) {
      el.style.display = 'none'
      el.hidden = true
    }
    this.updateVisibility(el)
    // Note: animation parameter accepted for API compatibility but not executed in string runtime
  },

  // Toggle: 1 state = binary (default ↔ state), 2+ states = cycle
  stateMachineToggle(el, stateOrder) {
    if (!el?._stateMachine) return
    const sm = el._stateMachine
    // Get custom states (exclude 'default')
    const order = stateOrder || Object.keys(sm.states).filter(s => s !== 'default')
    if (order.length === 0) return

    if (order.length === 1) {
      // Binary toggle: default ↔ single state
      const targetState = order[0]
      if (sm.current === targetState) {
        this.transitionTo(el, 'default')
      } else {
        this.transitionTo(el, targetState)
      }
    } else {
      // Cycle through multiple states
      const currentIndex = order.indexOf(sm.current)
      const nextIndex = currentIndex === -1 ? 0 : (currentIndex + 1) % order.length
      this.transitionTo(el, order[nextIndex])
    }
  },

  exclusiveTransition(el, stateName, animation) {
    if (!el?._stateMachine) return
    // Find siblings - handle display:contents wrapper elements (from each loops)
    // Walk up until we find a real parent (not display:contents or eachItem)
    let parent = el.parentElement
    try {
      while (parent && (
        parent.dataset.eachItem !== undefined ||
        (typeof getComputedStyle === 'function' && getComputedStyle(parent).display === 'contents')
      )) {
        parent = parent.parentElement
      }
    } catch (e) {
      // getComputedStyle might fail in some environments, fall back to direct parent
      parent = el.parentElement
    }
    if (parent) {
      // Find all elements with same component name (for exclusive within component type)
      // Use data-component (not data-mirror-name which gets overwritten by instance name)
      const componentName = el.dataset.component
      const siblings = componentName
        ? parent.querySelectorAll(`[data-component="${componentName}"]`)
        : parent.querySelectorAll('[data-mirror-id]')
      siblings.forEach(sibling => {
        if (sibling !== el && sibling._stateMachine) {
          const sibSm = sibling._stateMachine
          // Deselect siblings: transition to 'default' state (not initial!)
          // A sibling might have started in 'active' state, but we want to
          // deselect it by going to 'default', not back to 'active'
          if (sibSm.current !== 'default') {
            this.transitionTo(sibling, 'default')
          }
        }
      })
    }
    this.transitionTo(el, stateName)
  },

  // Wrapper for exclusive selection (used by template actions)
  exclusive(el, state) {
    if (!el) return
    const targetState = state ||
      (el._stateMachine ? Object.keys(el._stateMachine.states).find(s => s !== 'default') : 'active') ||
      'active'
    this.exclusiveTransition(el, targetState)
  },

  watchStates(el, targetState, initialState, condition, dependencies) {
    if (!el) return
    const root = el.closest('[data-mirror-root]') || document.body
    const targetElements = new Map()
    for (const dep of dependencies) {
      const targetEl = root.querySelector(`[data-mirror-name="${dep.target}"]`)
      if (targetEl) targetElements.set(dep.target, targetEl)
    }
    const checkCondition = () => {
      if (condition === 'and') {
        return dependencies.every(dep => {
          const targetEl = targetElements.get(dep.target)
          return targetEl?.dataset.state === dep.state
        })
      } else {
        return dependencies.some(dep => {
          const targetEl = targetElements.get(dep.target)
          return targetEl?.dataset.state === dep.state
        })
      }
    }
    const updateState = () => {
      if (checkCondition()) {
        this.transitionTo(el, targetState)
      } else {
        this.transitionTo(el, initialState)
      }
    }
    updateState()
    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        if (mutation.attributeName === 'data-state') {
          updateState()
          break
        }
      }
    })
    for (const targetEl of targetElements.values()) {
      observer.observe(targetEl, { attributes: true, attributeFilter: ['data-state'] })
    }
  },

  updateVisibility(el) {
    if (!el) return
    const state = el.dataset.state
    const children = el.querySelectorAll('[data-mirror-id]')
    children.forEach(child => {
      if (child._visibleWhen) {
        const condition = child._visibleWhen
        let visible = false
        if (condition.includes('&&') || condition.includes('||')) {
          try {
            const open = state === 'open'
            const closed = state === 'closed'
            const expanded = state === 'expanded'
            const collapsed = state === 'collapsed'
            visible = eval(condition)
          } catch (e) { visible = false }
        } else {
          visible = state === condition
        }
        child.style.display = visible ? '' : 'none'
      }
    })
  },

  // Navigation
  navigate(targetName, clickedElement) {
    if (!targetName) return
    // Get the root node (Shadow DOM root or document) to support both contexts
    const root = clickedElement ? clickedElement.getRootNode() : document
    // Try data-mirror-name first (from name property), then fall back to data-component
    const target = root.querySelector(`[data-mirror-name="${targetName}"]`) ||
                   root.querySelector(`[data-component="${targetName}"]`)
    if (!target) return
    if (target.parentElement) {
      Array.from(target.parentElement.children).forEach(sibling => {
        // Check for either data-mirror-name or data-component to identify view elements
        if (sibling.dataset && (sibling.dataset.mirrorName || sibling.dataset.component)) {
          sibling.style.display = sibling === target ? '' : 'none'
        }
      })
    }
    this.updateNavSelection(clickedElement)
  },

  updateNavSelection(clickedElement) {
    if (!clickedElement) return
    const nav = clickedElement.closest('nav')
    if (!nav) return
    const navItems = nav.querySelectorAll('[data-route]')
    navItems.forEach(item => {
      if (item === clickedElement) {
        item.dataset.selected = 'true'
        this.applyState(item, 'selected')
      } else {
        delete item.dataset.selected
        this.removeState(item, 'selected')
      }
    })
  },

  navigateToPage(pageName, clickedElement) {
    if (!pageName) return
    const filename = pageName.endsWith('.mirror') ? pageName : pageName + '.mirror'
    const readFile = this._readFile || window._mirrorReadFile
    if (!readFile) {
      console.warn('No readFile callback available for page navigation')
      return
    }
    const content = readFile(filename)
    if (!content) {
      console.warn(`Page not found: ${filename}`)
      return
    }
    if (typeof Mirror === 'undefined' || !Mirror.compile) {
      console.warn('Mirror compiler not available for dynamic page loading')
      return
    }
    try {
      const pageCode = Mirror.compile(content, { readFile })
      const container = this.getPageContainer()
      if (!container) {
        console.warn('No page container found for rendering')
        return
      }
      container.innerHTML = ''
      const execCode = pageCode.replace('export function createUI', 'function createUI')
      const fn = new Function(execCode + '\nreturn createUI();')
      const ui = fn()
      if (ui && ui.root) {
        while (ui.root.firstChild) {
          container.appendChild(ui.root.firstChild)
        }
      }
    } catch (err) {
      console.error(`Failed to load page ${filename}:`, err)
    }
    this.updateNavSelection(clickedElement)
  },

  getPageContainer() {
    let container = document.querySelector('[data-page-container]')
    if (container) return container
    container = document.querySelector('[data-instance-name="PageContent"]')
    if (container) return container
    container = document.querySelector('[data-instance-name="Content"]')
    if (container) return container
    const nav = document.querySelector('nav')
    if (nav && nav.parentElement) {
      for (const sibling of nav.parentElement.children) {
        if (sibling !== nav && sibling.tagName !== 'NAV') {
          return sibling
        }
      }
    }
    return null
  },

  // Selection binding
  updateSelectionBinding(el) {
    if (!el) return
    let parent = el.parentElement
    while (parent) {
      if (parent._selectionBinding) {
        const value = el.textContent?.trim() || ''
        const varName = parent._selectionBinding
        window._mirrorState = window._mirrorState || {}
        window._mirrorState[varName] = value
        this.updateBoundElements(varName, value)
        return
      }
      parent = parent.parentElement
    }
  },

  updateBoundElements(varName, value) {
    document.querySelectorAll('[data-mirror-id]').forEach(el => {
      if (el._textBinding === varName) {
        el.textContent = value || el._textPlaceholder || ''
      }
    })
  },

  // Cleanup
  destroy(el) {
    if (!el) return
    if (el._clickOutsideHandler) {
      document.removeEventListener('click', el._clickOutsideHandler)
      delete el._clickOutsideHandler
    }
    if (el.children) {
      Array.from(el.children).forEach(child => this.destroy(child))
    }
  },

  // Zag component initialization
  initZagComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig
    const trigger = el.querySelector('[data-slot="Trigger"]')
    const content = el.querySelector('[data-slot="Content"]')

    if (!trigger || !content) return

    // Ensure select container has position:relative for absolute dropdown positioning
    el.style.position = 'relative'

    // Set initial state
    content.hidden = true
    content.style.display = 'none'

    // Track state
    el._zagState = { open: false, value: [], highlightedIndex: -1 }

    // Get config values
    const isDisabled = config.machineConfig?.disabled
    const placeholder = config.machineConfig?.placeholder
    const defaultValue = config.machineConfig?.defaultValue
    const value = config.machineConfig?.value
    const isMultiple = config.machineConfig?.multiple
    // Default: closeOnSelect=true for single, closeOnSelect=false for multiple (keepOpen)
    const closeOnSelect = isMultiple
      ? config.machineConfig?.closeOnSelect === true
      : config.machineConfig?.closeOnSelect !== false
    const isSearchable = config.machineConfig?.searchable
    const isClearable = config.machineConfig?.clearable
    const isDeselectable = config.machineConfig?.deselectable
    const placement = config.machineConfig?.placement || 'bottom-start'
    const offset = config.machineConfig?.offset ?? 4
    const items = content.querySelectorAll('[data-mirror-item]')

    // ========================================
    // DEFAULT STYLING (Tutorial-konform)
    // ========================================

    // Trigger Styling
    if (!trigger.hasAttribute('data-styled')) {
      Object.assign(trigger.style, {
        background: '#1a1a1a',
        padding: '7px 10px',
        borderRadius: '5px',
        height: '34px',
        boxSizing: 'border-box',
        border: '1px solid #333',
        minWidth: '160px',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'flex-start',
        gap: '8px',
        cursor: 'pointer',
        fontSize: '13px',
        color: '#e0e0e0',
        transition: 'border-color 0.15s',
        position: 'relative',
        textAlign: 'left',
        fontFamily: 'inherit',
      })
    }

    // Content/Dropdown Styling with placement support
    if (!content.hasAttribute('data-styled')) {
      const placementStyles = {
        position: 'absolute',
        zIndex: '1000',
      }
      // Apply placement-based positioning
      if (placement.startsWith('top')) {
        placementStyles.bottom = '100%'
        placementStyles.marginBottom = offset + 'px'
      } else {
        placementStyles.top = '100%'
        placementStyles.marginTop = offset + 'px'
      }
      if (placement.endsWith('-start') || placement.endsWith('-left')) {
        placementStyles.left = '0'
      } else if (placement.endsWith('-end') || placement.endsWith('-right')) {
        placementStyles.right = '0'
      } else {
        placementStyles.left = '0' // default
      }

      Object.assign(content.style, {
        background: '#1a1a1a',
        borderRadius: '6px',
        border: '1px solid #333',
        boxShadow: '0 6px 20px rgba(0,0,0,0.35)',
        padding: '3px',
        maxHeight: '200px',
        overflow: 'auto',
        minWidth: '160px',
        ...placementStyles,
      })
      content.dataset.placement = placement
    }

    // Item Styling
    items.forEach(item => {
      if (!item.hasAttribute('data-styled')) {
        // Only set alignItems if not already set by compiler (e.g., via center, ver, etc.)
        const hasAlignItems = item.style.alignItems !== ''
        const baseStyles = {
          padding: '6px 10px',
          borderRadius: '4px',
          display: 'flex',
          gap: '8px',
          cursor: 'pointer',
          fontSize: '13px',
          color: '#e0e0e0',
        }
        // Only add alignItems default if not already set
        if (!hasAlignItems) {
          baseStyles.alignItems = 'center'
        }
        Object.assign(item.style, baseStyles)
      }
    })

    // Group & GroupLabel Styling
    const groups = content.querySelectorAll('[data-slot="Group"]')
    groups.forEach(group => {
      if (!group.hasAttribute('data-styled')) {
        Object.assign(group.style, {
          display: 'flex',
          flexDirection: 'column',
        })
        // Add margin-top for groups after the first one
        if (group.previousElementSibling) {
          group.style.marginTop = '8px'
        }
      }
      // Style GroupLabel
      const groupLabel = group.querySelector('[data-slot="GroupLabel"]')
      if (groupLabel && !groupLabel.hasAttribute('data-styled')) {
        Object.assign(groupLabel.style, {
          padding: '6px 10px 4px',
          fontSize: '11px',
          fontWeight: '600',
          color: '#888',
          textTransform: 'uppercase',
          letterSpacing: '0.5px',
        })
      }
    })

    // ========================================
    // DEFAULT ICONS
    // ========================================

    // Create or find ValueText
    let triggerText = trigger.querySelector('[data-slot="ValueText"]')
    if (!triggerText) {
      triggerText = document.createElement('span')
      triggerText.dataset.slot = 'ValueText'
      triggerText.style.cssText = 'flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'
      trigger.insertBefore(triggerText, trigger.firstChild)
    }
    el._zagTriggerText = triggerText

    // Create or find Indicator (chevron-down)
    let indicator = trigger.querySelector('[data-slot="Indicator"]')
    if (!indicator) {
      indicator = document.createElement('span')
      indicator.dataset.slot = 'Indicator'
      indicator.style.cssText = 'color:#666;display:flex;transition:transform 0.15s;flex-shrink:0;'
      indicator.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>'
      trigger.appendChild(indicator)
    }
    el._zagIndicator = indicator

    // Create ItemIndicator (check/checkbox) for each item
    items.forEach(item => {
      let check = item.querySelector('[data-slot="ItemIndicator"]')
      if (!check) {
        check = document.createElement('span')
        check.dataset.slot = 'ItemIndicator'

        if (isMultiple) {
          // Multiple: Checkbox style (box with border, filled when selected)
          check.style.cssText = 'width:15px;height:15px;border-radius:3px;border:1px solid #444;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;'
          check.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="opacity:0;color:#fff;"><polyline points="20 6 9 17 4 12"></polyline></svg>'
          // Insert at beginning for checkbox
          item.insertBefore(check, item.firstChild)
        } else {
          // Single: Checkmark style (appears on right when selected)
          check.style.cssText = 'margin-left:auto;display:none;color:#4f46e5;flex-shrink:0;'
          check.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
          item.appendChild(check)
        }
      }
    })

    // ========================================
    // CLEAR BUTTON
    // ========================================

    let clearButton = null
    if (isClearable) {
      clearButton = trigger.querySelector('[data-slot="ClearButton"]')
      if (!clearButton) {
        clearButton = document.createElement('button')
        clearButton.type = 'button'
        clearButton.dataset.slot = 'ClearButton'
        clearButton.style.cssText = 'color:#666;padding:2px;border-radius:4px;cursor:pointer;display:none;background:none;border:none;flex-shrink:0;align-items:center;justify-content:center;'
        clearButton.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>'
        clearButton.title = 'Auswahl löschen'
        // Insert before indicator
        trigger.insertBefore(clearButton, indicator)
      }

      clearButton.addEventListener('mouseenter', () => {
        clearButton.style.color = '#fff'
        clearButton.style.background = '#333'
      })
      clearButton.addEventListener('mouseleave', () => {
        clearButton.style.color = '#666'
        clearButton.style.background = 'none'
      })
      clearButton.addEventListener('click', (e) => {
        e.stopPropagation()
        el._zagState.value = []
        items.forEach(i => {
          i.removeAttribute('data-selected')
          const ind = i.querySelector('[data-slot="ItemIndicator"]')
          if (ind) ind.style.display = 'none'
        })
        renderTriggerValue()
        clearButton.style.display = 'none'
      })

      el._zagClearButton = clearButton
    }

    // ========================================
    // SEARCH INPUT
    // ========================================

    let searchInput = null
    let emptyElement = null
    if (isSearchable) {
      searchInput = content.querySelector('[data-slot="Input"]')
      if (!searchInput) {
        searchInput = document.createElement('input')
        searchInput.type = 'text'
        searchInput.placeholder = 'Suchen...'
        searchInput.dataset.slot = 'Input'
        searchInput.style.cssText = 'background:transparent;border:none;border-bottom:1px solid #333;padding:7px 10px;color:#fff;width:100%;font-size:13px;outline:none;'
        content.insertBefore(searchInput, content.firstChild)
      }

      // Create Empty element for no results
      emptyElement = content.querySelector('[data-slot="Empty"]')
      if (!emptyElement) {
        emptyElement = document.createElement('div')
        emptyElement.dataset.slot = 'Empty'
        emptyElement.textContent = 'Keine Ergebnisse'
        emptyElement.style.cssText = 'padding:16px;text-align:center;color:#666;font-size:12px;display:none;'
        content.appendChild(emptyElement)
      }
      el._zagEmptyElement = emptyElement

      searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase()
        items.forEach(item => {
          const text = item.textContent.toLowerCase()
          // Use 'flex' instead of '' to preserve horizontal layout
          item.style.display = text.includes(query) ? 'flex' : 'none'
        })
        const visibleItems = Array.from(items).filter(i => i.style.display !== 'none')

        // Show/hide empty state
        if (emptyElement) {
          emptyElement.style.display = visibleItems.length === 0 ? '' : 'none'
        }

        el._zagState.highlightedIndex = 0
        if (visibleItems.length > 0) {
          this._updateZagHighlight(el, visibleItems)
        }
      })

      // Keyboard navigation for search input
      searchInput.addEventListener('keydown', (e) => {
        const visibleItems = Array.from(content.querySelectorAll('[data-mirror-item]')).filter(i => i.style.display !== 'none')
        const count = visibleItems.length

        switch (e.key) {
          case 'ArrowDown':
            e.preventDefault()
            el._zagState.highlightedIndex = (el._zagState.highlightedIndex + 1) % count
            this._updateZagHighlight(el, visibleItems)
            break
          case 'ArrowUp':
            e.preventDefault()
            el._zagState.highlightedIndex = (el._zagState.highlightedIndex - 1 + count) % count
            this._updateZagHighlight(el, visibleItems)
            break
          case 'Enter':
            e.preventDefault()
            if (el._zagState.highlightedIndex >= 0 && visibleItems[el._zagState.highlightedIndex]) {
              visibleItems[el._zagState.highlightedIndex].click()
            }
            break
          case 'Escape':
            e.preventDefault()
            el._zagState.open = false
            content.hidden = true
            content.style.display = 'none'
            trigger.setAttribute('aria-expanded', 'false')
            trigger.style.borderColor = '#333'
            if (indicator) {
              indicator.style.transform = ''
              indicator.style.color = '#666'
            }
            trigger.focus()
            fireCloseEvent()
            break
        }
      })

      el._zagSearchInput = searchInput
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    // Event dispatching helpers
    const fireOpenEvent = () => {
      el.dispatchEvent(new CustomEvent('open', { detail: { value: el._zagState.value } }))
    }
    const fireCloseEvent = () => {
      el.dispatchEvent(new CustomEvent('close', { detail: { value: el._zagState.value } }))
    }
    const fireChangeEvent = (newValue, previousValue) => {
      el.dispatchEvent(new CustomEvent('change', {
        detail: { value: newValue, previousValue },
        bubbles: true
      }))
    }

    const getItemLabel = (item) => {
      // First check for explicit ItemText slot
      const textEl = item.querySelector('[data-slot="ItemText"]')
      if (textEl) return textEl.textContent

      // For items with multiple child elements, collect text from span elements
      const childElements = item.children
      if (childElements.length > 1) {
        const texts = []
        for (const child of childElements) {
          // Skip indicators and icons
          if (child.dataset?.slot === 'ItemIndicator') continue
          if (child.querySelector('svg')) continue
          // Collect text from span elements
          const text = child.textContent?.trim()
          if (text) texts.push(text)
        }
        if (texts.length > 0) return texts.join(' ')
      }

      // Simple items: use all text content
      return item.textContent?.trim() || ''
    }

    const updateCheckIcons = () => {
      items.forEach(item => {
        const ind = item.querySelector('[data-slot="ItemIndicator"]')
        if (ind) {
          const isSelected = el._zagState.value.includes(item.dataset.mirrorItem)

          if (isMultiple) {
            // Checkbox style: fill background and show checkmark when selected
            if (isSelected) {
              ind.style.background = '#4f46e5'
              ind.style.borderColor = '#4f46e5'
              const svg = ind.querySelector('svg')
              if (svg) svg.style.opacity = '1'
            } else {
              ind.style.background = ''
              ind.style.borderColor = '#444'
              const svg = ind.querySelector('svg')
              if (svg) svg.style.opacity = '0'
            }
          } else {
            // Checkmark style: show/hide
            ind.style.display = isSelected ? '' : 'none'
          }
        }
      })
    }

    // Render tags for multiple mode
    const renderTags = () => {
      // Remove existing tag group
      const existingTags = trigger.querySelector('[data-slot="TagGroup"]')
      if (existingTags) existingTags.remove()

      if (!isMultiple || el._zagState.value.length === 0) {
        triggerText.style.display = ''
        return
      }

      // Hide text, show tags
      triggerText.style.display = 'none'

      const tagGroup = document.createElement('div')
      tagGroup.dataset.slot = 'TagGroup'
      tagGroup.style.cssText = 'display:flex;flex-wrap:nowrap;gap:4px;overflow:hidden;flex:1;'

      for (const val of el._zagState.value) {
        const matchItem = Array.from(items).find(i => i.dataset.mirrorItem === val)
        const label = matchItem ? getItemLabel(matchItem) : val

        const tag = document.createElement('span')
        tag.dataset.slot = 'Pill'
        tag.dataset.value = val
        tag.style.cssText = 'background:#333;color:#e0e0e0;padding:2px 6px;border-radius:3px;font-size:12px;display:flex;align-items:center;gap:4px;flex-shrink:0;white-space:nowrap;'
        tag.textContent = label

        const removeBtn = document.createElement('span')
        removeBtn.dataset.slot = 'PillRemove'
        removeBtn.style.cssText = 'color:#888;cursor:pointer;display:flex;'
        removeBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>'
        removeBtn.addEventListener('mouseenter', () => removeBtn.style.color = '#fff')
        removeBtn.addEventListener('mouseleave', () => removeBtn.style.color = '#888')
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation()
          const idx = el._zagState.value.indexOf(val)
          if (idx > -1) el._zagState.value.splice(idx, 1)
          const matchItem = Array.from(items).find(i => i.dataset.mirrorItem === val)
          if (matchItem) matchItem.removeAttribute('data-selected')
          updateCheckIcons()
          renderTags()
          renderTriggerValue()
        })
        tag.appendChild(removeBtn)
        tagGroup.appendChild(tag)
      }

      // Insert before clear button or indicator
      const insertBefore = clearButton || indicator
      trigger.insertBefore(tagGroup, insertBefore)
    }

    const renderTriggerValue = () => {
      if (isMultiple) {
        if (el._zagState.value.length === 0) {
          triggerText.style.display = ''
          triggerText.textContent = placeholder || 'Auswählen...'
          triggerText.style.color = '#666'
          if (clearButton) clearButton.style.display = 'none'
        } else {
          renderTags()
          if (clearButton) clearButton.style.display = 'flex'
        }
      } else {
        if (el._zagState.value.length === 0) {
          triggerText.textContent = placeholder || 'Auswählen...'
          triggerText.style.color = '#666'
          if (clearButton) clearButton.style.display = 'none'
        } else {
          const matchItem = Array.from(items).find(i => i.dataset.mirrorItem === el._zagState.value[0])
          triggerText.textContent = matchItem ? getItemLabel(matchItem) : el._zagState.value[0]
          triggerText.style.color = '#e0e0e0'
          if (clearButton) clearButton.style.display = 'flex'
        }
      }
    }

    // ========================================
    // DISABLED STATE
    // ========================================

    if (isDisabled) {
      trigger.setAttribute('disabled', 'true')
      trigger.style.opacity = '0.5'
      trigger.style.cursor = 'not-allowed'
      trigger.style.pointerEvents = 'none'
    }

    // ========================================
    // TRACK STATE
    // ========================================

    el._zagState.multiple = isMultiple
    el._zagPlaceholder = placeholder || 'Auswählen...'

    // Pre-select value
    const preselect = value || defaultValue
    if (preselect) {
      const preselectArr = Array.isArray(preselect) ? preselect : [preselect]
      el._zagState.value = preselectArr
      items.forEach(item => {
        if (preselectArr.includes(item.dataset.mirrorItem)) {
          item.setAttribute('data-selected', 'true')
        }
      })
      updateCheckIcons()
    }
    renderTriggerValue()

    // If disabled, don't set up interactions
    if (isDisabled) return

    // ========================================
    // TRIGGER CLICK
    // ========================================

    trigger.addEventListener('click', (e) => {
      e.stopPropagation()
      const wasOpen = el._zagState.open
      el._zagState.open = !wasOpen
      content.hidden = !el._zagState.open
      content.style.display = el._zagState.open ? '' : 'none'
      trigger.setAttribute('aria-expanded', el._zagState.open)

      // Fire open/close events
      if (el._zagState.open) {
        fireOpenEvent()

        // Auto-flip: check if dropdown fits below, otherwise flip to top
        requestAnimationFrame(() => {
          const triggerRect = trigger.getBoundingClientRect()
          const contentRect = content.getBoundingClientRect()
          const viewportHeight = window.innerHeight

          // Find scrollable parent (preview container)
          let scrollParent = el.parentElement
          while (scrollParent && scrollParent !== document.body) {
            const overflow = window.getComputedStyle(scrollParent).overflow
            if (overflow === 'auto' || overflow === 'scroll' || overflow === 'hidden') {
              break
            }
            scrollParent = scrollParent.parentElement
          }
          const containerRect = scrollParent ? scrollParent.getBoundingClientRect() : { bottom: viewportHeight, top: 0 }

          const spaceBelow = containerRect.bottom - triggerRect.bottom
          const spaceAbove = triggerRect.top - containerRect.top
          const contentHeight = contentRect.height

          // If not enough space below but more space above, flip to top
          if (spaceBelow < contentHeight && spaceAbove > spaceBelow) {
            content.style.top = 'auto'
            content.style.bottom = '100%'
            content.style.marginTop = '0'
            content.style.marginBottom = offset + 'px'
            content.dataset.placement = 'top-start'
          } else {
            content.style.bottom = 'auto'
            content.style.top = '100%'
            content.style.marginBottom = '0'
            content.style.marginTop = offset + 'px'
            content.dataset.placement = 'bottom-start'
          }
        })
      } else {
        fireCloseEvent()
      }

      // Update styles
      trigger.style.borderColor = el._zagState.open ? '#4f46e5' : '#333'
      if (indicator) {
        indicator.style.transform = el._zagState.open ? 'rotate(180deg)' : ''
        indicator.style.color = el._zagState.open ? '#4f46e5' : '#666'
      }

      if (el._zagState.open) {
        if (searchInput) {
          searchInput.value = ''
          searchInput.focus()
          // Use 'flex' to preserve horizontal layout
          items.forEach(item => item.style.display = 'flex')
        }
        el._zagState.highlightedIndex = 0
        this._updateZagHighlight(el, items)
      }
    })

    // Hover effect
    trigger.addEventListener('mouseenter', () => {
      if (!el._zagState.open) trigger.style.borderColor = '#444'
    })
    trigger.addEventListener('mouseleave', () => {
      if (!el._zagState.open) trigger.style.borderColor = '#333'
    })

    // Keyboard navigation on trigger (for non-searchable selects)
    trigger.addEventListener('keydown', (e) => {
      // When closed: open on Enter/Space/ArrowDown
      if (!el._zagState.open) {
        if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown') {
          e.preventDefault()
          trigger.click()
        }
        return
      }

      // When open: navigate with arrows
      const visibleItems = Array.from(content.querySelectorAll('[data-mirror-item]')).filter(i => i.style.display !== 'none')
      const count = visibleItems.length

      switch (e.key) {
        case 'ArrowDown':
          e.preventDefault()
          el._zagState.highlightedIndex = (el._zagState.highlightedIndex + 1) % count
          this._updateZagHighlight(el, visibleItems)
          break
        case 'ArrowUp':
          e.preventDefault()
          el._zagState.highlightedIndex = (el._zagState.highlightedIndex - 1 + count) % count
          this._updateZagHighlight(el, visibleItems)
          break
        case 'Enter':
        case ' ':
          e.preventDefault()
          if (el._zagState.highlightedIndex >= 0 && visibleItems[el._zagState.highlightedIndex]) {
            visibleItems[el._zagState.highlightedIndex].click()
          }
          break
        case 'Escape':
          e.preventDefault()
          el._zagState.open = false
          content.hidden = true
          content.style.display = 'none'
          trigger.setAttribute('aria-expanded', 'false')
          trigger.style.borderColor = '#333'
          if (indicator) {
            indicator.style.transform = ''
            indicator.style.color = '#666'
          }
          fireCloseEvent()
          break
        case 'Tab':
          // Close on Tab but allow natural tab behavior
          el._zagState.open = false
          content.hidden = true
          content.style.display = 'none'
          trigger.setAttribute('aria-expanded', 'false')
          trigger.style.borderColor = '#333'
          if (indicator) {
            indicator.style.transform = ''
            indicator.style.color = '#666'
          }
          fireCloseEvent()
          break
      }
    })

    // ========================================
    // CLICK OUTSIDE
    // ========================================

    document.addEventListener('click', (e) => {
      if (el._zagState.open && !el.contains(e.target)) {
        el._zagState.open = false
        content.hidden = true
        content.style.display = 'none'
        trigger.setAttribute('aria-expanded', 'false')
        trigger.style.borderColor = '#333'
        if (indicator) {
          indicator.style.transform = ''
          indicator.style.color = '#666'
        }
        fireCloseEvent()
      }
    })

    // ========================================
    // ITEM INTERACTIONS
    // ========================================

    items.forEach((item, index) => {
      const isItemDisabled = item.dataset.disabled === 'true'

      if (isItemDisabled) {
        item.style.opacity = '0.4'
        item.style.cursor = 'not-allowed'
        return
      }

      item.addEventListener('click', (e) => {
        e.stopPropagation()
        const itemValue = item.dataset.mirrorItem
        const previousValue = [...el._zagState.value]

        if (isMultiple) {
          const idx = el._zagState.value.indexOf(itemValue)
          if (idx > -1) {
            el._zagState.value.splice(idx, 1)
            item.removeAttribute('data-selected')
          } else {
            el._zagState.value.push(itemValue)
            item.setAttribute('data-selected', 'true')
          }
          updateCheckIcons()
          renderTriggerValue()
          fireChangeEvent([...el._zagState.value], previousValue)
        } else {
          // Single select mode
          const isCurrentlySelected = el._zagState.value.includes(itemValue)

          if (isCurrentlySelected && isDeselectable) {
            // Deselect if already selected and deselectable is enabled
            el._zagState.value = []
            item.removeAttribute('data-selected')
          } else {
            // Select new item
            el._zagState.value = [itemValue]
            items.forEach(i => i.removeAttribute('data-selected'))
            item.setAttribute('data-selected', 'true')
          }
          updateCheckIcons()
          renderTriggerValue()
          fireChangeEvent([...el._zagState.value], previousValue)

          if (closeOnSelect) {
            el._zagState.open = false
            content.hidden = true
            content.style.display = 'none'
            trigger.setAttribute('aria-expanded', 'false')
            trigger.style.borderColor = '#333'
            if (indicator) {
              indicator.style.transform = ''
              indicator.style.color = '#666'
            }
            fireCloseEvent()
          }
        }
      })

      item.addEventListener('mouseenter', () => {
        el._zagState.highlightedIndex = index
        this._updateZagHighlight(el, items)
      })
    })

    // ========================================
    // KEYBOARD NAVIGATION
    // ========================================

    el.addEventListener('keydown', (e) => {
      if (!el._zagState.open) {
        if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown') {
          e.preventDefault()
          trigger.click()
        }
        return
      }

      const visibleItems = Array.from(content.querySelectorAll('[data-mirror-item]')).filter(i => i.style.display !== 'none')
      const count = visibleItems.length

      switch (e.key) {
        case 'ArrowDown':
          e.preventDefault()
          el._zagState.highlightedIndex = (el._zagState.highlightedIndex + 1) % count
          this._updateZagHighlight(el, visibleItems)
          break
        case 'ArrowUp':
          e.preventDefault()
          el._zagState.highlightedIndex = (el._zagState.highlightedIndex - 1 + count) % count
          this._updateZagHighlight(el, visibleItems)
          break
        case 'Enter':
        case ' ':
          e.preventDefault()
          if (el._zagState.highlightedIndex >= 0 && visibleItems[el._zagState.highlightedIndex]) {
            visibleItems[el._zagState.highlightedIndex].click()
          }
          break
        case 'Escape':
          e.preventDefault()
          el._zagState.open = false
          content.hidden = true
          content.style.display = 'none'
          trigger.setAttribute('aria-expanded', 'false')
          trigger.style.borderColor = '#333'
          if (indicator) {
            indicator.style.transform = ''
            indicator.style.color = '#666'
          }
          trigger.focus()
          fireCloseEvent()
          break
      }
    })

    // ========================================
    // ACCESSIBILITY
    // ========================================

    trigger.setAttribute('tabindex', '0')
    trigger.setAttribute('role', 'combobox')
    trigger.setAttribute('aria-haspopup', 'listbox')
    trigger.setAttribute('aria-expanded', 'false')
    content.setAttribute('role', 'listbox')
  },

  _updateZagHighlight(el, items) {
    items.forEach((item, i) => {
      if (i === el._zagState.highlightedIndex) {
        item.setAttribute('data-highlighted', 'true')
        item.style.background = '#252525'
      } else {
        item.removeAttribute('data-highlighted')
        item.style.background = ''
      }
    })
  },

  // Tabs component initialization
  initTabsComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig
    const list = el.querySelector('[data-slot="List"]')
    const triggers = el.querySelectorAll('[data-slot="Trigger"]')
    const contents = el.querySelectorAll('[data-slot="Content"]')
    const indicator = el.querySelector('[data-slot="Indicator"]')

    if (!list || triggers.length === 0) return

    // Get config values
    const orientation = config.machineConfig?.orientation || 'horizontal'
    const activationMode = config.machineConfig?.activationMode || 'automatic'
    const loopFocus = config.machineConfig?.loopFocus !== false
    const deselectable = config.machineConfig?.deselectable || false
    const defaultValue = config.machineConfig?.defaultValue || config.machineConfig?.value || (config.items?.[0]?.value)

    // Initialize state
    el._tabsState = {
      value: defaultValue,
      focusedIndex: 0,
    }

    // ========================================
    // DEFAULT STYLING
    // ========================================

    // Root styling
    if (!el.hasAttribute('data-styled')) {
      Object.assign(el.style, {
        display: 'flex',
        flexDirection: orientation === 'vertical' ? 'row' : 'column',
      })
    }

    // List styling
    // Structural styles always needed for layout to work
    const isVertical = orientation === 'vertical'
    list.style.display = 'inline-flex'
    list.style.flexDirection = isVertical ? 'column' : 'row'
    list.style.position = 'relative'
    list.setAttribute('aria-orientation', orientation)

    // Visual defaults only if not customized
    if (!list.hasAttribute('data-styled')) {
      list.style.borderBottom = isVertical ? 'none' : '1px solid #333'
      list.style.borderRight = isVertical ? '1px solid #333' : 'none'
      if (!list.style.gap) list.style.gap = '24px'
    }

    // Trigger styling
    triggers.forEach(trigger => {
      if (!trigger.hasAttribute('data-styled')) {
        Object.assign(trigger.style, {
          padding: '8px 0',
          background: 'transparent',
          border: 'none',
          color: '#888',
          cursor: 'pointer',
          fontSize: '13px',
          fontWeight: '500',
          fontFamily: 'inherit',
          transition: 'color 0.15s',
          position: 'relative',
          whiteSpace: 'nowrap',
          flexShrink: '0',
          flexGrow: '0',
        })
      }
    })

    // Indicator styling
    // Structural styles are ALWAYS needed for positioning to work
    const hasCustomIndicator = indicator?.hasAttribute('data-custom-indicator')
    if (indicator) {
      // Always apply structural styles
      indicator.style.position = 'absolute'
      indicator.style.transition = 'left 0.2s ease, top 0.2s ease, width 0.2s ease, height 0.2s ease'

      if (hasCustomIndicator) {
        // Custom indicator with children - center content
        indicator.style.display = 'flex'
        indicator.style.alignItems = 'center'
        indicator.style.justifyContent = 'center'
      } else {
        // Visual defaults only if not customized
        if (!indicator.hasAttribute('data-styled')) {
          indicator.style.background = '#4f46e5'
          indicator.style.borderRadius = '2px'
        }

        // Initial position/size - set defaults for uncustomized dimensions (line indicator)
        if (isVertical) {
          if (!indicator.style.width) indicator.style.width = '2px'
          indicator.style.left = '0'
          indicator.style.top = '0'
          indicator.style.height = '0'
        } else {
          if (!indicator.style.height) indicator.style.height = '2px'
          indicator.style.bottom = '0'
          indicator.style.left = '0'
          indicator.style.width = '0'
        }
      }
    }

    // Content styling
    contents.forEach(content => {
      if (!content.hasAttribute('data-styled')) {
        Object.assign(content.style, {
          padding: '16px',
          display: 'none', // hidden by default
        })
      } else {
        // Even with custom styles, hide non-active panels
        if (content.dataset.value !== el._tabsState.value) {
          content.style.display = 'none'
        }
      }
    })

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const selectTab = (value) => {
      const previousValue = el._tabsState.value

      // Handle deselectable
      if (deselectable && value === previousValue) {
        el._tabsState.value = null
        updateUI()
        fireChangeEvent(null, previousValue)
        return
      }

      if (value === previousValue) return

      el._tabsState.value = value
      updateUI()
      fireChangeEvent(value, previousValue)
    }

    const updateUI = () => {
      const value = el._tabsState.value

      // Update triggers
      triggers.forEach((trigger, i) => {
        const isSelected = trigger.dataset.value === value
        trigger.setAttribute('aria-selected', isSelected)
        trigger.setAttribute('tabindex', isSelected ? '0' : '-1')

        if (!trigger.hasAttribute('data-styled')) {
          trigger.style.color = isSelected ? '#e0e0e0' : '#888'
        }

        if (isSelected) {
          trigger.setAttribute('data-selected', 'true')
          el._tabsState.focusedIndex = i
        } else {
          trigger.removeAttribute('data-selected')
        }
      })

      // Update contents
      contents.forEach(content => {
        const isActive = content.dataset.value === value
        content.style.display = isActive ? '' : 'none'
        content.setAttribute('data-state', isActive ? 'active' : 'inactive')
        if (isActive) {
          content.setAttribute('data-selected', 'true')
          // Lazy load content from file if needed
          if (content.dataset.loadFromFile && !content.dataset.loaded) {
            loadContentFromFile(content)
          }
        } else {
          content.removeAttribute('data-selected')
        }
      })

      // Update indicator position
      if (indicator && value) {
        const activeIndex = Array.from(triggers).findIndex(t => t.dataset.value === value)
        if (activeIndex >= 0) {
          if (hasCustomIndicator) {
            indicator.style.display = 'flex'
          }
          updateIndicator(triggers[activeIndex])
        }
      } else if (indicator && !value) {
        // Hide indicator when no tab selected
        if (hasCustomIndicator) {
          indicator.style.display = 'none'
        } else {
          indicator.style.width = '0'
          indicator.style.height = '0'
        }
      }
    }

    const updateIndicator = (activeTrigger) => {
      if (!indicator || !activeTrigger) return

      const isVertical = orientation === 'vertical'
      const listRect = list.getBoundingClientRect()
      const triggerRect = activeTrigger.getBoundingClientRect()

      if (hasCustomIndicator) {
        // Custom indicator - center it under/beside the active trigger
        const indicatorRect = indicator.getBoundingClientRect()
        if (isVertical) {
          // Center vertically beside the trigger
          const triggerCenter = (triggerRect.top - listRect.top) + (triggerRect.height / 2)
          indicator.style.top = (triggerCenter - (indicatorRect.height / 2)) + 'px'
          indicator.style.left = '0'
        } else {
          // Center horizontally under the trigger
          const triggerCenter = (triggerRect.left - listRect.left) + (triggerRect.width / 2)
          indicator.style.left = (triggerCenter - (indicatorRect.width / 2)) + 'px'
          indicator.style.bottom = '0'
        }
      } else {
        // Default line indicator - stretch to trigger size
        if (isVertical) {
          indicator.style.top = (triggerRect.top - listRect.top) + 'px'
          indicator.style.height = triggerRect.height + 'px'
        } else {
          indicator.style.left = (triggerRect.left - listRect.left) + 'px'
          indicator.style.width = triggerRect.width + 'px'
        }
      }
    }

    const fireChangeEvent = (newValue, previousValue) => {
      el.dispatchEvent(new CustomEvent('change', {
        detail: { value: newValue, previousValue },
        bubbles: true
      }))
    }

    const loadContentFromFile = (container) => {
      const filename = container.dataset.loadFromFile
      if (!filename) return

      const fullFilename = filename.endsWith('.mirror') ? filename : filename + '.mirror'

      // Try to get readFile callback
      const readFile = window._mirrorReadFile
      if (!readFile) {
        console.warn('No readFile callback available for lazy loading')
        return
      }

      const content = readFile(fullFilename)
      if (!content) {
        console.warn('Page not found: ' + fullFilename)
        return
      }

      // Get Mirror compiler
      const Mirror = window.Mirror
      if (!Mirror?.compile) {
        console.warn('Mirror compiler not available for lazy loading')
        return
      }

      try {
        const pageCode = Mirror.compile(content, { readFile })
        const execCode = pageCode.replace('export function createUI', 'function createUI')
        const fn = new Function(execCode + '\nreturn createUI();')
        const ui = fn()

        if (ui?.root) {
          // Clear any existing content
          container.innerHTML = ''
          // Move children from generated root to container
          while (ui.root.firstChild) {
            container.appendChild(ui.root.firstChild)
          }
        }

        // Mark as loaded so we don't reload
        container.dataset.loaded = 'true'
      } catch (err) {
        console.error('Failed to load page ' + fullFilename + ':', err)
      }
    }

    const focusTrigger = (index) => {
      if (index >= 0 && index < triggers.length) {
        triggers[index].focus()
        el._tabsState.focusedIndex = index
        // In automatic mode, also select the tab
        if (activationMode === 'automatic') {
          selectTab(triggers[index].dataset.value)
        }
      }
    }

    const getNextIndex = (current, direction) => {
      const count = triggers.length
      // Skip disabled triggers
      let next = current
      let attempts = 0
      do {
        if (direction === 'next') {
          next = loopFocus ? (next + 1) % count : Math.min(next + 1, count - 1)
        } else {
          next = loopFocus ? (next - 1 + count) % count : Math.max(next - 1, 0)
        }
        attempts++
      } while (triggers[next].disabled && attempts < count)

      return triggers[next].disabled ? current : next
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    // Click on trigger
    triggers.forEach((trigger, index) => {
      trigger.addEventListener('click', () => {
        if (trigger.disabled) return
        selectTab(trigger.dataset.value)
        trigger.focus()
      })

      // Hover effect
      trigger.addEventListener('mouseenter', () => {
        if (!trigger.disabled && !trigger.hasAttribute('data-styled')) {
          if (trigger.dataset.value !== el._tabsState.value) {
            trigger.style.color = '#ccc'
          }
        }
      })
      trigger.addEventListener('mouseleave', () => {
        if (!trigger.hasAttribute('data-styled')) {
          trigger.style.color = trigger.dataset.value === el._tabsState.value ? '#e0e0e0' : '#888'
        }
      })
    })

    // Keyboard navigation on list
    list.addEventListener('keydown', (e) => {
      const isVertical = orientation === 'vertical'
      const current = el._tabsState.focusedIndex

      switch (e.key) {
        case 'ArrowRight':
          if (!isVertical) {
            e.preventDefault()
            focusTrigger(getNextIndex(current, 'next'))
          }
          break
        case 'ArrowLeft':
          if (!isVertical) {
            e.preventDefault()
            focusTrigger(getNextIndex(current, 'prev'))
          }
          break
        case 'ArrowDown':
          if (isVertical) {
            e.preventDefault()
            focusTrigger(getNextIndex(current, 'next'))
          }
          break
        case 'ArrowUp':
          if (isVertical) {
            e.preventDefault()
            focusTrigger(getNextIndex(current, 'prev'))
          }
          break
        case 'Home':
          e.preventDefault()
          focusTrigger(0)
          break
        case 'End':
          e.preventDefault()
          focusTrigger(triggers.length - 1)
          break
        case 'Enter':
        case ' ':
          e.preventDefault()
          if (activationMode === 'manual') {
            selectTab(triggers[current].dataset.value)
          }
          break
      }
    })

    // ========================================
    // ACCESSIBILITY
    // ========================================

    triggers.forEach((trigger, i) => {
      const contentValue = trigger.dataset.value
      const content = Array.from(contents).find(c => c.dataset.value === contentValue)
      const contentId = content ? (content.id || `tabpanel-${el._zagConfig.id}-${i}`) : ''

      if (content && !content.id) {
        content.id = contentId
      }

      trigger.setAttribute('aria-controls', contentId)

      if (content) {
        const triggerId = trigger.id || `tab-${el._zagConfig.id}-${i}`
        if (!trigger.id) trigger.id = triggerId
        content.setAttribute('aria-labelledby', triggerId)
      }
    })

    // ========================================
    // INITIAL STATE
    // ========================================

    updateUI()

    // Update indicator position after render
    requestAnimationFrame(() => {
      if (el._tabsState.value) {
        const activeTrigger = Array.from(triggers).find(t => t.dataset.value === el._tabsState.value)
        if (activeTrigger) {
          updateIndicator(activeTrigger)
        }
      }
    })
  },

  // Switch component initialization
  initSwitchComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig
    const track = el.querySelector('[data-slot="Track"]')
    const thumb = track?.querySelector('[data-slot="Thumb"]')
    const label = el.querySelector('[data-slot="Label"]')

    if (!track || !thumb) return

    // Get config values
    const defaultChecked = config.machineConfig?.checked || config.machineConfig?.defaultChecked || false
    const isDisabled = config.machineConfig?.disabled || false
    const isReadOnly = config.machineConfig?.readOnly || false
    const isInvalid = config.machineConfig?.invalid || false

    // Initialize state
    el._switchState = {
      checked: defaultChecked,
    }

    // ========================================
    // DEFAULT STYLING (granular - only set if not already defined)
    // ========================================

    // Helper to set default style only if not already set
    const setDefault = (element, prop, value) => {
      if (!element.style[prop]) element.style[prop] = value
    }

    // Root (label) styling - always set structural
    setDefault(el, 'display', 'inline-flex')
    setDefault(el, 'alignItems', 'center')
    setDefault(el, 'gap', '8px')
    setDefault(el, 'cursor', isDisabled ? 'not-allowed' : 'pointer')
    el.style.userSelect = 'none'

    // Track styling - structural (always needed)
    track.style.display = 'inline-flex'
    track.style.alignItems = 'center'
    track.style.flexShrink = '0'
    track.style.transition = 'background 0.15s ease'
    // Dimensions - default if not set
    setDefault(track, 'width', '36px')
    setDefault(track, 'height', '20px')
    setDefault(track, 'padding', '2px')
    // Visual - default if not set
    setDefault(track, 'borderRadius', '10px')
    if (!track.style.background) {
      track.style.background = el._switchState.checked ? '#4f46e5' : '#333'
    }

    // Thumb styling - structural (always needed)
    thumb.style.display = 'block'
    thumb.style.transition = 'transform 0.15s ease'
    // Dimensions - default if not set
    setDefault(thumb, 'width', '16px')
    setDefault(thumb, 'height', '16px')
    // Visual - default if not set
    setDefault(thumb, 'borderRadius', '50%')
    setDefault(thumb, 'background', '#fff')
    setDefault(thumb, 'boxShadow', '0 1px 3px rgba(0,0,0,0.3)')

    // Calculate initial transform based on dimensions
    const trackWidth = parseInt(track.style.width) || 36
    const thumbWidth = parseInt(thumb.style.width) || 16
    const trackPadding = parseInt(track.style.padding) || 2
    const initialTranslate = el._switchState.checked ? (trackWidth - thumbWidth - trackPadding * 2) : 0
    thumb.style.transform = el._switchState.checked ? `translateX(${initialTranslate}px)` : 'translateX(0)'

    // Label styling - default if not set
    if (label) {
      setDefault(label, 'fontSize', '13px')
      setDefault(label, 'color', '#e0e0e0')
    }

    // ========================================
    // STATE MANAGEMENT
    // ========================================

    // Track if background was customized (set before runtime)
    const trackBgCustomized = !!track.style.background && track.style.background !== '#4f46e5' && track.style.background !== '#333' && track.style.background !== 'rgb(79, 70, 229)' && track.style.background !== 'rgb(51, 51, 51)'

    const updateUI = () => {
      const checked = el._switchState.checked

      // Update accessibility
      el.setAttribute('aria-checked', checked.toString())

      // Update data attributes
      el.setAttribute('data-state', checked ? 'checked' : 'unchecked')
      track.setAttribute('data-state', checked ? 'checked' : 'unchecked')
      thumb.setAttribute('data-state', checked ? 'checked' : 'unchecked')

      // Calculate thumb translate based on track/thumb dimensions
      const trackWidth = parseInt(track.style.width) || 36
