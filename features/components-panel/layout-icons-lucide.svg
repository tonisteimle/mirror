<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400">
  <style>
    .bg { fill: #09090b; }
    .card { fill: #18181b; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; fill: #71717a; }
    .section { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #a1a1aa; text-transform: uppercase; letter-spacing: 0.5px; }
    /* Lucide Style: stroke-width 2, round caps/joins */
    .lucide {
      stroke: #e4e4e7;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>

  <rect class="bg" width="520" height="400"/>

  <text class="section" x="16" y="24">Layout Icons - Lucide Style (stroke: 2, round caps)</text>

  <!-- Row 1: Direction -->
  <text class="label" x="16" y="52">Direction</text>

  <!-- Vertical Stack -->
  <g transform="translate(16, 60)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="20" height="5" rx="1"/>
      <rect x="2" y="9.5" width="20" height="5" rx="1"/>
      <rect x="2" y="17" width="20" height="5" rx="1"/>
    </g>
  </g>
  <text class="label" x="40" y="120" text-anchor="middle">Vertical</text>

  <!-- Horizontal Stack -->
  <g transform="translate(72, 60)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="5" height="20" rx="1"/>
      <rect x="9.5" y="2" width="5" height="20" rx="1"/>
      <rect x="17" y="2" width="5" height="20" rx="1"/>
    </g>
  </g>
  <text class="label" x="96" y="120" text-anchor="middle">Horizontal</text>

  <!-- Grid 2x2 -->
  <g transform="translate(128, 60)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="8" height="8" rx="1"/>
      <rect x="14" y="2" width="8" height="8" rx="1"/>
      <rect x="2" y="14" width="8" height="8" rx="1"/>
      <rect x="14" y="14" width="8" height="8" rx="1"/>
    </g>
  </g>
  <text class="label" x="152" y="120" text-anchor="middle">Grid 2</text>

  <!-- Grid 3 -->
  <g transform="translate(184, 60)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="5" height="5" rx="0.5"/>
      <rect x="9.5" y="2" width="5" height="5" rx="0.5"/>
      <rect x="17" y="2" width="5" height="5" rx="0.5"/>
      <rect x="2" y="9.5" width="5" height="5" rx="0.5"/>
      <rect x="9.5" y="9.5" width="5" height="5" rx="0.5"/>
      <rect x="17" y="9.5" width="5" height="5" rx="0.5"/>
      <rect x="2" y="17" width="5" height="5" rx="0.5"/>
      <rect x="9.5" y="17" width="5" height="5" rx="0.5"/>
      <rect x="17" y="17" width="5" height="5" rx="0.5"/>
    </g>
  </g>
  <text class="label" x="208" y="120" text-anchor="middle">Grid 3</text>

  <!-- Wrap -->
  <g transform="translate(240, 60)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="5" height="5" rx="0.5"/>
      <rect x="9.5" y="2" width="5" height="5" rx="0.5"/>
      <rect x="17" y="2" width="5" height="5" rx="0.5"/>
      <rect x="2" y="9.5" width="5" height="5" rx="0.5"/>
      <rect x="9.5" y="9.5" width="5" height="5" rx="0.5"/>
      <path d="M17 12 L20 12 L20 19 L7 19" stroke-dasharray="2 2"/>
    </g>
  </g>
  <text class="label" x="264" y="120" text-anchor="middle">Wrap</text>

  <!-- Row 2: Alignment -->
  <text class="label" x="16" y="148">Alignment</text>

  <!-- Center -->
  <g transform="translate(16, 156)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="20" height="20" rx="2" stroke-dasharray="3 2"/>
      <rect x="7" y="7" width="10" height="10" rx="1"/>
    </g>
  </g>
  <text class="label" x="40" y="216" text-anchor="middle">Center</text>

  <!-- Spread -->
  <g transform="translate(72, 156)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="6" width="4" height="12" rx="1"/>
      <rect x="10" y="6" width="4" height="12" rx="1"/>
      <rect x="18" y="6" width="4" height="12" rx="1"/>
    </g>
  </g>
  <text class="label" x="96" y="216" text-anchor="middle">Spread</text>

  <!-- Start -->
  <g transform="translate(128, 156)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="6" width="5" height="12" rx="1"/>
      <rect x="9" y="6" width="5" height="12" rx="1"/>
      <rect x="16" y="6" width="5" height="12" rx="1"/>
    </g>
  </g>
  <text class="label" x="152" y="216" text-anchor="middle">Start</text>

  <!-- End -->
  <g transform="translate(184, 156)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="3" y="6" width="5" height="12" rx="1"/>
      <rect x="10" y="6" width="5" height="12" rx="1"/>
      <rect x="17" y="6" width="5" height="12" rx="1"/>
    </g>
  </g>
  <text class="label" x="208" y="216" text-anchor="middle">End</text>

  <!-- Between -->
  <g transform="translate(240, 156)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="7" width="4" height="10" rx="1"/>
      <rect x="18" y="7" width="4" height="10" rx="1"/>
      <line x1="12" y1="6" x2="12" y2="18" stroke-dasharray="2 2"/>
    </g>
  </g>
  <text class="label" x="264" y="216" text-anchor="middle">Between</text>

  <!-- Row 3: Overflow & Position -->
  <text class="label" x="16" y="244">Overflow & Position</text>

  <!-- Scroll Vertical -->
  <g transform="translate(16, 252)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="3" y="2" width="14" height="20" rx="2"/>
      <line x1="20" y1="5" x2="20" y2="19"/>
      <rect x="19" y="7" width="2" height="6" rx="1" fill="#e4e4e7" stroke="none"/>
    </g>
  </g>
  <text class="label" x="40" y="312" text-anchor="middle">Scroll V</text>

  <!-- Scroll Horizontal -->
  <g transform="translate(72, 252)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="3" width="20" height="14" rx="2"/>
      <line x1="5" y1="20" x2="19" y2="20"/>
      <rect x="7" y="19" width="6" height="2" rx="1" fill="#e4e4e7" stroke="none"/>
    </g>
  </g>
  <text class="label" x="96" y="312" text-anchor="middle">Scroll H</text>

  <!-- Stacked / Layers -->
  <g transform="translate(128, 252)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="6" y="6" width="14" height="14" rx="2" stroke-opacity="0.4"/>
      <rect x="4" y="4" width="14" height="14" rx="2" stroke-opacity="0.7"/>
      <rect x="2" y="2" width="14" height="14" rx="2"/>
    </g>
  </g>
  <text class="label" x="152" y="312" text-anchor="middle">Stacked</text>

  <!-- Sticky -->
  <g transform="translate(184, 252)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <line x1="2" y1="8" x2="22" y2="8" stroke-dasharray="2 2"/>
      <rect x="4" y="2" width="16" height="5" rx="1"/>
      <rect x="4" y="11" width="16" height="9" rx="1" stroke-opacity="0.4"/>
    </g>
  </g>
  <text class="label" x="208" y="312" text-anchor="middle">Sticky</text>

  <!-- Fixed -->
  <g transform="translate(240, 252)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="20" height="20" rx="2" stroke-dasharray="2 2"/>
      <rect x="6" y="6" width="12" height="12" rx="1"/>
      <circle cx="12" cy="12" r="2" fill="#e4e4e7" stroke="none"/>
    </g>
  </g>
  <text class="label" x="264" y="312" text-anchor="middle">Fixed</text>

  <!-- Clip -->
  <g transform="translate(296, 252)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="20" height="20" rx="2"/>
      <rect x="12" y="8" width="14" height="12" rx="1" stroke-opacity="0.4"/>
    </g>
  </g>
  <text class="label" x="320" y="312" text-anchor="middle">Clip</text>

  <!-- Row 4: Common Patterns -->
  <text class="label" x="304" y="52">Patterns</text>

  <!-- Sidebar Layout -->
  <g transform="translate(304, 60)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="6" height="20" rx="1"/>
      <rect x="10" y="2" width="12" height="20" rx="1" stroke-dasharray="2 2"/>
    </g>
  </g>
  <text class="label" x="328" y="120" text-anchor="middle">Sidebar</text>

  <!-- Header + Content -->
  <g transform="translate(360, 60)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="20" height="5" rx="1"/>
      <rect x="2" y="9" width="20" height="13" rx="1" stroke-dasharray="2 2"/>
    </g>
  </g>
  <text class="label" x="384" y="120" text-anchor="middle">Header</text>

  <!-- Footer Layout -->
  <g transform="translate(416, 60)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="20" height="13" rx="1" stroke-dasharray="2 2"/>
      <rect x="2" y="17" width="20" height="5" rx="1"/>
    </g>
  </g>
  <text class="label" x="440" y="120" text-anchor="middle">Footer</text>

  <!-- Holy Grail -->
  <g transform="translate(472, 60)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="20" height="4" rx="0.5"/>
      <rect x="2" y="8" width="4" height="10" rx="0.5"/>
      <rect x="8" y="8" width="8" height="10" rx="0.5" stroke-dasharray="2 2"/>
      <rect x="18" y="8" width="4" height="10" rx="0.5"/>
      <rect x="2" y="20" width="20" height="2" rx="0.5"/>
    </g>
  </g>
  <text class="label" x="496" y="120" text-anchor="middle">Holy Grail</text>

  <!-- Row 4 continued -->

  <!-- Card Container -->
  <g transform="translate(304, 156)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="20" height="20" rx="3"/>
      <line x1="6" y1="10" x2="18" y2="10"/>
      <line x1="6" y1="14" x2="14" y2="14"/>
    </g>
  </g>
  <text class="label" x="328" y="216" text-anchor="middle">Card</text>

  <!-- Modal -->
  <g transform="translate(360, 156)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="20" height="20" rx="2" stroke-opacity="0.3"/>
      <rect x="4" y="5" width="16" height="14" rx="2"/>
      <line x1="16" y1="7" x2="18" y2="9"/>
      <line x1="18" y1="7" x2="16" y2="9"/>
    </g>
  </g>
  <text class="label" x="384" y="216" text-anchor="middle">Modal</text>

  <!-- Aspect Ratio -->
  <g transform="translate(416, 156)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="5" width="20" height="14" rx="2"/>
      <text font-family="system-ui" font-size="6" fill="#e4e4e7" x="12" y="14" text-anchor="middle">16:9</text>
    </g>
  </g>
  <text class="label" x="440" y="216" text-anchor="middle">Aspect</text>

  <!-- Full Screen -->
  <g transform="translate(472, 156)">
    <rect class="card" width="48" height="48" rx="6"/>
    <g class="lucide" transform="translate(12, 12)">
      <rect x="2" y="2" width="20" height="20" rx="2"/>
      <polyline points="7,2 2,2 2,7"/>
      <polyline points="17,2 22,2 22,7"/>
      <polyline points="7,22 2,22 2,17"/>
      <polyline points="17,22 22,22 22,17"/>
    </g>
  </g>
  <text class="label" x="496" y="216" text-anchor="middle">Fullscreen</text>

  <!-- Info -->
  <g transform="translate(16, 340)">
    <text class="section" fill="#52525b">Lucide Compatibility: stroke-width: 2 | stroke-linecap: round | stroke-linejoin: round | viewBox: 24x24</text>
    <text class="label" y="20">These icons match Lucide's visual style and can be used alongside existing Lucide icons.</text>
  </g>

</svg>
