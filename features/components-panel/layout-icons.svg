<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <style>
    .label { font-family: system-ui; font-size: 10px; fill: #888; }
    .icon { stroke: #3B82F6; fill: none; stroke-width: 1.5; }
    .icon-fill { fill: #3B82F620; }
    .bg { fill: #1a1a23; rx: 8; }
  </style>

  <!-- Background -->
  <rect width="400" height="300" fill="#0a0a0f"/>

  <!-- Row 1: Layout Containers -->

  <!-- Vertical -->
  <g transform="translate(20, 20)">
    <rect class="bg" width="60" height="80"/>
    <g class="icon" transform="translate(14, 12)">
      <rect x="0" y="0" width="32" height="10" rx="2"/>
      <rect x="0" y="14" width="32" height="10" rx="2"/>
      <rect x="0" y="28" width="32" height="10" rx="2"/>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Vertical</text>
  </g>

  <!-- Horizontal -->
  <g transform="translate(90, 20)">
    <rect class="bg" width="60" height="80"/>
    <g class="icon" transform="translate(10, 16)">
      <rect x="0" y="0" width="10" height="28" rx="2"/>
      <rect x="14" y="0" width="10" height="28" rx="2"/>
      <rect x="28" y="0" width="10" height="28" rx="2"/>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Horizontal</text>
  </g>

  <!-- Grid -->
  <g transform="translate(160, 20)">
    <rect class="bg" width="60" height="80"/>
    <g class="icon" transform="translate(10, 12)">
      <rect x="0" y="0" width="18" height="14" rx="2"/>
      <rect x="22" y="0" width="18" height="14" rx="2"/>
      <rect x="0" y="18" width="18" height="14" rx="2"/>
      <rect x="22" y="18" width="18" height="14" rx="2"/>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Grid</text>
  </g>

  <!-- Stacked -->
  <g transform="translate(230, 20)">
    <rect class="bg" width="60" height="80"/>
    <g class="icon" transform="translate(12, 14)">
      <rect x="10" y="10" width="24" height="20" rx="2" class="icon-fill"/>
      <rect x="5" y="5" width="24" height="20" rx="2" class="icon-fill"/>
      <rect x="0" y="0" width="24" height="20" rx="2"/>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Stacked</text>
  </g>

  <!-- Scroll -->
  <g transform="translate(300, 20)">
    <rect class="bg" width="60" height="80"/>
    <g class="icon" transform="translate(12, 12)">
      <rect x="0" y="0" width="28" height="36" rx="2"/>
      <rect x="32" y="4" width="3" height="28" rx="1.5" stroke-width="1"/>
      <rect x="32" y="8" width="3" height="8" rx="1.5" fill="#3B82F6"/>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Scroll</text>
  </g>

  <!-- Row 2: Basic Components -->

  <!-- Text -->
  <g transform="translate(20, 120)">
    <rect class="bg" width="60" height="80"/>
    <g transform="translate(12, 16)">
      <text font-family="system-ui" font-size="24" font-weight="bold" fill="#3B82F6">Aa</text>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Text</text>
  </g>

  <!-- Button -->
  <g transform="translate(90, 120)">
    <rect class="bg" width="60" height="80"/>
    <g class="icon" transform="translate(8, 20)">
      <rect x="0" y="0" width="44" height="20" rx="4" fill="#3B82F6" stroke="none"/>
      <text font-family="system-ui" font-size="9" fill="white" x="22" y="14" text-anchor="middle">Button</text>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Button</text>
  </g>

  <!-- Input -->
  <g transform="translate(160, 120)">
    <rect class="bg" width="60" height="80"/>
    <g class="icon" transform="translate(8, 20)">
      <rect x="0" y="0" width="44" height="20" rx="4"/>
      <line x1="8" y1="10" x2="20" y2="10" stroke-width="1"/>
      <rect x="6" y="6" width="1" height="8" fill="#3B82F6" stroke="none">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Input</text>
  </g>

  <!-- Icon -->
  <g transform="translate(230, 120)">
    <rect class="bg" width="60" height="80"/>
    <g class="icon" transform="translate(18, 14)">
      <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Icon</text>
  </g>

  <!-- Image -->
  <g transform="translate(300, 120)">
    <rect class="bg" width="60" height="80"/>
    <g class="icon" transform="translate(12, 12)">
      <rect x="0" y="0" width="36" height="28" rx="2"/>
      <circle cx="10" cy="10" r="4" fill="#3B82F620"/>
      <polyline points="36,20 26,12 12,28 0,20"/>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Image</text>
  </g>

  <!-- Row 3: User Components Example -->

  <!-- Card (user) -->
  <g transform="translate(20, 220)">
    <rect class="bg" width="60" height="80"/>
    <!-- Blue dot indicator -->
    <circle cx="52" cy="28" r="4" fill="#3B82F6"/>
    <g transform="translate(10, 12)">
      <!-- Mini card preview -->
      <rect x="0" y="0" width="40" height="40" rx="4" stroke="#3B82F6" fill="none" stroke-width="1"/>
      <rect x="4" y="4" width="32" height="12" rx="2" fill="#52525B"/>
      <text font-family="system-ui" font-size="6" fill="#888" x="6" y="26">Aa</text>
      <rect x="4" y="30" width="16" height="6" rx="1" fill="#3B82F640"/>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Card</text>
  </g>

  <!-- NavBar (user) -->
  <g transform="translate(90, 220)">
    <rect class="bg" width="60" height="80"/>
    <circle cx="52" cy="28" r="4" fill="#3B82F6"/>
    <g transform="translate(8, 20)">
      <!-- Mini navbar preview -->
      <rect x="0" y="0" width="44" height="16" rx="2" stroke="#3B82F6" fill="none" stroke-width="1"/>
      <circle cx="8" cy="8" r="3" fill="#3B82F640"/>
      <line x1="16" y1="8" x2="40" y2="8" stroke="#52525B" stroke-width="2"/>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">NavBar</text>
  </g>

  <!-- Modal (user) -->
  <g transform="translate(160, 220)">
    <rect class="bg" width="60" height="80"/>
    <circle cx="52" cy="28" r="4" fill="#3B82F6"/>
    <g transform="translate(10, 10)">
      <!-- Mini modal preview -->
      <rect x="0" y="0" width="40" height="44" rx="4" fill="#27272a" stroke="#3B82F6" stroke-width="1"/>
      <line x1="32" y1="6" x2="36" y2="10" stroke="#888" stroke-width="1.5"/>
      <line x1="36" y1="6" x2="32" y2="10" stroke="#888" stroke-width="1.5"/>
      <rect x="4" y="16" width="32" height="4" rx="1" fill="#52525B"/>
      <rect x="4" y="24" width="24" height="4" rx="1" fill="#52525B"/>
      <rect x="20" y="34" width="16" height="6" rx="2" fill="#3B82F6"/>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Modal</text>
  </g>

  <!-- Form (user) -->
  <g transform="translate(230, 220)">
    <rect class="bg" width="60" height="80"/>
    <circle cx="52" cy="28" r="4" fill="#3B82F6"/>
    <g transform="translate(10, 10)">
      <!-- Mini form preview -->
      <rect x="0" y="0" width="40" height="44" rx="4" stroke="#3B82F6" fill="none" stroke-width="1"/>
      <rect x="4" y="6" width="32" height="8" rx="2" fill="#27272a" stroke="#52525B" stroke-width="0.5"/>
      <rect x="4" y="18" width="32" height="8" rx="2" fill="#27272a" stroke="#52525B" stroke-width="0.5"/>
      <rect x="4" y="30" width="32" height="8" rx="2" fill="#3B82F6"/>
    </g>
    <text class="label" x="30" y="70" text-anchor="middle">Form</text>
  </g>

</svg>
