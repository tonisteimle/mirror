<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 600">
  <style>
    .panel-bg { fill: #0a0a0f; }
    .section-title { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; fill: #71717a; text-transform: uppercase; letter-spacing: 0.5px; }
    .section-count { font-family: system-ui, -apple-system, sans-serif; font-size: 8px; fill: #52525b; }
    .item-label { font-family: system-ui, -apple-system, sans-serif; font-size: 8px; fill: #a1a1aa; }
    .item-bg { fill: #18181b; }
    .item-bg:hover { fill: #1e1e28; }
    .icon { stroke: #71717a; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .icon-fill { fill: currentColor; fill-opacity: 0.12; }
    .search-bg { fill: #18181b; }
    .search-text { font-family: system-ui; font-size: 10px; fill: #52525b; }
    .divider { stroke: #27272a; }
  </style>

  <!-- Panel Background -->
  <rect class="panel-bg" width="200" height="600"/>

  <!-- Search Bar -->
  <g transform="translate(8, 8)">
    <rect class="search-bg" width="184" height="28" rx="6"/>
    <text class="search-text" x="12" y="18">Search components...</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SECTION: Layout -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <g transform="translate(8, 48)">
    <text class="section-title" x="0" y="0">Layout</text>
    <text class="section-count" x="180" y="0" text-anchor="end">(20)</text>
  </g>

  <!-- Layout Grid: 4 columns, small icons -->
  <g transform="translate(8, 56)">
    <!-- Row 1 -->
    <g transform="translate(0, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="16" height="4" rx="1"/>
        <rect x="0" y="6" width="16" height="4" rx="1"/>
        <rect x="0" y="12" width="16" height="4" rx="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Ver</text>
    </g>

    <g transform="translate(48, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="4" height="16" rx="1"/>
        <rect x="6" y="0" width="4" height="16" rx="1"/>
        <rect x="12" y="0" width="4" height="16" rx="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Hor</text>
    </g>

    <g transform="translate(96, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="7" height="7" rx="1"/>
        <rect x="9" y="0" width="7" height="7" rx="1"/>
        <rect x="0" y="9" width="7" height="7" rx="1"/>
        <rect x="9" y="9" width="7" height="7" rx="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Grid</text>
    </g>

    <g transform="translate(144, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="4" y="4" width="10" height="10" rx="1" class="icon-fill" stroke="#71717a"/>
        <rect x="2" y="2" width="10" height="10" rx="1" class="icon-fill" stroke="#71717a"/>
        <rect x="0" y="0" width="10" height="10" rx="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Stack</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 44)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="16" height="16" rx="1" stroke-dasharray="2 1" stroke-width="1"/>
        <rect x="5" y="5" width="6" height="6" rx="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Center</text>
    </g>

    <g transform="translate(48, 44)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="4" width="4" height="8" rx="1"/>
        <rect x="6" y="4" width="4" height="8" rx="1"/>
        <rect x="12" y="4" width="4" height="8" rx="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Spread</text>
    </g>

    <g transform="translate(96, 44)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="4" height="4" rx="1"/>
        <rect x="6" y="0" width="4" height="4" rx="1"/>
        <rect x="12" y="0" width="4" height="4" rx="1"/>
        <rect x="0" y="6" width="4" height="4" rx="1"/>
        <rect x="6" y="6" width="4" height="4" rx="1"/>
        <path d="M12 8 L15 8 L15 14 L2 14" stroke-dasharray="2 1" stroke-width="1" fill="none"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Wrap</text>
    </g>

    <g transform="translate(144, 44)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="12" height="16" rx="1"/>
        <rect x="14" y="2" width="2" height="12" rx="1" stroke-width="1"/>
        <rect x="14" y="3" width="2" height="5" rx="1" fill="#71717a" stroke="none"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Scroll</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 88)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="6" width="16" height="1" fill="#71717a"/>
        <rect x="1" y="2" width="14" height="6" rx="1" class="icon-fill" stroke="#71717a"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Sticky</text>
    </g>

    <g transform="translate(48, 88)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="16" height="16" rx="1" stroke-dasharray="2 1" stroke-width="1"/>
        <rect x="3" y="3" width="10" height="10" rx="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Fixed</text>
    </g>

    <g transform="translate(96, 88)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="16" height="4" rx="1"/>
        <rect x="0" y="6" width="16" height="10" rx="1" stroke-dasharray="2 1" stroke-width="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Header</text>
    </g>

    <g transform="translate(144, 88)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="5" height="16" rx="1"/>
        <rect x="7" y="0" width="9" height="16" rx="1" stroke-dasharray="2 1" stroke-width="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Sidebar</text>
    </g>
  </g>

  <line class="divider" x1="8" y1="196" x2="192" y2="196"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SECTION: Basics -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <g transform="translate(8, 208)">
    <text class="section-title" x="0" y="0">Basics</text>
    <text class="section-count" x="180" y="0" text-anchor="end">(8)</text>
  </g>

  <g transform="translate(8, 216)">
    <!-- Row 1 -->
    <g transform="translate(0, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <text font-family="system-ui" font-size="12" font-weight="500" fill="#71717a" x="22" y="22" text-anchor="middle">Aa</text>
      <text class="item-label" x="22" y="36" text-anchor="middle">Text</text>
    </g>

    <g transform="translate(48, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 8)">
        <rect x="0" y="0" width="16" height="8" rx="4" class="icon-fill" stroke="#71717a"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Button</text>
    </g>

    <g transform="translate(96, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 8)">
        <rect x="0" y="0" width="16" height="8" rx="2"/>
        <line x1="3" y1="2" x2="3" y2="6" stroke-width="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Input</text>
    </g>

    <g transform="translate(144, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <polygon points="8,1 10,6 16,6 11,10 13,16 8,12 3,16 5,10 0,6 6,6" stroke-width="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Icon</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 44)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="16" height="12" rx="1"/>
        <circle cx="5" cy="4" r="2" class="icon-fill" stroke="#71717a" stroke-width="1"/>
        <polyline points="16,10 11,6 6,10 3,8 0,10"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Image</text>
    </g>

    <g transform="translate(48, 44)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 8)">
        <rect x="1" y="1" width="8" height="8" rx="2"/>
        <polyline points="3,5 5,7 8,3" stroke-width="1.5"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Check</text>
    </g>

    <g transform="translate(96, 44)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 8)">
        <rect x="0" y="0" width="16" height="8" rx="4"/>
        <circle cx="11" cy="4" r="3" fill="#71717a"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Toggle</text>
    </g>

    <g transform="translate(144, 44)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <g class="icon" transform="translate(14, 10)">
        <line x1="0" y1="2" x2="16" y2="2" stroke-width="2"/>
        <circle cx="10" cy="2" r="3"/>
        <circle cx="10" cy="2" r="1.5" fill="#71717a"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Slider</text>
    </g>
  </g>

  <line class="divider" x1="8" y1="312" x2="192" y2="312"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SECTION: User Components (dynamic from --- sections ---) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <g transform="translate(8, 324)">
    <text class="section-title" x="0" y="0">Navigation</text>
    <text class="section-count" x="180" y="0" text-anchor="end">(3)</text>
  </g>

  <g transform="translate(8, 332)">
    <g transform="translate(0, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <circle cx="38" cy="8" r="3" fill="#3B82F6"/>
      <g class="icon" transform="translate(14, 8)">
        <rect x="0" y="0" width="16" height="6" rx="1"/>
        <circle cx="3" cy="3" r="1.5" class="icon-fill" stroke="#71717a" stroke-width="1"/>
        <line x1="7" y1="3" x2="14" y2="3" stroke-width="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">NavBar</text>
    </g>

    <g transform="translate(48, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <circle cx="38" cy="8" r="3" fill="#3B82F6"/>
      <g class="icon" transform="translate(14, 8)">
        <rect x="0" y="3" width="16" height="6" rx="1"/>
        <line x1="3" y1="6" x2="6" y2="6" stroke-width="2"/>
        <line x1="8" y1="6" x2="11" y2="6" stroke-width="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">TabBar</text>
    </g>

    <g transform="translate(96, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <circle cx="38" cy="8" r="3" fill="#3B82F6"/>
      <g class="icon" transform="translate(14, 10)">
        <circle cx="2" cy="2" r="1" fill="#71717a"/>
        <line x1="4" y1="2" x2="8" y2="2" stroke-width="1"/>
        <circle cx="10" cy="2" r="1" fill="#71717a"/>
        <line x1="12" y1="2" x2="16" y2="2" stroke-width="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Bread</text>
    </g>
  </g>

  <line class="divider" x1="8" y1="384" x2="192" y2="384"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SECTION: Forms (from user's --- Forms --- section) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <g transform="translate(8, 396)">
    <text class="section-title" x="0" y="0">Forms</text>
    <text class="section-count" x="180" y="0" text-anchor="end">(4)</text>
  </g>

  <g transform="translate(8, 404)">
    <g transform="translate(0, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <circle cx="38" cy="8" r="3" fill="#3B82F6"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="16" height="16" rx="1"/>
        <rect x="2" y="3" width="12" height="3" rx="1" stroke-width="1"/>
        <rect x="2" y="8" width="12" height="3" rx="1" stroke-width="1"/>
        <rect x="2" y="13" width="8" height="2" rx="0.5" fill="#71717a" stroke="none"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Form</text>
    </g>

    <g transform="translate(48, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <circle cx="38" cy="8" r="3" fill="#3B82F6"/>
      <g class="icon" transform="translate(14, 6)">
        <text font-size="6" fill="#71717a" x="0" y="5">Aa</text>
        <rect x="0" y="8" width="16" height="6" rx="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Field</text>
    </g>

    <g transform="translate(96, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <circle cx="38" cy="8" r="3" fill="#3B82F6"/>
      <g class="icon" transform="translate(14, 8)">
        <rect x="0" y="0" width="16" height="8" rx="1"/>
        <polyline points="11,2 13,4 11,6" stroke-width="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Select</text>
    </g>

    <g transform="translate(144, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <circle cx="38" cy="8" r="3" fill="#3B82F6"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="16" height="12" rx="1"/>
        <line x1="3" y1="4" x2="13" y2="4" stroke-width="1"/>
        <line x1="3" y1="7" x2="10" y2="7" stroke-width="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Textarea</text>
    </g>
  </g>

  <line class="divider" x1="8" y1="456" x2="192" y2="456"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SECTION: Cards (from user's --- Cards --- section) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <g transform="translate(8, 468)">
    <text class="section-title" x="0" y="0">Cards</text>
    <text class="section-count" x="180" y="0" text-anchor="end">(3)</text>
  </g>

  <g transform="translate(8, 476)">
    <g transform="translate(0, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <circle cx="38" cy="8" r="3" fill="#3B82F6"/>
      <g class="icon" transform="translate(14, 4)">
        <rect x="0" y="0" width="16" height="18" rx="2"/>
        <rect x="2" y="2" width="12" height="6" rx="1" class="icon-fill" stroke="#71717a" stroke-width="1"/>
        <line x1="2" y1="11" x2="10" y2="11" stroke-width="1"/>
        <line x1="2" y1="14" x2="7" y2="14" stroke-width="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Card</text>
    </g>

    <g transform="translate(48, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <circle cx="38" cy="8" r="3" fill="#3B82F6"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="16" height="14" rx="2" stroke-opacity="0.3"/>
        <rect x="2" y="3" width="12" height="9" rx="1" class="icon-fill" stroke="#71717a"/>
        <line x1="11" y1="5" x2="12" y2="6" stroke-width="1"/>
        <line x1="12" y1="5" x2="11" y2="6" stroke-width="1"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Modal</text>
    </g>

    <g transform="translate(96, 0)">
      <rect class="item-bg" width="44" height="40" rx="4"/>
      <circle cx="38" cy="8" r="3" fill="#3B82F6"/>
      <g class="icon" transform="translate(14, 6)">
        <rect x="0" y="0" width="16" height="14" rx="1"/>
        <line x1="0" y1="4" x2="16" y2="4"/>
        <line x1="5" y1="0" x2="5" y2="14" stroke-width="1"/>
        <line x1="11" y1="0" x2="11" y2="14" stroke-width="1"/>
        <rect x="0" y="0" width="16" height="4" rx="1" class="icon-fill" stroke="none"/>
      </g>
      <text class="item-label" x="22" y="36" text-anchor="middle">Table</text>
    </g>
  </g>

  <!-- Panel Info -->
  <g transform="translate(8, 540)">
    <text class="section-count" x="0" y="0">Width: 200px</text>
    <text class="section-count" x="0" y="12">Icons: 16x16 in 44x40 cards</text>
    <text class="section-count" x="0" y="24">Grid: 4 columns</text>
    <text class="section-count" x="0" y="36">Blue dot = User component</text>
  </g>

</svg>
