<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #e4e4e7; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #71717a; }
    .section { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #a1a1aa; text-transform: uppercase; letter-spacing: 0.5px; }
    .icon { stroke: #71717a; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .icon-fill { fill: currentColor; fill-opacity: 0.12; }
    .card { fill: #18181b; }
    .card:hover .icon { stroke: #3B82F6; }
  </style>

  <!-- Background -->
  <rect width="600" height="500" fill="#09090b"/>

  <!-- Title -->
  <text class="title" x="24" y="32">Component Icons - Style Guide Reference</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SECTION: Layout Containers -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <text class="section" x="24" y="64">Layout Containers</text>

  <!-- Vertical -->
  <g transform="translate(24, 76)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 16)">
      <rect x="0" y="0" width="24" height="6" rx="2"/>
      <rect x="0" y="9" width="24" height="6" rx="2"/>
      <rect x="0" y="18" width="24" height="6" rx="2"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Vertical</text>
  </g>

  <!-- Horizontal -->
  <g transform="translate(104, 76)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 16)">
      <rect x="0" y="0" width="6" height="24" rx="2"/>
      <rect x="9" y="0" width="6" height="24" rx="2"/>
      <rect x="18" y="0" width="6" height="24" rx="2"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Horizontal</text>
  </g>

  <!-- Grid -->
  <g transform="translate(184, 76)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 16)">
      <rect x="0" y="0" width="10" height="10" rx="2"/>
      <rect x="14" y="0" width="10" height="10" rx="2"/>
      <rect x="0" y="14" width="10" height="10" rx="2"/>
      <rect x="14" y="14" width="10" height="10" rx="2"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Grid</text>
  </g>

  <!-- Stacked -->
  <g transform="translate(264, 76)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 16)">
      <rect x="6" y="6" width="16" height="16" rx="2" class="icon-fill" stroke="#71717a"/>
      <rect x="3" y="3" width="16" height="16" rx="2" class="icon-fill" stroke="#71717a"/>
      <rect x="0" y="0" width="16" height="16" rx="2"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Stacked</text>
  </g>

  <!-- Scroll -->
  <g transform="translate(344, 76)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 16)">
      <rect x="0" y="0" width="18" height="24" rx="2"/>
      <rect x="21" y="2" width="3" height="20" rx="1.5" stroke-width="1"/>
      <rect x="21" y="4" width="3" height="8" rx="1.5" fill="#71717a" stroke="none"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Scroll</text>
  </g>

  <!-- Wrap -->
  <g transform="translate(424, 76)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 16)">
      <rect x="0" y="0" width="6" height="6" rx="1.5"/>
      <rect x="9" y="0" width="6" height="6" rx="1.5"/>
      <rect x="18" y="0" width="6" height="6" rx="1.5"/>
      <rect x="0" y="9" width="6" height="6" rx="1.5"/>
      <rect x="9" y="9" width="6" height="6" rx="1.5"/>
      <path d="M18 12 L22 12 L22 20 L4 20" stroke-dasharray="2 2" stroke-width="1" fill="none"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Wrap</text>
  </g>

  <!-- Center -->
  <g transform="translate(504, 76)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 16)">
      <rect x="0" y="0" width="24" height="24" rx="2" stroke-dasharray="3 2" stroke-width="1"/>
      <rect x="7" y="7" width="10" height="10" rx="2"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Center</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SECTION: Basic Components -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <text class="section" x="24" y="172">Basic Components</text>

  <!-- Text -->
  <g transform="translate(24, 184)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g transform="translate(24, 14)">
      <text font-family="system-ui" font-size="20" font-weight="500" fill="#71717a">Aa</text>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Text</text>
  </g>

  <!-- Button -->
  <g transform="translate(104, 184)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 18)">
      <rect x="0" y="0" width="24" height="12" rx="6" class="icon-fill" stroke="#71717a"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Button</text>
  </g>

  <!-- Input -->
  <g transform="translate(184, 184)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 18)">
      <rect x="0" y="0" width="24" height="12" rx="2"/>
      <line x1="4" y1="3" x2="4" y2="9" stroke-width="1.5"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Input</text>
  </g>

  <!-- Icon -->
  <g transform="translate(264, 184)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 16)">
      <polygon points="12,2 14.5,9 22,9 16,14 18.5,22 12,17 5.5,22 8,14 2,9 9.5,9" stroke-width="1.5"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Icon</text>
  </g>

  <!-- Image -->
  <g transform="translate(344, 184)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 14)">
      <rect x="0" y="0" width="24" height="18" rx="2"/>
      <circle cx="7" cy="6" r="2.5" class="icon-fill" stroke="#71717a"/>
      <polyline points="24,14 17,8 10,14 6,11 0,16"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Image</text>
  </g>

  <!-- Checkbox -->
  <g transform="translate(424, 184)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 16)">
      <rect x="2" y="2" width="14" height="14" rx="3"/>
      <polyline points="5,9 8,12 13,6" stroke-width="2"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Checkbox</text>
  </g>

  <!-- Toggle -->
  <g transform="translate(504, 184)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 18)">
      <rect x="0" y="0" width="24" height="12" rx="6"/>
      <circle cx="17" cy="6" r="4" fill="#71717a"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Toggle</text>
  </g>

  <!-- Row 2 of Basics -->

  <!-- Slider -->
  <g transform="translate(24, 264)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 22)">
      <line x1="0" y1="4" x2="24" y2="4" stroke-width="2" stroke-linecap="round"/>
      <circle cx="16" cy="4" r="4"/>
      <circle cx="16" cy="4" r="2" fill="#71717a"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Slider</text>
  </g>

  <!-- Select -->
  <g transform="translate(104, 264)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 18)">
      <rect x="0" y="0" width="24" height="12" rx="2"/>
      <polyline points="17,4 20,7 17,10" stroke-width="1.5"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Select</text>
  </g>

  <!-- Link -->
  <g transform="translate(184, 264)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 16)">
      <path d="M10,14 L6,14 C3,14 1,12 1,9 C1,6 3,4 6,4 L10,4"/>
      <path d="M14,4 L18,4 C21,4 23,6 23,9 C23,12 21,14 18,14 L14,14"/>
      <line x1="8" y1="9" x2="16" y2="9"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Link</text>
  </g>

  <!-- Divider -->
  <g transform="translate(264, 264)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 22)">
      <line x1="0" y1="4" x2="24" y2="4" stroke-width="1.5"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Divider</text>
  </g>

  <!-- Spacer -->
  <g transform="translate(344, 264)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 16)">
      <line x1="12" y1="0" x2="12" y2="24" stroke-dasharray="3 3" stroke-width="1"/>
      <polyline points="8,3 12,0 16,3" stroke-width="1.5"/>
      <polyline points="8,21 12,24 16,21" stroke-width="1.5"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Spacer</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SECTION: Composite Components -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <text class="section" x="24" y="360">Composite Components (User Pool)</text>

  <!-- Card -->
  <g transform="translate(24, 372)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 12)">
      <rect x="0" y="0" width="24" height="28" rx="3"/>
      <rect x="3" y="3" width="18" height="9" rx="1.5" class="icon-fill" stroke="#71717a" stroke-width="1"/>
      <line x1="3" y1="16" x2="16" y2="16" stroke-width="1"/>
      <line x1="3" y1="20" x2="12" y2="20" stroke-width="1"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Card</text>
  </g>

  <!-- Modal -->
  <g transform="translate(104, 372)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 14)">
      <rect x="0" y="0" width="24" height="20" rx="2" stroke-opacity="0.3"/>
      <rect x="3" y="4" width="18" height="14" rx="2" class="icon-fill" stroke="#71717a"/>
      <line x1="17" y1="6" x2="19" y2="8" stroke-width="1"/>
      <line x1="19" y1="6" x2="17" y2="8" stroke-width="1"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Modal</text>
  </g>

  <!-- NavBar -->
  <g transform="translate(184, 372)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 20)">
      <rect x="0" y="0" width="24" height="10" rx="2"/>
      <circle cx="5" cy="5" r="2" class="icon-fill" stroke="#71717a"/>
      <line x1="10" y1="5" x2="14" y2="5" stroke-width="1"/>
      <line x1="16" y1="5" x2="20" y2="5" stroke-width="1"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">NavBar</text>
  </g>

  <!-- Form -->
  <g transform="translate(264, 372)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 12)">
      <rect x="0" y="0" width="24" height="28" rx="2"/>
      <rect x="3" y="3" width="18" height="5" rx="1" stroke-width="1"/>
      <rect x="3" y="11" width="18" height="5" rx="1" stroke-width="1"/>
      <rect x="3" y="19" width="18" height="6" rx="1.5" class="icon-fill" stroke="#71717a"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Form</text>
  </g>

  <!-- List -->
  <g transform="translate(344, 372)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 14)">
      <circle cx="2" cy="3" r="1.5" fill="#71717a"/>
      <line x1="6" y1="3" x2="22" y2="3" stroke-width="1"/>
      <circle cx="2" cy="10" r="1.5" fill="#71717a"/>
      <line x1="6" y1="10" x2="22" y2="10" stroke-width="1"/>
      <circle cx="2" cy="17" r="1.5" fill="#71717a"/>
      <line x1="6" y1="17" x2="22" y2="17" stroke-width="1"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">List</text>
  </g>

  <!-- Table -->
  <g transform="translate(424, 372)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 14)">
      <rect x="0" y="0" width="24" height="20" rx="2"/>
      <line x1="0" y1="6" x2="24" y2="6"/>
      <line x1="8" y1="0" x2="8" y2="20" stroke-width="1"/>
      <line x1="16" y1="0" x2="16" y2="20" stroke-width="1"/>
      <rect x="0" y="0" width="24" height="6" rx="2" class="icon-fill" stroke="none"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Table</text>
  </g>

  <!-- Sidebar -->
  <g transform="translate(504, 372)">
    <rect class="card" width="72" height="72" rx="8"/>
    <g class="icon" transform="translate(24, 14)">
      <rect x="0" y="0" width="24" height="20" rx="2"/>
      <line x1="8" y1="0" x2="8" y2="20"/>
      <line x1="2" y1="4" x2="6" y2="4" stroke-width="1"/>
      <line x1="2" y1="8" x2="6" y2="8" stroke-width="1"/>
      <line x1="2" y1="12" x2="6" y2="12" stroke-width="1"/>
    </g>
    <text class="label" x="36" y="62" text-anchor="middle">Sidebar</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Style Guide Notes -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <g transform="translate(24, 460)">
    <text class="label" x="0" y="0">Stroke: 1.5px | Radius: 2-3px | ViewBox: 24x24 | Color: currentColor</text>
    <text class="label" x="0" y="16">Fill-opacity: 0.12 for depth | Consistent padding: 2px minimum</text>
  </g>

</svg>
