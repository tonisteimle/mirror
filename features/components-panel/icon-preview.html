<!DOCTYPE html>
<html>
<head>
  <title>Layout Icons - Lucide</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #09090b;
      color: #e4e4e7;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 24px;
      margin: 0;
    }
    h1 { font-size: 16px; color: #a1a1aa; margin: 0 0 24px 0; }
    h2 { font-size: 12px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; margin: 24px 0 12px 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
    }
    .icon-card {
      background: #18181b;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .icon-card:hover {
      background: #27272a;
    }
    .icon-card svg {
      width: 24px;
      height: 24px;
      stroke: #e4e4e7;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .icon-card span {
      font-size: 10px;
      color: #71717a;
      text-align: center;
    }
    .comparison {
      display: flex;
      gap: 24px;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #27272a;
    }
    .comparison-col {
      flex: 1;
    }
    .comparison-col h3 {
      font-size: 11px;
      color: #52525b;
      margin: 0 0 12px 0;
    }
    .list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 4px;
    }
    .list-item:hover {
      background: rgba(255,255,255,0.05);
    }
    .list-item svg {
      width: 16px;
      height: 16px;
      stroke: #71717a;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .list-item span {
      font-size: 12px;
      color: #a1a1aa;
    }
    /* Fill-based icons (Material) */
    .fill-icon svg {
      fill: #e4e4e7;
      stroke: none;
    }
    .list-item.fill-icon svg {
      fill: #71717a;
      stroke: none;
    }
  </style>
</head>
<body>
  <h1>Layout Icons - Lucide (Official)</h1>

  <h2>Direction</h2>
  <div class="grid" id="direction"></div>

  <h2>Alignment</h2>
  <div class="grid" id="alignment"></div>

  <h2>Overflow & Scroll</h2>
  <div class="grid" id="overflow"></div>

  <h2>Page Patterns</h2>
  <div class="grid" id="patterns"></div>

  <h2>Components</h2>
  <div class="grid" id="components"></div>

  <div class="comparison">
    <div class="comparison-col">
      <h3>Als Liste (wie im Panel) - Lucide Stroke</h3>
      <div id="list-preview"></div>
    </div>
    <div class="comparison-col">
      <h3>Neben Material Icons (Fill)</h3>
      <div id="mixed-preview"></div>
    </div>
  </div>

  <script>
    // Lucide Icons (stroke-based)
    const icons = {
      direction: [
        { name: 'rows-3', svg: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M21 9H3"/><path d="M21 15H3"/>' },
        { name: 'columns-3', svg: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="M15 3v18"/>' },
        { name: 'grid-2x2', svg: '<rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/>' },
        { name: 'grid-3x3', svg: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/>' },
        { name: 'wrap-text', svg: '<path d="M3 6h18"/><path d="M3 12h15a3 3 0 1 1 0 6h-4"/><path d="m10 18 4-4-4-4"/><path d="M3 18h7"/>' },
      ],
      alignment: [
        { name: 'align-center', svg: '<path d="M12 2v20"/><path d="M8 10H4a2 2 0 0 1-2-2V6c0-1.1.9-2 2-2h4"/><path d="M16 10h4a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-4"/><path d="M8 20H7a2 2 0 0 1-2-2v-2c0-1.1.9-2 2-2h1"/><path d="M16 14h1a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2h-1"/>' },
        { name: 'between-horizontal', svg: '<rect width="6" height="14" x="2" y="5" rx="2"/><rect width="6" height="10" x="16" y="7" rx="2"/><path d="M12 2v20"/>' },
        { name: 'align-start-vertical', svg: '<rect width="14" height="6" x="2" y="16" rx="2"/><rect width="10" height="6" x="2" y="2" rx="2"/><rect width="6" height="6" x="2" y="9" rx="2"/>' },
        { name: 'align-end-vertical', svg: '<rect width="14" height="6" x="8" y="16" rx="2"/><rect width="10" height="6" x="12" y="2" rx="2"/><rect width="6" height="6" x="16" y="9" rx="2"/>' },
      ],
      overflow: [
        { name: 'scroll', svg: '<path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3"/>' },
        { name: 'layers', svg: '<path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 12.5-8.58 3.9a2 2 0 0 1-1.66 0L2 12.5"/><path d="m22 17.5-8.58 3.9a2 2 0 0 1-1.66 0L2 17.5"/>' },
      ],
      patterns: [
        { name: 'panel-left', svg: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/>' },
        { name: 'panel-right', svg: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M15 3v18"/>' },
        { name: 'panel-top', svg: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/>' },
        { name: 'panel-bottom', svg: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 15h18"/>' },
        { name: 'layout-dashboard', svg: '<rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>' },
      ],
      components: [
        { name: 'square', svg: '<rect width="18" height="18" x="3" y="3" rx="2"/>' },
        { name: 'app-window', svg: '<rect x="2" y="4" width="20" height="16" rx="2"/><path d="M10 4v4"/><path d="M2 8h20"/><path d="M6 4v4"/>' },
        { name: 'gallery-horizontal', svg: '<path d="M2 3v18"/><rect width="12" height="18" x="6" y="3" rx="2"/><path d="M22 3v18"/>' },
        { name: 'list', svg: '<path d="M3 12h.01"/><path d="M3 18h.01"/><path d="M3 6h.01"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M8 6h13"/>' },
        { name: 'text-cursor-input', svg: '<path d="M5 4h1a3 3 0 0 1 3 3 3 3 0 0 1 3-3h1"/><path d="M13 20h-1a3 3 0 0 1-3-3 3 3 0 0 1-3 3H5"/><path d="M5 16H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h1"/><path d="M13 8h7a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-7"/><path d="M9 7v10"/>' },
      ]
    };

    // Material Design Icons (fill-based) for comparison
    const materialIcons = [
      { name: 'home', path: 'M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z' },
      { name: 'search', path: 'M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z' },
      { name: 'person', path: 'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z' },
      { name: 'star', path: 'M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z' },
    ];

    function renderStrokeIcon(icon) {
      return `
        <div class="icon-card">
          <svg viewBox="0 0 24 24">${icon.svg}</svg>
          <span>${icon.name}</span>
        </div>
      `;
    }

    function renderListItem(icon, isStroke = true) {
      if (isStroke) {
        return `
          <div class="list-item">
            <svg viewBox="0 0 24 24">${icon.svg}</svg>
            <span>${icon.name}</span>
          </div>
        `;
      } else {
        return `
          <div class="list-item fill-icon">
            <svg viewBox="0 0 24 24"><path d="${icon.path}"/></svg>
            <span>${icon.name}</span>
          </div>
        `;
      }
    }

    // Render grids
    document.getElementById('direction').innerHTML = icons.direction.map(renderStrokeIcon).join('');
    document.getElementById('alignment').innerHTML = icons.alignment.map(renderStrokeIcon).join('');
    document.getElementById('overflow').innerHTML = icons.overflow.map(renderStrokeIcon).join('');
    document.getElementById('patterns').innerHTML = icons.patterns.map(renderStrokeIcon).join('');
    document.getElementById('components').innerHTML = icons.components.map(renderStrokeIcon).join('');

    // Render list preview (Lucide only)
    const listIcons = [
      icons.direction[0], icons.direction[1], icons.direction[2],
      icons.patterns[0], icons.patterns[1],
    ];
    document.getElementById('list-preview').innerHTML = listIcons.map(i => renderListItem(i, true)).join('');

    // Render mixed preview (Lucide + Material)
    const mixedHtml = [
      renderListItem(icons.direction[0], true),
      renderListItem(icons.direction[1], true),
      renderListItem(materialIcons[0], false),
      renderListItem(materialIcons[1], false),
      renderListItem(icons.patterns[0], true),
      renderListItem(icons.components[0], true),
      renderListItem(materialIcons[2], false),
      renderListItem(materialIcons[3], false),
    ].join('');
    document.getElementById('mixed-preview').innerHTML = mixedHtml;
  </script>
</body>
</html>
