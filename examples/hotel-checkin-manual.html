<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Check-in (Manual Build)</title>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    /* =============================================================================
       TOKENS (from Mirror)
       ============================================================================= */
    :root {
      --primary-bg: #1a1a1a;
      --secondary-bg: #252525;
      --accent-bg: #c9a961;
      --accent-col: #c9a961;
      --accent-hover-bg: #d4b76e;
      --success-col: #4ade80;
      --muted-col: #666;
      --text-col: #fff;
      --border-boc: #333;
      --border-hover-boc: #444;
    }

    /* =============================================================================
       RESET & BASE
       ============================================================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    /* =============================================================================
       COMPONENTS (from Mirror)
       ============================================================================= */

    /* Card: bg $secondary, rad 12, pad 24, gap 16 */
    .card {
      background: var(--secondary-bg);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* SectionTitle: col $muted, fs 11, uppercase, weight 600, letter 1 */
    .section-title {
      color: var(--muted-col);
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* FieldLabel: col $muted, fs 12, mar 0 0 6 0 */
    .field-label {
      color: var(--muted-col);
      font-size: 12px;
      margin-bottom: 6px;
    }

    /* FieldValue: col $text, fs 15, weight 500 */
    .field-value {
      color: var(--text-col);
      font-size: 15px;
      font-weight: 500;
    }

    /* InputField: bg $primary, bor 1, boc $border, col $text, pad 14 16, rad 8, w full */
    .input-field {
      background: var(--primary-bg);
      border: 1px solid var(--border-boc);
      color: var(--text-col);
      padding: 14px 16px;
      border-radius: 8px;
      width: 100%;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    /* focus: boc $accent */
    .input-field:focus {
      border-color: var(--accent-col);
    }

    /* PrimaryBtn: bg $accent, col $primary, pad 16 32, rad 8, fs 14, weight 600, cursor pointer, w full */
    .primary-btn {
      background: var(--accent-bg);
      color: var(--primary-bg);
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      border: none;
      transition: background 0.2s;
    }
    /* hover: bg $accent-hover */
    .primary-btn:hover {
      background: var(--accent-hover-bg);
    }

    /* GuestBtn: bg transparent, bor 1, boc $border, col $text, pad 14 24, rad 8, fs 13, cursor pointer */
    .guest-btn {
      background: transparent;
      border: 1px solid var(--border-boc);
      color: var(--text-col);
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    /* hover: boc $border-hover */
    .guest-btn:hover {
      border-color: var(--border-hover-boc);
    }
    /* selected: boc $accent, col $accent */
    .guest-btn.selected {
      border-color: var(--accent-col);
      color: var(--accent-col);
    }

    /* StatusBadge: Frame pad 8 16, bg $primary, rad 6 */
    .status-badge {
      padding: 8px 16px;
      background: var(--primary-bg);
      border-radius: 6px;
    }
    /* Label: col $success, fs 12, weight 500 */
    .status-badge .label {
      color: var(--success-col);
      font-size: 12px;
      font-weight: 500;
    }

    /* =============================================================================
       LAYOUT HELPERS (Frame equivalents)
       ============================================================================= */
    .frame {
      display: flex;
      flex-direction: column;
    }
    .frame.hor {
      flex-direction: row;
    }
    .frame.center {
      align-items: center;
      justify-content: center;
    }
    .frame.ver-center {
      align-items: center;
    }
    .frame.spread {
      justify-content: space-between;
    }
    .frame.grow {
      flex-grow: 1;
    }

    /* =============================================================================
       MAIN CONTAINER
       Frame w 480, bg $primary, pad 40, rad 16, gap 32
       ============================================================================= */
    .main-container {
      width: 480px;
      background: var(--primary-bg);
      padding: 40px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* =============================================================================
       SPECIFIC STYLES
       ============================================================================= */

    /* Header */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .hotel-name {
      color: var(--accent-col);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
    }
    .page-title {
      color: var(--text-col);
      font-size: 28px;
      font-weight: 300;
    }

    /* Booking Details Row */
    .booking-row {
      display: flex;
      flex-direction: row;
      gap: 24px;
    }
    .booking-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .booking-field.grow {
      flex-grow: 1;
    }

    /* Guest Information */
    .guest-info-fields {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .date-row {
      display: flex;
      flex-direction: row;
      gap: 16px;
    }
    .date-row .field-group {
      flex-grow: 1;
    }
    .guest-buttons {
      display: flex;
      flex-direction: row;
      gap: 8px;
    }

    /* Room Assignment */
    .room-row {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }
    .room-info {
      display: flex;
      flex-direction: row;
      gap: 16px;
      align-items: center;
    }
    .room-icon-box {
      width: 56px;
      height: 56px;
      background: var(--primary-bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .room-icon-box i {
      color: var(--accent-col);
      width: 24px;
      height: 24px;
    }
    .room-details {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .room-number {
      color: var(--text-col);
      font-size: 18px;
      font-weight: 500;
    }
    .room-location {
      color: var(--muted-col);
      font-size: 13px;
    }

    /* Additional Services */
    .services-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .service-item {
      display: flex;
      flex-direction: row;
      gap: 12px;
      align-items: center;
    }
    .service-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent-col);
      cursor: pointer;
    }
    .service-item span {
      color: var(--text-col);
      font-size: 14px;
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .help-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 4px;
    }
    .help-text {
      color: var(--muted-col);
      font-size: 12px;
    }
    .help-link {
      color: var(--accent-col);
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }
    .help-link:hover {
      text-decoration: underline;
    }

    /* =============================================================================
       TOAST NOTIFICATION
       ============================================================================= */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      border: 1px solid var(--success-col);
      color: var(--success-col);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Main Container: Frame w 480, bg $primary, pad 40, rad 16, gap 32 -->
  <div class="main-container">

    <!-- Header: Frame gap 8, center -->
    <div class="header">
      <!-- Text "GRAND HOTEL", col $accent, fs 13, weight 600, letter 2 -->
      <span class="hotel-name">GRAND HOTEL</span>
      <!-- Text "Guest Check-in", col $text, fs 28, weight 300 -->
      <span class="page-title">Guest Check-in</span>
    </div>

    <!-- Booking Details: Card -->
    <div class="card">
      <!-- SectionTitle "Booking Details" -->
      <span class="section-title">Booking Details</span>
      <!-- Frame hor, gap 24 -->
      <div class="booking-row">
        <!-- Frame gap 4, grow -->
        <div class="booking-field grow">
          <!-- FieldLabel "Confirmation" -->
          <span class="field-label">Confirmation</span>
          <!-- FieldValue "BK-2024-78432" -->
          <span class="field-value">BK-2024-78432</span>
        </div>
        <!-- Frame gap 4 -->
        <div class="booking-field">
          <!-- FieldLabel "Room Type" -->
          <span class="field-label">Room Type</span>
          <!-- FieldValue "Deluxe Suite" -->
          <span class="field-value">Deluxe Suite</span>
        </div>
      </div>
    </div>

    <!-- Guest Information: Card -->
    <div class="card">
      <!-- SectionTitle "Guest Information" -->
      <span class="section-title">Guest Information</span>
      <!-- Frame gap 16 -->
      <div class="guest-info-fields">
        <!-- Frame gap 4 -->
        <div class="field-group">
          <!-- FieldLabel "Full Name" -->
          <span class="field-label">Full Name</span>
          <!-- Input placeholder "Enter guest name", InputField -->
          <input type="text" class="input-field" placeholder="Enter guest name">
        </div>
        <!-- Frame hor, gap 16 -->
        <div class="date-row">
          <!-- Frame gap 4, grow -->
          <div class="field-group">
            <!-- FieldLabel "Check-in" -->
            <span class="field-label">Check-in</span>
            <!-- Input type "date", value "2024-04-12", InputField -->
            <input type="date" class="input-field" value="2024-04-12">
          </div>
          <!-- Frame gap 4, grow -->
          <div class="field-group">
            <!-- FieldLabel "Check-out" -->
            <span class="field-label">Check-out</span>
            <!-- Input type "date", value "2024-04-15", InputField -->
            <input type="date" class="input-field" value="2024-04-15">
          </div>
        </div>
        <!-- Frame gap 4 -->
        <div class="field-group">
          <!-- FieldLabel "Number of Guests" -->
          <span class="field-label">Number of Guests</span>
          <!-- Frame hor, gap 8 -->
          <div class="guest-buttons">
            <!-- GuestBtn "1" -->
            <button class="guest-btn" onclick="selectGuest(this)">1</button>
            <!-- GuestBtn "2", selected -->
            <button class="guest-btn selected" onclick="selectGuest(this)">2</button>
            <!-- GuestBtn "3" -->
            <button class="guest-btn" onclick="selectGuest(this)">3</button>
            <!-- GuestBtn "4" -->
            <button class="guest-btn" onclick="selectGuest(this)">4</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Room Assignment: Card -->
    <div class="card">
      <!-- SectionTitle "Room Assignment" -->
      <span class="section-title">Room Assignment</span>
      <!-- Frame hor, spread, ver-center -->
      <div class="room-row">
        <!-- Frame hor, gap 16, ver-center -->
        <div class="room-info">
          <!-- Frame w 56, h 56, bg $primary, rad 8, center -->
          <div class="room-icon-box">
            <!-- Icon "door-open", ic $accent, is 24 -->
            <i data-lucide="door-open"></i>
          </div>
          <!-- Frame gap 2 -->
          <div class="room-details">
            <!-- Text "Room 412", col $text, fs 18, weight 500 -->
            <span class="room-number">Room 412</span>
            <!-- Text "4th Floor, Lake View", col $muted, fs 13 -->
            <span class="room-location">4th Floor, Lake View</span>
          </div>
        </div>
        <!-- StatusBadge -->
        <div class="status-badge">
          <!-- Label "Ready" -->
          <span class="label">Ready</span>
        </div>
      </div>
    </div>

    <!-- Additional Services: Card -->
    <div class="card">
      <!-- SectionTitle "Additional Services" -->
      <span class="section-title">Additional Services</span>
      <!-- Frame gap 12 -->
      <div class="services-list">
        <!-- Frame hor, gap 12, ver-center -->
        <label class="service-item">
          <!-- Checkbox -->
          <input type="checkbox">
          <!-- Text "Early check-in (11:00)", col $text, fs 14 -->
          <span>Early check-in (11:00)</span>
        </label>
        <!-- Frame hor, gap 12, ver-center -->
        <label class="service-item">
          <!-- Checkbox -->
          <input type="checkbox">
          <!-- Text "Late check-out (14:00)", col $text, fs 14 -->
          <span>Late check-out (14:00)</span>
        </label>
        <!-- Frame hor, gap 12, ver-center -->
        <label class="service-item">
          <!-- Checkbox -->
          <input type="checkbox">
          <!-- Text "Airport transfer", col $text, fs 14 -->
          <span>Airport transfer</span>
        </label>
        <!-- Frame hor, gap 12, ver-center -->
        <label class="service-item">
          <!-- Checkbox checked -->
          <input type="checkbox" checked>
          <!-- Text "Breakfast included", col $text, fs 14 -->
          <span>Breakfast included</span>
        </label>
      </div>
    </div>

    <!-- Actions: Frame gap 12 -->
    <div class="actions">
      <!-- PrimaryBtn "Complete Check-in", toast("Check-in complete!", "success") -->
      <button class="primary-btn" onclick="showToast('Check-in complete!', 'success')">Complete Check-in</button>
      <!-- Frame hor, center, gap 4 -->
      <div class="help-row">
        <!-- Text "Need help?", col $muted, fs 12 -->
        <span class="help-text">Need help?</span>
        <!-- Link "Call reception", col $accent, fs 12, cursor pointer, href "tel:+49123456789" -->
        <a href="tel:+49123456789" class="help-link">Call reception</a>
      </div>
    </div>

  </div>

  <!-- Toast Container -->
  <div id="toast" class="toast"></div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // =============================================================================
    // FUNCTIONS (from Mirror)
    // =============================================================================

    // exclusive() - GuestBtn: only one can be selected
    function selectGuest(btn) {
      // Remove 'selected' from all siblings
      const buttons = btn.parentElement.querySelectorAll('.guest-btn');
      buttons.forEach(b => b.classList.remove('selected'));
      // Add 'selected' to clicked button
      btn.classList.add('selected');
    }

    // toast("message", "type") - Show toast notification
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');

      // Auto-hide after 3 seconds
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>

</body>
</html>
