<!DOCTYPE html>
<html>
<head>
  <title>Debug: Generated Code</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    pre { background: #222; padding: 16px; border-radius: 8px; overflow: auto; font-size: 12px; }
    h2 { color: #888; font-size: 14px; margin-top: 24px; }
    .render { background: #1a1a1a; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
  </style>
</head>
<body>

<h2>FLAT - Generated Code:</h2>
<pre id="flat-code"></pre>
<div class="render" id="flat-render"></div>

<h2>COMPONENT - Generated Code:</h2>
<pre id="comp-code"></pre>
<div class="render" id="comp-render"></div>

<script src="../../dist/browser/index.global.js"></script>
<script>
const flatCode = `
Frame hor, gap 8, bg #1a1a24, pad 12, rad 8
  Frame w 40, h 40, bg #ef4444, rad 4
  Frame w 40, h 40, bg #f59e0b, rad 4
  Frame w 40, h 40, bg #10b981, rad 4
`;

const compCode = `
Row: Frame hor, gap 8, bg #1a1a24, pad 12, rad 8
  A: Frame w 40, h 40, rad 4
  B: Frame w 40, h 40, rad 4
  C: Frame w 40, h 40, rad 4

Row
  A bg #ef4444
  B bg #f59e0b
  C bg #10b981
`;

// Show generated code
const flatGenerated = MirrorLang.compile(flatCode);
const compGenerated = MirrorLang.compile(compCode);

document.getElementById('flat-code').textContent = flatGenerated;
document.getElementById('comp-code').textContent = compGenerated;

// Render both
function render(code, containerId) {
  try {
    const compiled = MirrorLang.compile(code);
    const execCode = compiled.replace('export function createUI', 'function createUI');
    const fn = new Function(execCode + '\nreturn createUI();');
    const ui = fn();
    if (ui && ui.root) {
      document.getElementById(containerId).appendChild(ui.root);
    }
  } catch (e) {
    document.getElementById(containerId).textContent = 'Error: ' + e.message;
  }
}

render(flatCode, 'flat-render');
render(compCode, 'comp-render');
</script>

</body>
</html>
