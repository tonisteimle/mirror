<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Bug Fixed: Using "as" Syntax</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; background: #000; padding: 32px; }
    h1 { color: #888; font-size: 14px; font-weight: 400; margin-bottom: 24px; }
    .test { margin-bottom: 24px; padding: 16px; background: #111; border-radius: 8px; }
    .title { color: #666; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }
    .row { display: flex; gap: 32px; }
    .col { flex: 1; }
    .label { color: #444; font-size: 10px; margin-bottom: 8px; }
    .error { color: #ef4444; font-size: 12px; }
  </style>
</head>
<body>

<h1>Bug Fixed: Syntax "Row as Frame:" statt "Row: Frame"</h1>

<!-- Test: Korrekte Syntax -->
<div class="test">
  <div class="title">Test: Mit "as Frame:" Syntax (Fixed)</div>
  <div class="row">
    <div class="col">
      <div class="label">FLAT</div>
      <div id="flat"></div>
    </div>
    <div class="col">
      <div class="label">COMPONENT (as Frame:)</div>
      <div id="comp"></div>
    </div>
  </div>
</div>

<!-- Staff Item Test -->
<div class="test">
  <div class="title">Staff Item mit korrekter Syntax</div>
  <div id="staff"></div>
</div>

<script src="../../dist/browser/index.global.js"></script>
<script>
function render(id, code) {
  try {
    const compiled = MirrorLang.compile(code);
    const execCode = compiled.replace('export function createUI', 'function createUI');
    const fn = new Function(execCode + '\nreturn createUI();');
    const ui = fn();
    if (ui && ui.root) {
      document.getElementById(id).appendChild(ui.root);
    }
  } catch (e) {
    document.getElementById(id).innerHTML = '<div class="error">' + e.message + '</div>';
    console.error(id, e);
  }
}

// FLAT
render('flat', `
Frame hor, gap 8, bg #1a1a24, pad 12, rad 8
  Frame w 40, h 40, bg #ef4444, rad 4
  Frame w 40, h 40, bg #f59e0b, rad 4
  Frame w 40, h 40, bg #10b981, rad 4
`);

// COMPONENT with "as Frame:" syntax
render('comp', `
Row as Frame: hor, gap 8, bg #1a1a24, pad 12, rad 8
  A: Frame w 40, h 40, rad 4
  B: Frame w 40, h 40, rad 4
  C: Frame w 40, h 40, rad 4

Row
  A bg #ef4444
  B bg #f59e0b
  C bg #10b981
`);

// Staff Item with fixed syntax
render('staff', `
StaffItem as Frame: hor, ver-center, gap 12, pad 12, rad 8, bg #12121a, w 300
  Avatar as Frame: w 40, h 40, rad 99, center, bg grad 135 #3b82f6 #8b5cf6
    Initials: col white, fs 14, weight 600
  Info as Frame: gap 0, grow
    Name: col white, fs 13, weight 500
    Role: col #55556a, fs 12
  Count: col #f59e0b, fs 12, weight 500

StaffItem
  Avatar
    Initials "MW"
  Info
    Name "Dr. Maria Weber"
    Role "Oberärztin"
  Count "3 Patienten"
`);
</script>

</body>
</html>
