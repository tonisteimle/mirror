<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Staff Item - HTML</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --text-primary: #ffffff;
      --text-muted: #55556a;
      --status-stable: #10b981;
      --status-warning: #f59e0b;
      --radius-md: 8px;
      --space-md: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      padding: 24px;
    }

    .staff-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
    }

    .staff-avatar {
      width: 40px;
      height: 40px;
      border-radius: 99px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: white;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    }

    .staff-details {
      flex: 1;
    }

    .staff-name {
      font-weight: 500;
      font-size: 13px;
      color: var(--text-primary);
    }

    .staff-role {
      font-size: 12px;
      color: var(--text-muted);
    }

    .staff-status {
      font-size: 12px;
      font-weight: 500;
    }

    .staff-status.busy { color: var(--status-warning); }
    .staff-status.active { color: var(--status-stable); }
  </style>
</head>
<body>
  <div class="staff-item">
    <div class="staff-avatar">MW</div>
    <div class="staff-details">
      <div class="staff-name">Dr. Maria Weber</div>
      <div class="staff-role">Oberärztin</div>
    </div>
    <span class="staff-status busy">3 Patienten</span>
  </div>
</body>
</html>
