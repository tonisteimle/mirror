        el.innerHTML = ""

      el = document.querySelector('[data-mirror-name="' + el + '"]')
    }
    if (!el) return
    el.scrollIntoView({ behavior: options.behavior || 'smooth', block: options.block || 'start' })
  },

  scrollBy(container, x, y, behavior = 'smooth') {
    if (typeof container === 'string') {
      container = document.querySelector('[data-mirror-name="' + container + '"]')
    }
    if (!container) return
    container.scrollBy({ left: x, top: y, behavior: behavior })
  },

  scrollToTop(container) {
    if (typeof container === 'string') {
      container = document.querySelector('[data-mirror-name="' + container + '"]')
    }
    if (container) {
      container.scrollTop = 0
    }
  },

  scrollToBottom(container) {
    if (typeof container === 'string') {
      container = document.querySelector('[data-mirror-name="' + container + '"]')
    }
    if (container) {
      container.scrollTop = container.scrollHeight
    }
  },

  // ============================================
  // FEEDBACK: Toast Notifications
  // ============================================

  _toastCounter: 0,
  _activeToasts: new Map(),

  toast(message, type = 'info', position = 'bottom') {
    const toastId = ++this._toastCounter
    const duration = 3000

    // Dismiss existing toasts at the same position
    for (const [id, t] of this._activeToasts) {
      if (t.element.dataset.position === position) {
        this.dismissToast(id)
      }
    }

    // Create toast element
    const toastEl = document.createElement('div')
    toastEl.className = 'mirror-toast'
    toastEl.dataset.type = type
    toastEl.dataset.position = position
    toastEl.dataset.toastId = String(toastId)
    toastEl.textContent = message

    // Base styles
    Object.assign(toastEl.style, {
      position: 'fixed',
      zIndex: '10000',
      padding: '12px 20px',
      borderRadius: '8px',
      fontSize: '14px',
      fontFamily: 'system-ui, -apple-system, sans-serif',
      boxShadow: '0 4px 12px rgba(0,0,0,0.3)',
      transition: 'opacity 0.2s, transform 0.2s',
      opacity: '0',
      transform: 'translateY(10px)',
    })

    // Position styles
    const posStyles = {
      'top': { top: '20px', left: '50%', transform: 'translateX(-50%) translateY(-10px)' },
      'bottom': { bottom: '20px', left: '50%', transform: 'translateX(-50%) translateY(10px)' },
      'top-left': { top: '20px', left: '20px', transform: 'translateY(-10px)' },
      'top-right': { top: '20px', right: '20px', transform: 'translateY(-10px)' },
      'bottom-left': { bottom: '20px', left: '20px', transform: 'translateY(10px)' },
      'bottom-right': { bottom: '20px', right: '20px', transform: 'translateY(10px)' },
    }
    Object.assign(toastEl.style, posStyles[position] || posStyles.bottom)

    // Type colors
    const typeColors = {
      'info': { bg: '#1a1a1a', color: '#fff', border: '#333' },
      'success': { bg: '#052e16', color: '#4ade80', border: '#166534' },
      'error': { bg: '#450a0a', color: '#f87171', border: '#991b1b' },
      'warning': { bg: '#422006', color: '#fbbf24', border: '#92400e' },
    }
    const colors = typeColors[type] || typeColors.info
    toastEl.style.background = colors.bg
    toastEl.style.color = colors.color
    toastEl.style.border = '1px solid ' + colors.border

    document.body.appendChild(toastEl)

    // Store toast info
    this._activeToasts.set(toastId, {
      element: toastEl,
      timerId: null
    })

    // Animate in
    requestAnimationFrame(() => {
      toastEl.style.opacity = '1'
      toastEl.style.transform = position.startsWith('top')
        ? 'translateX(-50%) translateY(0)'
        : 'translateX(-50%) translateY(0)'
      if (!position.includes('-')) {
        toastEl.style.transform = position.startsWith('top')
          ? 'translateX(-50%) translateY(0)'
          : 'translateX(-50%) translateY(0)'
      } else {
        toastEl.style.transform = 'translateY(0)'
      }
    })

    // Auto dismiss
    const timerId = setTimeout(() => this.dismissToast(toastId), duration)
    this._activeToasts.get(toastId).timerId = timerId

    return toastId
  },

  dismissToast(toastId) {
    const toast = this._activeToasts.get(toastId)
    if (!toast) return

    if (toast.timerId) clearTimeout(toast.timerId)

    toast.element.style.opacity = '0'
    toast.element.style.transform = toast.element.dataset.position?.startsWith('top')
      ? 'translateY(-10px)'
      : 'translateY(10px)'

    setTimeout(() => {
      toast.element.remove()
      this._activeToasts.delete(toastId)
    }, 200)
  },

  // ============================================
  // INPUT CONTROL: Focus, Clear, Error
  // ============================================

  focus(el) {
    if (!el) return
    const target = typeof el === 'string' ? document.querySelector('[data-mirror-name="' + el + '"]') : el
    if (target && typeof target.focus === 'function') {
      target.focus()
    }
  },

  blur(el) {
    if (!el) return
    const target = typeof el === 'string' ? document.querySelector('[data-mirror-name="' + el + '"]') : el
    if (target && typeof target.blur === 'function') {
      target.blur()
    }
  },

  clear(el) {
    if (!el) return
    const target = typeof el === 'string' ? document.querySelector('[data-mirror-name="' + el + '"]') : el
    if (target && 'value' in target) {
      target.value = ''
      target.dispatchEvent(new Event('input', { bubbles: true }))
    }
  },

  selectText(el) {
    if (!el) return
    const target = typeof el === 'string' ? document.querySelector('[data-mirror-name="' + el + '"]') : el
    if (target && typeof target.select === 'function') {
      target.select()
    }
  },

  setError(el, message) {
    if (!el) return
    const target = typeof el === 'string' ? document.querySelector('[data-mirror-name="' + el + '"]') : el
    if (!target) return

    // Set invalid state
    target.dataset.state = 'invalid'
    target.setAttribute('aria-invalid', 'true')

    // Store error message
    if (message) {
      target._errorMessage = message
      // Try to find or create error display
      let errorEl = target.parentElement?.querySelector('.mirror-error-message')
      if (!errorEl) {
        errorEl = document.createElement('span')
        errorEl.className = 'mirror-error-message'
        errorEl.style.cssText = 'color:#ef4444;font-size:12px;margin-top:4px;display:block;'
        target.parentElement?.appendChild(errorEl)
      }
      errorEl.textContent = message
    }

    // Apply invalid styles via state machine if available
    this.transitionTo && this.transitionTo(target, 'invalid')
  },

  clearError(el) {
    if (!el) return
    const target = typeof el === 'string' ? document.querySelector('[data-mirror-name="' + el + '"]') : el
    if (!target) return

    // Clear invalid state
    delete target.dataset.state
    target.removeAttribute('aria-invalid')
    delete target._errorMessage

    // Remove error message element
    const errorEl = target.parentElement?.querySelector('.mirror-error-message')
    if (errorEl) errorEl.remove()

    // Revert to default state
    this.transitionTo && this.transitionTo(target, 'default')
  },

  // ============================================
  // NAVIGATION: Back, Forward, OpenUrl
  // ============================================

  back() {
    window.history.back()
  },

  forward() {
    window.history.forward()
  },

  openUrl(url, options = {}) {
    if (!url) return
    const { newTab = true } = options
    // Ensure URL has a protocol
    const fullUrl = url.startsWith('http://') || url.startsWith('https://') || url.startsWith('mailto:')
      ? url
      : 'https://' + url
    const target = newTab ? '_blank' : '_self'
    window.open(fullUrl, target, newTab ? 'noopener,noreferrer' : undefined)
  },

  // ============================================
  // KEYBOARD NAVIGATION (Accessibility)
  // ============================================

  /**
   * Setup keyboard navigation for a form container
   * - Enter moves to next field (or submits if last)
   * - Escape blurs current field
   * - Tab cycles through fields normally
   */
  setupKeyboardNav(container) {
    if (!container) return
    if (container._keyboardNavSetup) return // Already setup
    container._keyboardNavSetup = true

    // Selector for form inputs
    const inputSelector = 'input:not([type="hidden"]):not([disabled]), select:not([disabled]), textarea:not([disabled])'

    // Get ordered list of inputs
    const getInputs = () => {
      const inputs = Array.from(container.querySelectorAll(inputSelector))
      // Sort by tabindex if present
      return inputs.sort((a, b) => {
        const aTab = parseInt(a.getAttribute('tabindex') || '0', 10)
        const bTab = parseInt(b.getAttribute('tabindex') || '0', 10)
        return aTab - bTab
      })
    }

    container.addEventListener('keydown', (e) => {
      const target = e.target
      if (!target.matches || !target.matches(inputSelector)) return

      if (e.key === 'Enter' && target.tagName !== 'TEXTAREA') {
        e.preventDefault()
        const inputs = getInputs()
        const currentIndex = inputs.indexOf(target)

        if (currentIndex < inputs.length - 1) {
          // Move to next input
          inputs[currentIndex + 1].focus()
        } else {
          // Last input - look for submit button
          const submitBtn = container.querySelector('button[type="submit"], button:not([type])')
          if (submitBtn) {
            submitBtn.click()
          }
        }
      } else if (e.key === 'Escape') {
        target.blur()
      }
    })
  },

  // ============================================
  // TABLE FUNCTIONS (Built-in)
  // ============================================

  /**
   * Sort table by field
   * Toggles between ascending and descending on repeated clicks
   */
  tableSort(table, field) {
    if (!table) return

    // Initialize or get sort state
    const state = table._sortState || { field: null, desc: false }

    // Toggle direction if same field, otherwise reset to ascending
    if (state.field === field) {
      state.desc = !state.desc
    } else {
      state.field = field
      state.desc = false
    }
    table._sortState = state

    // Update sort icons visual state
    table.querySelectorAll('.mirror-sort-icon').forEach(icon => {
      const isActive = icon.dataset.field === field
      icon.style.opacity = isActive ? '1' : '0.5'

      // Check for custom icons
      if (icon.dataset.hasCustomIcons === 'true') {
        const ascIcon = icon.querySelector('.mirror-sort-asc')
        const descIcon = icon.querySelector('.mirror-sort-desc')
        const defaultIcon = icon.querySelector('.mirror-sort-default')

        if (isActive) {
          if (defaultIcon) defaultIcon.style.display = 'none'
          if (state.desc) {
            if (ascIcon) ascIcon.style.display = 'none'
            if (descIcon) descIcon.style.display = ''
          } else {
            if (ascIcon) ascIcon.style.display = ''
            if (descIcon) descIcon.style.display = 'none'
          }
        } else {
          // Reset to default
          if (ascIcon) ascIcon.style.display = 'none'
          if (descIcon) descIcon.style.display = 'none'
          if (defaultIcon) defaultIcon.style.display = ''
        }
      } else {
        // Update icon direction with default SVGs
        if (isActive) {
          if (state.desc) {
            icon.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10l5 5 5-5"/></svg>'
          } else {
            icon.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 14l5-5 5 5"/></svg>'
          }
        } else {
          // Reset to default double chevron
          icon.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 15l5 5 5-5M7 9l5-5 5 5"/></svg>'
        }
      }
    })

    // Re-sort the table body
    const body = table.querySelector('.mirror-table-body')
    if (!body) return

    const rows = Array.from(body.querySelectorAll('.mirror-table-row'))
    rows.sort((a, b) => {
      const aVal = a.dataset[field] || a.querySelector('[data-field="' + field + '"]')?.textContent || ''
      const bVal = b.dataset[field] || b.querySelector('[data-field="' + field + '"]')?.textContent || ''

      // Try numeric comparison first
      const aNum = parseFloat(aVal)
      const bNum = parseFloat(bVal)

      let cmp
      if (!isNaN(aNum) && !isNaN(bNum)) {
        cmp = aNum - bNum
      } else {
        cmp = aVal.localeCompare(bVal)
      }

      return state.desc ? -cmp : cmp
    })

    // Re-append sorted rows
    rows.forEach(row => body.appendChild(row))
  },

  /**
   * Go to previous page in paginated table
   */
  tablePrev(table) {
    if (!table || !table._pageState) return

    const state = table._pageState
    if (state.current > 1) {
      state.current--
      this._updateTablePage(table)
    }
  },

  /**
   * Go to next page in paginated table
   */
  tableNext(table) {
    if (!table || !table._pageState) return

    const state = table._pageState
    const totalPages = Math.ceil(state.total / state.size)
    if (state.current < totalPages) {
      state.current++
      this._updateTablePage(table)
    }
  },

  /**
   * Update table to show current page
   */
  _updateTablePage(table) {
    if (!table || !table._pageState) return

    const state = table._pageState
    const body = table.querySelector('.mirror-table-body')
    if (!body) return

    const rows = Array.from(body.querySelectorAll('.mirror-table-row'))
    const start = (state.current - 1) * state.size
    const end = start + state.size

    rows.forEach((row, index) => {
      row.style.display = (index >= start && index < end) ? '' : 'none'
    })

    // Update page info
    const totalPages = Math.ceil(state.total / state.size)
    const pageInfo = table.querySelector('.mirror-paginator-info')
    if (pageInfo) {
      pageInfo.textContent = 'Page ' + state.current + ' of ' + totalPages
    }
  },

  // ============================================
  // VALUE FUNCTIONS (Built-in)
  // ============================================

  // Token storage
  _tokens: {},
  _initialTokens: {},
  _tokenWatchers: [],

  registerToken(name, value) {
    this._tokens[name] = value
    this._initialTokens[name] = value
  },

  watchToken(name, el, prop) {
    this._tokenWatchers.push({ name, el, prop })
  },

  _notifyTokenWatchers(name) {
    this._tokenWatchers.forEach(w => {
      if (w.name === name) {
        if (w.prop === 'textContent') {
          w.el.textContent = this._tokens[name]
        } else {
          w.el[w.prop] = this._tokens[name]
        }
      }
    })
  },

  get(name) {
    // Read from __mirrorData for consistency with $get()
    if (window.__mirrorData && name in window.__mirrorData) {
      return window.__mirrorData[name]
    }
    return this._tokens[name]
  },

  set(name, value) {
    this._tokens[name] = value
    // Also update __mirrorData so $get() returns new value
    if (window.__mirrorData) {
      window.__mirrorData[name] = value
    }
    this._notifyTokenWatchers(name)
    // Notify text bindings to re-render
    this.notifyDataChange && this.notifyDataChange(name, value)
  },

  increment(name, options = {}) {
    // Read from __mirrorData for consistency
    const current = (window.__mirrorData && name in window.__mirrorData)
      ? (typeof window.__mirrorData[name] === 'number' ? window.__mirrorData[name] : 0)
      : (this._tokens[name] || 0)
    const step = options.step || 1
    let newVal = current + step
    if (options.max !== undefined && newVal > options.max) {
      newVal = options.max
    }
    this._tokens[name] = newVal
    // Also update __mirrorData so $get() returns new value
    if (window.__mirrorData) {
      window.__mirrorData[name] = newVal
    }
    this._notifyTokenWatchers(name)
    // Notify text bindings to re-render
    this.notifyDataChange && this.notifyDataChange(name, newVal)
  },

  decrement(name, options = {}) {
    // Read from __mirrorData for consistency
    const current = (window.__mirrorData && name in window.__mirrorData)
      ? (typeof window.__mirrorData[name] === 'number' ? window.__mirrorData[name] : 0)
      : (this._tokens[name] || 0)
    const step = options.step || 1
    let newVal = current - step
    if (options.min !== undefined && newVal < options.min) {
      newVal = options.min
    }
    this._tokens[name] = newVal
    // Also update __mirrorData so $get() returns new value
    if (window.__mirrorData) {
      window.__mirrorData[name] = newVal
    }
    this._notifyTokenWatchers(name)
    // Notify text bindings to re-render
    this.notifyDataChange && this.notifyDataChange(name, newVal)
  },

  reset(name, initialValue) {
    let newVal
    if (initialValue !== undefined) {
      newVal = initialValue
    } else {
      newVal = this._initialTokens[name]
    }
    this._tokens[name] = newVal
    // Also update __mirrorData so $get() returns new value
    if (window.__mirrorData) {
      window.__mirrorData[name] = newVal
    }
    this._notifyTokenWatchers(name)
    // Notify text bindings to re-render
    this.notifyDataChange && this.notifyDataChange(name, newVal)
  },

  // ============================================
  // CRUD OPERATIONS
  // ============================================

  // Generate unique ID for new entries
  _generateId(prefix = 'item') {
    return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9)
  },

  // Add new entry to collection
  add(collectionName, values) {
    const name = collectionName.startsWith('$') ? collectionName.slice(1) : collectionName
    const data = window.__mirrorData || {}

    if (!data[name] || typeof data[name] !== 'object') {
      data[name] = {}
    }

    const collection = data[name]
    const key = this._generateId(name.slice(0, 3))

    // Use provided values or create empty entry with _key
    collection[key] = values || { _key: key }
    if (!collection[key]._key) {
      collection[key]._key = key
    }

    this._refreshEachLoops(name)
    return key
  },

  // Remove entry from collection
  remove(itemOrCollection, key) {
    let collectionName, entryKey

    if (typeof itemOrCollection === 'string') {
      // Called as remove('collectionName', 'key')
      collectionName = itemOrCollection.startsWith('$') ? itemOrCollection.slice(1) : itemOrCollection
      entryKey = key
    } else if (itemOrCollection && typeof itemOrCollection === 'object') {
      // Called as remove(item) - find collection by _key
      if (typeof itemOrCollection._key !== 'string') {
        console.warn('[Mirror] remove() requires item with _key property')
        return
      }
      entryKey = itemOrCollection._key

      // Find which collection contains this key
      const data = window.__mirrorData || {}
      const found = Object.entries(data).find(([, val]) => {
        if (val && typeof val === 'object' && !Array.isArray(val)) {
          return val[entryKey] !== undefined
        }
        return false
      })

      if (!found) {
        console.warn('[Mirror] remove() could not find collection for item')
        return
      }
      collectionName = found[0]
    } else {
      return
    }

    const data = window.__mirrorData || {}
    const collection = data[collectionName]

    if (!collection || typeof collection !== 'object') {
      return
    }

    delete collection[entryKey]
    this._refreshEachLoops(collectionName)
  },

  // Create new entry in collection
  create(collectionName, initialValues = {}) {
    const name = collectionName.startsWith('$') ? collectionName.slice(1) : collectionName
    const data = window.__mirrorData || {}
    const collection = data[name]

    if (!collection || typeof collection !== 'object' || Array.isArray(collection)) {
      console.warn('[Mirror] create() - collection not found:', name)
      return null
    }

    // Generate unique key
    const newKey = 'new_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9)

    // Get template from existing entry
    const entries = Object.values(collection)
    const template = entries[0]
    const newEntry = { _key: newKey }

    // Copy structure from template
    if (template && typeof template === 'object') {
      for (const key of Object.keys(template)) {
        if (key !== '_key') {
          const val = template[key]
          if (typeof val === 'string') newEntry[key] = ''
          else if (typeof val === 'number') newEntry[key] = 0
          else if (typeof val === 'boolean') newEntry[key] = false
          else newEntry[key] = null
        }
      }
    }

    // Apply initial values
    Object.assign(newEntry, initialValues)

    // Add to collection
    collection[newKey] = newEntry
    this._refreshEachLoops(name)

    return newEntry
  },

  // Save (dispatch event for persistence)
  save(target) {
    const data = window.__mirrorData || {}
    if (this._isDebug()) console.log('[Mirror] save()', target || '', data)
    window.dispatchEvent(new CustomEvent('mirror:save', { detail: { target, data } }))
  },

  // Delete item (alias for remove, avoids reserved word)
  deleteItem(itemOrKey) {
    this.remove(itemOrKey)
  },

  // Revert changes (dispatch event)
  revert(target) {
    if (this._isDebug()) console.log('[Mirror] revert()', target || '')
    window.dispatchEvent(new CustomEvent('mirror:revert', { detail: { target } }))
  },

  // Update field in item
  updateField(item, field, value) {
    if (!item || typeof item._key !== 'string') {
      return
    }

    item[field] = value

    // Also update in __mirrorData
    const data = window.__mirrorData || {}
    const entryKey = item._key

    for (const [collName, colData] of Object.entries(data)) {
      if (colData && typeof colData === 'object' && !Array.isArray(colData)) {
        if (colData[entryKey]) {
          colData[entryKey][field] = value
          return
        }
      }
    }
  },

  // Re-render each loops for a collection after data changes
  _refreshEachLoops(collectionName) {
    const containers = document.querySelectorAll('[data-each-container]')

    containers.forEach(container => {
      const config = container._eachConfig
      if (!config) return
      if (config.collection !== collectionName) return

      // Clear and re-render
      container.innerHTML = ''

      const data = window.__mirrorData || {}
      let items = data[collectionName]

      if (!items) return

      // Convert object to array with _key
      if (!Array.isArray(items)) {
        items = Object.entries(items).map(([k, v]) => {
          if (typeof v === 'object' && v !== null) {
            return { _key: k, ...v }
          }
          return v
        })
      }

      // Apply filter if configured
      if (config.filterFn) {
        items = items.filter(config.filterFn)
      }

      // Apply sort if configured
      if (config.orderBy) {
        const dir = config.orderDesc ? -1 : 1
        items = [...items].sort((a, b) => {
          const aVal = a[config.orderBy]
          const bVal = b[config.orderBy]
          if (aVal < bVal) return -dir
          if (aVal > bVal) return dir
          return 0
        })
      }

      // Render each item
      items.forEach((item, index) => {
        const itemEl = config.renderItem(item, index)
        container.appendChild(itemEl)
      })
    })
  },

  // ============================================
  // TWO-WAY DATA BINDING
  // ============================================

  // Bindings Registry: path → Set of bound elements
  _inputBindings: new Map(),
  _textBindings: new Map(),
  _visibilityBindings: new Map(),  // path → Set of elements with _visibleWhen depending on this path

  // Register element for two-way value binding (Input, Textarea)
  bindValue(el, path) {
    if (!el || !path) return
    el._valueBinding = path
    if (!this._inputBindings.has(path)) {
      this._inputBindings.set(path, new Set())
    }
    this._inputBindings.get(path).add(el)
  },

  // Register element for text binding (Text elements that display data)
  bindText(el, path, expression) {
    if (!el || !path) return
    el._textBinding = path
    el._textExpression = expression  // For complex expressions like "Hello, " + $name
    if (!this._textBindings.has(path)) {
      this._textBindings.set(path, new Set())
    }
    this._textBindings.get(path).add(el)
  },

  // Register element for visibility binding (elements with _visibleWhen that depends on data)
  bindVisibility(el, path) {
    if (!el || !path) return
    // Store all paths this element depends on
    if (!el._visibilityPaths) {
      el._visibilityPaths = []
    }
    el._visibilityPaths.push(path)
    // Register in the bindings map
    if (!this._visibilityBindings.has(path)) {
      this._visibilityBindings.set(path, new Set())
    }
    this._visibilityBindings.get(path).add(el)
  },

      const evalCondition = condition.replace(/\$([a-zA-Z_][a-zA-Z0-9_.]*)/g, '$get("$1")')

      const result = new Function('$get', 'return ' + evalCondition)($get)
      return !!result

      return false

  // Set data value and notify all bound elements
  notifyDataChange(path, value) {
    // Collect all paths to update: the exact path AND all sub-paths (e.g., selectedAddress.firstName)
    const pathsToUpdate = [path]
    const pathPrefix = path + '.'

    // Find all registered paths that are sub-paths of the changed path
    for (const registeredPath of this._textBindings.keys()) {
      if (registeredPath.startsWith(pathPrefix)) {
        pathsToUpdate.push(registeredPath)
      }
    }
    for (const registeredPath of this._inputBindings.keys()) {
      if (registeredPath.startsWith(pathPrefix) && !pathsToUpdate.includes(registeredPath)) {
        pathsToUpdate.push(registeredPath)
      }
    }
    for (const registeredPath of this._visibilityBindings.keys()) {
      if (registeredPath.startsWith(pathPrefix) && !pathsToUpdate.includes(registeredPath)) {
        pathsToUpdate.push(registeredPath)
      }
    }

    // Update all affected paths
    for (const updatePath of pathsToUpdate) {
      // Update other inputs (skip active element to avoid cursor jumping)
      const inputElements = this._inputBindings.get(updatePath)
      if (inputElements) {
        for (const el of inputElements) {
          if (el !== document.activeElement) {
            el.value = value ?? ''
          }
        }
      }

      // Update text elements
      const textElements = this._textBindings.get(updatePath)
      if (textElements) {
        for (const el of textElements) {
          if (el._textTemplate) {
            // Re-evaluate expression template with new data
            try {
              const result = el._textTemplate()
              el.textContent = result ?? ''
            } catch (e) {
              el.textContent = value ?? ''
            }
          } else {
            el.textContent = value ?? ''
          }
        }
      }

      // Update visibility of elements with _visibleWhen that depend on this path
      const visElements = this._visibilityBindings.get(updatePath)
      if (visElements) {
        for (const el of visElements) {
          if (el._visibleWhen) {
            const visible = this._evaluateVisibilityCondition(el._visibleWhen)
            el.style.display = visible ? '' : 'none'
          }
        }
      }
    }

    // Refresh all each loops as their filter expressions may depend on the changed value
    this._refreshAllEachLoops()

  // Refresh all each loops (for filter variable changes)
  _refreshAllEachLoops() {
    const containers = document.querySelectorAll('[data-each-container]')
    const data = window.__mirrorData || {}

    containers.forEach(container => {
      const config = container._eachConfig
      if (!config) return

      const collectionName = typeof config.collection === 'string' ? config.collection : null
      if (!collectionName) return

      // Clear existing items
      container.innerHTML = ''

      // Get fresh data
      const items = data[collectionName]
      if (!items || typeof items !== 'object') return

      // Convert to array
      let itemsArray
      if (Array.isArray(items)) {
        itemsArray = items
      } else {
        itemsArray = Object.entries(items).map(([k, v]) =>
          typeof v === 'object' && v !== null ? { _key: k, ...v } : { _key: k, value: v }
        )
      }

      // Apply filter
      if (config.filterFn) {
        itemsArray = itemsArray.filter(config.filterFn)
      }

      // Apply sorting
      if (config.orderBy) {
        const sortDir = config.orderDesc ? -1 : 1
        itemsArray = [...itemsArray].sort((a, b) => {
          const aVal = a[config.orderBy]
          const bVal = b[config.orderBy]
          if (aVal < bVal) return -sortDir
          if (aVal > bVal) return sortDir
          return 0
        })
      }

      // Render
      if (config.renderItem) {
        itemsArray.forEach((item, index) => {
          container.appendChild(config.renderItem(item, index))
        })
      }
    })

  // ============================================
  // CLIPBOARD FUNCTIONS (Built-in)

  async copy(text, triggerEl) {

        await navigator.clipboard.writeText(textToCopy)

        textarea.value = textToCopy
        textarea.style.position = 'fixed'
        textarea.style.opacity = '0'
        document.body.appendChild(textarea)
        textarea.select()
        document.execCommand('copy')
        document.body.removeChild(textarea)

      // Apply feedback state to trigger element
      if (triggerEl) {
        const prevState = triggerEl.dataset.state
        triggerEl.dataset.state = 'copied'
        setTimeout(() => {
          if (prevState) {
            triggerEl.dataset.state = prevState

  highlightNext(container) {

  highlightPrev(container) {

    const items = this.getHighlightableItems(container)

  highlightFirst(container) {
    if (!container) return
    const items = this.getHighlightableItems(container)
    if (items.length) this.highlight(items[0])

  highlightLast(container) {
    if (!container) return
    const items = this.getHighlightableItems(container)
    if (items.length) this.highlight(items[items.length - 1])

        } else if (!requireHighlightState && child.style.cursor === 'pointer') {
          items.push(child)
        } else {
          items.push(...findItems(child, requireHighlightState))

      return items
    }
    let items = findItems(container, true)
    if (!items.length) items = findItems(container, false)
    return items

  selectHighlighted(container) {
    if (!container) return
    const items = this.getHighlightableItems(container)
    const highlighted = items.find(el => el.dataset.highlighted === 'true')
    if (highlighted) this.select(highlighted)

  activate(el) {
    if (!el) return

  deactivate(el) {

          return targetEl?.dataset.state === dep.state

          return targetEl?.dataset.state === dep.state

  // Safe condition evaluator - replaces dangerous eval()
  _evaluateCondition(condition, state) {
    // Build state context
    const states = {
      open: state === 'open',
      closed: state === 'closed',
      expanded: state === 'expanded',
      collapsed: state === 'collapsed',
      active: state === 'active',
      inactive: state === 'inactive',
      selected: state === 'selected',
      disabled: state === 'disabled',
      loading: state === 'loading',
      error: state === 'error',
      on: state === 'on',
      off: state === 'off',
    }
    // Also support the current state name directly
    states[state] = true

    // Tokenize: split by && and || while preserving operators
    const tokens = condition.split(/(s*&&s*|s*||s*)/).filter(t => t.trim())

    let result = null
    let pendingOp = null

    for (const token of tokens) {
      const trimmed = token.trim()

      if (trimmed === '&&' || trimmed === '||') {
        pendingOp = trimmed
        continue
      }

      // Handle negation
      let negate = false
      let stateName = trimmed
      if (stateName.startsWith('!')) {
        negate = true
        stateName = stateName.slice(1).trim()
      }

      // Get state value (default to checking against current state)
      let value = states[stateName] !== undefined ? states[stateName] : (state === stateName)
      if (negate) value = !value

      // Apply operator
      if (result === null) {
        result = value
      } else if (pendingOp === '&&') {
        result = result && value
      } else if (pendingOp === '||') {
        result = result || value
      }
      pendingOp = null

    if (!target) return
    if (target.parentElement) {

        item.dataset.selected = 'true'
        this.applyState(item, 'selected')
      } else {
        delete item.dataset.selected
        this.removeState(item, 'selected')
      }
    })

  navigateToPage(pageName, clickedElement) {
    if (!pageName) return

    if (!readFile) {
      console.warn('No readFile callback available for page navigation')
      return
    }
    const content = readFile(filename)
    if (!content) {
      console.warn(`Page not found: ${filename}`)
      return

    if (typeof Mirror === 'undefined' || !Mirror.compile) {
      console.warn('Mirror compiler not available for dynamic page loading')
      return

    try {
      const pageCode = Mirror.compile(content, { readFile })

      if (!container) {
        console.warn('No page container found for rendering')
        return

      container.innerHTML = ''
      const execCode = pageCode.replace('export function createUI', 'function createUI')
      const fn = new Function(execCode + '\nreturn createUI();')
      const ui = fn()
      if (ui && ui.root) {

    container = document.querySelector('[data-instance-name="Content"]')
    if (container) return container

      parent = parent.parentElement

  // Zag component initialization
  initZagComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig
    const trigger = el.querySelector('[data-slot="Trigger"]')
    const content = el.querySelector('[data-slot="Content"]')

    if (!trigger || !content) return

    // Ensure select container has position:relative for absolute dropdown positioning
    el.style.position = 'relative'

    // Set initial state
    content.hidden = true
    content.style.display = 'none'

    // Track state
    el._zagState = { open: false, value: [], highlightedIndex: -1 }

    // Get config values
    const isDisabled = config.machineConfig?.disabled
    const placeholder = config.machineConfig?.placeholder
    const defaultValue = config.machineConfig?.defaultValue
    const value = config.machineConfig?.value
    const isMultiple = config.machineConfig?.multiple
    // Default: closeOnSelect=true for single, closeOnSelect=false for multiple (keepOpen)
    const closeOnSelect = isMultiple
      ? config.machineConfig?.closeOnSelect === true
      : config.machineConfig?.closeOnSelect !== false
    const isSearchable = config.machineConfig?.searchable
    const isClearable = config.machineConfig?.clearable
    const isDeselectable = config.machineConfig?.deselectable
    const placement = config.machineConfig?.placement || 'bottom-start'
    const offset = config.machineConfig?.offset ?? 4
    const items = Array.from(content.querySelectorAll('[data-value]'))

    // ========================================
    // DEFAULT STYLING (Tutorial-konform)
    // ========================================

    // Trigger Styling
    if (!trigger.hasAttribute('data-styled')) {
      Object.assign(trigger.style, {
        background: '#1a1a1a',
        padding: '7px 10px',
        borderRadius: '5px',
        height: '34px',
        boxSizing: 'border-box',
        border: '1px solid #333',
        minWidth: '160px',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'flex-start',
        gap: '8px',
        cursor: 'pointer',
        fontSize: '13px',
        color: '#e0e0e0',
        transition: 'border-color 0.15s',
        position: 'relative',
        textAlign: 'left',
        fontFamily: 'inherit',
      })
    }

    // Content/Dropdown Styling with placement support
    if (!content.hasAttribute('data-styled')) {
      const placementStyles = {
        position: 'absolute',
        zIndex: '1000',
      }
      // Apply placement-based positioning
      if (placement.startsWith('top')) {
        placementStyles.bottom = '100%'
        placementStyles.marginBottom = offset + 'px'
      } else {
        placementStyles.top = '100%'
        placementStyles.marginTop = offset + 'px'
      }
      if (placement.endsWith('-start') || placement.endsWith('-left')) {
        placementStyles.left = '0'
      } else if (placement.endsWith('-end') || placement.endsWith('-right')) {
        placementStyles.right = '0'
      } else {
        placementStyles.left = '0' // default
      }

      Object.assign(content.style, {
        background: '#1a1a1a',
        borderRadius: '6px',
        border: '1px solid #333',
        boxShadow: '0 6px 20px rgba(0,0,0,0.35)',
        padding: '3px',
        maxHeight: '200px',
        overflow: 'auto',
        minWidth: '160px',
        ...placementStyles,
      })
      content.dataset.placement = placement
    }

    // Item Styling
    items.forEach(item => {
      if (!item.hasAttribute('data-styled')) {
        // Only set alignItems if not already set by compiler (e.g., via center, ver, etc.)
        const hasAlignItems = item.style.alignItems !== ''
        const baseStyles = {
          padding: '6px 10px',
          borderRadius: '4px',
          display: 'flex',
          gap: '8px',
          cursor: 'pointer',
          fontSize: '13px',
          color: '#e0e0e0',
        }
        // Only add alignItems default if not already set
        if (!hasAlignItems) {
          baseStyles.alignItems = 'center'
        }
        Object.assign(item.style, baseStyles)
      }
    })

    // Group & GroupLabel Styling
    const groups = content.querySelectorAll('[data-slot="Group"]')
    groups.forEach(group => {
      if (!group.hasAttribute('data-styled')) {
        Object.assign(group.style, {
          display: 'flex',
          flexDirection: 'column',
        })
        // Add margin-top for groups after the first one
        if (group.previousElementSibling) {
          group.style.marginTop = '8px'
        }
      }
      // Style GroupLabel
      const groupLabel = group.querySelector('[data-slot="GroupLabel"]')
      if (groupLabel && !groupLabel.hasAttribute('data-styled')) {
        Object.assign(groupLabel.style, {
          padding: '6px 10px 4px',
          fontSize: '11px',
          fontWeight: '600',
          color: '#888',
          textTransform: 'uppercase',
          letterSpacing: '0.5px',
        })
      }
    })

    // ========================================
    // DEFAULT ICONS
    // ========================================

    // Create or find ValueText
    let triggerText = trigger.querySelector('[data-slot="ValueText"]')
    if (!triggerText) {
      triggerText = document.createElement('span')
      triggerText.dataset.slot = 'ValueText'
      triggerText.style.cssText = 'flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'
      trigger.insertBefore(triggerText, trigger.firstChild)
    }
    el._zagTriggerText = triggerText

    // Create or find Indicator (chevron-down)
    let indicator = trigger.querySelector('[data-slot="Indicator"]')
    if (!indicator) {
      indicator = document.createElement('span')
      indicator.dataset.slot = 'Indicator'
      indicator.style.cssText = 'color:#666;display:flex;transition:transform 0.15s;flex-shrink:0;'
      indicator.innerHTML = _runtime._icons.chevronDown(14)
      trigger.appendChild(indicator)
    }
    el._zagIndicator = indicator

    // Create ItemIndicator (check/checkbox) for each item
    items.forEach(item => {
      let check = item.querySelector('[data-slot="ItemIndicator"]')
      if (!check) {
        check = document.createElement('span')
        check.dataset.slot = 'ItemIndicator'

        if (isMultiple) {
          // Multiple: Checkbox style (box with border, filled when selected)
          check.style.cssText = 'width:15px;height:15px;border-radius:3px;border:1px solid #444;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;'
          check.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="opacity:0;color:#fff;"><polyline points="20 6 9 17 4 12"></polyline></svg>'
          // Insert at beginning for checkbox
          item.insertBefore(check, item.firstChild)
        } else {
          // Single: Checkmark style (appears on right when selected)
          check.style.cssText = 'margin-left:auto;display:none;color:#4f46e5;flex-shrink:0;'
          check.innerHTML = _runtime._icons.check(14)
          item.appendChild(check)
        }
      }
    })

    // ========================================
    // CLEAR BUTTON
    // ========================================

    let clearButton = null
    if (isClearable) {
      clearButton = trigger.querySelector('[data-slot="ClearButton"]')
      if (!clearButton) {
        clearButton = document.createElement('button')
        clearButton.type = 'button'
        clearButton.dataset.slot = 'ClearButton'
        clearButton.style.cssText = 'color:#666;padding:2px;border-radius:4px;cursor:pointer;display:none;background:none;border:none;flex-shrink:0;align-items:center;justify-content:center;'
        clearButton.innerHTML = _runtime._icons.x(14)
        clearButton.title = 'Auswahl löschen'
        // Insert before indicator
        trigger.insertBefore(clearButton, indicator)
      }

      clearButton.addEventListener('mouseenter', () => {
        clearButton.style.color = '#fff'
        clearButton.style.background = '#333'
      })
      clearButton.addEventListener('mouseleave', () => {
        clearButton.style.color = '#666'
        clearButton.style.background = 'none'
      })
      clearButton.addEventListener('click', (e) => {
        e.stopPropagation()
        el._zagState.value = []
        items.forEach(i => {
          i.removeAttribute('data-selected')
          const ind = i.querySelector('[data-slot="ItemIndicator"]')
          if (ind) ind.style.display = 'none'
        })
        renderTriggerValue()
        clearButton.style.display = 'none'
      })

      el._zagClearButton = clearButton
    }

    // ========================================
    // SEARCH INPUT
    // ========================================

    let searchInput = null
    let emptyElement = null
    if (isSearchable) {
      searchInput = content.querySelector('[data-slot="Input"]')
      if (!searchInput) {
        searchInput = document.createElement('input')
        searchInput.type = 'text'
        searchInput.placeholder = 'Suchen...'
        searchInput.dataset.slot = 'Input'
        searchInput.style.cssText = 'background:transparent;border:none;border-bottom:1px solid #333;padding:7px 10px;color:#fff;width:100%;font-size:13px;outline:none;'
        content.insertBefore(searchInput, content.firstChild)
      }

      // Create Empty element for no results
      emptyElement = content.querySelector('[data-slot="Empty"]')
      if (!emptyElement) {
        emptyElement = document.createElement('div')
        emptyElement.dataset.slot = 'Empty'
        emptyElement.textContent = 'Keine Ergebnisse'
        emptyElement.style.cssText = 'padding:16px;text-align:center;color:#666;font-size:12px;display:none;'
        content.appendChild(emptyElement)
      }
      el._zagEmptyElement = emptyElement

      searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase()
        items.forEach(item => {
          const text = item.textContent.toLowerCase()
          // Use 'flex' instead of '' to preserve horizontal layout
          item.style.display = text.includes(query) ? 'flex' : 'none'
        })
        const visibleItems = Array.from(items).filter(i => i.style.display !== 'none')

        // Show/hide empty state
        if (emptyElement) {
          emptyElement.style.display = visibleItems.length === 0 ? '' : 'none'
        }

        el._zagState.highlightedIndex = 0
        if (visibleItems.length > 0) {
          this._updateZagHighlight(el, visibleItems)
        }
      })

      // Keyboard navigation for search input
      searchInput.addEventListener('keydown', (e) => {
        const visibleItems = Array.from(content.querySelectorAll('[data-value]')).filter(i => i.style.display !== 'none')
        const count = visibleItems.length

        switch (e.key) {
          case 'ArrowDown':
            e.preventDefault()
            el._zagState.highlightedIndex = (el._zagState.highlightedIndex + 1) % count
            this._updateZagHighlight(el, visibleItems)
            break
          case 'ArrowUp':
            e.preventDefault()
            el._zagState.highlightedIndex = (el._zagState.highlightedIndex - 1 + count) % count
            this._updateZagHighlight(el, visibleItems)
            break
          case 'Enter':
            e.preventDefault()
            if (el._zagState.highlightedIndex >= 0 && visibleItems[el._zagState.highlightedIndex]) {
              visibleItems[el._zagState.highlightedIndex].click()
            }
            break
          case 'Escape':
            e.preventDefault()
            el._zagState.open = false
            content.hidden = true
            content.style.display = 'none'
            trigger.setAttribute('aria-expanded', 'false')
            trigger.style.borderColor = '#333'
            if (indicator) {
              indicator.style.transform = ''
              indicator.style.color = '#666'
            }
            trigger.focus()
            fireCloseEvent()
            break
        }
      })

      el._zagSearchInput = searchInput
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    // Event dispatching helpers
    const fireOpenEvent = () => {
      el.dispatchEvent(new CustomEvent('open', { detail: { value: el._zagState.value } }))
    }
    const fireCloseEvent = () => {
      el.dispatchEvent(new CustomEvent('close', { detail: { value: el._zagState.value } }))
    }
    const fireChangeEvent = (newValue, previousValue) => {
      el.dispatchEvent(new CustomEvent('change', {
        detail: { value: newValue, previousValue },
        bubbles: true
      }))
      // Two-way binding: update bound variable via $set
      const bindVar = el.dataset.bind
      if (bindVar && typeof window !== 'undefined' && typeof window.$set === 'function') {
        // For single select, use the first value; for multiple, use the array
        const bindValue = isMultiple ? newValue : (newValue[0] || '')
        window.$set(bindVar, bindValue)
      }
    }

    const getItemLabel = (item) => {
      // First check for explicit ItemText slot
      const textEl = item.querySelector('[data-slot="ItemText"]')
      if (textEl) return textEl.textContent

      // For items with multiple child elements, collect text from span elements
      const childElements = item.children
      if (childElements.length > 1) {
        const texts = []
        for (const child of childElements) {
          // Skip indicators and icons
          if (child.dataset?.slot === 'ItemIndicator') continue
          if (child.querySelector('svg')) continue
          // Collect text from span elements
          const text = child.textContent?.trim()
          if (text) texts.push(text)
        }
        if (texts.length > 0) return texts.join(' ')
      }

      // Simple items: use all text content
      return item.textContent?.trim() || ''
    }

    const updateCheckIcons = () => {
      items.forEach(item => {
        const ind = item.querySelector('[data-slot="ItemIndicator"]')
        if (ind) {
          const isSelected = el._zagState.value.includes(item.dataset.value)

          if (isMultiple) {
            // Checkbox style: fill background and show checkmark when selected
            if (isSelected) {
              ind.style.background = '#4f46e5'
              ind.style.borderColor = '#4f46e5'
              const svg = ind.querySelector('svg')
              if (svg) svg.style.opacity = '1'
            } else {
              ind.style.background = ''
              ind.style.borderColor = '#444'
              const svg = ind.querySelector('svg')
              if (svg) svg.style.opacity = '0'
            }
          } else {
            // Checkmark style: show/hide
            ind.style.display = isSelected ? '' : 'none'
          }
        }
      })
    }

    // Render tags for multiple mode
    const renderTags = () => {
      // Remove existing tag group
      const existingTags = trigger.querySelector('[data-slot="TagGroup"]')
      if (existingTags) existingTags.remove()

      if (!isMultiple || el._zagState.value.length === 0) {
        triggerText.style.display = ''
        return
      }

      // Hide text, show tags
      triggerText.style.display = 'none'

      const tagGroup = document.createElement('div')
      tagGroup.dataset.slot = 'TagGroup'
      tagGroup.style.cssText = 'display:flex;flex-wrap:nowrap;gap:4px;overflow:hidden;flex:1;'

      for (const val of el._zagState.value) {
        const matchItem = Array.from(items).find(i => i.dataset.value === val)
        const label = matchItem ? getItemLabel(matchItem) : val

        const tag = document.createElement('span')
        tag.dataset.slot = 'Pill'
        tag.dataset.value = val
        tag.style.cssText = 'background:#333;color:#e0e0e0;padding:2px 6px;border-radius:3px;font-size:12px;display:flex;align-items:center;gap:4px;flex-shrink:0;white-space:nowrap;'
        tag.textContent = label

        const removeBtn = document.createElement('span')
        removeBtn.dataset.slot = 'PillRemove'
        removeBtn.style.cssText = 'color:#888;cursor:pointer;display:flex;'
        removeBtn.innerHTML = _runtime._icons.x(12)
        removeBtn.addEventListener('mouseenter', () => removeBtn.style.color = '#fff')
        removeBtn.addEventListener('mouseleave', () => removeBtn.style.color = '#888')
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation()
          const idx = el._zagState.value.indexOf(val)
          if (idx > -1) el._zagState.value.splice(idx, 1)
          const matchItem = Array.from(items).find(i => i.dataset.value === val)
          if (matchItem) matchItem.removeAttribute('data-selected')
          updateCheckIcons()
          renderTags()
          renderTriggerValue()
        })
        tag.appendChild(removeBtn)
        tagGroup.appendChild(tag)
      }

      // Insert before clear button or indicator
      const insertBefore = clearButton || indicator
      trigger.insertBefore(tagGroup, insertBefore)
    }

    const renderTriggerValue = () => {
      if (isMultiple) {
        if (el._zagState.value.length === 0) {
          triggerText.style.display = ''
          triggerText.textContent = placeholder || 'Auswählen...'
          triggerText.style.color = '#666'
          if (clearButton) clearButton.style.display = 'none'
        } else {
          renderTags()
          if (clearButton) clearButton.style.display = 'flex'
        }
      } else {
        if (el._zagState.value.length === 0) {
          triggerText.textContent = placeholder || 'Auswählen...'
          triggerText.style.color = '#666'
          if (clearButton) clearButton.style.display = 'none'
        } else {
          const matchItem = Array.from(items).find(i => i.dataset.value === el._zagState.value[0])
          triggerText.textContent = matchItem ? getItemLabel(matchItem) : el._zagState.value[0]
          triggerText.style.color = '#e0e0e0'
          if (clearButton) clearButton.style.display = 'flex'
        }
      }
    }

    // ========================================
    // DISABLED STATE
    // ========================================

    if (isDisabled) {
      trigger.setAttribute('disabled', 'true')
      trigger.style.opacity = '0.5'
      trigger.style.cursor = 'not-allowed'
      trigger.style.pointerEvents = 'none'
    }

    // ========================================
    // TRACK STATE
    // ========================================

    el._zagState.multiple = isMultiple
    el._zagPlaceholder = placeholder || 'Auswählen...'

    // Pre-select value
    const preselect = value || defaultValue
    if (preselect) {
      const preselectArr = Array.isArray(preselect) ? preselect : [preselect]
      el._zagState.value = preselectArr
      items.forEach(item => {
        if (preselectArr.includes(item.dataset.value)) {
          item.setAttribute('data-selected', 'true')
        }
      })
      updateCheckIcons()
    }
    renderTriggerValue()

    // If disabled, don't set up interactions
    if (isDisabled) return

    // ========================================
    // TRIGGER CLICK
    // ========================================

    trigger.addEventListener('click', (e) => {
      e.stopPropagation()
      const wasOpen = el._zagState.open
      el._zagState.open = !wasOpen
      content.hidden = !el._zagState.open
      content.style.display = el._zagState.open ? '' : 'none'
      trigger.setAttribute('aria-expanded', el._zagState.open)

      // Fire open/close events
      if (el._zagState.open) {
        fireOpenEvent()

        // Auto-flip: check if dropdown fits below, otherwise flip to top
        requestAnimationFrame(() => {
          const triggerRect = trigger.getBoundingClientRect()
          const contentRect = content.getBoundingClientRect()
          const viewportHeight = window.innerHeight

          // Find scrollable parent (preview container)
          let scrollParent = el.parentElement
          while (scrollParent && scrollParent !== document.body) {
            const overflow = window.getComputedStyle(scrollParent).overflow
            if (overflow === 'auto' || overflow === 'scroll' || overflow === 'hidden') {
              break
            }
            scrollParent = scrollParent.parentElement
          }
          const containerRect = scrollParent ? scrollParent.getBoundingClientRect() : { bottom: viewportHeight, top: 0 }

          const spaceBelow = containerRect.bottom - triggerRect.bottom
          const spaceAbove = triggerRect.top - containerRect.top
          const contentHeight = contentRect.height

          // If not enough space below but more space above, flip to top
          if (spaceBelow < contentHeight && spaceAbove > spaceBelow) {
            content.style.top = 'auto'
            content.style.bottom = '100%'
            content.style.marginTop = '0'
            content.style.marginBottom = offset + 'px'
            content.dataset.placement = 'top-start'
          } else {
            content.style.bottom = 'auto'
            content.style.top = '100%'
            content.style.marginBottom = '0'
            content.style.marginTop = offset + 'px'
            content.dataset.placement = 'bottom-start'
          }
        })
      } else {
        fireCloseEvent()
      }

      // Update styles
      trigger.style.borderColor = el._zagState.open ? '#4f46e5' : '#333'
      if (indicator) {
        indicator.style.transform = el._zagState.open ? 'rotate(180deg)' : ''
        indicator.style.color = el._zagState.open ? '#4f46e5' : '#666'
      }

      if (el._zagState.open) {
        if (searchInput) {
          searchInput.value = ''
          searchInput.focus()
          // Use 'flex' to preserve horizontal layout
          items.forEach(item => item.style.display = 'flex')
        }
        el._zagState.highlightedIndex = 0
        this._updateZagHighlight(el, items)
      }
    })

    // Hover effect
    trigger.addEventListener('mouseenter', () => {
      if (!el._zagState.open) trigger.style.borderColor = '#444'
    })
    trigger.addEventListener('mouseleave', () => {
      if (!el._zagState.open) trigger.style.borderColor = '#333'
    })

    // Keyboard navigation on trigger (for non-searchable selects)
    trigger.addEventListener('keydown', (e) => {
      // When closed: open on Enter/Space/ArrowDown
      if (!el._zagState.open) {
        if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown') {
          e.preventDefault()
          trigger.click()
        }
        return
      }

      // When open: navigate with arrows
      const visibleItems = Array.from(content.querySelectorAll('[data-value]')).filter(i => i.style.display !== 'none')
      const count = visibleItems.length

      switch (e.key) {
        case 'ArrowDown':
          e.preventDefault()
          el._zagState.highlightedIndex = (el._zagState.highlightedIndex + 1) % count
          this._updateZagHighlight(el, visibleItems)
          break
        case 'ArrowUp':
          e.preventDefault()
          el._zagState.highlightedIndex = (el._zagState.highlightedIndex - 1 + count) % count
          this._updateZagHighlight(el, visibleItems)
          break
        case 'Enter':
        case ' ':
          e.preventDefault()
          if (el._zagState.highlightedIndex >= 0 && visibleItems[el._zagState.highlightedIndex]) {
            visibleItems[el._zagState.highlightedIndex].click()
          }
          break
        case 'Escape':
          e.preventDefault()
          el._zagState.open = false
          content.hidden = true
          content.style.display = 'none'
          trigger.setAttribute('aria-expanded', 'false')
          trigger.style.borderColor = '#333'
          if (indicator) {
            indicator.style.transform = ''
            indicator.style.color = '#666'
          }
          fireCloseEvent()
          break
        case 'Tab':
          // Close on Tab but allow natural tab behavior
          el._zagState.open = false
          content.hidden = true
          content.style.display = 'none'
          trigger.setAttribute('aria-expanded', 'false')
          trigger.style.borderColor = '#333'
          if (indicator) {
            indicator.style.transform = ''
            indicator.style.color = '#666'
          }
          fireCloseEvent()
          break
      }
    })

    // ========================================
    // CLICK OUTSIDE
    // ========================================

    document.addEventListener('click', (e) => {
      if (el._zagState.open && !e.composedPath().includes(el)) {
        el._zagState.open = false
        content.hidden = true
        content.style.display = 'none'
        trigger.setAttribute('aria-expanded', 'false')
        trigger.style.borderColor = '#333'
        if (indicator) {
          indicator.style.transform = ''
          indicator.style.color = '#666'
        }
        fireCloseEvent()
      }
    })

    // ========================================
    // ITEM INTERACTIONS
    // ========================================

    items.forEach((item, index) => {
      const isItemDisabled = item.dataset.disabled === 'true'

      if (isItemDisabled) {
        item.style.opacity = '0.4'
        item.style.cursor = 'not-allowed'
        return
      }

      item.addEventListener('click', (e) => {
        e.stopPropagation()
        const itemValue = item.dataset.value
        const previousValue = [...el._zagState.value]

        if (isMultiple) {
          const idx = el._zagState.value.indexOf(itemValue)
          if (idx > -1) {
            el._zagState.value.splice(idx, 1)
            item.removeAttribute('data-selected')
          } else {
            el._zagState.value.push(itemValue)
            item.setAttribute('data-selected', 'true')
          }
          updateCheckIcons()
          renderTriggerValue()
          fireChangeEvent([...el._zagState.value], previousValue)
        } else {
          // Single select mode
          const isCurrentlySelected = el._zagState.value.includes(itemValue)

          if (isCurrentlySelected && isDeselectable) {
            // Deselect if already selected and deselectable is enabled
            el._zagState.value = []
            item.removeAttribute('data-selected')
          } else {
            // Select new item
            el._zagState.value = [itemValue]
            items.forEach(i => i.removeAttribute('data-selected'))
            item.setAttribute('data-selected', 'true')
          }
          updateCheckIcons()
          renderTriggerValue()
          fireChangeEvent([...el._zagState.value], previousValue)

          if (closeOnSelect) {
            el._zagState.open = false
            content.hidden = true
            content.style.display = 'none'
            trigger.setAttribute('aria-expanded', 'false')
            trigger.style.borderColor = '#333'
            if (indicator) {
              indicator.style.transform = ''
              indicator.style.color = '#666'
            }
            fireCloseEvent()
          }
        }
      })

      item.addEventListener('mouseenter', () => {
        el._zagState.highlightedIndex = index
        this._updateZagHighlight(el, items)
      })
    })

    // ========================================
    // KEYBOARD NAVIGATION
    // ========================================

    el.addEventListener('keydown', (e) => {
      if (!el._zagState.open) {
        if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown') {
          e.preventDefault()
          trigger.click()
        }
        return
      }

      const visibleItems = Array.from(content.querySelectorAll('[data-value]')).filter(i => i.style.display !== 'none')
      const count = visibleItems.length

      switch (e.key) {
        case 'ArrowDown':
          e.preventDefault()
          el._zagState.highlightedIndex = (el._zagState.highlightedIndex + 1) % count
          this._updateZagHighlight(el, visibleItems)
          break
        case 'ArrowUp':
          e.preventDefault()
          el._zagState.highlightedIndex = (el._zagState.highlightedIndex - 1 + count) % count
          this._updateZagHighlight(el, visibleItems)
          break
        case 'Enter':
        case ' ':
          e.preventDefault()
          if (el._zagState.highlightedIndex >= 0 && visibleItems[el._zagState.highlightedIndex]) {
            visibleItems[el._zagState.highlightedIndex].click()
          }
          break
        case 'Escape':
          e.preventDefault()
          el._zagState.open = false
          content.hidden = true
          content.style.display = 'none'
          trigger.setAttribute('aria-expanded', 'false')
          trigger.style.borderColor = '#333'
          if (indicator) {
            indicator.style.transform = ''
            indicator.style.color = '#666'
          }
          trigger.focus()
          fireCloseEvent()
          break
      }
    })

    // ACCESSIBILITY
    // ========================================

    trigger.setAttribute('tabindex', '0')
    trigger.setAttribute('role', 'combobox')
    trigger.setAttribute('aria-haspopup', 'listbox')
    trigger.setAttribute('aria-expanded', 'false')
    content.setAttribute('role', 'listbox')
  },

  _updateZagHighlight(el, items) {
    items.forEach((item, i) => {
      if (i === el._zagState.highlightedIndex) {
        item.setAttribute('data-highlighted', 'true')
        item.style.background = '#252525'
      } else {
        item.removeAttribute('data-highlighted')
        item.style.background = ''
      }
    })
  },

  // Tabs component initialization
  initTabsComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig
    const list = el.querySelector('[data-slot="List"]')
    const triggers = el.querySelectorAll('[data-slot="Trigger"]')
    const contents = el.querySelectorAll('[data-slot="Content"]')
    const indicator = el.querySelector('[data-slot="Indicator"]')

    if (!list || triggers.length === 0) return

    // Get config values
    const orientation = config.machineConfig?.orientation || 'horizontal'
    const activationMode = config.machineConfig?.activationMode || 'automatic'
    const loopFocus = config.machineConfig?.loopFocus !== false
    const deselectable = config.machineConfig?.deselectable || false
    const defaultValue = config.machineConfig?.defaultValue || config.machineConfig?.value || (config.items?.[0]?.value)

    // Initialize state
    el._tabsState = {
      value: defaultValue,
      focusedIndex: 0,
    }

    // ========================================
    // DEFAULT STYLING
    // ========================================

    // Root styling
    if (!el.hasAttribute('data-styled')) {
      Object.assign(el.style, {
        display: 'flex',
        flexDirection: orientation === 'vertical' ? 'row' : 'column',
      })
    }

    // List styling
    // Structural styles always needed for layout to work
    const isVertical = orientation === 'vertical'
    list.style.display = 'inline-flex'
    list.style.flexDirection = isVertical ? 'column' : 'row'
    list.style.position = 'relative'
    list.setAttribute('aria-orientation', orientation)

    // Visual defaults only if not customized
    if (!list.hasAttribute('data-styled')) {
      list.style.borderBottom = isVertical ? 'none' : '1px solid #333'
      list.style.borderRight = isVertical ? '1px solid #333' : 'none'
      if (!list.style.gap) list.style.gap = '24px'
    }

    // Trigger styling
    triggers.forEach(trigger => {
      if (!trigger.hasAttribute('data-styled')) {
        Object.assign(trigger.style, {
          padding: '8px 0',
          background: 'transparent',
          border: 'none',
          color: '#888',
          cursor: 'pointer',
          fontSize: '13px',
          fontWeight: '500',
          fontFamily: 'inherit',
          transition: 'color 0.15s',
          position: 'relative',
          whiteSpace: 'nowrap',
          flexShrink: '0',
          flexGrow: '0',
        })
      }
    })

    // Indicator styling
    // Structural styles are ALWAYS needed for positioning to work
    const hasCustomIndicator = indicator?.hasAttribute('data-custom-indicator')
    if (indicator) {
      // Always apply structural styles
      indicator.style.position = 'absolute'
      indicator.style.transition = 'left 0.2s ease, top 0.2s ease, width 0.2s ease, height 0.2s ease'

      if (hasCustomIndicator) {
        // Custom indicator with children - center content
        indicator.style.display = 'flex'
        indicator.style.alignItems = 'center'
        indicator.style.justifyContent = 'center'
      } else {
        // Visual defaults only if not customized
        if (!indicator.hasAttribute('data-styled')) {
          indicator.style.background = '#4f46e5'
          indicator.style.borderRadius = '2px'
        }

        // Initial position/size - set defaults for uncustomized dimensions (line indicator)
        if (isVertical) {
          if (!indicator.style.width) indicator.style.width = '2px'
          indicator.style.left = '0'
          indicator.style.top = '0'
          indicator.style.height = '0'
        } else {
          if (!indicator.style.height) indicator.style.height = '2px'
          indicator.style.bottom = '0'
          indicator.style.left = '0'
          indicator.style.width = '0'
        }
      }
    }

    // Content styling
    contents.forEach(content => {
      if (!content.hasAttribute('data-styled')) {
        Object.assign(content.style, {
          padding: '16px',
          display: 'none', // hidden by default
        })
      } else {
        // Even with custom styles, hide non-active panels
        if (content.dataset.value !== el._tabsState.value) {
          content.style.display = 'none'
        }
      }
    })

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const selectTab = (value) => {
      const previousValue = el._tabsState.value

      // Handle deselectable

        el._tabsState.value = null
        updateUI()
        fireChangeEvent(null, previousValue)
        return
      }

      if (value === previousValue) return

      el._tabsState.value = value
      updateUI()
      fireChangeEvent(value, previousValue)
    }

    const updateUI = () => {
      const value = el._tabsState.value

      // Update triggers
      triggers.forEach((trigger, i) => {
        const isSelected = trigger.dataset.value === value
        trigger.setAttribute('aria-selected', isSelected)
        trigger.setAttribute('tabindex', isSelected ? '0' : '-1')

        if (!trigger.hasAttribute('data-styled')) {
          trigger.style.color = isSelected ? '#e0e0e0' : '#888'
        }

        if (isSelected) {
          trigger.setAttribute('data-selected', 'true')
          el._tabsState.focusedIndex = i
        } else {
          trigger.removeAttribute('data-selected')
        }
      })

      // Update contents
      contents.forEach(content => {
        const isActive = content.dataset.value === value
        content.style.display = isActive ? '' : 'none'
        content.setAttribute('data-state', isActive ? 'active' : 'inactive')
        if (isActive) {
          content.setAttribute('data-selected', 'true')
          // Lazy load content if needed
          if (!content.dataset.loaded) {
            if (content.dataset.shows) {
              loadShowContent(content)
            } else if (content.dataset.loadFromFile) {
              loadContentFromFile(content)
            }
          }
        } else {
          content.removeAttribute('data-selected')
        }
      })

      // Update indicator position
      if (indicator && value) {
        const activeIndex = Array.from(triggers).findIndex(t => t.dataset.value === value)
        if (activeIndex >= 0) {
          if (hasCustomIndicator) {
            indicator.style.display = 'flex'
          }
          updateIndicator(triggers[activeIndex])
        }
      } else if (indicator && !value) {
        // Hide indicator when no tab selected
        if (hasCustomIndicator) {
          indicator.style.display = 'none'
        } else {
          indicator.style.width = '0'
          indicator.style.height = '0'
        }
      }
    }

    const updateIndicator = (activeTrigger) => {
      if (!indicator || !activeTrigger) return

      const isVertical = orientation === 'vertical'
      const listRect = list.getBoundingClientRect()
      const triggerRect = activeTrigger.getBoundingClientRect()

      if (hasCustomIndicator) {
        // Custom indicator - center it under/beside the active trigger
        const indicatorRect = indicator.getBoundingClientRect()
        if (isVertical) {
          // Center vertically beside the trigger
          const triggerCenter = (triggerRect.top - listRect.top) + (triggerRect.height / 2)
          indicator.style.top = (triggerCenter - (indicatorRect.height / 2)) + 'px'
          indicator.style.left = '0'
        } else {
          // Center horizontally under the trigger
          const triggerCenter = (triggerRect.left - listRect.left) + (triggerRect.width / 2)
          indicator.style.left = (triggerCenter - (indicatorRect.width / 2)) + 'px'
          indicator.style.bottom = '0'
        }
      } else {
        // Default line indicator - stretch to trigger size
        if (isVertical) {
          indicator.style.top = (triggerRect.top - listRect.top) + 'px'
          indicator.style.height = triggerRect.height + 'px'
        } else {
          indicator.style.left = (triggerRect.left - listRect.left) + 'px'
          indicator.style.width = triggerRect.width + 'px'
        }
      }
    }

    const fireChangeEvent = (newValue, previousValue) => {
      el.dispatchEvent(new CustomEvent('change', {
        detail: { value: newValue, previousValue },
        bubbles: true
      }))
    }

    // Handle "show X [from Y]" syntax
    const loadShowContent = (container) => {
      const showsTarget = container.dataset.shows
      const showsFrom = container.dataset.showsFrom
      if (!showsTarget) return

      const root = el.getRootNode()

      if (showsFrom) {
        // Load element from external file: show X from Y
        loadElementFromFile(container, showsTarget, showsFrom)
      } else {
        // Try to find local element first
        const localEl = root.querySelector ? root.querySelector('[name="' + showsTarget + '"]') : document.querySelector('[name="' + showsTarget + '"]')
        if (localEl) {
          // Clone local element content into container
          container.innerHTML = ''
          const clone = localEl.cloneNode(true)
          // Remove name attribute from clone to avoid conflicts
          clone.removeAttribute('name')
          container.appendChild(clone)
          container.dataset.loaded = 'true'
        } else {
          // No local element found, treat as file name: show X → X.mirror
          loadElementFromFile(container, null, showsTarget)
        }
      }
    }

    // Load content from external file, optionally extracting a specific element
    const loadElementFromFile = (container, elementName, filename) => {
      const fullFilename = filename.endsWith('.mirror') ? filename : filename + '.mirror'

      const readFile = window._mirrorReadFile
      if (!readFile) {
        console.warn('No readFile callback available for lazy loading')
        return
      }

      const content = readFile(fullFilename)
      if (!content) {
        console.warn('Page not found: ' + fullFilename)
        return
      }

      const Mirror = window.Mirror
      if (!Mirror?.compile) {
        console.warn('Mirror compiler not available for lazy loading')
        return
      }

      try {
        const pageCode = Mirror.compile(content, { readFile })
        const execCode = pageCode.replace('export function createUI', 'function createUI')
        const fn = new Function(execCode + '\nreturn createUI();')
        const ui = fn()

        if (ui?.root) {
          container.innerHTML = ''
          if (elementName) {
            // Find specific named element in loaded content
            const targetEl = ui.root.querySelector('[name="' + elementName + '"]')
            if (targetEl) {
              container.appendChild(targetEl)
            } else {
              console.warn('Element "' + elementName + '" not found in ' + fullFilename)
              // Fallback: show entire file content
              while (ui.root.firstChild) {
                container.appendChild(ui.root.firstChild)
              }
            }
          } else {
            // No specific element, show entire file content
            while (ui.root.firstChild) {
              container.appendChild(ui.root.firstChild)
            }
          }
        }
        container.dataset.loaded = 'true'
      } catch (err) {
        console.error('Failed to load from ' + fullFilename + ':', err)
      }
    }

    const loadContentFromFile = (container) => {
      const filename = container.dataset.loadFromFile
      if (!filename) return

      const fullFilename = filename.endsWith('.mirror') ? filename : filename + '.mirror'

      // Try to get readFile callback
      const readFile = window._mirrorReadFile
      if (!readFile) {
        console.warn('No readFile callback available for lazy loading')
        return
      }

      const content = readFile(fullFilename)
      if (!content) {
        console.warn('Page not found: ' + fullFilename)
        return
      }

      // Get Mirror compiler
      const Mirror = window.Mirror
      if (!Mirror?.compile) {
        console.warn('Mirror compiler not available for lazy loading')
        return
      }

      try {
        const pageCode = Mirror.compile(content, { readFile })
        const execCode = pageCode.replace('export function createUI', 'function createUI')
        const fn = new Function(execCode + '\nreturn createUI();')
        const ui = fn()

        if (ui?.root) {
          // Clear any existing content
          container.innerHTML = ''
          // Move children from generated root to container
          while (ui.root.firstChild) {
            container.appendChild(ui.root.firstChild)
          }
        }

        // Mark as loaded so we don't reload
        container.dataset.loaded = 'true'
      } catch (err) {
        console.error('Failed to load page ' + fullFilename + ':', err)
      }
    }

    const focusTrigger = (index) => {
      if (index >= 0 && index < triggers.length) {
        triggers[index].focus()
        el._tabsState.focusedIndex = index
        // In automatic mode, also select the tab
        if (activationMode === 'automatic') {
          selectTab(triggers[index].dataset.value)
        }
      }
    }

    const getNextIndex = (current, direction) => {
      const count = triggers.length
      // Skip disabled triggers
      let next = current
      let attempts = 0
      do {
        if (direction === 'next') {
          next = loopFocus ? (next + 1) % count : Math.min(next + 1, count - 1)
        } else {
          next = loopFocus ? (next - 1 + count) % count : Math.max(next - 1, 0)
        }
        attempts++
      } while (triggers[next].disabled && attempts < count)

      return triggers[next].disabled ? current : next
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    // Click on trigger
    triggers.forEach((trigger, index) => {
      trigger.addEventListener('click', () => {
        if (trigger.disabled) return
        selectTab(trigger.dataset.value)
        trigger.focus()
      })

      // Hover effect
      trigger.addEventListener('mouseenter', () => {
        if (!trigger.disabled && !trigger.hasAttribute('data-styled')) {
          if (trigger.dataset.value !== el._tabsState.value) {
            trigger.style.color = '#ccc'
          }
        }
      })
      trigger.addEventListener('mouseleave', () => {
        if (!trigger.hasAttribute('data-styled')) {
          trigger.style.color = trigger.dataset.value === el._tabsState.value ? '#e0e0e0' : '#888'
        }
      })
    })

    // Keyboard navigation on list
    list.addEventListener('keydown', (e) => {
      const isVertical = orientation === 'vertical'
      const current = el._tabsState.focusedIndex

      switch (e.key) {
        case 'ArrowRight':
          if (!isVertical) {
            e.preventDefault()
            focusTrigger(getNextIndex(current, 'next'))
          }
          break
        case 'ArrowLeft':
          if (!isVertical) {
            e.preventDefault()
            focusTrigger(getNextIndex(current, 'prev'))
          }
          break
        case 'ArrowDown':
          if (isVertical) {
            e.preventDefault()
            focusTrigger(getNextIndex(current, 'next'))
          }
          break
        case 'ArrowUp':
          if (isVertical) {
            e.preventDefault()
            focusTrigger(getNextIndex(current, 'prev'))
          }
          break
        case 'Home':
          e.preventDefault()
          focusTrigger(0)
          break
        case 'End':
          e.preventDefault()
          focusTrigger(triggers.length - 1)
          break
        case 'Enter':
        case ' ':
          e.preventDefault()
          if (activationMode === 'manual') {
            selectTab(triggers[current].dataset.value)
          }
