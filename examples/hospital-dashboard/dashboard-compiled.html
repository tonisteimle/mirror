    const createStepItem = (step, index) => {
      const item = document.createElement('div')
      item.dataset.slot = 'Item'
      item.dataset.index = String(index)
      item.style.cssText = 'display: flex; align-items: center; gap: 8px;'

      // Create trigger (clickable part)
      const trigger = document.createElement('button')
      trigger.type = 'button'
      trigger.dataset.slot = 'Trigger'
      trigger.dataset.index = String(index)
      trigger.style.cssText = 'display: flex; align-items: center; gap: 8px; background: transparent; border: none; cursor: pointer; padding: 0;'

      // Indicator (circle with number)
      const indicator = document.createElement('span')
      indicator.dataset.slot = 'Indicator'
      indicator.textContent = String(index + 1)
      indicator.style.cssText = 'width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; transition: background-color 0.2s, color 0.2s, border-color 0.2s;'
      trigger.appendChild(indicator)

      // Title
      if (step.title) {
        const title = document.createElement('span')
        title.dataset.slot = 'Title'
        title.textContent = step.title
        title.style.cssText = 'font-size: 14px; font-weight: 500; color: #e0e0e0;'
        trigger.appendChild(title)
      }

      trigger.onclick = () => {
        if (!linear || index <= el._stepsState.currentStep) {
          goTo(index)
        }
      }

      item.appendChild(trigger)

      // Separator (except for last item)
      if (index < steps.length - 1) {
        const separator = document.createElement('div')
        separator.dataset.slot = 'Separator'
        if (orientation === 'vertical') {
          separator.style.cssText = 'width: 2px; height: 24px; background: #333; margin: 8px 0 8px 15px;'
        } else {
          separator.style.cssText = 'flex: 1; height: 2px; background: #333; min-width: 24px; margin: 0 8px;'
        }
        item.appendChild(separator)
      }

      return item
    }

    const updateUI = () => {
      const { currentStep, totalSteps } = el._stepsState

      // Update step items
      const items = list.querySelectorAll('[data-slot="Item"]')
      items.forEach((item, i) => {
        const indicator = item.querySelector('[data-slot="Indicator"]')
        const trigger = item.querySelector('[data-slot="Trigger"]')
        const separator = item.querySelector('[data-slot="Separator"]')

        if (i < currentStep) {
          // Completed
          item.setAttribute('data-state', 'complete')
          if (indicator) {
            indicator.style.backgroundColor = '#22c55e'
            indicator.style.color = '#fff'
            indicator.style.border = 'none'
            indicator.innerHTML = _runtime._icons.check(16, 3)
          }
          if (separator) {
            separator.style.backgroundColor = '#22c55e'
          }
          if (trigger) {
            trigger.style.cursor = 'pointer'
          }
        } else if (i === currentStep) {
          // Current
          item.setAttribute('data-state', 'current')
          if (indicator) {
            indicator.style.backgroundColor = '#5BA8F5'
            indicator.style.color = '#fff'
            indicator.style.border = 'none'
            indicator.textContent = String(i + 1)
          }
          if (separator) {
            separator.style.backgroundColor = '#333'
          }
          if (trigger) {
            trigger.style.cursor = 'pointer'
          }
        } else {
          // Upcoming
          item.setAttribute('data-state', 'upcoming')
          if (indicator) {
            indicator.style.backgroundColor = 'transparent'
            indicator.style.color = '#666'
            indicator.style.border = '2px solid #444'
            indicator.textContent = String(i + 1)
          }
          if (separator) {
            separator.style.backgroundColor = '#333'
          }
          if (trigger) {
            trigger.style.cursor = linear ? 'not-allowed' : 'pointer'
          }
        }
      })

      // Update content
      if (content) {
        content.innerHTML = ''
        if (steps[currentStep]?.content) {
          const stepContent = document.createElement('div')
          stepContent.innerHTML = steps[currentStep].content
          content.appendChild(stepContent)
        }
      }

      // Update button states
      if (prevTrigger) {
        prevTrigger.disabled = currentStep === 0
        prevTrigger.style.opacity = currentStep === 0 ? '0.5' : '1'
        prevTrigger.style.cursor = currentStep === 0 ? 'not-allowed' : 'pointer'
      }
      if (nextTrigger) {
        const isLast = currentStep === totalSteps - 1
        nextTrigger.textContent = isLast ? 'Finish' : 'Next'
      }

      // Set data attributes
      el.setAttribute('data-step', String(currentStep))
      el.setAttribute('data-total', String(totalSteps))

      // Emit change event
      el.dispatchEvent(new CustomEvent('step-change', { detail: { step: currentStep, total: totalSteps } }))
    }

    const goTo = (index) => {
      const { totalSteps } = el._stepsState
      const newIndex = Math.max(0, Math.min(totalSteps - 1, index))
      el._stepsState.currentStep = newIndex
      updateUI()
    }

    const next = () => {
      goTo(el._stepsState.currentStep + 1)
    }

    const prev = () => {
      goTo(el._stepsState.currentStep - 1)
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    if (prevTrigger) {
      prevTrigger.onclick = prev
    }

    if (nextTrigger) {
      nextTrigger.onclick = () => {
        if (el._stepsState.currentStep === el._stepsState.totalSteps - 1) {
          el.dispatchEvent(new CustomEvent('complete'))
        } else {
          next()
        }
      }
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.next = next
    el.prev = prev
    el.goTo = goTo
    el.getCurrentStep = () => el._stepsState.currentStep
    el.getTotalSteps = () => el._stepsState.totalSteps
    el.isComplete = () => el._stepsState.currentStep === el._stepsState.totalSteps - 1

    el.setSteps = (newSteps) => {
      el._stepsState.totalSteps = newSteps.length
      el._stepsState.currentStep = 0

      // Clear and rebuild
      list.innerHTML = ''

      newSteps.forEach((step, index) => {
        const item = createStepItem(step, index)
        list.appendChild(item)
      })

      updateUI()
    }

    // ========================================
    // INITIAL STATE
    // ========================================

    // Create step items
    steps.forEach((step, index) => {
      const item = createStepItem(step, index)
      list.appendChild(item)
    })

    updateUI()
  },

  initPaginationComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const prevTrigger = el.querySelector('[data-slot="PrevTrigger"]')
    const nextTrigger = el.querySelector('[data-slot="NextTrigger"]')
    const itemGroup = el.querySelector('[data-slot="ItemGroup"]')

    if (!itemGroup) return

    // Configuration
    const totalPages = Number(config.count ?? config.totalPages ?? 10)
    const defaultPage = Number(config.page ?? config.defaultPage ?? 1)
    const siblingCount = Number(config.siblingCount ?? 1)

    // State
    el._paginationState = {
      currentPage: defaultPage,
      totalPages: totalPages
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Root styles
    setDefault(el, 'display', 'flex')
    setDefault(el, 'alignItems', 'center')
    setDefault(el, 'gap', '4px')

    // ItemGroup styles
    setDefault(itemGroup, 'display', 'flex')
    setDefault(itemGroup, 'alignItems', 'center')
    setDefault(itemGroup, 'gap', '4px')

    // PrevTrigger styles
    if (prevTrigger) {
      setDefault(prevTrigger, 'display', 'flex')
      setDefault(prevTrigger, 'alignItems', 'center')
      setDefault(prevTrigger, 'justifyContent', 'center')
      setDefault(prevTrigger, 'width', '32px')
      setDefault(prevTrigger, 'height', '32px')
      setDefault(prevTrigger, 'borderRadius', '6px')
      setDefault(prevTrigger, 'backgroundColor', 'transparent')
      setDefault(prevTrigger, 'border', '1px solid #333')
      setDefault(prevTrigger, 'cursor', 'pointer')
      setDefault(prevTrigger, 'color', '#e0e0e0')
      prevTrigger.innerHTML = _runtime._icons.chevronLeft(16)
    }

    // NextTrigger styles
    if (nextTrigger) {
      setDefault(nextTrigger, 'display', 'flex')
      setDefault(nextTrigger, 'alignItems', 'center')
      setDefault(nextTrigger, 'justifyContent', 'center')
      setDefault(nextTrigger, 'width', '32px')
      setDefault(nextTrigger, 'height', '32px')
      setDefault(nextTrigger, 'borderRadius', '6px')
      setDefault(nextTrigger, 'backgroundColor', 'transparent')
      setDefault(nextTrigger, 'border', '1px solid #333')
      setDefault(nextTrigger, 'cursor', 'pointer')
      setDefault(nextTrigger, 'color', '#e0e0e0')
      nextTrigger.innerHTML = _runtime._icons.chevronRight(16)
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const getPageRange = () => {
      const { currentPage, totalPages } = el._paginationState
      const pages = []

      // Always show first page
      pages.push(1)

      // Calculate range around current page
      const leftSibling = Math.max(2, currentPage - siblingCount)
      const rightSibling = Math.min(totalPages - 1, currentPage + siblingCount)

      // Add ellipsis after first if needed
      if (leftSibling > 2) {
        pages.push('...')
      }

      // Add pages in range
      for (let i = leftSibling; i <= rightSibling; i++) {
        if (i !== 1 && i !== totalPages) {
          pages.push(i)
        }
      }

      // Add ellipsis before last if needed
      if (rightSibling < totalPages - 1) {
        pages.push('...')
      }

      // Always show last page (if more than 1 page)
      if (totalPages > 1) {
        pages.push(totalPages)
      }

      return pages
    }

    const createPageItem = (page) => {
      const item = document.createElement('button')
      item.type = 'button'
      item.dataset.slot = 'Item'

      if (page === '...') {
        item.dataset.slot = 'Ellipsis'
        item.textContent = '...'
        item.style.cssText = 'display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: transparent; border: none; color: #666; cursor: default; font-size: 14px;'
        item.disabled = true
      } else {
        item.dataset.page = String(page)
        item.textContent = String(page)
        item.style.cssText = 'display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 6px; background: transparent; border: 1px solid #333; cursor: pointer; color: #e0e0e0; font-size: 14px; transition: background-color 0.2s, border-color 0.2s;'

        item.onmouseenter = () => {
          if (!item.classList.contains('active')) {
            item.style.borderColor = '#555'
          }
        }
        item.onmouseleave = () => {
          if (!item.classList.contains('active')) {
            item.style.borderColor = '#333'
          }
        }

        item.onclick = () => goTo(page)
      }

      return item
    }

    const updateUI = () => {
      const { currentPage, totalPages } = el._paginationState

      // Clear items
      itemGroup.innerHTML = ''

      // Create page items
      const pages = getPageRange()
      pages.forEach(page => {
        const item = createPageItem(page)

        if (page === currentPage) {
          item.classList.add('active')
          item.style.backgroundColor = '#5BA8F5'
          item.style.borderColor = '#5BA8F5'
          item.style.color = '#fff'
        }

        itemGroup.appendChild(item)
      })

      // Update trigger states
      if (prevTrigger) {
        prevTrigger.disabled = currentPage === 1
        prevTrigger.style.opacity = currentPage === 1 ? '0.5' : '1'
        prevTrigger.style.cursor = currentPage === 1 ? 'not-allowed' : 'pointer'
      }
      if (nextTrigger) {
        nextTrigger.disabled = currentPage === totalPages
        nextTrigger.style.opacity = currentPage === totalPages ? '0.5' : '1'
        nextTrigger.style.cursor = currentPage === totalPages ? 'not-allowed' : 'pointer'
      }

      // Set data attributes
      el.setAttribute('data-page', String(currentPage))
      el.setAttribute('data-total', String(totalPages))

      // Emit change event
      el.dispatchEvent(new CustomEvent('page-change', { detail: { page: currentPage, total: totalPages } }))
    }

    const goTo = (page) => {
      const { totalPages } = el._paginationState
      const newPage = Math.max(1, Math.min(totalPages, Number(page)))
      el._paginationState.currentPage = newPage
      updateUI()
    }

    const next = () => {
      goTo(el._paginationState.currentPage + 1)
    }

    const prev = () => {
      goTo(el._paginationState.currentPage - 1)
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    if (prevTrigger) {
      prevTrigger.onclick = prev
    }

    if (nextTrigger) {
      nextTrigger.onclick = next
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.next = next
    el.prev = prev
    el.goTo = goTo
    el.getCurrentPage = () => el._paginationState.currentPage
    el.getTotalPages = () => el._paginationState.totalPages

    el.setTotalPages = (total) => {
      el._paginationState.totalPages = total
      if (el._paginationState.currentPage > total) {
        el._paginationState.currentPage = total
      }
      updateUI()
    }

    // ========================================
    // INITIAL STATE
    // ========================================

    el.setAttribute('role', 'navigation')
    el.setAttribute('aria-label', 'Pagination')
    updateUI()
  },

  initTreeViewComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}
    const slotStyles = el._slotStyles || {}

    // Get elements
    const tree = el.querySelector('[data-slot="Tree"]')

    if (!tree) return

    // Configuration
    const items = config.items || []
    const selectionMode = config.selectionMode || 'single'
    const expandedKeys = new Set(config.expandedKeys || [])
    const selectedKeys = new Set(config.selectedKeys || [])

    // State
    el._treeViewState = {
      expandedKeys: expandedKeys,
      selectedKeys: selectedKeys
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Apply slot styles
    const applySlotStyles = (element, slotName) => {
      const styles = slotStyles[slotName]
      if (styles) {
        Object.assign(element.style, styles)
      }
    }

    // Root styles
    setDefault(el, 'display', 'block')

    // Tree styles
    setDefault(tree, 'listStyle', 'none')
    setDefault(tree, 'margin', '0')
    setDefault(tree, 'padding', '0')

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const createTreeItem = (item, depth = 0) => {
      const hasChildren = item.children && item.children.length > 0
      const id = item.id || item.value || String(Math.random())
      const label = item.label || item.name || item.text || id

      const li = document.createElement('li')
      li.dataset.slot = hasChildren ? 'Branch' : 'Item'
      li.dataset.itemId = id
      li.setAttribute('role', 'treeitem')
      li.setAttribute('aria-selected', selectedKeys.has(id) ? 'true' : 'false')

      // Apply styles
      applySlotStyles(li, hasChildren ? 'Branch' : 'Item')
      setDefault(li, 'listStyle', 'none')
      setDefault(li, 'margin', '0')
      setDefault(li, 'padding', '0')

      if (hasChildren) {
        // Branch with children
        li.setAttribute('aria-expanded', expandedKeys.has(id) ? 'true' : 'false')

        // BranchTrigger (clickable row)
        const trigger = document.createElement('div')
        trigger.dataset.slot = 'BranchTrigger'
        trigger.dataset.itemId = id
        applySlotStyles(trigger, 'BranchTrigger')
        setDefault(trigger, 'display', 'flex')
        setDefault(trigger, 'alignItems', 'center')
        setDefault(trigger, 'gap', '4px')
        setDefault(trigger, 'padding', '6px 8px')
        setDefault(trigger, 'paddingLeft', (depth * 16 + 8) + 'px')
        setDefault(trigger, 'cursor', 'pointer')
        setDefault(trigger, 'userSelect', 'none')
        setDefault(trigger, 'borderRadius', '4px')
        setDefault(trigger, 'color', '#e0e0e0')

        // Hover effect
        trigger.onmouseenter = () => {
          if (!trigger.classList.contains('selected')) {
            trigger.style.backgroundColor = '#1a1a1a'
          }
        }
        trigger.onmouseleave = () => {
          if (!trigger.classList.contains('selected')) {
            trigger.style.backgroundColor = ''
          }
        }

        // BranchIndicator (expand/collapse icon)
        const indicator = document.createElement('span')
        indicator.dataset.slot = 'BranchIndicator'
        applySlotStyles(indicator, 'BranchIndicator')
        setDefault(indicator, 'display', 'flex')
        setDefault(indicator, 'alignItems', 'center')
        setDefault(indicator, 'justifyContent', 'center')
        setDefault(indicator, 'width', '16px')
        setDefault(indicator, 'height', '16px')
        setDefault(indicator, 'color', '#888')
        setDefault(indicator, 'transition', 'transform 0.15s ease')
        indicator.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>'

        if (expandedKeys.has(id)) {
          indicator.style.transform = 'rotate(90deg)'
        }

        // ItemText
        const text = document.createElement('span')
        text.dataset.slot = 'ItemText'
        text.textContent = label
        applySlotStyles(text, 'ItemText')
        setDefault(text, 'flex', '1')
        setDefault(text, 'fontSize', '14px')

        trigger.appendChild(indicator)
        trigger.appendChild(text)
        li.appendChild(trigger)

        // BranchContent (children container)
        const content = document.createElement('ul')
        content.dataset.slot = 'BranchContent'
        content.dataset.itemId = id
        content.setAttribute('role', 'group')
        applySlotStyles(content, 'BranchContent')
        setDefault(content, 'listStyle', 'none')
        setDefault(content, 'margin', '0')
        setDefault(content, 'padding', '0')
        setDefault(content, 'overflow', 'hidden')

        if (!expandedKeys.has(id)) {
          content.style.display = 'none'
        }

        // Recursively add children
        for (const child of item.children) {
          content.appendChild(createTreeItem(child, depth + 1))
        }

        li.appendChild(content)

        // Click handler for expand/collapse
        trigger.onclick = (e) => {
          e.stopPropagation()
          toggleExpand(id)
          // Also select the item
          selectItem(id, e)
        }

        // Indicator click for expand/collapse only
        indicator.onclick = (e) => {
          e.stopPropagation()
          toggleExpand(id)
        }
      } else {
        // Leaf item (no children)
        const itemContent = document.createElement('div')
        itemContent.dataset.slot = 'ItemContent'
        setDefault(itemContent, 'display', 'flex')
        setDefault(itemContent, 'alignItems', 'center')
        setDefault(itemContent, 'gap', '4px')
        setDefault(itemContent, 'padding', '6px 8px')
        setDefault(itemContent, 'paddingLeft', (depth * 16 + 28) + 'px')
        setDefault(itemContent, 'cursor', 'pointer')
        setDefault(itemContent, 'userSelect', 'none')
        setDefault(itemContent, 'borderRadius', '4px')
        setDefault(itemContent, 'color', '#e0e0e0')

        // Hover effect
        itemContent.onmouseenter = () => {
          if (!itemContent.classList.contains('selected')) {
            itemContent.style.backgroundColor = '#1a1a1a'
          }
        }
        itemContent.onmouseleave = () => {
          if (!itemContent.classList.contains('selected')) {
            itemContent.style.backgroundColor = ''
          }
        }

        // ItemText
        const text = document.createElement('span')
        text.dataset.slot = 'ItemText'
        text.textContent = label
        applySlotStyles(text, 'ItemText')
        setDefault(text, 'flex', '1')
        setDefault(text, 'fontSize', '14px')

        itemContent.appendChild(text)
        li.appendChild(itemContent)

        // Click handler for selection
        itemContent.onclick = (e) => {
          e.stopPropagation()
          selectItem(id, e)
        }
      }

      // Apply selected state
      if (selectedKeys.has(id)) {
        const trigger = li.querySelector('[data-slot="BranchTrigger"], [data-slot="ItemContent"]')
        if (trigger) {
          trigger.classList.add('selected')
          trigger.style.backgroundColor = '#5BA8F5'
          trigger.style.color = '#fff'
        }
      }

      return li
    }

    const toggleExpand = (id) => {
      const { expandedKeys } = el._treeViewState
      const branch = tree.querySelector(`[data-item-id="${id}"][data-slot="Branch"]`)
      const content = branch?.querySelector(`[data-slot="BranchContent"][data-item-id="${id}"]`)
      const indicator = branch?.querySelector('[data-slot="BranchIndicator"]')

      if (expandedKeys.has(id)) {
        expandedKeys.delete(id)
        if (content) content.style.display = 'none'
        if (indicator) indicator.style.transform = ''
        if (branch) branch.setAttribute('aria-expanded', 'false')
        el.dispatchEvent(new CustomEvent('collapse', { detail: { id } }))
      } else {
        expandedKeys.add(id)
        if (content) content.style.display = ''
        if (indicator) indicator.style.transform = 'rotate(90deg)'
        if (branch) branch.setAttribute('aria-expanded', 'true')
        el.dispatchEvent(new CustomEvent('expand', { detail: { id } }))
      }
    }

    const selectItem = (id, event) => {
      const { selectedKeys } = el._treeViewState
      const isMultiple = selectionMode === 'multiple'
      const isCtrl = event?.ctrlKey || event?.metaKey

      // Clear previous selection unless multi-select
      if (!isMultiple && !isCtrl) {
        tree.querySelectorAll('[data-slot="BranchTrigger"].selected, [data-slot="ItemContent"].selected').forEach(el => {
          el.classList.remove('selected')
          el.style.backgroundColor = ''
          el.style.color = '#e0e0e0'
        })
        selectedKeys.clear()
      }

      // Toggle selection
      const itemEl = tree.querySelector(`[data-item-id="${id}"]`)
      const trigger = itemEl?.querySelector('[data-slot="BranchTrigger"], [data-slot="ItemContent"]')

      if (selectedKeys.has(id) && (isMultiple || isCtrl)) {
        selectedKeys.delete(id)
        if (trigger) {
          trigger.classList.remove('selected')
          trigger.style.backgroundColor = ''
          trigger.style.color = '#e0e0e0'
        }
        if (itemEl) itemEl.setAttribute('aria-selected', 'false')
      } else {
        selectedKeys.add(id)
        if (trigger) {
          trigger.classList.add('selected')
          trigger.style.backgroundColor = '#5BA8F5'
          trigger.style.color = '#fff'
        }
        if (itemEl) itemEl.setAttribute('aria-selected', 'true')
      }

      // Emit change event
      el.dispatchEvent(new CustomEvent('change', {
        detail: {
          selectedKeys: Array.from(selectedKeys),
          value: isMultiple ? Array.from(selectedKeys) : Array.from(selectedKeys)[0]
        }
      }))
    }

    const renderTree = () => {
      tree.innerHTML = ''
      for (const item of items) {
        tree.appendChild(createTreeItem(item))
      }
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.getSelectedKeys = () => Array.from(el._treeViewState.selectedKeys)
    el.getExpandedKeys = () => Array.from(el._treeViewState.expandedKeys)

    el.select = (id) => selectItem(id)
    el.toggle = (id) => toggleExpand(id)

    el.expandAll = () => {
      const getAllIds = (items) => {
        let ids = []
        for (const item of items) {
          if (item.children && item.children.length > 0) {
            ids.push(item.id || item.value)
            ids = ids.concat(getAllIds(item.children))
          }
        }
        return ids
      }
      const allIds = getAllIds(items)
      for (const id of allIds) {
        if (!el._treeViewState.expandedKeys.has(id)) {
          toggleExpand(id)
        }
      }
    }

    el.collapseAll = () => {
      const ids = Array.from(el._treeViewState.expandedKeys)
      for (const id of ids) {
        toggleExpand(id)
      }
    }

    el.setItems = (newItems) => {
      config.items = newItems
      el._treeViewState.expandedKeys.clear()
      el._treeViewState.selectedKeys.clear()
      renderTree()
    }

    // ========================================
    // INITIAL STATE
    // ========================================

    el.setAttribute('role', 'tree')
    renderTree()
  },

  /**
   * Initialize SideNav component
   * Handles selection, keyboard navigation, collapsible groups, and shows-linking
   */
  initSideNavComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}
    const items = el._zagConfig.items || []
    const slotStyles = el._slotStyles || {}
    const collapsed = config.collapsed || false
    const defaultValue = config.defaultValue || config.value

    // Get elements
    const itemList = el.querySelector('[data-slot="ItemList"]')
    const navItems = el.querySelectorAll('[data-slot="Item"]')
    const groups = el.querySelectorAll('[data-slot="Group"]')

    if (!itemList) return

    // State
    el._sideNavState = {
      value: defaultValue,
      focusedIndex: 0,
    }

    // ========================================
    // DEFAULT STYLES (CSS Variables)
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    const applySlotStyles = (element, slotName) => {
      const styles = slotStyles[slotName]
      if (styles) {
        element.setAttribute('data-styled', 'true')
        Object.assign(element.style, styles)
      }
    }

    // Root defaults
    if (!el.hasAttribute('data-styled')) {
      setDefault(el, 'display', 'flex')
      setDefault(el, 'flexDirection', 'column')
      setDefault(el, 'height', '100%')
      setDefault(el, 'width', collapsed ? 'var(--m-sidenav-collapsed-width, 64px)' : 'var(--m-sidenav-width, 240px)')
      setDefault(el, 'backgroundColor', 'var(--m-sidenav-bg, #0a0a0a)')
      setDefault(el, 'borderRight', 'var(--m-sidenav-border, 1px solid #1a1a1a)')
    }

    // ItemList defaults
    if (!itemList.hasAttribute('data-styled')) {
      setDefault(itemList, 'display', 'flex')
      setDefault(itemList, 'flexDirection', 'column')
      setDefault(itemList, 'flex', '1')
      setDefault(itemList, 'overflow', 'auto')
      setDefault(itemList, 'padding', 'var(--m-sidenav-padding, 8px)')
    }

    // ========================================
    // RENDER ICONS (Lucide)
    // ========================================

    navItems.forEach(item => {
      const iconSlot = item.querySelector('[data-slot="ItemIcon"]')
      if (iconSlot && iconSlot.dataset.icon) {
        const iconName = iconSlot.dataset.icon
        this.loadIcon(iconSlot, iconName)
        applySlotStyles(iconSlot, 'ItemIcon')
        if (!iconSlot.hasAttribute('data-styled')) {
          setDefault(iconSlot, 'display', 'flex')
          setDefault(iconSlot, 'alignItems', 'center')
          setDefault(iconSlot, 'justifyContent', 'center')
          setDefault(iconSlot, 'width', 'var(--m-sidenav-icon-size, 20px)')
          setDefault(iconSlot, 'height', 'var(--m-sidenav-icon-size, 20px)')
          setDefault(iconSlot, 'color', 'var(--m-sidenav-icon-color, #666)')
          setDefault(iconSlot, 'flexShrink', '0')
        }
      }
    })

    // Style NavItems
    navItems.forEach(item => {
      applySlotStyles(item, 'Item')
      if (!item.hasAttribute('data-styled')) {
        setDefault(item, 'display', 'flex')
        setDefault(item, 'alignItems', 'center')
        setDefault(item, 'gap', 'var(--m-sidenav-item-gap, 12px)')
        setDefault(item, 'padding', 'var(--m-sidenav-item-padding, 10px 16px)')
        setDefault(item, 'color', 'var(--m-sidenav-item-color, #888)')
        setDefault(item, 'cursor', 'pointer')
        setDefault(item, 'textDecoration', 'none')
        setDefault(item, 'borderRadius', 'var(--m-sidenav-item-radius, 6px)')
        setDefault(item, 'margin', 'var(--m-sidenav-item-margin, 2px 0)')
        setDefault(item, 'transition', 'background-color 0.15s, color 0.15s')
      }

      // Label styles
      const label = item.querySelector('[data-slot="ItemLabel"]')
      if (label) {
        applySlotStyles(label, 'ItemLabel')
        if (!label.hasAttribute('data-styled')) {
          setDefault(label, 'flex', '1')
          setDefault(label, 'fontSize', 'var(--m-sidenav-label-size, 14px)')
          setDefault(label, 'whiteSpace', 'nowrap')
          setDefault(label, 'overflow', 'hidden')
          setDefault(label, 'textOverflow', 'ellipsis')
        }
      }

      // Badge styles
      const badge = item.querySelector('[data-slot="ItemBadge"]')
      if (badge) {
        applySlotStyles(badge, 'ItemBadge')
        if (!badge.hasAttribute('data-styled')) {
          setDefault(badge, 'padding', 'var(--m-sidenav-badge-padding, 2px 8px)')
          setDefault(badge, 'backgroundColor', 'var(--m-sidenav-badge-bg, #ef4444)')
          setDefault(badge, 'color', 'var(--m-sidenav-badge-color, white)')
          setDefault(badge, 'borderRadius', 'var(--m-sidenav-badge-radius, 99px)')
          setDefault(badge, 'fontSize', 'var(--m-sidenav-badge-size, 11px)')
          setDefault(badge, 'fontWeight', '500')
        }
      }

      // Arrow styles
      const arrow = item.querySelector('[data-slot="ItemArrow"]')
      if (arrow) {
        applySlotStyles(arrow, 'ItemArrow')
        if (!arrow.hasAttribute('data-styled')) {
          setDefault(arrow, 'color', 'var(--m-sidenav-arrow-color, #444)')
          setDefault(arrow, 'marginLeft', 'auto')
        }
        arrow.innerHTML = _runtime._icons.chevronRight(16)
      }

      // Hover effect
      item.onmouseenter = () => {
        if (!item.hasAttribute('aria-current')) {
          item.style.backgroundColor = 'var(--m-sidenav-item-hover-bg, #151515)'
        }
      }
      item.onmouseleave = () => {
        if (!item.hasAttribute('aria-current')) {
          item.style.backgroundColor = ''
        }
      }
    })

    // Style Groups
    groups.forEach(group => {
      applySlotStyles(group, 'Group')
      if (!group.hasAttribute('data-styled')) {
        setDefault(group, 'marginTop', 'var(--m-sidenav-group-margin, 16px)')
      }

      const groupLabel = group.querySelector('[data-slot="GroupLabel"]')
      if (groupLabel) {
        applySlotStyles(groupLabel, 'GroupLabel')
        if (!groupLabel.hasAttribute('data-styled')) {
          setDefault(groupLabel, 'display', 'flex')
          setDefault(groupLabel, 'alignItems', 'center')
          setDefault(groupLabel, 'justifyContent', 'space-between')
          setDefault(groupLabel, 'padding', 'var(--m-sidenav-group-label-padding, 8px 16px)')
          setDefault(groupLabel, 'color', 'var(--m-sidenav-group-label-color, #444)')
          setDefault(groupLabel, 'fontSize', 'var(--m-sidenav-group-label-size, 11px)')
          setDefault(groupLabel, 'fontWeight', '500')
          setDefault(groupLabel, 'textTransform', 'uppercase')
          setDefault(groupLabel, 'letterSpacing', '0.05em')
        }

        // Group Arrow for collapsible
        const groupArrow = groupLabel.querySelector('[data-slot="GroupArrow"]')
        if (groupArrow) {
          applySlotStyles(groupArrow, 'GroupArrow')
          if (!groupArrow.hasAttribute('data-styled')) {
            setDefault(groupArrow, 'transition', 'transform 0.2s')
          }
          groupArrow.innerHTML = _runtime._icons.chevronDown(14)

          // Set initial rotation based on state
          // Open: rotate(180deg) = UP, Closed: no rotation = DOWN
          if (group.getAttribute('data-state') === 'open') {
            groupArrow.style.transform = 'rotate(180deg)'
          }
        }
      }

      const groupContent = group.querySelector('[data-slot="GroupContent"]')
      if (groupContent) {
        applySlotStyles(groupContent, 'GroupContent')
        setDefault(groupContent, 'overflow', 'hidden')
        setDefault(groupContent, 'transition', 'max-height 0.2s ease')

        // Hide content if group is collapsed
        if (group.getAttribute('data-state') === 'closed') {
          groupContent.style.display = 'none'
        }
      }

      // Setup collapsible group toggle
      if (group.hasAttribute('data-collapsible')) {
        const label = group.querySelector('[data-slot="GroupLabel"]')
        const content = group.querySelector('[data-slot="GroupContent"]')
        const arrow = group.querySelector('[data-slot="GroupArrow"]')

        if (label && content) {
          const toggleGroup = () => {
            const isOpen = group.getAttribute('data-state') === 'open'
            if (isOpen) {
              group.setAttribute('data-state', 'closed')
              content.style.display = 'none'
              if (arrow) arrow.style.transform = ''  // DOWN when closed
            } else {
              group.setAttribute('data-state', 'open')
              content.style.display = ''
              if (arrow) arrow.style.transform = 'rotate(180deg)'  // UP when open
            }
          }

          label.onclick = toggleGroup
          label.onkeydown = (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault()
              toggleGroup()
            }
          }
        }
      }
    })

    // ========================================
    // LAZY LOADING FROM FILE
    // ========================================

    // Cache for loaded pages to avoid reloading
    const loadedPages = new Map()

    const loadContentFromFile = (filename, elementName = null) => {
      // Find the page container (sibling of SideNav)
      const container = el.parentElement?.querySelector('[data-page-container]')
        || el.nextElementSibling
        || el.parentElement?.querySelector(':not([data-zag-component="sidenav"])')

      if (!container) {
        console.warn('No container found for SideNav page content')
        return
      }

      // Cache key includes element name for "show X from Y" syntax
      const cacheKey = elementName ? filename + '::' + elementName : filename

      // Check if already loaded
      if (loadedPages.has(cacheKey)) {
        // Just show the cached content
        const cachedContent = loadedPages.get(cacheKey)
        // Hide all children
        Array.from(container.children).forEach(child => {
          child.style.display = 'none'
        })
        // Show cached
        cachedContent.style.display = ''
        return
      }

      const fullFilename = filename.endsWith('.mirror') ? filename : filename + '.mirror'

      // Try to get readFile callback
      const readFile = window._mirrorReadFile
      if (!readFile) {
        console.warn('No readFile callback available for lazy loading')
        return
      }

      const content = readFile(fullFilename)
      if (!content) {
        console.warn('Page not found: ' + fullFilename)
        return
      }

      // Get Mirror compiler
      const Mirror = window.Mirror
      if (!Mirror?.compile) {
        console.warn('Mirror compiler not available for lazy loading')
        return
      }

      try {
        const pageCode = Mirror.compile(content, { readFile })
        const execCode = pageCode.replace('export function createUI', 'function createUI')
        const fn = new Function(execCode + '\nreturn createUI();')
        const ui = fn()

        if (ui?.root) {
          // Hide all existing children
          Array.from(container.children).forEach(child => {
            child.style.display = 'none'
          })

          // Create wrapper for this page's content
          const pageWrapper = document.createElement('div')
          pageWrapper.dataset.loadedPage = cacheKey

          if (elementName) {
            // Find specific named element in loaded content: show X from Y
            const targetEl = ui.root.querySelector('[name="' + elementName + '"]')
            if (targetEl) {
              pageWrapper.appendChild(targetEl)
            } else {
              console.warn('Element "' + elementName + '" not found in ' + fullFilename)
              // Fallback: show entire file content
              while (ui.root.firstChild) {
                pageWrapper.appendChild(ui.root.firstChild)
              }
            }
          } else {
            // Move children from generated root to wrapper
            while (ui.root.firstChild) {
              pageWrapper.appendChild(ui.root.firstChild)
            }
          }

          // Add to container
          container.appendChild(pageWrapper)

          // Cache the wrapper
          loadedPages.set(cacheKey, pageWrapper)
        }
      } catch (err) {
        console.error('Failed to load page ' + fullFilename + ':', err)
      }
    }

    // ========================================
    // SELECTION LOGIC
    // ========================================

    const selectItem = (value) => {
      el._sideNavState.value = value

      // Update all items
      navItems.forEach(item => {
        const itemValue = item.dataset.value
        if (itemValue === value) {
          item.setAttribute('aria-current', 'page')
          item.style.backgroundColor = 'var(--m-sidenav-item-selected-bg, #1a1a1a)'
          item.style.color = 'var(--m-sidenav-item-selected-color, #fff)'

          // Update icon color
          const icon = item.querySelector('[data-slot="ItemIcon"]')
          if (icon) {
            icon.style.color = 'var(--m-sidenav-icon-selected-color, #fff)'
          }
        } else {
          item.removeAttribute('aria-current')
          item.style.backgroundColor = ''
          item.style.color = ''

          const icon = item.querySelector('[data-slot="ItemIcon"]')
          if (icon) {
            icon.style.color = ''
          }
        }
      })

      // Handle shows attribute or loadFromFile
      const selectedItem = el.querySelector(`[data-slot="Item"][data-value="${value}"]`)
      if (selectedItem && selectedItem.dataset.shows) {
        const showsTarget = selectedItem.dataset.shows
        const showsFrom = selectedItem.dataset.showsFrom
        // Use getRootNode() to support Shadow DOM (tutorial playgrounds) and main document
        const root = el.getRootNode()

        if (showsFrom) {
          // Load element from external file: show X from Y
          loadContentFromFile(showsFrom, showsTarget)
        } else {
          // Try to find local element first
          const localEl = root.querySelector ? root.querySelector(`[data-mirror-name="${showsTarget}"]`) : document.querySelector(`[data-mirror-name="${showsTarget}"]`)
          if (localEl) {
            // Collect all view names from NavItems with data-shows
            const allViewNames = new Set()
            navItems.forEach(item => {
              if (item.dataset.shows) {
                allViewNames.add(item.dataset.shows)
              }
            })

            // Hide all views that are linked to NavItems, show only the target
            allViewNames.forEach(viewName => {
              const viewEls = root.querySelectorAll(`[data-mirror-name="${viewName}"]`)
              viewEls.forEach(viewEl => {
                viewEl.style.display = viewName === showsTarget ? '' : 'none'
              })
            })
          } else {
            // No local element found, treat as file name: show X → X.mirror
            loadContentFromFile(showsTarget)
          }
        }
      } else if (selectedItem && selectedItem.dataset.loadFromFile) {
        loadContentFromFile(selectedItem.dataset.loadFromFile)
      }

      // Dispatch change event
      el.dispatchEvent(new CustomEvent('change', {
        detail: { value },
        bubbles: true
      }))
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    navItems.forEach((item, index) => {
      if (item.hasAttribute('data-disabled')) return

      item.onclick = (e) => {
        e.preventDefault()
        selectItem(item.dataset.value)
      }

      item.onfocus = () => {
        el._sideNavState.focusedIndex = index
      }
    })

    // ========================================
    // KEYBOARD NAVIGATION
    // ========================================

    const getFocusableItems = () => {
      return Array.from(navItems).filter(item => !item.hasAttribute('data-disabled'))
    }

    const focusItem = (index) => {
      const focusableItems = getFocusableItems()
      if (index < 0) index = focusableItems.length - 1
      if (index >= focusableItems.length) index = 0
      el._sideNavState.focusedIndex = index
      focusableItems[index]?.focus()
    }

    el.onkeydown = (e) => {
      const focusableItems = getFocusableItems()
      const { focusedIndex } = el._sideNavState

      switch (e.key) {
        case 'ArrowDown':
          e.preventDefault()
          focusItem(focusedIndex + 1)
          break
        case 'ArrowUp':
          e.preventDefault()
          focusItem(focusedIndex - 1)
          break
        case 'Home':
          e.preventDefault()
          focusItem(0)
          break
        case 'End':
          e.preventDefault()
          focusItem(focusableItems.length - 1)
          break
        case 'Enter':
        case ' ':
          e.preventDefault()

        } else if (e.key === 'ArrowLeft') {

            ? (currentIndex - 1 + enabledItems.length) % enabledItems.length
            : Math.max(currentIndex - 1, 0)

          nextIndex = loopFocus
            ? (currentIndex + 1) % enabledItems.length
            : Math.min(currentIndex + 1, enabledItems.length - 1)
        } else if (e.key === 'ArrowUp') {
          nextIndex = loopFocus

            : Math.max(currentIndex - 1, 0)
        }
      }

      if (nextIndex !== currentIndex && enabledItems[nextIndex]) {
        enabledItems[nextIndex].focus()
        e.preventDefault()
      }

      if (e.key === 'Enter' || e.key === ' ') {
        if (document.activeElement.dataset.slot === 'Item') {
          const value = document.activeElement.dataset.value
          toggleItem(value)
          e.preventDefault()

    // PUBLIC API
    // ========================================

    el.getValue = () => multiple ? Array.from(el._toggleState.value) : el._toggleState.value

        el._toggleState.value = new Set(Array.isArray(value) ? value : [value])

  initTooltipComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}
    const openDelay = config.openDelay ?? 200
    const closeDelay = config.closeDelay ?? 100
    const placement = config.placement ?? 'top'
    const disabled = config.disabled ?? false

    // Get elements
    const trigger = el.querySelector('[data-slot="Trigger"]')
    const content = el.querySelector('[data-slot="Content"]')

    if (!trigger || !content) return

    // State
    el._tooltipState = {
      open: false,
      openTimer: null,
      closeTimer: null
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Root must be position: relative for absolute positioning of content
    el.style.position = 'relative'

    // Content (tooltip) styles
    setDefault(content, 'position', 'absolute')
    setDefault(content, 'zIndex', '1000')
    setDefault(content, 'padding', '8px 12px')
    setDefault(content, 'backgroundColor', '#333')
    setDefault(content, 'color', '#fff')
    setDefault(content, 'borderRadius', '6px')
    setDefault(content, 'fontSize', '12px')
    setDefault(content, 'whiteSpace', 'nowrap')
    setDefault(content, 'pointerEvents', 'none')
    setDefault(content, 'transition', 'opacity 0.2s')
    content.style.opacity = '0'
    content.style.visibility = 'hidden'

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const show = () => {
      if (disabled) return
      clearTimeout(el._tooltipState.closeTimer)

      el._tooltipState.openTimer = setTimeout(() => {
        el._tooltipState.open = true
        content.style.opacity = '1'
        content.style.visibility = 'visible'
        positionTooltip()
        el.dispatchEvent(new CustomEvent('open', { bubbles: true }))
      }, openDelay)
    }

    const hide = () => {
      clearTimeout(el._tooltipState.openTimer)

      el._tooltipState.closeTimer = setTimeout(() => {
        el._tooltipState.open = false
        content.style.opacity = '0'
        content.style.visibility = 'hidden'
        el.dispatchEvent(new CustomEvent('close', { bubbles: true }))
      }, closeDelay)
    }

      const triggerRect = trigger.getBoundingClientRect()
      const elRect = el.getBoundingClientRect()
      const gap = 8

      // Calculate trigger position relative to the root element
      const triggerTop = triggerRect.top - elRect.top
      const triggerLeft = triggerRect.left - elRect.left

      content.style.display = 'block'
      const contentWidth = content.offsetWidth
      const contentHeight = content.offsetHeight

      switch (placement) {

          top = triggerTop + triggerRect.height + gap
          left = triggerLeft + (triggerRect.width - contentWidth) / 2
          break
        case 'left':
          top = triggerTop + (triggerRect.height - contentHeight) / 2
          left = triggerLeft - contentWidth - gap
          break
        case 'right':
          top = triggerTop + (triggerRect.height - contentHeight) / 2
          left = triggerLeft + triggerRect.width + gap
          break
        default: // top
          top = triggerTop - contentHeight - gap
          left = triggerLeft + (triggerRect.width - contentWidth) / 2
      }

      content.style.top = top + 'px'
      content.style.left = left + 'px'
    }

    // EVENT HANDLERS
    // ========================================

    trigger.onmouseenter = show
    trigger.onmouseleave = hide
    trigger.onfocus = show
    trigger.onblur = hide

    // ========================================
    // PUBLIC API
    // ========================================

    el.isOpen = () => el._tooltipState.open
    el.show = show
    el.hide = hide
  },

          content.style.right = (elRect.width - triggerLeft + gap) + 'px'
          break
        case 'right':

          content.style.left = (triggerLeft + triggerRect.width + gap) + 'px'
          break
        default: // bottom

    el.toggle = toggle

  // Icon cache and loading

  async loadIcon(el, iconName) {
    if (!el || !iconName) return
    const size = el.dataset.iconSize || '16'
    const color = el.dataset.iconColor || 'currentColor'
    const strokeWidth = el.dataset.iconWeight || '2'
    const isFilled = el.dataset.iconFill === 'true'

    // Check cache first
    let svgText = this._iconCache.get(iconName)

    if (!svgText) {
      // Check pending request
      let pending = this._pendingIcons.get(iconName)
      if (!pending) {
        pending = this._fetchIcon(iconName)
        this._pendingIcons.set(iconName, pending)
      }
      svgText = await pending
      this._pendingIcons.delete(iconName)
      if (!svgText) {
        console.warn(`Icon "${iconName}" not found, using fallback`)
        svgText = this._fallbackIcon
      }
    }

    el.innerHTML = svgText
    const svg = el.querySelector('svg')
    if (svg) {
      svg.style.width = size + 'px'
      svg.style.height = size + 'px'
      svg.style.color = color
      svg.style.display = 'block'
      if (isFilled) {
        svg.setAttribute('fill', 'currentColor')
        svg.setAttribute('stroke', 'none')
      } else {
        svg.setAttribute('stroke-width', strokeWidth)
      }
    }

  async _fetchIcon(iconName) {
    try {
      const url = `https://unpkg.com/lucide-static/icons/${iconName}.svg`
      const res = await fetch(url)
      if (!res.ok) return null
      const svgText = await res.text()
      this._iconCache.set(iconName, svgText)
      return svgText
    } catch (err) {
      console.warn(`Failed to load icon "${iconName}":`, err)
      return null
    }

  preloadIcons(names) {
    names.forEach(name => {
      if (!this._iconCache.has(name)) {
        this._fetchIcon(name)

    })

  _chartJsLoaded: false,

  async _loadChartJs() {

    if (this._chartJsLoading) return this._chartJsLoading

    this._chartJsLoading = new Promise((resolve, reject) => {
      const script = document.createElement('script')
      script.src = 'https://cdn.jsdelivr.net/npm/chart.js'

  _parseChartData(data, xField, yField) {
    if (!data) return { labels: [], values: [] }

    // Handle array of objects with x/y fields
    if (Array.isArray(data)) {
      if (xField && yField) {
        return {
          labels: data.map(item => item[xField]),
          values: data.map(item => item[yField])
        }
      }
      return { labels: data.map((_, i) => String(i)), values: data }
    }

    // Handle key-value object (most common case)
    if (typeof data === 'object') {
      const entries = Object.entries(data)
      // Check if values are objects with x/y fields
      if (entries.length > 0 && typeof entries[0][1] === 'object' && xField && yField) {
        return {
          labels: entries.map(([_, v]) => v[xField]),
          values: entries.map(([_, v]) => v[yField])
        }
      }
      // Simple key-value pairs
      return {
        labels: entries.map(([k]) => k),
        values: entries.map(([_, v]) => v)

    return { labels: [], values: [] }

  animate(animationName, elements, options = {}) {
    const animation = this._animations.get(animationName)
    if (!animation) {
      console.warn(`Animation "${animationName}" not found`)
      return null
    }

    // Normalize elements to array
    let targets = []
    if (!elements) {
      return null
    } else if (Array.isArray(elements)) {
      targets = elements.map(e => e._el || e)
    } else {
      targets = [elements._el || elements]
    }

    const { delay = 0, stagger = 0, loop = false, reverse = false } = options
    const results = []

    // Easing curves
    const easingMap = {
      'linear': 'linear',
      'ease': 'ease',
      'ease-in': 'ease-in',
      'ease-out': 'ease-out',
      'ease-in-out': 'ease-in-out',
    }

    targets.forEach((el, index) => {
      if (!el) return

      const elementDelay = delay + (index * stagger)

      // Build keyframes from animation definition
      const keyframes = []
      const propertyTimelines = new Map()

      // Group properties by name to build proper keyframe sequence
      animation.keyframes.forEach(kf => {
        kf.properties.forEach(prop => {
          if (!propertyTimelines.has(prop.name)) {
            propertyTimelines.set(prop.name, [])
          }
          propertyTimelines.get(prop.name).push({
            time: kf.time,
            value: prop.value,
            easing: prop.easing || animation.easing || 'ease-out'
          })
        })
      })

      // Convert to Web Animations API format
      const duration = animation.duration * 1000
      const allTimes = [...new Set(animation.keyframes.map(kf => kf.time))].sort((a, b) => a - b)

      allTimes.forEach(time => {
        const kf = { offset: time / animation.duration }
        propertyTimelines.forEach((timeline, propName) => {
          const point = timeline.find(p => p.time === time)
          if (point) {

            kf[cssName] = this._animValueMap(propName, point.value)

      })

        keyframes.reverse()
        keyframes.forEach((kf, i) => {
          kf.offset = i / (keyframes.length - 1)
        })
      }

      const timing = {
        duration,
        delay: elementDelay,
        easing: easingMap[animation.easing] || 'ease-out',
        iterations: loop === true ? Infinity : (typeof loop === 'number' ? loop : 1),
        fill: 'forwards'
      }

      try {

      } catch (err) {

    const map = {

      'x-offset': 'translateX',
      'y-offset': 'translateY',

      'scale-x': 'scaleX',
      'scale-y': 'scaleY',
      'rotate': 'rotate',

      'bg': 'backgroundColor',
      'color': 'color',
      'col': 'color',
      'width': 'width',
      'height': 'height',
      'padding': 'padding',
      'pad': 'padding',

      'rad': 'borderRadius',

    if (propName === 'rotate') {

    if (propName === 'width' || propName === 'height' || propName === 'padding' || propName === 'pad' || propName === 'radius' || propName === 'rad') {

    if (!el) return false
    if (el.hidden) return false
    const style = window.getComputedStyle(el)
    return style.display !== 'none' && style.visibility !== 'hidden' && parseFloat(style.opacity) !== 0
  },

  isHidden(el) {
    return !this.isVisible(el)
  },

  isDisplayNone(el) {
    if (!el) return true
    return window.getComputedStyle(el).display === 'none'
  },

  isOpacityZero(el) {
    if (!el) return true
    return parseFloat(window.getComputedStyle(el).opacity) === 0
  },

  hasHiddenAttribute(el) {
    if (!el) return true
    return el.hidden === true
  },

  getVisibilityState(el) {
    if (!el) return { visible: false, display: 'none', opacity: 0, hidden: true, reason: 'hidden' }
    const style = window.getComputedStyle(el)
    const display = style.display
    const opacity = parseFloat(style.opacity)
    const hidden = el.hidden
    const visibility = style.visibility
    let reason = 'visible', visible = true
    if (display === 'none') { visible = false; reason = 'display' }
    else if (opacity === 0) { visible = false; reason = 'opacity' }
    else if (hidden) { visible = false; reason = 'hidden' }
    else if (visibility === 'hidden') { visible = false; reason = 'visibility' }
    return { visible, display, opacity, hidden, reason }
  },

  getComputedStyle(el, prop) {
    if (!el) return ''
    return window.getComputedStyle(el).getPropertyValue(prop)
  },

  waitForHidden(el, timeout = 1000) {
    return new Promise(resolve => {
      if (!el) { resolve(true); return }
      if (!this.isVisible(el)) { resolve(true); return }
      const startTime = Date.now()
      const check = setInterval(() => {
        if (!this.isVisible(el)) { clearInterval(check); resolve(true) }
        else if (Date.now() - startTime > timeout) { clearInterval(check); resolve(false) }
      }, 16)
    })
  },

  // Async Helpers
  waitForState(el, state, timeout = 1000) {
    return new Promise(resolve => {
      if (!el) { resolve(false); return }
      if (this.getState(el) === state) { resolve(true); return }
      const startTime = Date.now()
      const check = setInterval(() => {
        if (this.getState(el) === state) { clearInterval(check); resolve(true) }
        else if (Date.now() - startTime > timeout) { clearInterval(check); resolve(false) }
      }, 16)
    })
  },

  waitForVisible(el, visible, timeout = 1000) {
    return new Promise(resolve => {
      if (!el) { resolve(false); return }
      if (this.isVisible(el) === visible) { resolve(true); return }
      const startTime = Date.now()
      const check = setInterval(() => {
        if (this.isVisible(el) === visible) { clearInterval(check); resolve(true) }
        else if (Date.now() - startTime > timeout) { clearInterval(check); resolve(false) }
      }, 16)
    })
  },

  // Debug
  logStateMachine(el) {
    const info = this.getStateMachineInfo(el)
    if (!info) { console.log('[Mirror Test API] No state machine'); return }
    console.group('[Mirror Test API] State Machine')
    console.log('Current:', info.current)
    console.log('Initial:', info.initial)
    console.log('States:', info.states)
    console.log('Transitions:', info.transitions)
    console.groupEnd()
  },

  getStateMachineInfo(el) {
    if (!el?._stateMachine) return null
    const sm = el._stateMachine
    return {
      current: sm.current,
      initial: sm.initial,
      states: Object.keys(sm.states),
      transitions: sm.transitions.map(t => ({
        trigger: t.trigger, to: t.to, key: t.key, modifier: t.modifier
      }))
    }
  },

  // Navigation
  _navigationHistory: [],
  _historyIndex: -1,

  navigate(target) {
    if (!target) return
    _runtime.navigate(target, null)
  },

  navigateToPage(pageName) {
    if (!pageName) return Promise.resolve()
    // Track history
    if (this._historyIndex < this._navigationHistory.length - 1) {
      this._navigationHistory = this._navigationHistory.slice(0, this._historyIndex + 1)
    }
    this._navigationHistory.push(pageName)
    this._historyIndex = this._navigationHistory.length - 1

    _runtime.navigateToPage(pageName, null)
    return new Promise(resolve => setTimeout(resolve, 50))
  },

  goBack() {
    if (this._historyIndex <= 0) return
    this._historyIndex--
    const previousPage = this._navigationHistory[this._historyIndex]
    if (previousPage) _runtime.navigateToPage(previousPage, null)
  },

  goForward() {
    if (this._historyIndex >= this._navigationHistory.length - 1) return
    this._historyIndex++
    const nextPage = this._navigationHistory[this._historyIndex]
    if (nextPage) _runtime.navigateToPage(nextPage, null)
  },

  getCurrentPage() {
    if (this._historyIndex >= 0 && this._historyIndex < this._navigationHistory.length) {
      return this._navigationHistory[this._historyIndex]
    }
    return null
  },

  getNavigationHistory() {
    return [...this._navigationHistory]
  },

  getNavigationState() {
    return {
      currentPage: this.getCurrentPage(),
      history: this.getNavigationHistory(),
      canGoBack: this._historyIndex > 0,
      canGoForward: this._historyIndex < this._navigationHistory.length - 1,
    }
  },

  getPageContainer() {
    return _runtime.getPageContainer()
  },

  showView(view) {
    if (!view) return
    view.style.display = ''
    view.hidden = false
  },

  hideView(view) {
    if (!view) return
    view.style.display = 'none'
    view.hidden = true
  },

  switchToView(view) {
    if (!view) return
    const parent = view.parentElement
    if (!parent) return
    Array.from(parent.children).forEach(sibling => {
      if (sibling.dataset?.component) {
        if (sibling === view) {
          sibling.style.display = ''
          sibling.hidden = false
        } else {
          sibling.style.display = 'none'
          sibling.hidden = true
        }
      }
    })
  },

  getActiveView(container) {
    const searchContainer = container || document.body
    const views = searchContainer.querySelectorAll('[data-component]')
    for (const view of views) {
      if (this._isViewVisible(view)) return view
    }
    return null
  },

  getAllViews(container) {
    const searchContainer = container || document.body
    return Array.from(searchContainer.querySelectorAll('[data-component]'))
  },

  getViewByName(name) {
    return document.querySelector('[data-component="' + name + '"]')
  },

  _isViewVisible(view) {
    if (!view) return false
    const style = window.getComputedStyle(view)
    return style.display !== 'none' && !view.hidden
  },

  waitForNavigation(pageName, timeout = 1000) {
    return new Promise(resolve => {
      if (this.getCurrentPage() === pageName) { resolve(true); return }
      const startTime = Date.now()
      const check = setInterval(() => {
        if (this.getCurrentPage() === pageName) { clearInterval(check); resolve(true) }
        else if (Date.now() - startTime > timeout) { clearInterval(check); resolve(false) }
      }, 16)
    })
  },

  waitForViewChange(view, timeout = 1000) {
    return new Promise(resolve => {
      if (!view) { resolve(false); return }
      if (this._isViewVisible(view)) { resolve(true); return }
      const startTime = Date.now()
      const check = setInterval(() => {
        if (this._isViewVisible(view)) { clearInterval(check); resolve(true) }
        else if (Date.now() - startTime > timeout) { clearInterval(check); resolve(false) }
      }, 16)
    })
  },

  resetNavigationHistory() {
    this._navigationHistory = []
    this._historyIndex = -1
  },
}

// Expose Test API on window
if (typeof window !== 'undefined') {
  window.__MIRROR_TEST__ = __MIRROR_TEST__
}

_runtime.registerToken('$accent-purple', '#8b5cf6')

_runtime.registerToken('$status-warning', '#f59e0b')
