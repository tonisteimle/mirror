        item.removeAttribute('data-highlighted')
      }

      if (indicator) {
        indicator.style.opacity = selected ? '1' : '0'
      }
    }

    const select = (value, isItemDisabled) => {
      if (isDisabled || isReadOnly || isItemDisabled) return

      const currentlySelected = isSelected(value)

      if (currentlySelected) {
        // Deselect
        if (!isRequired || el._listboxState.selectedValues.length > 1) {
          el._listboxState.selectedValues = el._listboxState.selectedValues.filter(v => v !== value)
        }
      } else {
        // Select
        if (multiple) {
          el._listboxState.selectedValues.push(value)
        } else {
          el._listboxState.selectedValues = [value]
        }
      }

      // Update all items
      items.forEach(item => {
        const itemValue = item.dataset.value
        const highlighted = el._listboxState.highlightedValue === itemValue
        updateItemState(item, itemValue, isSelected(itemValue), highlighted)
      })

      // Dispatch change event
      el.dispatchEvent(new CustomEvent('change', {
        detail: { value: multiple ? [...el._listboxState.selectedValues] : (el._listboxState.selectedValues[0] || null) },
        bubbles: true
      }))
    }

    const highlight = (value) => {
      el._listboxState.highlightedValue = value

      items.forEach(item => {
        const itemValue = item.dataset.value
        const highlighted = itemValue === value
        updateItemState(item, itemValue, isSelected(itemValue), highlighted)
      })
    }

    // ========================================
    // SETUP ITEMS
    // ========================================

    items.forEach((item, index) => {
      const value = item.dataset.value || `item-${index}`
      const indicator = item.querySelector('[data-slot="ItemIndicator"]')
      const text = item.querySelector('[data-slot="ItemText"]')
      const isItemDisabled = item.hasAttribute('data-disabled')

      // Default item styles
      setDefault(item, 'display', 'flex')
      setDefault(item, 'alignItems', 'center')
      setDefault(item, 'gap', '8px')
      setDefault(item, 'padding', '8px 12px')
      setDefault(item, 'borderRadius', '4px')
      setDefault(item, 'cursor', isItemDisabled ? 'not-allowed' : 'pointer')
      setDefault(item, 'transition', 'background 0.15s')
      setDefault(item, 'outline', 'none')

      if (isItemDisabled) {
        setDefault(item, 'opacity', '0.5')
      }

      // Default indicator styles and load icon
      if (indicator) {
        setDefault(indicator, 'display', 'flex')
        setDefault(indicator, 'alignItems', 'center')
        setDefault(indicator, 'justifyContent', 'center')
        setDefault(indicator, 'width', '16px')
        setDefault(indicator, 'height', '16px')
        setDefault(indicator, 'color', '#5BA8F5')
        setDefault(indicator, 'flexShrink', '0')
        setDefault(indicator, 'transition', 'opacity 0.15s')

        // Load icon (from data-icon attribute or default 'check')
        const iconName = indicator.dataset.icon || 'check'
        this.loadIcon(indicator, iconName)
      }

      // Default text styles
      if (text) {
        setDefault(text, 'flex', '1')
        setDefault(text, 'fontSize', '14px')
        setDefault(text, 'color', '#e0e0e0')
      }

      // Click handler
      if (!isItemDisabled && !isReadOnly) {
        item.addEventListener('click', () => {
          select(value, isItemDisabled)
          item.focus()
        })
      }

      // Hover/focus effects
      if (!isItemDisabled) {
        item.addEventListener('mouseenter', () => {
          highlight(value)
          item.style.background = '#1a1a1a'
        })
        item.addEventListener('mouseleave', () => {
          item.style.background = ''
        })
        item.addEventListener('focus', () => {
          highlight(value)
          item.style.background = '#1a1a1a'
          item.style.boxShadow = '0 0 0 2px rgba(59, 130, 246, 0.5)'
        })
        item.addEventListener('blur', () => {
          item.style.background = ''
          item.style.boxShadow = ''
        })
      }

      // Set initial state
      const selected = isSelected(value)
      updateItemState(item, value, selected, false)
    })

    // ========================================
    // KEYBOARD NAVIGATION
    // ========================================

    el.addEventListener('keydown', (e) => {
      const enabledItems = Array.from(items).filter(item => !item.hasAttribute('data-disabled'))
      const currentIndex = enabledItems.indexOf(document.activeElement)

      let nextIndex = currentIndex

      switch (e.key) {
        case 'ArrowDown':
        case 'ArrowRight':
          e.preventDefault()
          if (loopFocus) {
            nextIndex = currentIndex === -1 ? 0 : (currentIndex + 1) % enabledItems.length
          } else {
            nextIndex = Math.min(currentIndex + 1, enabledItems.length - 1)
          }
          break
        case 'ArrowUp':
        case 'ArrowLeft':
          e.preventDefault()
          if (loopFocus) {
            nextIndex = currentIndex === -1 ? enabledItems.length - 1 : (currentIndex - 1 + enabledItems.length) % enabledItems.length
          } else {
            nextIndex = Math.max(currentIndex - 1, 0)
          }
          break
        case 'Home':
          e.preventDefault()
          nextIndex = 0
          break
        case 'End':
          e.preventDefault()
          nextIndex = enabledItems.length - 1
          break
        case ' ':
        case 'Enter':
          e.preventDefault()
          if (currentIndex !== -1) {
            const item = enabledItems[currentIndex]
            const value = item.dataset.value
            select(value, false)
          }
          break
        case 'a':
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault()
            if (multiple) {
              // Select all
              el._listboxState.selectedValues = enabledItems.map(item => item.dataset.value)
              items.forEach(item => {
                const value = item.dataset.value
                updateItemState(item, value, true, el._listboxState.highlightedValue === value)
              })
              el.dispatchEvent(new CustomEvent('change', {
                detail: { value: [...el._listboxState.selectedValues] },
                bubbles: true
              }))
            }
          }
          break
      }

      if (nextIndex !== currentIndex && enabledItems[nextIndex]) {
        enabledItems[nextIndex].focus()
        highlight(enabledItems[nextIndex].dataset.value)
      }
    })

    // ========================================
    // DISABLED/INVALID STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
      el.style.opacity = '0.5'
      el.style.pointerEvents = 'none'
    }

    if (isInvalid) {
      el.setAttribute('data-invalid', 'true')
    }

    if (isRequired) {
      el.setAttribute('data-required', 'true')
      el.setAttribute('aria-required', 'true')
    }

    // Set orientation
    el.setAttribute('data-orientation', orientation)
    el.setAttribute('aria-multiselectable', String(multiple))
  },

      setDefault(triggerArrow, 'alignItems', 'center')
      setDefault(triggerArrow, 'justifyContent', 'center')
      setDefault(triggerArrow, 'flexShrink', '0')
      setDefault(triggerArrow, 'transition', 'transform 0.2s')
      setDefault(triggerArrow, 'color', '#888')
      // Load arrow icon
      this.loadIcon(triggerArrow, 'chevron-down')
    }

    // Content (dropdown) styles
    setDefault(content, 'position', 'absolute')
    setDefault(content, 'top', '100%')
    setDefault(content, 'left', '0')
    setDefault(content, 'right', '0')
    setDefault(content, 'marginTop', '4px')
    setDefault(content, 'padding', '4px')
    setDefault(content, 'background', '#1a1a1a')
    setDefault(content, 'border', '1px solid #333')
    setDefault(content, 'borderRadius', '6px')
    setDefault(content, 'boxShadow', '0 4px 12px rgba(0,0,0,0.3)')
    setDefault(content, 'maxHeight', '240px')
    setDefault(content, 'overflowY', 'auto')
    setDefault(content, 'zIndex', '1000')
    setDefault(content, 'display', 'none') // Initially hidden

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const isSelected = (value) => el._selectState.selectedValues.includes(value)

    const updateTriggerText = () => {
      if (!triggerText) return
      const selected = el._selectState.selectedValues
      if (selected.length === 0) {
        triggerText.textContent = placeholder
        triggerText.style.color = '#888'
      } else if (multiple) {
        const labels = selected.map(v => {
          const item = items.find(i => i.dataset.value === v)
          return item?.querySelector('[data-slot="ItemText"]')?.textContent || v
        })
        triggerText.textContent = labels.join(', ')
        triggerText.style.color = '#e0e0e0'
      } else {
        const item = items.find(i => i.dataset.value === selected[0])
        triggerText.textContent = item?.querySelector('[data-slot="ItemText"]')?.textContent || selected[0]
        triggerText.style.color = '#e0e0e0'
      }
    }

    const updateItemStates = () => {
      items.forEach((item, index) => {
        const value = item.dataset.value
        const selected = isSelected(value)
        const indicator = item.querySelector('[data-slot="ItemIndicator"]')

        item.setAttribute('aria-selected', String(selected))
        item.setAttribute('data-state', selected ? 'checked' : 'unchecked')

        if (indicator) {
          indicator.style.opacity = selected ? '1' : '0'
        }

        // Highlighted state
        if (index === el._selectState.highlightedIndex) {
          item.setAttribute('data-highlighted', 'true')
          item.style.background = '#2a2a2a'
        } else {
          item.removeAttribute('data-highlighted')
          item.style.background = 'transparent'
        }
      })
    }

    const open = () => {
      if (isDisabled || isReadOnly) return
      el._selectState.isOpen = true
      content.style.display = 'block'
      trigger.setAttribute('aria-expanded', 'true')
      el.setAttribute('data-state', 'open')

      if (triggerArrow) {
        triggerArrow.style.transform = 'rotate(180deg)'
      }

      // Highlight first selected or first item
      const firstSelectedIndex = [...items].findIndex(i => isSelected(i.dataset.value))
      el._selectState.highlightedIndex = firstSelectedIndex >= 0 ? firstSelectedIndex : 0
      updateItemStates()

      el.dispatchEvent(new CustomEvent('open', { bubbles: true }))
    }

    const close = () => {

      content.style.display = 'none'

      if (triggerArrow) {
        triggerArrow.style.transform = 'rotate(0deg)'
      }

      updateItemStates()
      el.dispatchEvent(new CustomEvent('close', { bubbles: true }))
    }

    const toggle = () => {
      if (el._selectState.isOpen) {
        close()
      } else {
        open()
      }
    }

    const selectItem = (value) => {
      if (multiple) {
        if (isSelected(value)) {
          el._selectState.selectedValues = el._selectState.selectedValues.filter(v => v !== value)
        } else {
          el._selectState.selectedValues.push(value)
        }
      } else {
        el._selectState.selectedValues = [value]
      }

      updateTriggerText()
      updateItemStates()

      // Update bound variable if data-bind is set
      const bindVar = el.dataset.bind
      if (bindVar && typeof window.$set === 'function') {
        const newValue = multiple ? [...el._selectState.selectedValues] : (el._selectState.selectedValues[0] || '')
        window.$set(bindVar, newValue)
      }

      el.dispatchEvent(new CustomEvent('change', {
        detail: { value: multiple ? [...el._selectState.selectedValues] : el._selectState.selectedValues[0] },
        bubbles: true
      }))

      if (!multiple && closeOnSelect) {
        close()
      }
    }

    // ========================================
    // SETUP ITEMS
    // ========================================

    items.forEach((item, index) => {
      const isItemDisabled = item.hasAttribute('data-disabled')
      const indicator = item.querySelector('[data-slot="ItemIndicator"]')
      const iconName = item.dataset.icon || 'check'

      // Default item styles
      setDefault(item, 'display', 'flex')
      setDefault(item, 'alignItems', 'center')
      setDefault(item, 'justifyContent', 'space-between')
      setDefault(item, 'padding', '8px 12px')
      setDefault(item, 'borderRadius', '4px')
      setDefault(item, 'cursor', isItemDisabled ? 'not-allowed' : 'pointer')
      setDefault(item, 'fontSize', '14px')
      setDefault(item, 'color', isItemDisabled ? '#666' : '#e0e0e0')
      setDefault(item, 'transition', 'background 0.1s')

      // Indicator styles
      if (indicator) {
        setDefault(indicator, 'display', 'flex')
        setDefault(indicator, 'alignItems', 'center')
        setDefault(indicator, 'justifyContent', 'center')
        setDefault(indicator, 'opacity', '0')
        setDefault(indicator, 'transition', 'opacity 0.15s')
        setDefault(indicator, 'color', '#22c55e')
        setDefault(indicator, 'marginLeft', '8px')
        setDefault(indicator, 'flexShrink', '0')
        // Load icon
        this.loadIcon(indicator, iconName)
      }

      // Click handler
      if (!isItemDisabled) {
        item.addEventListener('click', (e) => {
          e.stopPropagation()
          selectItem(item.dataset.value)
        })

        // Hover effect
        item.addEventListener('mouseenter', () => {
          el._selectState.highlightedIndex = index
          updateItemStates()
        })
      }
    })

    // ========================================
    // TRIGGER EVENTS
    // ========================================

    if (!isDisabled) {
      trigger.addEventListener('click', (e) => {
        e.stopPropagation()
        toggle()
      })

      // Hover effect
      trigger.addEventListener('mouseenter', () => {
        if (!el._selectState.isOpen) {
          trigger.style.borderColor = '#555'
        }
      })
      trigger.addEventListener('mouseleave', () => {
        if (!el._selectState.isOpen) {
          trigger.style.borderColor = '#333'
        }
      })
    }

    // ========================================
    // KEYBOARD NAVIGATION
    // ========================================

    el.addEventListener('keydown', (e) => {
      const enabledItems = [...items].filter(i => !i.hasAttribute('data-disabled'))
      const currentIndex = el._selectState.highlightedIndex
      const enabledIndices = enabledItems.map(i => [...items].indexOf(i))

      if (!el._selectState.isOpen) {
        if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown' || e.key === 'ArrowUp') {
          e.preventDefault()
          open()
        }
        return
      }

      let nextIndex = currentIndex

      switch (e.key) {
        case 'Escape':
          e.preventDefault()
          close()
          trigger.focus()
          return

        case 'ArrowDown':
          e.preventDefault()
          const currentPosDown = enabledIndices.indexOf(currentIndex)
          if (currentPosDown < enabledIndices.length - 1) {
            nextIndex = enabledIndices[currentPosDown + 1]
          } else if (loopFocus) {
            nextIndex = enabledIndices[0]
          }
          break

        case 'ArrowUp':
          e.preventDefault()
          const currentPosUp = enabledIndices.indexOf(currentIndex)
          if (currentPosUp > 0) {
            nextIndex = enabledIndices[currentPosUp - 1]
          } else if (loopFocus) {
            nextIndex = enabledIndices[enabledIndices.length - 1]
          }
          break

        case 'Home':
          e.preventDefault()
          nextIndex = enabledIndices[0]
          break

        case 'End':
          e.preventDefault()
          nextIndex = enabledIndices[enabledIndices.length - 1]
          break

        case 'Enter':
        case ' ':
          e.preventDefault()
          if (currentIndex >= 0 && !items[currentIndex].hasAttribute('data-disabled')) {
            selectItem(items[currentIndex].dataset.value)
          }
          return

        case 'Tab':
          close()
          return
      }

      if (nextIndex !== currentIndex) {
        el._selectState.highlightedIndex = nextIndex
        updateItemStates()
        items[nextIndex]?.scrollIntoView({ block: 'nearest' })
      }
    })

    // ========================================
    // CLICK OUTSIDE TO CLOSE
    // ========================================

    document.addEventListener('click', (e) => {
      if (el._selectState.isOpen && !e.composedPath().includes(el)) {
        close()
      }
    })

    // ========================================
    // INITIAL STATE
    // ========================================

    el.setAttribute('data-state', 'closed')
    updateTriggerText()
    updateItemStates()

    if (isDisabled) {
      trigger.disabled = true
      el.setAttribute('data-disabled', 'true')
    }

    if (isInvalid) {
      el.setAttribute('data-invalid', 'true')
      trigger.style.borderColor = '#ef4444'
    }

    if (isRequired) {
      el.setAttribute('data-required', 'true')
      el.setAttribute('aria-required', 'true')
    }

    // Focus management
    trigger.setAttribute('tabindex', isDisabled ? '-1' : '0')
  },

  initRadioGroupComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}
    const itemsConfig = el._zagConfig.items || []

    // State styles from slots
    const itemStateStyles = el._zagConfig.itemStateStyles || {}
    const controlStateStyles = el._zagConfig.controlStateStyles || {}
    const textStateStyles = el._zagConfig.textStateStyles || {}

    // Get elements
    const items = el.querySelectorAll('[data-slot="Item"]')
    if (items.length === 0) return

    // Configuration
    const defaultValue = config.defaultValue || config.value || null
    const isDisabled = config.disabled === true
    const isReadOnly = config.readOnly === true
    const isRequired = config.required === true
    const isInvalid = config.invalid === true
    const orientation = config.orientation || 'vertical'
    const name = config.name || el.id || 'radio-group'

    // State
    el._radioState = {
      selectedValue: defaultValue,
      focusedIndex: -1
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, value) => {
      if (element && !element.style[prop]) {
        element.style[prop] = value
      }
    }

    // Root styles
    setDefault(el, 'display', 'flex')
    setDefault(el, 'flexDirection', orientation === 'horizontal' ? 'row' : 'column')
    setDefault(el, 'gap', '8px')

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const isSelected = (value) => el._radioState.selectedValue === value

    const updateItemStates = () => {
      items.forEach((item, index) => {
        const value = item.dataset.value
        const selected = isSelected(value)
        const control = item.querySelector('[data-slot="ItemControl"]')

        item.setAttribute('data-state', selected ? 'checked' : 'unchecked')

        if (control) {
          control.setAttribute('aria-checked', String(selected))
          control.setAttribute('data-state', selected ? 'checked' : 'unchecked')
        }

        // Focus state
        if (index === el._radioState.focusedIndex) {
          item.setAttribute('data-focus', 'true')
        } else {
          item.removeAttribute('data-focus')
        }
      })
    }

    const selectItem = (value) => {
      if (isDisabled || isReadOnly) return

      el._radioState.selectedValue = value
      // Use enhanced update if available (set up later), fallback to basic
      if (el._updateRadioStates) {
        el._updateRadioStates()
      } else {
        updateItemStates()
      }

      el.dispatchEvent(new CustomEvent('change', {
        detail: { value },
        bubbles: true
      }))
    }

    // ========================================
    // SETUP ITEMS
    // ========================================

    items.forEach((item, index) => {
      const isItemDisabled = item.hasAttribute('data-disabled') || isDisabled
      const control = item.querySelector('[data-slot="ItemControl"]')
      const text = item.querySelector('[data-slot="ItemText"]')
      const value = item.dataset.value

      // Default item styles
      setDefault(item, 'display', 'flex')
      setDefault(item, 'alignItems', 'center')
      setDefault(item, 'gap', '8px')
      setDefault(item, 'cursor', isItemDisabled ? 'not-allowed' : 'pointer')
      setDefault(item, 'opacity', isItemDisabled ? '0.5' : '1')

      // Default control (radio circle) styles
      if (control) {
        setDefault(control, 'width', '18px')
        setDefault(control, 'height', '18px')
        setDefault(control, 'borderRadius', '50%')
        setDefault(control, 'border', '2px solid #555')
        setDefault(control, 'background', 'transparent')
        setDefault(control, 'display', 'flex')
        setDefault(control, 'alignItems', 'center')
        setDefault(control, 'justifyContent', 'center')
        setDefault(control, 'transition', 'border-color 0.15s, background 0.15s')
        setDefault(control, 'flexShrink', '0')

        // Inner dot (created dynamically)
        const dot = document.createElement('div')
        dot.dataset.slot = 'ItemDot'
        dot.style.width = '8px'
        dot.style.height = '8px'
        dot.style.borderRadius = '50%'
        dot.style.background = '#5BA8F5'
        dot.style.transform = 'scale(0)'
        dot.style.transition = 'transform 0.15s'
        control.appendChild(dot)
      }

      // Default text styles
      if (text) {
        setDefault(text, 'fontSize', '14px')
        setDefault(text, 'color', isItemDisabled ? '#666' : '#e0e0e0')
      }

      // Click handler
      if (!isItemDisabled) {
        item.addEventListener('click', () => {
          selectItem(value)
        })

        // Hover effect
        item.addEventListener('mouseenter', () => {
          if (control && !isSelected(value)) {
            control.style.borderColor = '#888'
          }
        })
        item.addEventListener('mouseleave', () => {
          if (control && !isSelected(value)) {
            control.style.borderColor = '#555'
          }
        })
      }

      // Set initial state - handled by enhancedUpdateItemStates below
    })

    // Helper to apply/remove state styles
    const applyStateStyles = (element, stateStyles, stateName, apply) => {
      const styles = stateStyles[stateName]
      if (!styles) return

      for (const [prop, value] of Object.entries(styles)) {
        if (apply) {
          // Store original value if not stored yet
          if (!element._originalStyles) element._originalStyles = {}
          if (!(prop in element._originalStyles)) {
            element._originalStyles[prop] = element.style[prop] || ''
          }
          element.style[prop] = value
        } else {
          // Restore original value
          if (element._originalStyles && prop in element._originalStyles) {
            element.style[prop] = element._originalStyles[prop]
          }
        }
      }
    }

    // Update states based on selection
    const originalUpdateItemStates = updateItemStates
    const enhancedUpdateItemStates = () => {
      items.forEach((item) => {
        const value = item.dataset.value
        const selected = isSelected(value)
        const control = item.querySelector('[data-slot="ItemControl"]')
        const text = item.querySelector('[data-slot="ItemText"]')

        item.setAttribute('data-state', selected ? 'checked' : 'unchecked')

        // Apply/remove item state styles
        applyStateStyles(item, itemStateStyles, 'checked', selected)

        if (control) {
          control.setAttribute('aria-checked', String(selected))
          control.setAttribute('data-state', selected ? 'checked' : 'unchecked')

          // Apply custom control state styles or fallback to defaults
          if (controlStateStyles.checked) {
            applyStateStyles(control, controlStateStyles, 'checked', selected)
          } else {
            control.style.borderColor = selected ? '#5BA8F5' : '#555'
          }

          const dot = control.querySelector('[data-slot="ItemDot"]')
          if (dot) {
            dot.style.transform = selected ? 'scale(1)' : 'scale(0)'
          }
        }

        // Apply/remove text state styles
        if (text) {
          applyStateStyles(text, textStateStyles, 'checked', selected)
        }
      })
    }

    // Replace updateItemStates
    el._updateRadioStates = enhancedUpdateItemStates

    // ========================================
    // KEYBOARD NAVIGATION
    // ========================================

    el.setAttribute('tabindex', isDisabled ? '-1' : '0')

    el.addEventListener('keydown', (e) => {
      const enabledItems = [...items].filter(i => !i.hasAttribute('data-disabled'))
      if (enabledItems.length === 0) return

      const enabledIndices = enabledItems.map(i => [...items].indexOf(i))
      let currentIndex = el._radioState.focusedIndex
      if (currentIndex === -1) {
        // Find selected item or use first enabled
        const selectedIndex = [...items].findIndex(i => isSelected(i.dataset.value))
        currentIndex = selectedIndex >= 0 ? selectedIndex : enabledIndices[0]
      }

      let nextIndex = currentIndex
      const currentPos = enabledIndices.indexOf(currentIndex)

      switch (e.key) {
        case 'ArrowDown':
        case 'ArrowRight':
          e.preventDefault()
          if (currentPos < enabledIndices.length - 1) {
            nextIndex = enabledIndices[currentPos + 1]
          } else {
            nextIndex = enabledIndices[0] // Loop
          }
          break

        case 'ArrowUp':
        case 'ArrowLeft':
          e.preventDefault()
          if (currentPos > 0) {
            nextIndex = enabledIndices[currentPos - 1]
          } else {
            nextIndex = enabledIndices[enabledIndices.length - 1] // Loop
          }
          break

        case ' ':
        case 'Enter':
          e.preventDefault()
          if (currentIndex >= 0) {
            selectItem(items[currentIndex].dataset.value)
            enhancedUpdateItemStates()
          }
          return
      }

      if (nextIndex !== currentIndex) {
        el._radioState.focusedIndex = nextIndex
        // Auto-select on arrow keys (radio group behavior)
        selectItem(items[nextIndex].dataset.value)
        enhancedUpdateItemStates()
      }
    })

    // ========================================
    // INITIAL STATE
    // ========================================

    el.setAttribute('data-orientation', orientation)

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
    }

    if (isInvalid) {
      el.setAttribute('data-invalid', 'true')
    }

    if (isRequired) {
      el.setAttribute('data-required', 'true')
      el.setAttribute('aria-required', 'true')
    }

    // Initial render
    enhancedUpdateItemStates()
  },

  initSliderComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const track = el.querySelector('[data-slot="Track"]')
    const range = el.querySelector('[data-slot="Range"]')
    const thumb = el.querySelector('[data-slot="Thumb"]')
    const valueText = el.querySelector('[data-slot="ValueText"]')

    if (!track || !thumb) return

    // Configuration
    const min = config.min ?? 0
    const max = config.max ?? 100
    const step = config.step ?? 1
    const defaultValue = config.defaultValue ?? config.value ?? min
    const isDisabled = config.disabled === true
    const isReadOnly = config.readOnly === true
    const orientation = config.orientation || 'horizontal'

    // State
    el._sliderState = {
      value: defaultValue,
      isDragging: false
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, value) => {
      if (element && !element.style[prop]) {
        element.style[prop] = value
      }
    }

    const isHorizontal = orientation === 'horizontal'

    // Root styles
    setDefault(el, 'display', 'flex')
    setDefault(el, 'flexDirection', 'column')
    setDefault(el, 'gap', '8px')
    setDefault(el, 'width', isHorizontal ? '200px' : 'auto')

    // Track styles
    setDefault(track, 'position', 'relative')
    setDefault(track, 'width', isHorizontal ? '100%' : '8px')
    setDefault(track, 'height', isHorizontal ? '8px' : '200px')
    setDefault(track, 'background', '#333')
    setDefault(track, 'borderRadius', '4px')
    setDefault(track, 'cursor', isDisabled ? 'not-allowed' : 'pointer')

    // Range styles
    if (range) {
      setDefault(range, 'position', 'absolute')
      setDefault(range, 'background', '#5BA8F5')
      setDefault(range, 'borderRadius', '4px')
      if (isHorizontal) {
        setDefault(range, 'height', '100%')
        setDefault(range, 'left', '0')
      } else {
        setDefault(range, 'width', '100%')
        setDefault(range, 'bottom', '0')
      }
    }

    // Thumb styles
    setDefault(thumb, 'position', 'absolute')
    setDefault(thumb, 'width', '20px')
    setDefault(thumb, 'height', '20px')
    setDefault(thumb, 'background', '#fff')
    setDefault(thumb, 'borderRadius', '50%')
    setDefault(thumb, 'boxShadow', '0 2px 4px rgba(0,0,0,0.3)')
    setDefault(thumb, 'cursor', isDisabled ? 'not-allowed' : 'grab')
    setDefault(thumb, 'transform', 'translate(-50%, -50%)')
    setDefault(thumb, 'transition', 'box-shadow 0.15s')
    if (isHorizontal) {
      setDefault(thumb, 'top', '50%')
    } else {
      setDefault(thumb, 'left', '50%')
    }

    // ValueText styles
    if (valueText) {
      setDefault(valueText, 'fontSize', '14px')
      setDefault(valueText, 'color', '#e0e0e0')
      setDefault(valueText, 'textAlign', 'center')
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const getPercent = (value) => ((value - min) / (max - min)) * 100

    const clamp = (value) => Math.min(max, Math.max(min, value))

    const roundToStep = (value) => {
      const steps = Math.round((value - min) / step)
      return clamp(min + steps * step)
    }

    const updateUI = () => {
      const percent = getPercent(el._sliderState.value)

      if (isHorizontal) {
        thumb.style.left = percent + '%'
        if (range) range.style.width = percent + '%'
      } else {
        thumb.style.bottom = percent + '%'
        if (range) range.style.height = percent + '%'
      }

      thumb.setAttribute('aria-valuenow', String(el._sliderState.value))
      thumb.setAttribute('aria-valuemin', String(min))
      thumb.setAttribute('aria-valuemax', String(max))

      if (valueText) {
        valueText.textContent = String(el._sliderState.value)
      }
    }

    const setValue = (newValue, dispatchEvent = true) => {
      const oldValue = el._sliderState.value
      el._sliderState.value = roundToStep(newValue)

      if (oldValue !== el._sliderState.value) {
        updateUI()
        if (dispatchEvent) {
          el.dispatchEvent(new CustomEvent('change', {
            detail: { value: el._sliderState.value },
            bubbles: true
          }))
        }
      }
    }

    const getValueFromPosition = (clientX, clientY) => {
      const rect = track.getBoundingClientRect()
      let percent

      if (isHorizontal) {
        percent = (clientX - rect.left) / rect.width
      } else {
        percent = 1 - (clientY - rect.top) / rect.height
      }

      percent = Math.min(1, Math.max(0, percent))
      return min + percent * (max - min)
    }

    // ========================================
    // MOUSE/TOUCH EVENTS
    // ========================================

    if (!isDisabled && !isReadOnly) {
      const startDrag = (e) => {
        e.preventDefault()
        el._sliderState.isDragging = true
        thumb.style.cursor = 'grabbing'
        document.body.style.userSelect = 'none'

        const clientX = e.touches ? e.touches[0].clientX : e.clientX
        const clientY = e.touches ? e.touches[0].clientY : e.clientY
        setValue(getValueFromPosition(clientX, clientY))
      }

      const moveDrag = (e) => {
        if (!el._sliderState.isDragging) return

        const clientX = e.touches ? e.touches[0].clientX : e.clientX
        const clientY = e.touches ? e.touches[0].clientY : e.clientY
        setValue(getValueFromPosition(clientX, clientY))
      }

      const endDrag = () => {
        if (!el._sliderState.isDragging) return

        el._sliderState.isDragging = false
        thumb.style.cursor = 'grab'
        document.body.style.userSelect = ''

        el.dispatchEvent(new CustomEvent('changeend', {
          detail: { value: el._sliderState.value },
          bubbles: true
        }))
      }

      // Track click
      track.addEventListener('mousedown', startDrag)
      track.addEventListener('touchstart', startDrag, { passive: false })

  initPinInputComponent(el) {
    if (!el || !el._zagConfig) return

    // Get elements

    const type = config.type || 'numeric' // numeric, alphanumeric, alphabetic
    const isDisabled = config.disabled === true

    const placeholder = config.placeholder || '○'
    const defaultValue = config.defaultValue || config.value || ''

      values: Array(length).fill(''),
      focusedIndex: -1
    }

    // Initialize with default value if provided
    if (defaultValue) {
      const chars = defaultValue.split('').slice(0, length)
      chars.forEach((char, i) => {
        el._pinInputState.values[i] = char
      })
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, value) => {
      if (element && !element.style[prop]) {
        element.style[prop] = value
      }
    }

    setDefault(el, 'gap', '8px')

    setDefault(control, 'display', 'flex')
    setDefault(control, 'gap', '8px')

    inputs.forEach(input => {
      setDefault(input, 'width', '48px')
      setDefault(input, 'height', '48px')

      setDefault(input, 'fontSize', '20px')

      setDefault(input, 'border', '2px solid #333')

      }

      inputs.forEach((input, i) => {
        const value = el._pinInputState.values[i] || ''
        input.value = value
        input.placeholder = value ? '' : placeholder

      el.dispatchEvent(new CustomEvent('change', {
        detail: { value: getValue(), values: [...el._pinInputState.values] },
        bubbles: true
      }))
    }

    const dispatchComplete = () => {
      const value = getValue()
      if (value.length === length && !el._pinInputState.values.includes('')) {
        el.dispatchEvent(new CustomEvent('complete', {
          detail: { value, values: [...el._pinInputState.values] },
          bubbles: true
        }))

    }

      if (type === 'numeric') return /^[0-9]$/.test(char)
      if (type === 'alphabetic') return /^[a-zA-Z]$/.test(char)
      if (type === 'alphanumeric') return /^[a-zA-Z0-9]$/.test(char)

          chars.forEach((char, i) => {
            if (index + i < length) {
              el._pinInputState.values[index + i] = char
            }
          })
          updateInputs()
          dispatchChange()

          const nextIndex = Math.min(index + chars.length, length - 1)
          focusInput(nextIndex)
          dispatchComplete()
        } else if (value.length === 1) {
          if (isValidChar(value)) {
            el._pinInputState.values[index] = value
            updateInputs()
            dispatchChange()

            if (index < length - 1) {
              focusInput(index + 1)
            }
            dispatchComplete()
          } else {
            input.value = el._pinInputState.values[index] || ''
          }
        }
      })

      // Keyboard navigation
      input.addEventListener('keydown', (e) => {
        switch (e.key) {
          case 'Backspace':
            e.preventDefault()
            if (el._pinInputState.values[index]) {
              el._pinInputState.values[index] = ''
              updateInputs()
              dispatchChange()
            } else if (index > 0) {
              el._pinInputState.values[index - 1] = ''
              updateInputs()
              dispatchChange()
              focusInput(index - 1)
            }
            break
          case 'Delete':
            e.preventDefault()
            if (el._pinInputState.values[index]) {
              el._pinInputState.values[index] = ''
              updateInputs()
              dispatchChange()
            }
            break
          case 'ArrowLeft':
            e.preventDefault()
            if (index > 0) {
              focusInput(index - 1)
            }
            break
          case 'ArrowRight':
            e.preventDefault()
            if (index < length - 1) {
              focusInput(index + 1)
            }
            break
          case 'Home':
            e.preventDefault()
            focusInput(0)
            break
          case 'End':
            e.preventDefault()
            focusInput(length - 1)
            break
        }
      })

      // Prevent typing when already has a value
      input.addEventListener('keypress', (e) => {
        if (el._pinInputState.values[index] && e.key.length === 1) {
          e.preventDefault()
          // Replace current value with new one
          if (isValidChar(e.key)) {
            el._pinInputState.values[index] = e.key
            updateInputs()
            dispatchChange()
            if (index < length - 1) {
              focusInput(index + 1)
            }
            dispatchComplete()
          }
        }
      })
    })

    // Handle paste on control
    control.addEventListener('paste', (e) => {
      if (isDisabled || isReadOnly) return

      e.preventDefault()
      const pasted = e.clipboardData.getData('text')
      const chars = pasted.split('').filter(isValidChar).slice(0, length)

      chars.forEach((char, i) => {
        el._pinInputState.values[i] = char
      })

      dispatchChange()

      const nextIndex = Math.min(chars.length, length - 1)
      focusInput(nextIndex)
      dispatchComplete()
    })

    // INITIAL STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
    }

    if (config.invalid) {
      el.setAttribute('data-invalid', 'true')
      inputs.forEach(input => {
        input.style.borderColor = '#ef4444'
      })
    }

    // Initial render
    updateInputs()
  },

  initProgressComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const track = el.querySelector('[data-slot="Track"]')
    const range = el.querySelector('[data-slot="Range"]')
    const valueText = el.querySelector('[data-slot="ValueText"]')

    if (!track || !range) return

    // Configuration
    const min = Number(config.min ?? 0)
    const max = Number(config.max ?? 100)
    const value = Number(config.value ?? 0)

    // State
    el._progressState = {
      value: value
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Root styles
    setDefault(el, 'display', 'flex')
    setDefault(el, 'flexDirection', 'column')
    setDefault(el, 'gap', '8px')
    setDefault(el, 'width', '200px')

    // Track styles
    setDefault(track, 'position', 'relative')
    setDefault(track, 'width', '100%')
    setDefault(track, 'height', '8px')
    setDefault(track, 'background', '#333')
    setDefault(track, 'borderRadius', '4px')
    setDefault(track, 'overflow', 'hidden')

    // Range styles
    setDefault(range, 'height', '100%')
    setDefault(range, 'background', '#5BA8F5')
    setDefault(range, 'borderRadius', '4px')
    setDefault(range, 'transition', 'width 0.3s ease')

    // ValueText styles
    if (valueText) {
      setDefault(valueText, 'fontSize', '14px')
      setDefault(valueText, 'color', '#e0e0e0')
      setDefault(valueText, 'textAlign', 'center')
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const getPercent = (val) => {
      if (max === min) return 0
      return Math.min(100, Math.max(0, ((val - min) / (max - min)) * 100))
    }

    const updateUI = () => {
      const percent = getPercent(el._progressState.value)
      range.style.width = percent + '%'

      el.setAttribute('aria-valuenow', String(el._progressState.value))
      el.setAttribute('aria-valuemin', String(min))
      el.setAttribute('aria-valuemax', String(max))

      if (valueText) {
        valueText.textContent = Math.round(percent) + '%'
      }

      // Set completion state
      if (percent >= 100) {
        el.setAttribute('data-complete', 'true')
      } else {
        el.removeAttribute('data-complete')
      }
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.setValue = (newValue) => {
      el._progressState.value = Math.min(max, Math.max(min, Number(newValue)))
      updateUI()
    }

    el.getValue = () => el._progressState.value

    // ========================================
    // INITIAL STATE
    // ========================================

    el.setAttribute('role', 'progressbar')
    updateUI()
  },

  initCircularProgressComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const circle = el.querySelector('[data-slot="Circle"]')
    const circleTrack = el.querySelector('[data-slot="CircleTrack"]')
    const circleRange = el.querySelector('[data-slot="CircleRange"]')
    const valueText = el.querySelector('[data-slot="ValueText"]')

    if (!circle || !circleTrack || !circleRange) return

    // Configuration
    const min = Number(config.min ?? 0)
    const max = Number(config.max ?? 100)
    const value = Number(config.value ?? 0)
    const size = Number(config.size ?? 80)
    const strokeWidth = Number(config.strokeWidth ?? 8)

    // State
    el._circularProgressState = {
      value: value
    }

    // Calculate circle geometry
    const radius = 42 // matches viewBox 0 0 100 100
    const circumference = 2 * Math.PI * radius

    // ========================================

    // ========================================

    // Circle (SVG) styles
    setDefault(circle, 'width', size + 'px')

    setDefault(circle, 'transform', 'rotate(-90deg)')

    // CircleTrack styles
    circleTrack.setAttribute('stroke', '#333')
    circleTrack.setAttribute('stroke-width', String(strokeWidth))

    // CircleRange styles
    circleRange.setAttribute('stroke', '#5BA8F5')

    // ValueText styles
    if (valueText) {
      setDefault(valueText, 'position', 'absolute')

      setDefault(valueText, 'fontWeight', '600')
      setDefault(valueText, 'color', '#e0e0e0')
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const getPercent = (val) => {
      if (max === min) return 0
      return Math.min(100, Math.max(0, ((val - min) / (max - min)) * 100))
    }

    const updateUI = () => {
      const percent = getPercent(el._circularProgressState.value)
      const offset = circumference - (percent / 100) * circumference

      circleRange.setAttribute('stroke-dasharray', String(circumference))
      circleRange.setAttribute('stroke-dashoffset', String(offset))

      el.setAttribute('aria-valuenow', String(el._circularProgressState.value))
      el.setAttribute('aria-valuemin', String(min))
      el.setAttribute('aria-valuemax', String(max))

      if (valueText) {
        valueText.textContent = Math.round(percent) + '%'
      }

      // Set completion state
      if (percent >= 100) {
        el.setAttribute('data-complete', 'true')
      } else {
        el.removeAttribute('data-complete')
      }
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.setValue = (newValue) => {
      el._circularProgressState.value = Math.min(max, Math.max(min, Number(newValue)))
      updateUI()
    }

    el.getValue = () => el._circularProgressState.value

    // ========================================
    // INITIAL STATE
    // ========================================

    el.setAttribute('role', 'progressbar')
    updateUI()
  },

  initAvatarComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const image = el.querySelector('[data-slot="Image"]')
    const fallback = el.querySelector('[data-slot="Fallback"]')

    if (!image || !fallback) return

    // Configuration
    const src = config.src || ''
    const name = config.name || ''
    const fallbackText = config.fallback || ''

    // State
    el._avatarState = {
      status: 'loading' // 'loading', 'loaded', 'error'
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Root styles
    setDefault(el, 'display', 'inline-flex')
    setDefault(el, 'alignItems', 'center')
    setDefault(el, 'justifyContent', 'center')
    setDefault(el, 'width', '48px')
    setDefault(el, 'height', '48px')
    setDefault(el, 'borderRadius', '50%')
    setDefault(el, 'overflow', 'hidden')
    setDefault(el, 'backgroundColor', '#333')
    setDefault(el, 'position', 'relative')
    setDefault(el, 'flexShrink', '0')

    // Image styles
    setDefault(image, 'width', '100%')
    setDefault(image, 'height', '100%')
    setDefault(image, 'objectFit', 'cover')
    image.style.display = 'none' // Hidden until loaded

    // Fallback styles
    setDefault(fallback, 'display', 'flex')
    setDefault(fallback, 'alignItems', 'center')
    setDefault(fallback, 'justifyContent', 'center')
    setDefault(fallback, 'width', '100%')
    setDefault(fallback, 'height', '100%')
    setDefault(fallback, 'fontSize', '16px')
    setDefault(fallback, 'fontWeight', '600')
    setDefault(fallback, 'color', '#e0e0e0')
    setDefault(fallback, 'textTransform', 'uppercase')
    setDefault(fallback, 'position', 'absolute')
    setDefault(fallback, 'top', '0')
    setDefault(fallback, 'left', '0')

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const getInitials = (text) => {
      if (!text) return ''
      const words = text.trim().split(/\s+/)
      if (words.length === 1) {
        return words[0].charAt(0).toUpperCase()
      }
      return (words[0].charAt(0) + words[words.length - 1].charAt(0)).toUpperCase()
    }

    const updateUI = () => {
      const state = el._avatarState.status

      if (state === 'loaded') {
        image.style.display = 'block'
        fallback.style.display = 'none'
        el.setAttribute('data-state', 'loaded')
      } else if (state === 'error') {
        image.style.display = 'none'
        fallback.style.display = 'flex'
        el.setAttribute('data-state', 'error')
      } else {
        image.style.display = 'none'
        fallback.style.display = 'flex'
        el.setAttribute('data-state', 'loading')
      }
    }

    // ========================================
    // IMAGE LOADING
    // ========================================

    // Set fallback content
    if (fallbackText) {
      fallback.textContent = fallbackText
    } else if (name) {
      fallback.textContent = getInitials(name)
    } else {
      // Default icon (user silhouette)
      fallback.innerHTML = _runtime._icons.user(24)
    }

    if (src) {
      image.onload = () => {
        el._avatarState.status = 'loaded'
        updateUI()
      }

      image.onerror = () => {
        el._avatarState.status = 'error'
        updateUI()
      }

      // Already has src from emit, just handle load state
      if (image.complete && image.naturalWidth > 0) {
        el._avatarState.status = 'loaded'
      }
    } else {
      el._avatarState.status = 'error'
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.setSrc = (newSrc) => {
      if (newSrc) {
        el._avatarState.status = 'loading'
        image.src = newSrc
      } else {
        el._avatarState.status = 'error'
      }
      updateUI()
    }

    el.setName = (newName) => {
      if (!fallbackText) {
        fallback.textContent = getInitials(newName)
      }
    }

    el.getStatus = () => el._avatarState.status

    // ========================================
    // INITIAL STATE
    // ========================================

    updateUI()
  },

  initFileUploadComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const dropzone = el.querySelector('[data-slot="Dropzone"]')
    const hiddenInput = el.querySelector('[data-slot="HiddenInput"]')

    if (!dropzone || !hiddenInput) return

    // Configuration
    const accept = config.accept || '*'
    const multiple = config.multiple !== false
    const maxFiles = Number(config.maxFiles ?? 10)
    const maxSize = Number(config.maxSize ?? 10 * 1024 * 1024) // 10MB default

    // State
    el._fileUploadState = {
      files: [],
      isDragging: false
    }

    // Apply accept and multiple to input
    hiddenInput.accept = accept
    hiddenInput.multiple = multiple

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Root styles
    setDefault(el, 'display', 'flex')
    setDefault(el, 'flexDirection', 'column')
    setDefault(el, 'gap', '12px')
    setDefault(el, 'width', '100%')

    // Dropzone styles
    setDefault(dropzone, 'display', 'flex')
    setDefault(dropzone, 'flexDirection', 'column')
    setDefault(dropzone, 'alignItems', 'center')
    setDefault(dropzone, 'justifyContent', 'center')
    setDefault(dropzone, 'gap', '12px')
    setDefault(dropzone, 'padding', '32px')
    setDefault(dropzone, 'border', '2px dashed #444')
    setDefault(dropzone, 'borderRadius', '8px')
    setDefault(dropzone, 'backgroundColor', '#111')
    setDefault(dropzone, 'cursor', 'pointer')
    setDefault(dropzone, 'transition', 'border-color 0.2s, background-color 0.2s')

    // HiddenInput styles
    hiddenInput.style.display = 'none'

    // Trigger styles
    if (trigger) {
      setDefault(trigger, 'padding', '8px 16px')
      setDefault(trigger, 'backgroundColor', '#5BA8F5')
      setDefault(trigger, 'color', '#fff')
      setDefault(trigger, 'border', 'none')
      setDefault(trigger, 'borderRadius', '6px')
      setDefault(trigger, 'cursor', 'pointer')
      setDefault(trigger, 'fontSize', '14px')
      setDefault(trigger, 'fontWeight', '500')
      trigger.textContent = 'Choose Files'
    }

    // Content styles
    if (content) {
      setDefault(content, 'display', 'flex')
      setDefault(content, 'flexDirection', 'column')
      setDefault(content, 'alignItems', 'center')
      setDefault(content, 'gap', '8px')
      setDefault(content, 'color', '#888')
      setDefault(content, 'fontSize', '14px')
      // Add upload icon and text
      content.innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg><span>Drag and drop files here</span>'
    }

    // ItemGroup styles
    if (itemGroup) {
      setDefault(itemGroup, 'display', 'flex')
      setDefault(itemGroup, 'flexDirection', 'column')
      setDefault(itemGroup, 'gap', '8px')
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const formatSize = (bytes) => {
      if (bytes < 1024) return bytes + ' B'
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB'
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB'
    }

    const createFileItem = (file, index) => {
      const item = document.createElement('div')
      item.dataset.slot = 'Item'
      item.dataset.index = String(index)
      item.style.cssText = 'display: flex; align-items: center; gap: 12px; padding: 12px; background: #1a1a1a; border-radius: 6px; border: 1px solid #333;'

      // File icon
      const icon = document.createElement('span')
      icon.innerHTML = _runtime._icons.file(20)
      icon.style.cssText = 'flex-shrink: 0; color: #888;'
      item.appendChild(icon)

      // File info
      const info = document.createElement('div')
      info.style.cssText = 'flex: 1; min-width: 0;'

      const name = document.createElement('div')
      name.dataset.slot = 'ItemName'
      name.textContent = file.name
      name.style.cssText = 'font-size: 14px; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;'
      info.appendChild(name)

      const size = document.createElement('div')
      size.dataset.slot = 'ItemSize'
      size.textContent = formatSize(file.size)
      size.style.cssText = 'font-size: 12px; color: #666;'
      info.appendChild(size)

      item.appendChild(info)

      // Delete button
      const deleteBtn = document.createElement('button')
      deleteBtn.type = 'button'
      deleteBtn.dataset.slot = 'ItemDelete'
      deleteBtn.innerHTML = _runtime._icons.x(16)
      deleteBtn.style.cssText = 'padding: 4px; background: transparent; border: none; cursor: pointer; color: #666; border-radius: 4px;'
      deleteBtn.onmouseenter = () => { deleteBtn.style.backgroundColor = '#333'; deleteBtn.style.color = '#ef4444'; }
      deleteBtn.onmouseleave = () => { deleteBtn.style.backgroundColor = 'transparent'; deleteBtn.style.color = '#666'; }
      deleteBtn.onclick = (e) => {
        e.stopPropagation()
        el.removeFile(index)
      }
      item.appendChild(deleteBtn)

      return item
    }

    const updateUI = () => {
      if (!itemGroup) return

      // Clear existing items
      itemGroup.innerHTML = ''

      // Add file items
      el._fileUploadState.files.forEach((file, index) => {
        const item = createFileItem(file, index)
        itemGroup.appendChild(item)
      })

      // Update dropzone state
      if (el._fileUploadState.isDragging) {
        dropzone.style.borderColor = '#5BA8F5'
        dropzone.style.backgroundColor = '#1a1a2e'
        el.setAttribute('data-dragging', 'true')
      } else {
        dropzone.style.borderColor = '#444'
        dropzone.style.backgroundColor = '#111'
        el.removeAttribute('data-dragging')
      }

      // Emit change event
      el.dispatchEvent(new CustomEvent('files-change', { detail: { files: el._fileUploadState.files } }))
    }

    const addFiles = (fileList) => {
      const files = Array.from(fileList)

      // Filter by max size
      const validFiles = files.filter(file => {
        if (file.size > maxSize) {
          console.warn(`File "${file.name}" exceeds max size of ${formatSize(maxSize)}`)
          return false
        }
        return true
      })

      // Check max files limit
      const available = maxFiles - el._fileUploadState.files.length
      const toAdd = validFiles.slice(0, available)

      if (toAdd.length < validFiles.length) {
        console.warn(`Only ${available} more file(s) can be added (max: ${maxFiles})`)
      }

      el._fileUploadState.files.push(...toAdd)
      updateUI()
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    // Click on dropzone or trigger opens file picker
    dropzone.onclick = () => hiddenInput.click()
    if (trigger) {
      trigger.onclick = (e) => {
        e.stopPropagation()
        hiddenInput.click()
      }
    }

    // File input change
    hiddenInput.onchange = (e) => {
      if (e.target.files && e.target.files.length > 0) {
        addFiles(e.target.files)
        hiddenInput.value = '' // Reset to allow re-selecting same file
      }
    }

    // Drag events
    dropzone.ondragenter = (e) => {
      e.preventDefault()
      e.stopPropagation()
      el._fileUploadState.isDragging = true
      updateUI()
    }

    dropzone.ondragover = (e) => {
      e.preventDefault()
      e.stopPropagation()
    }

    dropzone.ondragleave = (e) => {
      e.preventDefault()
      e.stopPropagation()
      // Only set to false if leaving the dropzone entirely
      if (!dropzone.contains(e.relatedTarget)) {
        el._fileUploadState.isDragging = false
        updateUI()
      }
    }

    dropzone.ondrop = (e) => {
      e.preventDefault()
      e.stopPropagation()
      el._fileUploadState.isDragging = false

      if (e.dataTransfer && e.dataTransfer.files.length > 0) {
        addFiles(e.dataTransfer.files)
      }
      updateUI()
    }

    // ========================================
    // PUBLIC API
    // ========================================

    el.getFiles = () => [...el._fileUploadState.files]

    el.removeFile = (index) => {
      el._fileUploadState.files.splice(index, 1)
      updateUI()
    }

    el.clearFiles = () => {
      el._fileUploadState.files = []
      updateUI()
    }

    el.addFiles = (files) => {
      addFiles(files)
    }

    // ========================================
    // INITIAL STATE
    // ========================================

    updateUI()
  },

    if (nextTrigger) {

      setDefault(nextTrigger, 'justifyContent', 'center')
      setDefault(nextTrigger, 'width', '40px')
      setDefault(nextTrigger, 'height', '40px')
      setDefault(nextTrigger, 'borderRadius', '50%')
      setDefault(nextTrigger, 'backgroundColor', '#333')
      setDefault(nextTrigger, 'border', 'none')
      setDefault(nextTrigger, 'cursor', 'pointer')
      setDefault(nextTrigger, 'color', '#e0e0e0')

    }

    // IndicatorGroup styles
    if (indicatorGroup) {
      setDefault(indicatorGroup, 'display', 'flex')
      setDefault(indicatorGroup, 'alignItems', 'center')
      setDefault(indicatorGroup, 'gap', '8px')
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const createSlide = (item, index) => {
      const slide = document.createElement('div')
      slide.dataset.slot = 'Item'
      slide.dataset.index = String(index)
      slide.style.cssText = `flex: 0 0 ${100 / slidesPerView}%; min-width: 0;`

      if (typeof item === 'string') {
        // If item is a string (URL), create an image
        const img = document.createElement('img')
        img.src = item
        img.alt = `Slide ${index + 1}`
        img.style.cssText = 'width: 100%; height: 100%; object-fit: cover; display: block;'
        slide.appendChild(img)
      } else if (item.src) {
        // If item is an object with src
        const img = document.createElement('img')
        img.src = item.src
        img.alt = item.alt || `Slide ${index + 1}`
        img.style.cssText = 'width: 100%; height: 100%; object-fit: cover; display: block;'
        slide.appendChild(img)
      } else if (item.content) {
        // If item has content
        slide.innerHTML = item.content
      }

      return slide
    }

    const createIndicator = (index) => {
      const indicator = document.createElement('button')
      indicator.type = 'button'
      indicator.dataset.slot = 'Indicator'
      indicator.dataset.index = String(index)
      indicator.style.cssText = 'width: 8px; height: 8px; border-radius: 50%; background: #444; border: none; cursor: pointer; padding: 0; transition: background 0.2s;'

      indicator.onclick = () => goTo(index)

      return indicator
    }

    const updateUI = () => {
      const { currentIndex, totalSlides } = el._carouselState

      // Update slide position
      const offset = -(currentIndex * (100 / slidesPerView))
      itemGroup.style.transform = `translateX(${offset}%)`

      // Update indicators
      if (indicatorGroup) {
        const indicators = indicatorGroup.querySelectorAll('[data-slot="Indicator"]')
        indicators.forEach((ind, i) => {
          if (i === currentIndex) {
            ind.style.backgroundColor = '#5BA8F5'
          } else {
            ind.style.backgroundColor = '#444'
          }
        })
      }

      // Update button states
      if (!loop) {
        if (prevTrigger) {
          prevTrigger.disabled = currentIndex === 0
          prevTrigger.style.opacity = currentIndex === 0 ? '0.5' : '1'
        }
        if (nextTrigger) {
          nextTrigger.disabled = currentIndex >= totalSlides - slidesPerView
          nextTrigger.style.opacity = currentIndex >= totalSlides - slidesPerView ? '0.5' : '1'
        }
      }

      // Set data attributes
      el.setAttribute('data-current', String(currentIndex))
      el.setAttribute('data-total', String(totalSlides))

      // Emit change event
      el.dispatchEvent(new CustomEvent('slide-change', { detail: { index: currentIndex, total: totalSlides } }))
    }

    const goTo = (index) => {
      const { totalSlides } = el._carouselState
      let newIndex = index

      if (loop) {
        if (newIndex < 0) newIndex = totalSlides - 1
        if (newIndex >= totalSlides) newIndex = 0
      } else {
        newIndex = Math.max(0, Math.min(totalSlides - slidesPerView, newIndex))
      }

      el._carouselState.currentIndex = newIndex
      updateUI()
    }

    const next = () => {
      goTo(el._carouselState.currentIndex + 1)
    }

    const prev = () => {
      goTo(el._carouselState.currentIndex - 1)
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    if (prevTrigger) {
      prevTrigger.onclick = prev
    }

    if (nextTrigger) {
      nextTrigger.onclick = next
    }

    // Keyboard navigation
    el.tabIndex = 0
    el.onkeydown = (e) => {
      if (e.key === 'ArrowLeft') {
        e.preventDefault()
        prev()
      } else if (e.key === 'ArrowRight') {
        e.preventDefault()
        next()
      }
    }

    // ========================================
    // AUTO PLAY
    // ========================================

    const startAutoPlay = () => {
      if (!autoPlay) return
      stopAutoPlay()
      el._carouselState.autoPlayTimer = setInterval(next, autoPlayInterval)
    }

    const stopAutoPlay = () => {
      if (el._carouselState.autoPlayTimer) {
        clearInterval(el._carouselState.autoPlayTimer)
        el._carouselState.autoPlayTimer = null
      }
    }

    // Pause on hover
    el.onmouseenter = stopAutoPlay
    el.onmouseleave = startAutoPlay

    // ========================================
    // PUBLIC API
    // ========================================

    el.next = next
    el.prev = prev
    el.goTo = goTo
    el.getCurrentIndex = () => el._carouselState.currentIndex
    el.getTotalSlides = () => el._carouselState.totalSlides

    el.setItems = (newItems) => {
      el._carouselState.totalSlides = newItems.length
      el._carouselState.currentIndex = 0

      // Clear and rebuild
      itemGroup.innerHTML = ''
      if (indicatorGroup) indicatorGroup.innerHTML = ''

      newItems.forEach((item, index) => {
        const slide = createSlide(item, index)
        itemGroup.appendChild(slide)
      })

      if (indicatorGroup) {
        newItems.forEach((_, index) => {
          const indicator = createIndicator(index)
          indicatorGroup.appendChild(indicator)
        })
      }

      updateUI()
    }

    // ========================================
    // INITIAL STATE
    // ========================================

    // Create slides from items
    items.forEach((item, index) => {
      const slide = createSlide(item, index)
      itemGroup.appendChild(slide)
    })

    // Create indicators
    if (indicatorGroup) {
      items.forEach((_, index) => {
        const indicator = createIndicator(index)
        indicatorGroup.appendChild(indicator)
      })
    }

    updateUI()
    startAutoPlay()
  },

  initStepsComponent(el) {

    // State
    el._stepsState = {
      currentStep: defaultStep,
      totalSteps: steps.length
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, val) => {
      if (element && !element.style[prop]) {
        element.style[prop] = val
      }
    }

    // Root styles
    setDefault(el, 'display', 'flex')

      setDefault(navigation, 'display', 'flex')

      setDefault(nextTrigger, 'fontSize', '14px')
      nextTrigger.textContent = 'Next'
    }

    // ========================================
