  /**
   * Setup keyboard navigation for a form container
   * - Enter moves to next field (or submits if last)
   * - Escape blurs current field
   * - Tab cycles through fields normally
   */
  setupKeyboardNav(container) {
    if (!container) return
    if (container._keyboardNavSetup) return // Already setup
    container._keyboardNavSetup = true

    // Selector for form inputs
    const inputSelector = 'input:not([type="hidden"]):not([disabled]), select:not([disabled]), textarea:not([disabled])'

    // Get ordered list of inputs
    const getInputs = () => {
      const inputs = Array.from(container.querySelectorAll(inputSelector))
      // Sort by tabindex if present
      return inputs.sort((a, b) => {
        const aTab = parseInt(a.getAttribute('tabindex') || '0', 10)
        const bTab = parseInt(b.getAttribute('tabindex') || '0', 10)
        return aTab - bTab
      })
    }

    container.addEventListener('keydown', (e) => {
      const target = e.target
      if (!target.matches || !target.matches(inputSelector)) return

      if (e.key === 'Enter' && target.tagName !== 'TEXTAREA') {
        e.preventDefault()
        const inputs = getInputs()
        const currentIndex = inputs.indexOf(target)

        if (currentIndex < inputs.length - 1) {
          // Move to next input
          inputs[currentIndex + 1].focus()
        } else {
          // Last input - look for submit button
          const submitBtn = container.querySelector('button[type="submit"], button:not([type])')
          if (submitBtn) {
            submitBtn.click()
          }
        }
      } else if (e.key === 'Escape') {
        target.blur()
      }
    })

  /**

  tableSort(table, field) {
    if (!table) return

    // Initialize or get sort state
    const state = table._sortState || { field: null, desc: false }

    // Toggle direction if same field, otherwise reset to ascending
    if (state.field === field) {
      state.desc = !state.desc
    } else {
      state.field = field
      state.desc = false
    }
    table._sortState = state

    // Update sort icons visual state
    table.querySelectorAll('.mirror-sort-icon').forEach(icon => {
      const isActive = icon.dataset.field === field
      icon.style.opacity = isActive ? '1' : '0.5'

      // Check for custom icons
      if (icon.dataset.hasCustomIcons === 'true') {
        const ascIcon = icon.querySelector('.mirror-sort-asc')
        const descIcon = icon.querySelector('.mirror-sort-desc')
        const defaultIcon = icon.querySelector('.mirror-sort-default')

        if (isActive) {
          if (defaultIcon) defaultIcon.style.display = 'none'
          if (state.desc) {
            if (ascIcon) ascIcon.style.display = 'none'
            if (descIcon) descIcon.style.display = ''
          } else {
            if (ascIcon) ascIcon.style.display = ''
            if (descIcon) descIcon.style.display = 'none'
          }
        } else {
          // Reset to default
          if (ascIcon) ascIcon.style.display = 'none'
          if (descIcon) descIcon.style.display = 'none'
          if (defaultIcon) defaultIcon.style.display = ''
        }
      } else {
        // Update icon direction with default SVGs
        if (isActive) {
          if (state.desc) {
            icon.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10l5 5 5-5"/></svg>'
          } else {
            icon.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 14l5-5 5 5"/></svg>'
          }
        } else {
          // Reset to default double chevron
          icon.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 15l5 5 5-5M7 9l5-5 5 5"/></svg>'
        }
      }
    })

    // Re-sort the table body
    const body = table.querySelector('.mirror-table-body')
    if (!body) return

    const rows = Array.from(body.querySelectorAll('.mirror-table-row'))
    rows.sort((a, b) => {
      const aVal = a.dataset[field] || a.querySelector('[data-field="' + field + '"]')?.textContent || ''
      const bVal = b.dataset[field] || b.querySelector('[data-field="' + field + '"]')?.textContent || ''

      // Try numeric comparison first
      const aNum = parseFloat(aVal)
      const bNum = parseFloat(bVal)

      let cmp
      if (!isNaN(aNum) && !isNaN(bNum)) {
        cmp = aNum - bNum
      } else {
        cmp = aVal.localeCompare(bVal)
      }

      return state.desc ? -cmp : cmp
    })

    // Re-append sorted rows
    rows.forEach(row => body.appendChild(row))
  },

  /**
   * Go to previous page in paginated table

  tablePrev(table) {
    if (!table || !table._pageState) return

    const state = table._pageState
    if (state.current > 1) {
      state.current--
      this._updateTablePage(table)
    }
  },

  /**
   * Go to next page in paginated table
   */
  tableNext(table) {
    if (!table || !table._pageState) return

    const state = table._pageState
    const totalPages = Math.ceil(state.total / state.size)
    if (state.current < totalPages) {
      state.current++
      this._updateTablePage(table)
    }
  },

  /**
   * Update table to show current page
   */
  _updateTablePage(table) {
    if (!table || !table._pageState) return

    const state = table._pageState
    const body = table.querySelector('.mirror-table-body')
    if (!body) return

    const rows = Array.from(body.querySelectorAll('.mirror-table-row'))
    const start = (state.current - 1) * state.size
    const end = start + state.size

    rows.forEach((row, index) => {
      row.style.display = (index >= start && index < end) ? '' : 'none'
    })

    // Update page info
    const totalPages = Math.ceil(state.total / state.size)
    const pageInfo = table.querySelector('.mirror-paginator-info')
    if (pageInfo) {
      pageInfo.textContent = 'Page ' + state.current + ' of ' + totalPages
    }

    if (options.max !== undefined && newVal > options.max) {

  // Add new entry to collection
  add(collectionName, values) {
    const name = collectionName.startsWith('$') ? collectionName.slice(1) : collectionName
    const data = window.__mirrorData || {}

    if (!data[name] || typeof data[name] !== 'object') {
      data[name] = {}
    }

    const collection = data[name]
    const key = this._generateId(name.slice(0, 3))

    // Use provided values or create empty entry with _key
    collection[key] = values || { _key: key }

      collectionName = itemOrCollection.startsWith('$') ? itemOrCollection.slice(1) : itemOrCollection
      entryKey = key
    } else if (itemOrCollection && typeof itemOrCollection === 'object') {
      // Called as remove(item) - find collection by _key
      if (typeof itemOrCollection._key !== 'string') {
        console.warn('[Mirror] remove() requires item with _key property')
        return
      }
      entryKey = itemOrCollection._key

      // Find which collection contains this key
      const data = window.__mirrorData || {}
      const found = Object.entries(data).find(([, val]) => {
        if (val && typeof val === 'object' && !Array.isArray(val)) {
          return val[entryKey] !== undefined
        }
        return false
      })

      if (!found) {
        console.warn('[Mirror] remove() could not find collection for item')
        return

      collectionName = found[0]
    } else {
      return
    }

    const data = window.__mirrorData || {}
    const collection = data[collectionName]

    if (!collection || typeof collection !== 'object') {
      return
    }

    delete collection[entryKey]
    this._refreshEachLoops(collectionName)

    if (!collection || typeof collection !== 'object' || Array.isArray(collection)) {
      console.warn('[Mirror] create() - collection not found:', name)
      return null

    // Generate unique key
    const newKey = 'new_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9)

    // Get template from existing entry

    const template = entries[0]
    const newEntry = { _key: newKey }

    // Copy structure from template
    if (template && typeof template === 'object') {

          else if (typeof val === 'number') newEntry[key] = 0
          else if (typeof val === 'boolean') newEntry[key] = false
          else newEntry[key] = null

      const data = window.__mirrorData || {}

      if (mask[i].type !== 'literal') inputChars++

    let newPos = 0, counted = 0
    for (let i = 0; i < newVal.length && i < mask.length; i++) {
      newPos = i + 1
      if (mask[i].type !== 'literal') {
        counted++
        if (counted >= inputChars) break

      const old = input.value
      const raw = self.getMaskRawValue(input)

          return '$get("' + identifier + '")'

      const collectionName = typeof config.collection === 'string' ? config.collection : null
      if (!collectionName) return

      // Clear existing items
      container.innerHTML = ''

      // Get fresh data
      const items = data[collectionName]
      if (!items || typeof items !== 'object') return

      // Convert to array
      let itemsArray
      if (Array.isArray(items)) {
        itemsArray = items
      } else {
        itemsArray = Object.entries(items).map(([k, v]) =>
          typeof v === 'object' && v !== null ? { _key: k, ...v } : { _key: k, value: v }

      // Apply filter
      if (config.filterFn) {
        itemsArray = itemsArray.filter(config.filterFn)

        itemsArray = [...itemsArray].sort((a, b) => {
          const aVal = a[config.orderBy]
          const bVal = b[config.orderBy]
          if (aVal < bVal) return -sortDir
          if (aVal > bVal) return sortDir
          return 0

    const formatDate = (date, fmt = 'short') => {
      if (!date) return ''
      try {
        return new Intl.DateTimeFormat(locale, { dateStyle: fmt }).format(date)
      } catch {
        // Intl.DateTimeFormat failed (unsupported format/locale) - use basic fallback
        return date.toLocaleDateString()
      }
    }

    const isSameDay = (a, b) => {
      if (!a || !b) return false
      return a.getFullYear() === b.getFullYear() &&
             a.getMonth() === b.getMonth() &&
             a.getDate() === b.getDate()
    }

    const isDateDisabled = (date) => {
      if (minDate && date < minDate) return true
      if (maxDate && date > maxDate) return true
      return false
    }

    const getDaysInMonth = (year, month) => {
      return new Date(year, month + 1, 0).getDate()
    }

    const getWeekdayNames = () => {
      const names = []
      const date = new Date(2024, 0, startOfWeek) // Start from a known Sunday (Jan 2024)
      // Adjust to get first day of week
      while (date.getDay() !== startOfWeek) {
        date.setDate(date.getDate() + 1)
      }
      for (let i = 0; i < 7; i++) {
        names.push(new Intl.DateTimeFormat(locale, { weekday: 'short' }).format(date))
        date.setDate(date.getDate() + 1)
      }
      return names
    }

    const getMonthName = (month, year) => {
      const date = new Date(year, month, 1)
      return new Intl.DateTimeFormat(locale, { month: 'long', year: 'numeric' }).format(date)
    }

    // DEFAULT STYLING
    // ========================================

    const setDefault = (element, prop, value) => {
      if (!element.style[prop]) element.style[prop] = value
    }

    // Root styling
    setDefault(el, 'position', 'relative')
    setDefault(el, 'display', 'inline-block')

    // Control styling
    setDefault(control, 'display', 'flex')
    setDefault(control, 'alignItems', 'center')
    setDefault(control, 'gap', '0')
    setDefault(control, 'background', '#1a1a1a')
    setDefault(control, 'border', '1px solid #333')
    setDefault(control, 'borderRadius', '6px')
    setDefault(control, 'overflow', 'hidden')

    // Input styling
    setDefault(input, 'flex', '1')
    setDefault(input, 'padding', '8px 12px')
    setDefault(input, 'background', 'transparent')
    setDefault(input, 'border', 'none')
    setDefault(input, 'outline', 'none')
    setDefault(input, 'color', '#e0e0e0')
    setDefault(input, 'fontSize', '13px')
    setDefault(input, 'minWidth', '140px')
    input.readOnly = true

    // Trigger styling
    setDefault(trigger, 'padding', '8px 10px')
    setDefault(trigger, 'background', 'transparent')
    setDefault(trigger, 'border', 'none')
    setDefault(trigger, 'borderLeft', '1px solid #333')
    setDefault(trigger, 'cursor', isDisabled ? 'not-allowed' : 'pointer')
    setDefault(trigger, 'color', '#888')
    setDefault(trigger, 'display', 'flex')
    setDefault(trigger, 'alignItems', 'center')
    setDefault(trigger, 'justifyContent', 'center')

    content.style.top = isInline ? '0' : '100%'
    content.style.left = '0'
    content.style.marginTop = isInline ? '0' : '4px'
    content.style.zIndex = '1000'
    setDefault(content, 'background', '#1a1a1a')
    setDefault(content, 'border', '1px solid #333')
    setDefault(content, 'borderRadius', '8px')
    setDefault(content, 'padding', '12px')
    setDefault(content, 'boxShadow', '0 4px 20px rgba(0,0,0,0.4)')
    setDefault(content, 'minWidth', '280px')

    if (!isInline) {

    const renderCalendar = () => {

      } else if (view === 'year') {

      }

    const renderDayView = (viewDate, selectedDates) => {

      const month = viewDate.getMonth()
      const daysInMonth = getDaysInMonth(year, month)
      const firstDayOfMonth = new Date(year, month, 1).getDay()
      const offset = (firstDayOfMonth - startOfWeek + 7) % 7
      const weekdays = getWeekdayNames()

      let html = `
        <div data-part="view-control" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <button data-part="prev-trigger" type="button" style="background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 8px; border-radius: 4px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button data-part="view-trigger" type="button" style="background: transparent; border: none; color: #e0e0e0; cursor: pointer; font-size: 14px; font-weight: 500; padding: 4px 8px; border-radius: 4px;">
            ${getMonthName(month, year)}
          </button>
          <button data-part="next-trigger" type="button" style="background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 8px; border-radius: 4px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>

        <table data-part="table" style="width: 100%; border-collapse: collapse; text-align: center;">

            <tr>${weekdays.map(d => `<th style="color: #666; font-size: 11px; font-weight: 500; padding: 4px 0;">${d}</th>`).join('')}</tr>
          </thead>

      for (let week = 0; week < 6; week++) {
        html += '<tr>'
        for (let dow = 0; dow < 7; dow++) {
          const cellIndex = week * 7 + dow
          if (cellIndex < offset || day > daysInMonth) {
            html += '<td style="padding: 2px;"></td>'
          } else {
            const date = new Date(year, month, day)
            const isSelected = selectedDates.some(d => isSameDay(d, date))
            const isToday = isSameDay(date, new Date())
            const disabled = isDateDisabled(date)

            const cellStyle = `
              padding: 2px;
            `
            const btnStyle = `
              width: 32px;
              height: 32px;
              border: none;
              border-radius: 6px;
              cursor: ${disabled ? 'not-allowed' : 'pointer'};
              font-size: 13px;

              color: ${disabled ? '#444' : isSelected ? '#fff' : isToday ? '#4f46e5' : '#e0e0e0'};

    const renderMonthView = (year) => {
      const months = []

          </button>
          <button data-part="view-trigger" type="button" style="background: transparent; border: none; color: #e0e0e0; cursor: pointer; font-size: 14px; font-weight: 500; padding: 4px 8px;">

          </button>
          <button data-part="next-trigger" type="button" style="background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>

      months.forEach((name, i) => {

        html += `
          <button
            data-part="month-table-cell-trigger"
            data-month="${i}"
            type="button"
            style="padding: 12px 8px; background: ${isCurrentMonth ? '#4f46e5' : 'transparent'}; color: ${isCurrentMonth ? '#fff' : '#e0e0e0'}; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;"
          >${name}</button>
        `
      })

      html += '</div>'
      content.innerHTML = html
      bindCalendarEvents()
    }

    const renderYearView = (centerYear) => {
      const startYear = centerYear - 5
      const years = []
      for (let i = 0; i < 12; i++) {
        years.push(startYear + i)
      }

      let html = `
        <div data-part="view-control" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <button data-part="prev-trigger" type="button" style="background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span style="color: #e0e0e0; font-size: 14px; font-weight: 500;">${startYear} - ${startYear + 11}</span>
          <button data-part="next-trigger" type="button" style="background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
      `

      years.forEach(y => {
        const isCurrentYear = el._datePickerState.viewDate.getFullYear() === y
        html += `
          <button
            data-part="year-table-cell-trigger"
            data-year="${y}"
            type="button"
            style="padding: 12px 8px; background: ${isCurrentYear ? '#4f46e5' : 'transparent'}; color: ${isCurrentYear ? '#fff' : '#e0e0e0'}; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;"
          >${y}</button>
        `
      })

      html += '</div>'
      content.innerHTML = html
      bindCalendarEvents()
    }

    const bindCalendarEvents = () => {
      const state = el._datePickerState

      // Day selection
      content.querySelectorAll('[data-part="day-table-cell-trigger"]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.disabled) return

          const date = new Date(dateStr)

        btn.addEventListener('mouseenter', () => {

        btn.addEventListener('mouseleave', () => {

      })

      content.querySelectorAll('[data-part="month-table-cell-trigger"]').forEach(btn => {

          state.viewDate = new Date(state.viewDate.getFullYear(), month, 1)
          state.view = 'day'
          renderCalendar()
        })
      })

      // Year selection
      content.querySelectorAll('[data-part="year-table-cell-trigger"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const year = parseInt(btn.getAttribute('data-year'))
          state.viewDate = new Date(year, state.viewDate.getMonth(), 1)
          state.view = 'month'
          renderCalendar()

      const nextTrigger = content.querySelector('[data-part="next-trigger"]')

      if (prevTrigger) {

            state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth() - 1, 1)
          } else if (state.view === 'month') {
            state.viewDate = new Date(state.viewDate.getFullYear() - 1, state.viewDate.getMonth(), 1)
          } else if (state.view === 'year') {
            state.viewDate = new Date(state.viewDate.getFullYear() - 12, state.viewDate.getMonth(), 1)
          }
          renderCalendar()
        })
      }

      if (nextTrigger) {
        nextTrigger.addEventListener('click', () => {
          if (state.view === 'day') {
            state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth() + 1, 1)
          } else if (state.view === 'month') {
            state.viewDate = new Date(state.viewDate.getFullYear() + 1, state.viewDate.getMonth(), 1)
          } else if (state.view === 'year') {
            state.viewDate = new Date(state.viewDate.getFullYear() + 12, state.viewDate.getMonth(), 1)
          }
          renderCalendar()
        })
      }

    // ========================================
    // DATE SELECTION
    // ========================================

    const selectDate = (date) => {
      const state = el._datePickerState

      if (selectionMode === 'single') {
        state.selectedDates = [date]
      } else if (selectionMode === 'multiple') {
        const idx = state.selectedDates.findIndex(d => isSameDay(d, date))
        if (idx >= 0) {
          state.selectedDates.splice(idx, 1)
        } else {
          state.selectedDates.push(date)
        }
      } else if (selectionMode === 'range') {
        if (state.selectedDates.length === 0 || state.selectedDates.length === 2) {
          state.selectedDates = [date]
        } else {
          const start = state.selectedDates[0]
          if (date < start) {
            state.selectedDates = [date, start]
          } else {
            state.selectedDates = [start, date]
          }
        }
      }

      updateInputValue()
      renderCalendar()

      // Fire change event
      el.dispatchEvent(new CustomEvent('change', {
        detail: {
          value: state.selectedDates.map(d => d.toISOString().split('T')[0]),
          dates: state.selectedDates,
        },
        bubbles: true
      }))

      // Close popup if configured
      if (closeOnSelect && !isInline && selectionMode === 'single') {
        closeCalendar()
      }
      if (closeOnSelect && !isInline && selectionMode === 'range' && state.selectedDates.length === 2) {
        closeCalendar()
      }
    }

    const updateInputValue = () => {
      const state = el._datePickerState
      if (state.selectedDates.length === 0) {
        input.value = ''
      } else if (selectionMode === 'range' && state.selectedDates.length === 2) {
        input.value = `${formatDate(state.selectedDates[0])} - ${formatDate(state.selectedDates[1])}`
      } else {
        input.value = state.selectedDates.map(d => formatDate(d)).join(', ')
      }
    }

    // ========================================
    // OPEN/CLOSE
    // ========================================

    const openCalendar = () => {
      if (isDisabled || isInline) return
      el._datePickerState.open = true
      el._datePickerState.view = 'day'
      content.style.display = 'block'
      el.setAttribute('data-state', 'open')
      renderCalendar()

      el.dispatchEvent(new CustomEvent('open', { bubbles: true }))
    }

    const closeCalendar = () => {
      if (isInline) return
      el._datePickerState.open = false
      content.style.display = 'none'
      el.setAttribute('data-state', 'closed')

      el.dispatchEvent(new CustomEvent('close', { bubbles: true }))
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    // Debounce flag to prevent double-firing from pointerdown + click
    let lastToggleTime = 0

    // Toggle calendar helper with debounce
    const toggleCalendar = (e) => {
      const now = Date.now()
      if (now - lastToggleTime < 100) return // Debounce 100ms
      lastToggleTime = now

      if (e) {
        e.preventDefault()
        e.stopPropagation()
      }
      if (el._datePickerState.open) {
        closeCalendar()
      } else {
        openCalendar()
      }
    }

    // Trigger click - multiple event types for robustness
    // Using both click and pointerdown ensures compatibility with
    // different browsers, Shadow DOM, and automation tools
    trigger.addEventListener('click', toggleCalendar)
    trigger.addEventListener('pointerdown', (e) => {
      // Only handle primary button (left click)
      if (e.button !== 0) return
      toggleCalendar(e)
    })

    // Input click (also opens) - same robust handling
    let lastInputOpenTime = 0
    const openFromInput = (e) => {
      const now = Date.now()
      if (now - lastInputOpenTime < 100) return
      lastInputOpenTime = now

      if (e) {
        e.preventDefault()
        e.stopPropagation()
      }
      if (!el._datePickerState.open) {
        openCalendar()
      }
    }
    input.addEventListener('click', openFromInput)
    input.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return
      openFromInput(e)
    })

    // Click outside to close (use composedPath for Shadow DOM compatibility)
    document.addEventListener('click', (e) => {
      if (el._datePickerState.open && !e.composedPath().includes(el)) {

      }

    el.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && el._datePickerState.open) {
        closeCalendar()
        trigger.focus()
      }
    })

    // ========================================
    // ACCESSIBILITY
    // ========================================

    el.setAttribute('role', 'group')
    trigger.setAttribute('aria-label', 'Open calendar')
    trigger.setAttribute('aria-haspopup', 'dialog')

    // ========================================
    // DISABLED STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
      el.style.opacity = '0.5'
      el.style.pointerEvents = 'none'
    }

    // ========================================
    // INITIAL RENDER
    // ========================================

    updateInputValue()
    el.setAttribute('data-state', isInline ? 'open' : 'closed')
    if (isInline) {
      renderCalendar()
    }
  },


  // Icon cache and loading
  _iconCache: new Map(),
  _customIcons: new Map(),
  _pendingIcons: new Map(),
  _fallbackIcon: "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"/><path d=\"m9 9 6 6\"/><path d=\"m15 9-6 6\"/></svg>",

    // sanitizeIconName is stamped from compiler/runtime/icons.ts.
    const safeName = sanitizeIconName(iconName)

    const color = el.dataset.iconColor || 'currentColor'
    const strokeWidth = el.dataset.iconWeight || '2'

    // Custom icons (via $icons:) take precedence over Lucide
    const custom = this._customIcons.get(iconName)
    if (custom) {

        .filter(p => p.length > 0)
        .map(d => `<path d="${d}"/>`)
        .join('')
      el.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${custom.viewBox}" fill="${isFilled ? 'currentColor' : 'none'}" stroke="${isFilled ? 'none' : 'currentColor'}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round" style="width:${size}px;height:${size}px;color:${color};display:block;">${paths}</svg>`
      return
    }

    let svgText = this._iconCache.get(iconName)

    if (!svgText) {

      let pending = this._pendingIcons.get(iconName)
      if (!pending) {
        pending = this._fetchIcon(iconName)
        this._pendingIcons.set(iconName, pending)
      }
      svgText = await pending
      this._pendingIcons.delete(iconName)
      if (!svgText) {
        console.warn(`Icon "${iconName}" not found, using fallback`)
        svgText = this._fallbackIcon
      }
    }

    el.innerHTML = svgText
    const svg = el.querySelector('svg')
    if (svg) {
      svg.style.width = size + 'px'
      svg.style.height = size + 'px'
      svg.style.color = color
      svg.style.display = 'block'
      if (isFilled) {
        svg.setAttribute('fill', 'currentColor')

    // Defence-in-depth: reject unsafe names even if a caller bypasses
    // loadIcon's check. sanitizeIconName is stamped from icons.ts.
    const safeName = sanitizeIconName(iconName)
    if (!safeName) return null
    try {

      const res = await fetch(url)
      if (!res.ok) return null
      const rawSvg = await res.text()

      // before it ever reaches innerHTML. sanitizeSVG is stamped from
      // compiler/runtime/icons.ts.
      const svgText = sanitizeSVG(rawSvg)
      if (!svgText) return null
      this._iconCache.set(safeName, svgText)

      console.warn(`Failed to load icon "${safeName}":`, err)
      return null
    }

  preloadIcons(names) {
    names.forEach(name => {

    // Handle key-value object (most common case)
    if (typeof data === 'object') {
      const entries = Object.entries(data)
      // Check if values are objects with x/y fields
      if (entries.length > 0 && typeof entries[0][1] === 'object' && xField && yField) {
        return {
          labels: entries.map(([_, v]) => v[xField]),
          values: entries.map(([_, v]) => v[yField])
        }
      }
      // Simple key-value pairs
      return {
        labels: entries.map(([k]) => k),
        values: entries.map(([_, v]) => v)
      }
    }

    return { labels: [], values: [] }
  },

  async createChart(element, config) {
    await this._loadChartJs()

    // Chart.js requires a container with position:relative and overflow:hidden
    // to properly constrain the canvas size when responsive:true
    element.style.position = 'relative'
    element.style.overflow = 'hidden'

    // Create a wrapper that fills the container - Chart.js needs this structure
    const wrapper = document.createElement('div')
    wrapper.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;'
    element.appendChild(wrapper)

    const canvas = document.createElement('canvas')
    wrapper.appendChild(canvas)

    const { labels, values } = this._parseChartData(config.data, config.xField, config.yField)

    // Default colors
    const defaultColors = [
      '#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6',
      '#ec4899', '#06b6d4', '#84cc16', '#f97316', '#6366f1'
    ]
    const colors = config.colors || defaultColors
    const chartType = config.type || 'line'
    const isPieOrDoughnut = chartType === 'pie' || chartType === 'doughnut'

    // Determine fill based on config (Area charts have fill: true by default)
    const shouldFill = config.fill === true || (chartType === 'line' && config.fill === 'origin')

    // Build Chart.js config
    const chartConfig = {
      type: chartType,
      data: {
        labels: labels,
        datasets: [{
          label: config.title || '', // Empty string fallback for legend
          data: values,
          backgroundColor: isPieOrDoughnut
            ? colors.slice(0, values.length)
            : (shouldFill ? colors[0] + '40' : colors[0] + '80'),
          borderColor: isPieOrDoughnut ? colors.slice(0, values.length) : colors[0],
          borderWidth: isPieOrDoughnut ? 1 : 2,
          fill: shouldFill ? 'origin' : false,
          tension: config.tension !== undefined ? config.tension : 0.3,
          pointBackgroundColor: colors[0],
          pointBorderColor: colors[0],
          pointRadius: chartType === 'scatter' ? 5 : 3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: config.legend === true || isPieOrDoughnut,
            labels: {
              color: '#ccc',
              // For pie/doughnut: use labels from data (each slice = label)
              // For others: use dataset labels (but we only have one dataset)
              generateLabels: isPieOrDoughnut ? undefined : (chart) => {
                // Hide legend for single-dataset charts unless explicitly requested
                if (!config.legend) return []
                return Chart.defaults.plugins.legend.labels.generateLabels(chart)
              }
            }
          },
          title: {
            display: !!config.title,
            text: config.title || '',
            color: '#fff'
          }
        },
        scales: isPieOrDoughnut ? {} : {
          x: {
            display: config.axes !== false,
            grid: { display: config.grid !== false, color: '#333' },
            ticks: { color: '#888' }
          },
          y: {
            display: config.axes !== false,
            grid: { display: config.grid !== false, color: '#333' },
            ticks: { color: '#888' },
            beginAtZero: true
          }
        }
      }
    }

    // Special handling for radar charts
    if (chartType === 'radar') {
      chartConfig.options.scales = {
        r: {
          grid: { color: '#333' },
          pointLabels: { color: '#888' },
          ticks: { color: '#888', backdropColor: 'transparent' }
        }
      }
    }

    new window.Chart(canvas.getContext('2d'), chartConfig)
  },

  // Animation registry
  _animations: new Map(),

  registerAnimation(animation) {
    if (!animation || !animation.name) return
    this._animations.set(animation.name, animation)
  },

  getAnimation(name) {
    return this._animations.get(name)
  },

  animate(animationName, elements, options = {}) {
    const animation = this._animations.get(animationName)
    if (!animation) {
      console.warn(`Animation "${animationName}" not found`)
      return null
    }

    // Normalize elements to array
    let targets = []
    if (!elements) {
      return null
    } else if (Array.isArray(elements)) {
      targets = elements.map(e => e._el || e)
    } else {
      targets = [elements._el || elements]
    }

    const { delay = 0, stagger = 0, loop = false, reverse = false } = options
    const results = []

    // Easing curves
    const easingMap = {
      'linear': 'linear',
      'ease': 'ease',
      'ease-in': 'ease-in',
      'ease-out': 'ease-out',
      'ease-in-out': 'ease-in-out',
    }

    targets.forEach((el, index) => {
      if (!el) return

      const elementDelay = delay + (index * stagger)

      // Build keyframes from animation definition
      const keyframes = []
      const propertyTimelines = new Map()

      // Group properties by name to build proper keyframe sequence
      animation.keyframes.forEach(kf => {
        kf.properties.forEach(prop => {
          if (!propertyTimelines.has(prop.name)) {
            propertyTimelines.set(prop.name, [])
          }
          propertyTimelines.get(prop.name).push({
            time: kf.time,
            value: prop.value,
            easing: prop.easing || animation.easing || 'ease-out'
          })
        })
      })

      // Convert to Web Animations API format
      const duration = animation.duration * 1000
      const allTimes = [...new Set(animation.keyframes.map(kf => kf.time))].sort((a, b) => a - b)

      allTimes.forEach(time => {
        const kf = { offset: time / animation.duration }
        propertyTimelines.forEach((timeline, propName) => {
          const point = timeline.find(p => p.time === time)
          if (point) {
            // Map Mirror property names to CSS
            const cssName = this._animPropMap(propName)
            kf[cssName] = this._animValueMap(propName, point.value)
          }
        })
        keyframes.push(kf)
      })

      if (reverse) {
        keyframes.reverse()
        keyframes.forEach((kf, i) => {
          kf.offset = i / (keyframes.length - 1)
        })
      }

      const timing = {
        duration,
        delay: elementDelay,
        easing: easingMap[animation.easing] || 'ease-out',
        iterations: loop === true ? Infinity : (typeof loop === 'number' ? loop : 1),
        fill: 'forwards'
      }

      try {
        const anim = el.animate(keyframes, timing)
        results.push(anim)
      } catch (err) {
        console.warn('Animation error:', err)
      }
    })

    return results
  },

  _animPropMap(name) {
    const map = {
      'opacity': 'opacity',
      'x-offset': 'translateX',
      'y-offset': 'translateY',
      'scale': 'scale',
      'scale-x': 'scaleX',
      'scale-y': 'scaleY',
      'rotate': 'rotate',
      'background': 'backgroundColor',
      'bg': 'backgroundColor',
      'color': 'color',
      'col': 'color',
      'width': 'width',
      'height': 'height',
      'padding': 'padding',
      'pad': 'padding',
      'radius': 'borderRadius',
      'rad': 'borderRadius',
    }
    return map[name] || name
  },

  _animValueMap(propName, value) {
    if (propName === 'x-offset' || propName === 'y-offset') {
      return typeof value === 'number' ? value + 'px' : value
    }
    if (propName === 'rotate') {
      return typeof value === 'number' ? value + 'deg' : value
    }
    if (propName === 'width' || propName === 'height' || propName === 'padding' || propName === 'pad' || propName === 'radius' || propName === 'rad') {
      return typeof value === 'number' ? value + 'px' : value
    }
    return value
  },

  setupEnterExitObserver(el, onEnter, onExit) {
    if (!el) return null
    const element = el._el || el

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          if (onEnter) onEnter()
        } else {
          if (onExit) onExit()
        }
      })
    }, { threshold: 0.1 })

    observer.observe(element)
    return observer
  },

}

// ============================================
// TEST API
// ============================================

/**
 * Mirror Test API - Always available for testing
 */
const __MIRROR_TEST__ = {
  // Element Access
  getElement(nodeId) {
    return document.querySelector(`[data-mirror-id="${nodeId}"]`)
  },

  getAllElements() {
    return Array.from(document.querySelectorAll('[data-mirror-id]'))
  },

  findByName(name) {
    return document.querySelector(`[data-mirror-name="${name}"]`) ||
           document.querySelector(`[data-instance-name="${name}"]`) ||
           document.querySelector(`[data-component-name="${name}"]`) ||
           document.querySelector(`[name="${name}"]`)
  },

  // State Inspection
  getState(el) {
    if (!el) return 'default'
    return el._stateMachine?.current || el.dataset?.state || 'default'
  },

  getAvailableStates(el) {
    if (!el?._stateMachine) return ['default']
    return Object.keys(el._stateMachine.states)
  },

  getStyles(el) {
    if (!el) return {}
    const styles = {}
    for (let i = 0; i < el.style.length; i++) {
      const prop = el.style[i]
      styles[prop] = el.style.getPropertyValue(prop)
    }
    return styles
  },

  getBaseStyles(el) {
    return el?._baseStyles || {}
  },

  // State Manipulation
  setState(el, state) {
    if (el) _runtime.transitionTo(el, state)
  },

  resetToBase(el) {
    if (el) _runtime.transitionTo(el, 'default')
  },

  // Event Simulation
  trigger(el, event) {
    if (!el) return
    switch (event) {
      case 'click': el.click(); break
      case 'hover': el.dispatchEvent(new MouseEvent('mouseenter', { bubbles: true })); break
      case 'focus': el.focus(); el.dispatchEvent(new FocusEvent('focus', { bubbles: true })); break
      case 'blur': el.blur(); el.dispatchEvent(new FocusEvent('blur', { bubbles: true })); break
      case 'change': el.dispatchEvent(new Event('change', { bubbles: true })); break
      case 'input': el.dispatchEvent(new InputEvent('input', { bubbles: true })); break
    }
  },

  triggerKey(el, key, eventType = 'keydown') {
    if (!el) return
    const keyMap = {
      'enter': 'Enter', 'escape': 'Escape', 'esc': 'Escape', 'space': ' ',
      'tab': 'Tab', 'backspace': 'Backspace', 'delete': 'Delete',
      'arrow-up': 'ArrowUp', 'arrow-down': 'ArrowDown',
      'arrow-left': 'ArrowLeft', 'arrow-right': 'ArrowRight',
      'up': 'ArrowUp', 'down': 'ArrowDown', 'left': 'ArrowLeft', 'right': 'ArrowRight',
    }
    const normalizedKey = keyMap[key.toLowerCase()] || key
    el.dispatchEvent(new KeyboardEvent(eventType, {
      key: normalizedKey, code: normalizedKey, bubbles: true, cancelable: true
    }))
  },

  // Built-in Function Calls
  toggle(el, states) {
    if (el) _runtime.stateMachineToggle(el, states)
  },

  exclusive(el, state) {
    if (!el) return
    const targetState = state ||
      (el._stateMachine ? Object.keys(el._stateMachine.states).find(s => s !== 'default') : 'active') ||
      'active'
    _runtime.exclusiveTransition(el, targetState)
  },

  // Visibility Control
  show(el) {
    if (!el) return
    el.hidden = false
    if (el.style.display === 'none') {
      el.style.display = el._savedDisplay || ''
    }
    _runtime.updateVisibility && _runtime.updateVisibility(el)
  },

  hide(el) {
    if (!el) return
    const currentDisplay = window.getComputedStyle(el).display
    if (currentDisplay !== 'none') {
      el._savedDisplay = currentDisplay
    }
    el.style.display = 'none'
    el.hidden = true
  },

  // Visibility Checks
  isVisible(el) {
    if (!el) return false
    if (el.hidden) return false
    const style = window.getComputedStyle(el)
    return style.display !== 'none' && style.visibility !== 'hidden' && parseFloat(style.opacity) !== 0
  },

  isHidden(el) {
    return !this.isVisible(el)
  },

  isDisplayNone(el) {
    if (!el) return true
    return window.getComputedStyle(el).display === 'none'
  },

  isOpacityZero(el) {
    if (!el) return true
    return parseFloat(window.getComputedStyle(el).opacity) === 0
  },

  hasHiddenAttribute(el) {
    if (!el) return true
    return el.hidden === true
  },

  getVisibilityState(el) {
    if (!el) return { visible: false, display: 'none', opacity: 0, hidden: true, reason: 'hidden' }
    const style = window.getComputedStyle(el)
    const display = style.display
    const opacity = parseFloat(style.opacity)
    const hidden = el.hidden
    const visibility = style.visibility
    let reason = 'visible', visible = true
    if (display === 'none') { visible = false; reason = 'display' }
    else if (opacity === 0) { visible = false; reason = 'opacity' }
    else if (hidden) { visible = false; reason = 'hidden' }
    else if (visibility === 'hidden') { visible = false; reason = 'visibility' }
    return { visible, display, opacity, hidden, reason }
  },

  getComputedStyle(el, prop) {
    if (!el) return ''
    return window.getComputedStyle(el).getPropertyValue(prop)
  },

  waitForHidden(el, timeout = 1000) {
    return new Promise(resolve => {
      if (!el) { resolve(true); return }
      if (!this.isVisible(el)) { resolve(true); return }
      const startTime = Date.now()
      const check = setInterval(() => {
        if (!this.isVisible(el)) { clearInterval(check); resolve(true) }
        else if (Date.now() - startTime > timeout) { clearInterval(check); resolve(false) }
      }, 16)
    })
  },

  // Async Helpers
  waitForState(el, state, timeout = 1000) {
    return new Promise(resolve => {
      if (!el) { resolve(false); return }
      if (this.getState(el) === state) { resolve(true); return }
      const startTime = Date.now()
      const check = setInterval(() => {
        if (this.getState(el) === state) { clearInterval(check); resolve(true) }
        else if (Date.now() - startTime > timeout) { clearInterval(check); resolve(false) }
      }, 16)
    })
  },

  waitForVisible(el, visible, timeout = 1000) {
    return new Promise(resolve => {
      if (!el) { resolve(false); return }
      if (this.isVisible(el) === visible) { resolve(true); return }
      const startTime = Date.now()
      const check = setInterval(() => {
        if (this.isVisible(el) === visible) { clearInterval(check); resolve(true) }
        else if (Date.now() - startTime > timeout) { clearInterval(check); resolve(false) }
      }, 16)
    })
  },

  // Debug
  logStateMachine(el) {
    const info = this.getStateMachineInfo(el)
    if (!info) { console.log('[Mirror Test API] No state machine'); return }
    console.group('[Mirror Test API] State Machine')
    console.log('Current:', info.current)
    console.log('Initial:', info.initial)
    console.log('States:', info.states)
    console.log('Transitions:', info.transitions)
    console.groupEnd()
  },

  getStateMachineInfo(el) {
    if (!el?._stateMachine) return null
    const sm = el._stateMachine
    return {
      current: sm.current,
      initial: sm.initial,
      states: Object.keys(sm.states),
      transitions: sm.transitions.map(t => ({
        trigger: t.trigger, to: t.to, key: t.key, modifier: t.modifier
      }))
    }
  },

  // Navigation
  _navigationHistory: [],
  _historyIndex: -1,

  navigate(target) {
    if (!target) return
    _runtime.navigate(target, null)
  },

  navigateToPage(pageName) {
    if (!pageName) return Promise.resolve()
    // Track history
    if (this._historyIndex < this._navigationHistory.length - 1) {
      this._navigationHistory = this._navigationHistory.slice(0, this._historyIndex + 1)
    }
    this._navigationHistory.push(pageName)
    this._historyIndex = this._navigationHistory.length - 1

    _runtime.navigateToPage(pageName, null)
    return new Promise(resolve => setTimeout(resolve, 50))
  },

  goBack() {
    if (this._historyIndex <= 0) return
    this._historyIndex--
    const previousPage = this._navigationHistory[this._historyIndex]
    if (previousPage) _runtime.navigateToPage(previousPage, null)
  },

  goForward() {
    if (this._historyIndex >= this._navigationHistory.length - 1) return
    this._historyIndex++
    const nextPage = this._navigationHistory[this._historyIndex]
    if (nextPage) _runtime.navigateToPage(nextPage, null)
  },

  getCurrentPage() {
    if (this._historyIndex >= 0 && this._historyIndex < this._navigationHistory.length) {
      return this._navigationHistory[this._historyIndex]
    }
    return null
  },

  getNavigationHistory() {
    return [...this._navigationHistory]
  },

  getNavigationState() {
    return {
      currentPage: this.getCurrentPage(),
      history: this.getNavigationHistory(),
      canGoBack: this._historyIndex > 0,
      canGoForward: this._historyIndex < this._navigationHistory.length - 1,
    }
  },

  getPageContainer() {
    return _runtime.getPageContainer()
  },

  showView(view) {
    if (!view) return
    view.style.display = ''
    view.hidden = false
  },

  hideView(view) {
    if (!view) return
    view.style.display = 'none'
    view.hidden = true
  },

  switchToView(view) {
    if (!view) return
    const parent = view.parentElement
    if (!parent) return
    Array.from(parent.children).forEach(sibling => {
      if (sibling.dataset?.component) {
        if (sibling === view) {
          sibling.style.display = ''
          sibling.hidden = false
        } else {
          sibling.style.display = 'none'
          sibling.hidden = true
        }
      }
    })
  },

  getActiveView(container) {
    const searchContainer = container || document.body
    const views = searchContainer.querySelectorAll('[data-component]')
    for (const view of views) {
      if (this._isViewVisible(view)) return view
    }
    return null
  },

  getAllViews(container) {
    const searchContainer = container || document.body
    return Array.from(searchContainer.querySelectorAll('[data-component]'))
  },

  getViewByName(name) {
    return document.querySelector('[data-component="' + name + '"]')
  },

  _isViewVisible(view) {
    if (!view) return false
    const style = window.getComputedStyle(view)
    return style.display !== 'none' && !view.hidden
  },

  waitForNavigation(pageName, timeout = 1000) {
    return new Promise(resolve => {
      if (this.getCurrentPage() === pageName) { resolve(true); return }
      const startTime = Date.now()
      const check = setInterval(() => {
        if (this.getCurrentPage() === pageName) { clearInterval(check); resolve(true) }
        else if (Date.now() - startTime > timeout) { clearInterval(check); resolve(false) }
      }, 16)
    })
  },

  waitForViewChange(view, timeout = 1000) {
    return new Promise(resolve => {
      if (!view) { resolve(false); return }
      if (this._isViewVisible(view)) { resolve(true); return }
      const startTime = Date.now()
      const check = setInterval(() => {
        if (this._isViewVisible(view)) { clearInterval(check); resolve(true) }
        else if (Date.now() - startTime > timeout) { clearInterval(check); resolve(false) }
      }, 16)
    })
  },

  resetNavigationHistory() {
    this._navigationHistory = []
    this._historyIndex = -1
  },
}

// Expose Test API on window
if (typeof window !== 'undefined') {
  window.__MIRROR_TEST__ = __MIRROR_TEST__
}
