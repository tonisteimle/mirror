          break
      }
    })

    // ========================================
    // ACCESSIBILITY
    // ========================================

    triggers.forEach((trigger, i) => {
      const contentValue = trigger.dataset.value
      const content = Array.from(contents).find(c => c.dataset.value === contentValue)
      const contentId = content ? (content.id || `tabpanel-${el._zagConfig.id}-${i}`) : ''

      if (content && !content.id) {
        content.id = contentId
      }

      trigger.setAttribute('aria-controls', contentId)

      if (content) {
        const triggerId = trigger.id || `tab-${el._zagConfig.id}-${i}`
        if (!trigger.id) trigger.id = triggerId
        content.setAttribute('aria-labelledby', triggerId)
      }
    })

    // ========================================
    // INITIAL STATE
    // ========================================

    updateUI()

    // Update indicator position after render
    requestAnimationFrame(() => {
      if (el._tabsState.value) {
        const activeTrigger = Array.from(triggers).find(t => t.dataset.value === el._tabsState.value)
        if (activeTrigger) {
          updateIndicator(activeTrigger)
        }
      }
    })
  },

  // Switch component initialization
  initSwitchComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig
    const track = el.querySelector('[data-slot="Track"]')
    const thumb = track?.querySelector('[data-slot="Thumb"]')
    const label = el.querySelector('[data-slot="Label"]')

    if (!track || !thumb) return

    // Get config values
    const defaultChecked = config.machineConfig?.checked || config.machineConfig?.defaultChecked || false
    const isDisabled = config.machineConfig?.disabled || false
    const isReadOnly = config.machineConfig?.readOnly || false
    const isInvalid = config.machineConfig?.invalid || false

    // Initialize state
    el._switchState = {
      checked: defaultChecked,
    }

    // ========================================
    // DEFAULT STYLING (granular - only set if not already defined)
    // ========================================

    // Helper to set default style only if not already set
    const setDefault = (element, prop, value) => {
      if (!element.style[prop]) element.style[prop] = value
    }

    // Root (label) styling - always set structural
    setDefault(el, 'display', 'inline-flex')
    setDefault(el, 'alignItems', 'center')
    setDefault(el, 'gap', '8px')
    setDefault(el, 'cursor', isDisabled ? 'not-allowed' : 'pointer')
    el.style.userSelect = 'none'

    // Track styling - structural (always needed)
    track.style.display = 'inline-flex'
    track.style.alignItems = 'center'
    track.style.flexShrink = '0'
    track.style.transition = 'background 0.15s ease'
    // Dimensions - default if not set
    setDefault(track, 'width', '36px')
    setDefault(track, 'height', '20px')
    setDefault(track, 'padding', '2px')
    // Visual - default if not set
    setDefault(track, 'borderRadius', '10px')
    if (!track.style.background) {
      track.style.background = el._switchState.checked ? '#4f46e5' : '#333'
    }

    // Thumb styling - structural (always needed)
    thumb.style.display = 'block'
    thumb.style.transition = 'transform 0.15s ease'
    // Dimensions - default if not set
    setDefault(thumb, 'width', '16px')
    setDefault(thumb, 'height', '16px')
    // Visual - default if not set
    setDefault(thumb, 'borderRadius', '50%')
    setDefault(thumb, 'background', '#fff')
    setDefault(thumb, 'boxShadow', '0 1px 3px rgba(0,0,0,0.3)')

    // Calculate initial transform based on dimensions
    const trackWidth = parseInt(track.style.width) || 36
    const thumbWidth = parseInt(thumb.style.width) || 16
    const trackPadding = parseInt(track.style.padding) || 2
    const initialTranslate = el._switchState.checked ? (trackWidth - thumbWidth - trackPadding * 2) : 0
    thumb.style.transform = el._switchState.checked ? `translateX(${initialTranslate}px)` : 'translateX(0)'

    // Label styling - default if not set
    if (label) {
      setDefault(label, 'fontSize', '13px')
      setDefault(label, 'color', '#e0e0e0')
    }

    // ========================================
    // STATE MANAGEMENT
    // ========================================

    // Track if background was customized (set before runtime)
    const trackBgCustomized = !!track.style.background && track.style.background !== '#4f46e5' && track.style.background !== '#333' && track.style.background !== 'rgb(79, 70, 229)' && track.style.background !== 'rgb(51, 51, 51)'

    const updateUI = () => {
      const checked = el._switchState.checked

      // Update accessibility
      el.setAttribute('aria-checked', checked.toString())

      // Update data attributes
      el.setAttribute('data-state', checked ? 'checked' : 'unchecked')
      track.setAttribute('data-state', checked ? 'checked' : 'unchecked')
      thumb.setAttribute('data-state', checked ? 'checked' : 'unchecked')

      // Calculate thumb translate based on track/thumb dimensions
      const trackWidth = parseInt(track.style.width) || 36
      const thumbWidth = parseInt(thumb.style.width) || 16
      const padding = parseInt(track.style.padding) || 2
      const translateX = checked ? (trackWidth - thumbWidth - padding * 2) : 0

      // Thumb transform always needed for animation
      thumb.style.transform = checked ? `translateX(${translateX}px)` : 'translateX(0)'

      // Track background - only animate if NOT customized
      if (!trackBgCustomized) {
        track.style.background = checked ? '#4f46e5' : '#333'
      }
    }

    const toggle = () => {
      if (isDisabled || isReadOnly) return

      const previousChecked = el._switchState.checked
      el._switchState.checked = !previousChecked
      updateUI()

      // Fire change event
      el.dispatchEvent(new CustomEvent('change', {
        detail: { checked: el._switchState.checked },
        bubbles: true
      }))
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    // Click to toggle
    el.addEventListener('click', (e) => {
      e.preventDefault()
      toggle()
    })

    // Keyboard support
    el.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault()
        toggle()
      }
    })

    // Focus handling
    el.setAttribute('tabindex', isDisabled ? '-1' : '0')
    el.setAttribute('role', 'switch')
    el.setAttribute('aria-checked', el._switchState.checked.toString())

    // Store original box-shadow for focus handling
    const originalBoxShadow = track.style.boxShadow || ''

    el.addEventListener('focus', () => {
      track.setAttribute('data-focus', 'true')
      track.style.boxShadow = '0 0 0 2px rgba(79, 70, 229, 0.3)'
    })

    el.addEventListener('blur', () => {
      track.removeAttribute('data-focus')
      track.style.boxShadow = originalBoxShadow
    })

    // ========================================
    // DISABLED STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
      track.setAttribute('data-disabled', 'true')
      el.style.opacity = '0.5'
      el.style.cursor = 'not-allowed'
    }

    if (isInvalid) {
      el.setAttribute('data-invalid', 'true')
      track.setAttribute('data-invalid', 'true')
    }

    if (isReadOnly) {
      el.setAttribute('data-readonly', 'true')
    }

    // ========================================
    // INITIAL STATE
    // ========================================

    updateUI()
  },

  // ========================================
  // DatePicker Component
  // ========================================
  initDatePickerComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig

    // Create missing elements if needed (robust initialization)
    let control = el.querySelector('[data-slot="Control"]')
    let input = el.querySelector('[data-slot="Input"]')
    let trigger = el.querySelector('[data-slot="Trigger"]')
    let content = el.querySelector('[data-slot="Content"]')

    // Auto-create structure if missing
    if (!control) {
      control = document.createElement('div')
      control.dataset.slot = 'Control'
      el.appendChild(control)
    }
    if (!input) {
      input = document.createElement('input')
      input.type = 'text'
      input.dataset.slot = 'Input'
      input.placeholder = config.machineConfig?.placeholder || 'Select date...'
      control.appendChild(input)
    }
    if (!trigger) {
      trigger = document.createElement('button')
      trigger.type = 'button'
      trigger.dataset.slot = 'Trigger'
      trigger.setAttribute('aria-label', 'Open calendar')
      trigger.innerHTML = _runtime._icons.calendar(16)
      control.appendChild(trigger)
    }
    if (!content) {
      content = document.createElement('div')
      content.dataset.slot = 'Content'
      el.appendChild(content)
    }

    // Get config values
    const locale = config.machineConfig?.locale || 'en-US'
    const selectionMode = config.machineConfig?.selectionMode || 'single'
    const startOfWeek = config.machineConfig?.startOfWeek ?? 0
    const isDisabled = config.machineConfig?.disabled || false
    const isReadOnly = config.machineConfig?.readOnly || false
    const isInline = config.machineConfig?.inline || false
    const closeOnSelect = config.machineConfig?.closeOnSelect !== false
    const minDate = config.machineConfig?.min ? new Date(config.machineConfig.min) : null
    const maxDate = config.machineConfig?.max ? new Date(config.machineConfig.max) : null

    // Initialize state
    const today = new Date()
    el._datePickerState = {
      open: isInline,
      focusedDate: today,
      viewDate: new Date(today.getFullYear(), today.getMonth(), 1),
      selectedDates: [],
      view: 'day', // day, month, year
    }

    // Parse initial value
    if (config.machineConfig?.value || config.machineConfig?.defaultValue) {
      const dateStr = config.machineConfig?.value || config.machineConfig?.defaultValue
      const parsed = new Date(dateStr)
      if (!isNaN(parsed.getTime())) {
        el._datePickerState.selectedDates = [parsed]
        el._datePickerState.viewDate = new Date(parsed.getFullYear(), parsed.getMonth(), 1)
      }
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const formatDate = (date, fmt = 'short') => {
      if (!date) return ''
      try {
        return new Intl.DateTimeFormat(locale, { dateStyle: fmt }).format(date)
      } catch {
        // Intl.DateTimeFormat failed (unsupported format/locale) - use basic fallback
        return date.toLocaleDateString()
      }
    }

    const isSameDay = (a, b) => {
      if (!a || !b) return false
      return a.getFullYear() === b.getFullYear() &&
             a.getMonth() === b.getMonth() &&
             a.getDate() === b.getDate()
    }

    const isDateDisabled = (date) => {
      if (minDate && date < minDate) return true
      if (maxDate && date > maxDate) return true
      return false
    }

    const getDaysInMonth = (year, month) => {
      return new Date(year, month + 1, 0).getDate()
    }

    const getWeekdayNames = () => {
      const names = []
      const date = new Date(2024, 0, startOfWeek) // Start from a known Sunday (Jan 2024)
      // Adjust to get first day of week
      while (date.getDay() !== startOfWeek) {
        date.setDate(date.getDate() + 1)
      }
      for (let i = 0; i < 7; i++) {
        names.push(new Intl.DateTimeFormat(locale, { weekday: 'short' }).format(date))
        date.setDate(date.getDate() + 1)
      }
      return names
    }

    const getMonthName = (month, year) => {
      const date = new Date(year, month, 1)
      return new Intl.DateTimeFormat(locale, { month: 'long', year: 'numeric' }).format(date)
    }

    // ========================================
    // DEFAULT STYLING
    // ========================================

    const setDefault = (element, prop, value) => {
      if (!element.style[prop]) element.style[prop] = value
    }

    // Root styling
    setDefault(el, 'position', 'relative')
    setDefault(el, 'display', 'inline-block')

    // Control styling
    setDefault(control, 'display', 'flex')
    setDefault(control, 'alignItems', 'center')
    setDefault(control, 'gap', '0')
    setDefault(control, 'background', '#1a1a1a')
    setDefault(control, 'border', '1px solid #333')
    setDefault(control, 'borderRadius', '6px')
    setDefault(control, 'overflow', 'hidden')

    // Input styling
    setDefault(input, 'flex', '1')
    setDefault(input, 'padding', '8px 12px')
    setDefault(input, 'background', 'transparent')
    setDefault(input, 'border', 'none')
    setDefault(input, 'outline', 'none')
    setDefault(input, 'color', '#e0e0e0')
    setDefault(input, 'fontSize', '13px')
    setDefault(input, 'minWidth', '140px')
    input.readOnly = true

    // Trigger styling
    setDefault(trigger, 'padding', '8px 10px')
    setDefault(trigger, 'background', 'transparent')
    setDefault(trigger, 'border', 'none')
    setDefault(trigger, 'borderLeft', '1px solid #333')
    setDefault(trigger, 'cursor', isDisabled ? 'not-allowed' : 'pointer')
    setDefault(trigger, 'color', '#888')
    setDefault(trigger, 'display', 'flex')
    setDefault(trigger, 'alignItems', 'center')
    setDefault(trigger, 'justifyContent', 'center')

    // Content (calendar popup) styling
    content.style.position = isInline ? 'relative' : 'absolute'
    content.style.top = isInline ? '0' : '100%'
    content.style.left = '0'
    content.style.marginTop = isInline ? '0' : '4px'
    content.style.zIndex = '1000'
    setDefault(content, 'background', '#1a1a1a')
    setDefault(content, 'border', '1px solid #333')
    setDefault(content, 'borderRadius', '8px')
    setDefault(content, 'padding', '12px')
    setDefault(content, 'boxShadow', '0 4px 20px rgba(0,0,0,0.4)')
    setDefault(content, 'minWidth', '280px')

    if (!isInline) {
      content.style.display = 'none'
    }

    // ========================================
    // CALENDAR RENDERING
    // ========================================

    const renderCalendar = () => {
      const state = el._datePickerState
      const { viewDate, selectedDates, view } = state

      if (view === 'day') {
        renderDayView(viewDate, selectedDates)
      } else if (view === 'month') {
        renderMonthView(viewDate.getFullYear())
      } else if (view === 'year') {
        renderYearView(viewDate.getFullYear())
      }
    }

    const renderDayView = (viewDate, selectedDates) => {
      const year = viewDate.getFullYear()
      const month = viewDate.getMonth()
      const daysInMonth = getDaysInMonth(year, month)
      const firstDayOfMonth = new Date(year, month, 1).getDay()
      const offset = (firstDayOfMonth - startOfWeek + 7) % 7
      const weekdays = getWeekdayNames()

      let html = `
        <div data-part="view-control" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <button data-part="prev-trigger" type="button" style="background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 8px; border-radius: 4px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button data-part="view-trigger" type="button" style="background: transparent; border: none; color: #e0e0e0; cursor: pointer; font-size: 14px; font-weight: 500; padding: 4px 8px; border-radius: 4px;">
            ${getMonthName(month, year)}
          </button>
          <button data-part="next-trigger" type="button" style="background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 8px; border-radius: 4px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <table data-part="table" style="width: 100%; border-collapse: collapse; text-align: center;">
          <thead data-part="table-head">
            <tr>${weekdays.map(d => `<th style="color: #666; font-size: 11px; font-weight: 500; padding: 4px 0;">${d}</th>`).join('')}</tr>
          </thead>
          <tbody data-part="table-body">
      `

      let day = 1
      for (let week = 0; week < 6; week++) {
        html += '<tr>'
        for (let dow = 0; dow < 7; dow++) {
          const cellIndex = week * 7 + dow
          if (cellIndex < offset || day > daysInMonth) {
            html += '<td style="padding: 2px;"></td>'
          } else {
            const date = new Date(year, month, day)
            const isSelected = selectedDates.some(d => isSameDay(d, date))
            const isToday = isSameDay(date, new Date())
            const disabled = isDateDisabled(date)

            const cellStyle = `
              padding: 2px;
            `
            const btnStyle = `
              width: 32px;
              height: 32px;
              border: none;
              border-radius: 6px;
              cursor: ${disabled ? 'not-allowed' : 'pointer'};
              font-size: 13px;
              background: ${isSelected ? '#4f46e5' : 'transparent'};
              color: ${disabled ? '#444' : isSelected ? '#fff' : isToday ? '#4f46e5' : '#e0e0e0'};
              font-weight: ${isToday ? '600' : '400'};
              opacity: ${disabled ? '0.5' : '1'};
            `

            html += `
              <td data-part="day-table-cell" style="${cellStyle}">
                <button
                  data-part="day-table-cell-trigger"
                  data-day="${day}"
                  data-date="${date.toISOString()}"
                  type="button"
                  style="${btnStyle}"
                  ${disabled ? 'disabled' : ''}
                  ${isSelected ? 'data-selected="true"' : ''}
                  ${isToday ? 'data-today="true"' : ''}
                >${day}</button>
              </td>
            `
            day++
          }
        }
        html += '</tr>'
        if (day > daysInMonth) break
      }

      html += '</tbody></table>'
      content.innerHTML = html

      // Bind events
      bindCalendarEvents()
    }

    const renderMonthView = (year) => {
      const months = []
      for (let i = 0; i < 12; i++) {
        const date = new Date(year, i, 1)
        months.push(new Intl.DateTimeFormat(locale, { month: 'short' }).format(date))
      }

      let html = `
        <div data-part="view-control" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <button data-part="prev-trigger" type="button" style="background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button data-part="view-trigger" type="button" style="background: transparent; border: none; color: #e0e0e0; cursor: pointer; font-size: 14px; font-weight: 500; padding: 4px 8px;">
            ${year}
          </button>
          <button data-part="next-trigger" type="button" style="background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
      `

      months.forEach((name, i) => {
        const isCurrentMonth = el._datePickerState.viewDate.getMonth() === i && el._datePickerState.viewDate.getFullYear() === year
        html += `
          <button
            data-part="month-table-cell-trigger"
            data-month="${i}"
            type="button"
            style="padding: 12px 8px; background: ${isCurrentMonth ? '#4f46e5' : 'transparent'}; color: ${isCurrentMonth ? '#fff' : '#e0e0e0'}; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;"
          >${name}</button>
        `
      })

      html += '</div>'
      content.innerHTML = html
      bindCalendarEvents()
    }

    const renderYearView = (centerYear) => {
      const startYear = centerYear - 5
      const years = []
      for (let i = 0; i < 12; i++) {
        years.push(startYear + i)
      }

      let html = `
        <div data-part="view-control" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <button data-part="prev-trigger" type="button" style="background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span style="color: #e0e0e0; font-size: 14px; font-weight: 500;">${startYear} - ${startYear + 11}</span>
          <button data-part="next-trigger" type="button" style="background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
      `

      years.forEach(y => {
        const isCurrentYear = el._datePickerState.viewDate.getFullYear() === y
        html += `
          <button
            data-part="year-table-cell-trigger"
            data-year="${y}"
            type="button"
            style="padding: 12px 8px; background: ${isCurrentYear ? '#4f46e5' : 'transparent'}; color: ${isCurrentYear ? '#fff' : '#e0e0e0'}; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;"
          >${y}</button>
        `
      })

      html += '</div>'
      content.innerHTML = html
      bindCalendarEvents()
    }

    const bindCalendarEvents = () => {
      const state = el._datePickerState

      // Day selection
      content.querySelectorAll('[data-part="day-table-cell-trigger"]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.disabled) return
          const dateStr = btn.getAttribute('data-date')
          const date = new Date(dateStr)
          selectDate(date)
        })
        btn.addEventListener('mouseenter', () => {
          if (!btn.disabled) btn.style.background = btn.hasAttribute('data-selected') ? '#4f46e5' : '#252525'
        })
        btn.addEventListener('mouseleave', () => {
          if (!btn.disabled) btn.style.background = btn.hasAttribute('data-selected') ? '#4f46e5' : 'transparent'
        })
      })

      // Month selection
      content.querySelectorAll('[data-part="month-table-cell-trigger"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const month = parseInt(btn.getAttribute('data-month'))
          state.viewDate = new Date(state.viewDate.getFullYear(), month, 1)
          state.view = 'day'
          renderCalendar()
        })
      })

      // Year selection
      content.querySelectorAll('[data-part="year-table-cell-trigger"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const year = parseInt(btn.getAttribute('data-year'))
          state.viewDate = new Date(year, state.viewDate.getMonth(), 1)
          state.view = 'month'
          renderCalendar()
        })
      })

      // View trigger (month/year header)
      const viewTrigger = content.querySelector('[data-part="view-trigger"]')
      if (viewTrigger) {
        viewTrigger.addEventListener('click', () => {
          if (state.view === 'day') {
            state.view = 'month'
          } else if (state.view === 'month') {
            state.view = 'year'
          }
          renderCalendar()
        })
      }

      // Prev/Next navigation
      const prevTrigger = content.querySelector('[data-part="prev-trigger"]')
      const nextTrigger = content.querySelector('[data-part="next-trigger"]')

      if (prevTrigger) {
        prevTrigger.addEventListener('click', () => {
          if (state.view === 'day') {
            state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth() - 1, 1)
          } else if (state.view === 'month') {
            state.viewDate = new Date(state.viewDate.getFullYear() - 1, state.viewDate.getMonth(), 1)
          } else if (state.view === 'year') {
            state.viewDate = new Date(state.viewDate.getFullYear() - 12, state.viewDate.getMonth(), 1)
          }
          renderCalendar()
        })
      }

      if (nextTrigger) {
        nextTrigger.addEventListener('click', () => {
          if (state.view === 'day') {
            state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth() + 1, 1)
          } else if (state.view === 'month') {
            state.viewDate = new Date(state.viewDate.getFullYear() + 1, state.viewDate.getMonth(), 1)
          } else if (state.view === 'year') {
            state.viewDate = new Date(state.viewDate.getFullYear() + 12, state.viewDate.getMonth(), 1)
          }
          renderCalendar()
        })
      }
    }

    // ========================================
    // DATE SELECTION
    // ========================================

    const selectDate = (date) => {
      const state = el._datePickerState

      if (selectionMode === 'single') {
        state.selectedDates = [date]
      } else if (selectionMode === 'multiple') {
        const idx = state.selectedDates.findIndex(d => isSameDay(d, date))
        if (idx >= 0) {
          state.selectedDates.splice(idx, 1)
        } else {
          state.selectedDates.push(date)
        }
      } else if (selectionMode === 'range') {
        if (state.selectedDates.length === 0 || state.selectedDates.length === 2) {
          state.selectedDates = [date]
        } else {
          const start = state.selectedDates[0]
          if (date < start) {
            state.selectedDates = [date, start]
          } else {
            state.selectedDates = [start, date]
          }
        }
      }

      updateInputValue()
      renderCalendar()

      // Fire change event
      el.dispatchEvent(new CustomEvent('change', {
        detail: {
          value: state.selectedDates.map(d => d.toISOString().split('T')[0]),
          dates: state.selectedDates,
        },
        bubbles: true
      }))

      // Close popup if configured
      if (closeOnSelect && !isInline && selectionMode === 'single') {
        closeCalendar()
      }
      if (closeOnSelect && !isInline && selectionMode === 'range' && state.selectedDates.length === 2) {
        closeCalendar()
      }
    }

    const updateInputValue = () => {
      const state = el._datePickerState
      if (state.selectedDates.length === 0) {
        input.value = ''
      } else if (selectionMode === 'range' && state.selectedDates.length === 2) {
        input.value = `${formatDate(state.selectedDates[0])} - ${formatDate(state.selectedDates[1])}`
      } else {
        input.value = state.selectedDates.map(d => formatDate(d)).join(', ')
      }
    }

    // ========================================
    // OPEN/CLOSE
    // ========================================

    const openCalendar = () => {
      if (isDisabled || isInline) return
      el._datePickerState.open = true
      el._datePickerState.view = 'day'
      content.style.display = 'block'
      el.setAttribute('data-state', 'open')
      renderCalendar()

      el.dispatchEvent(new CustomEvent('open', { bubbles: true }))
    }

    const closeCalendar = () => {
      if (isInline) return
      el._datePickerState.open = false
      content.style.display = 'none'
      el.setAttribute('data-state', 'closed')

      el.dispatchEvent(new CustomEvent('close', { bubbles: true }))
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    // Debounce flag to prevent double-firing from pointerdown + click
    let lastToggleTime = 0

    // Toggle calendar helper with debounce
    const toggleCalendar = (e) => {
      const now = Date.now()
      if (now - lastToggleTime < 100) return // Debounce 100ms
      lastToggleTime = now

      if (e) {
        e.preventDefault()
        e.stopPropagation()
      }
      if (el._datePickerState.open) {
        closeCalendar()
      } else {
        openCalendar()
      }
    }

    // Trigger click - multiple event types for robustness
    // Using both click and pointerdown ensures compatibility with
    // different browsers, Shadow DOM, and automation tools
    trigger.addEventListener('click', toggleCalendar)
    trigger.addEventListener('pointerdown', (e) => {
      // Only handle primary button (left click)
      if (e.button !== 0) return
      toggleCalendar(e)
    })

    // Input click (also opens) - same robust handling
    let lastInputOpenTime = 0
    const openFromInput = (e) => {
      const now = Date.now()
      if (now - lastInputOpenTime < 100) return
      lastInputOpenTime = now

      if (e) {
        e.preventDefault()
        e.stopPropagation()
      }
      if (!el._datePickerState.open) {
        openCalendar()
      }
    }
    input.addEventListener('click', openFromInput)
    input.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return
      openFromInput(e)
    })

    // Click outside to close (use composedPath for Shadow DOM compatibility)
    document.addEventListener('click', (e) => {
      if (el._datePickerState.open && !e.composedPath().includes(el)) {
        closeCalendar()
      }
    })

    // Keyboard navigation
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && el._datePickerState.open) {
        closeCalendar()
        trigger.focus()
      }
    })

    // ========================================
    // ACCESSIBILITY
    // ========================================

    el.setAttribute('role', 'group')
    trigger.setAttribute('aria-label', 'Open calendar')
    trigger.setAttribute('aria-haspopup', 'dialog')

    // ========================================
    // DISABLED STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
      el.style.opacity = '0.5'
      el.style.pointerEvents = 'none'
    }

    // ========================================
    // INITIAL RENDER
    // ========================================

    updateInputValue()
    el.setAttribute('data-state', isInline ? 'open' : 'closed')
    if (isInline) {
      renderCalendar()
    }
  },

  // ========================================
  // DATE INPUT COMPONENT
  // ========================================
  initDateInputComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get control container
    let control = el.querySelector('[data-slot="Control"]')
    if (!control) {
      control = document.createElement('div')
      control.dataset.slot = 'Control'
      el.appendChild(control)
    }

    // Configuration
    const locale = config.locale || 'de-DE'
    const isDisabled = config.disabled === true
    const isReadOnly = config.readOnly === true

    // Parse locale to determine segment order
    // Common patterns: de-DE (DD.MM.YYYY), en-US (MM/DD/YYYY), en-GB (DD/MM/YYYY)
    let segments = ['day', 'month', 'year']
    let separator = '.'
    if (locale.startsWith('en-US')) {
      segments = ['month', 'day', 'year']
      separator = '/'
    } else if (locale.startsWith('en')) {
      segments = ['day', 'month', 'year']
      separator = '/'
    }

    // Initialize state
    const today = new Date()
    el._dateInputState = {
      day: '',
      month: '',
      year: '',
      focusedSegment: null
    }

    // Parse initial value
    if (config.value || config.defaultValue) {
      const dateStr = config.value || config.defaultValue
      const parsed = new Date(dateStr)
      if (!isNaN(parsed.getTime())) {
        el._dateInputState.day = String(parsed.getDate()).padStart(2, '0')
        el._dateInputState.month = String(parsed.getMonth() + 1).padStart(2, '0')
        el._dateInputState.year = String(parsed.getFullYear())
      }
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, value) => {
      if (element && !element.style[prop]) {
        element.style[prop] = value
      }
    }

    // Root styles
    setDefault(el, 'display', 'inline-flex')
    setDefault(el, 'flexDirection', 'column')
    setDefault(el, 'gap', '4px')

    // Control styles
    setDefault(control, 'display', 'inline-flex')
    setDefault(control, 'alignItems', 'center')
    setDefault(control, 'background', '#1a1a1a')
    setDefault(control, 'border', '1px solid #333')
    setDefault(control, 'borderRadius', '6px')
    setDefault(control, 'padding', '8px 12px')
    setDefault(control, 'gap', '2px')

    // ========================================
    // CREATE SEGMENTS
    // ========================================

    // Get slot styles
    const segmentSlot = el._zagConfig?.slots?.Segment
    const separatorSlot = el._zagConfig?.slots?.Separator

    const createSegment = (type, maxLength, placeholder, minVal, maxVal) => {
      const segment = document.createElement('input')
      segment.type = 'text'
      segment.inputMode = 'numeric'
      segment.dataset.slot = 'Segment'
      segment.dataset.segmentType = type
      segment.placeholder = placeholder
      segment.maxLength = maxLength
      segment.size = maxLength

      // Apply slot styles if defined
      if (segmentSlot?.styles) {
        for (const style of segmentSlot.styles) {
          segment.style[style.property] = style.value
        }
      }

      // Default segment styles
      setDefault(segment, 'width', type === 'year' ? '44px' : '28px')
      setDefault(segment, 'textAlign', 'center')
      setDefault(segment, 'background', 'transparent')
      setDefault(segment, 'border', 'none')
      setDefault(segment, 'outline', 'none')
      setDefault(segment, 'color', '#e0e0e0')
      setDefault(segment, 'fontSize', '14px')
      setDefault(segment, 'fontFamily', 'inherit')
      setDefault(segment, 'padding', '0')

      if (isDisabled) {
        segment.disabled = true
        segment.style.cursor = 'not-allowed'
      }
      if (isReadOnly) {
        segment.readOnly = true
      }

      // Set initial value
      segment.value = el._dateInputState[type] || ''

      // Handle input
      segment.addEventListener('input', (e) => {
        let val = segment.value.replace(/D/g, '')
        if (val.length > maxLength) {
          val = val.slice(0, maxLength)
        }
        segment.value = val
        el._dateInputState[type] = val

        // Auto-advance to next segment
        if (val.length === maxLength) {
          const nextSegment = segment.nextElementSibling?.nextElementSibling
          if (nextSegment && nextSegment.dataset.slot === 'Segment') {
            nextSegment.focus()
            nextSegment.select()
          }
        }

        // Emit change event
        emitChange()
      })

      // Handle blur - pad values
      segment.addEventListener('blur', () => {
        el._dateInputState.focusedSegment = null
        el.setAttribute('data-focus', 'false')

        let val = segment.value
        if (val && type !== 'year') {
          val = val.padStart(maxLength, '0')
          // Clamp to valid range
          const num = parseInt(val, 10)
          if (num < minVal) val = String(minVal).padStart(maxLength, '0')
          if (num > maxVal) val = String(maxVal).padStart(maxLength, '0')
          segment.value = val
          el._dateInputState[type] = val
        }
      })

      // Handle focus
      segment.addEventListener('focus', () => {
        el._dateInputState.focusedSegment = type
        el.setAttribute('data-focus', 'true')
        segment.select()
      })

      // Handle keyboard
      segment.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
          e.preventDefault()
          let val = parseInt(segment.value || '0', 10)
          if (e.key === 'ArrowUp') val++
          else val--
          // Clamp
          if (val < minVal) val = maxVal
          if (val > maxVal) val = minVal
          segment.value = type === 'year' ? String(val) : String(val).padStart(maxLength, '0')
          el._dateInputState[type] = segment.value
          emitChange()
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
          const currentPos = segment.selectionStart
          const targetSibling = e.key === 'ArrowLeft'
            ? segment.previousElementSibling?.previousElementSibling
            : segment.nextElementSibling?.nextElementSibling

          if (targetSibling && targetSibling.dataset.slot === 'Segment') {
            if (e.key === 'ArrowLeft' && currentPos === 0) {
              e.preventDefault()
              targetSibling.focus()
              targetSibling.setSelectionRange(targetSibling.value.length, targetSibling.value.length)
            } else if (e.key === 'ArrowRight' && currentPos === segment.value.length) {
              e.preventDefault()
              targetSibling.focus()
              targetSibling.setSelectionRange(0, 0)
            }
          }
        } else if (e.key === 'Backspace' && segment.value === '') {
          // Move to previous segment if empty
          const prevSeg = segment.previousElementSibling?.previousElementSibling
          if (prevSeg && prevSeg.dataset.slot === 'Segment') {
            e.preventDefault()
            prevSeg.focus()
          }
        }
      })

      return segment
    }

    const createSeparator = () => {
      const sep = document.createElement('span')
      sep.dataset.slot = 'Separator'
      sep.textContent = separator

      // Apply slot styles if defined
      if (separatorSlot?.styles) {
        for (const style of separatorSlot.styles) {
          sep.style[style.property] = style.value
        }
      }

      // Default separator styles
      setDefault(sep, 'color', '#666')
      setDefault(sep, 'fontSize', '14px')
      setDefault(sep, 'userSelect', 'none')

      return sep
    }

    // Clear control and create segments in order
    control.innerHTML = ''

    const segmentConfigs = {
      day: { maxLength: 2, placeholder: 'TT', min: 1, max: 31 },
      month: { maxLength: 2, placeholder: 'MM', min: 1, max: 12 },
      year: { maxLength: 4, placeholder: 'JJJJ', min: 1900, max: 2100 }
    }

    segments.forEach((type, index) => {
      const cfg = segmentConfigs[type]
      const segment = createSegment(type, cfg.maxLength, cfg.placeholder, cfg.min, cfg.max)
      control.appendChild(segment)

      if (index < segments.length - 1) {
        control.appendChild(createSeparator())
      }
    })

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const getDateValue = () => {
      const { day, month, year } = el._dateInputState
      if (day && month && year && year.length === 4) {
        const d = new Date(parseInt(year), parseInt(month) - 1, parseInt(day))
        if (!isNaN(d.getTime())) {
          return d
        }
      }
      return null
    }

    const emitChange = () => {
      const date = getDateValue()
      el.dispatchEvent(new CustomEvent('change', {
        detail: { value: date, segments: { ...el._dateInputState } },
        bubbles: true
      }))
    }

    // ========================================
    // ACCESSIBILITY
    // ========================================

    el.setAttribute('role', 'group')
    el.setAttribute('aria-label', 'Date input')

    // ========================================
    // DISABLED STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
      el.style.opacity = '0.5'
      el.style.pointerEvents = 'none'
    }

    // Set initial state
    el.setAttribute('data-focus', 'false')
  },

  // ========================================
  // NUMBER INPUT COMPONENT
  // ========================================
  initNumberInputComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const control = el.querySelector('[data-slot="Control"]')
    const input = el.querySelector('[data-slot="Input"]')
    const increment = el.querySelector('[data-slot="IncrementTrigger"]')
    const decrement = el.querySelector('[data-slot="DecrementTrigger"]')

    if (!input) return

    // Configuration
    const min = config.min !== undefined ? Number(config.min) : -Infinity
    const max = config.max !== undefined ? Number(config.max) : Infinity
    const step = config.step !== undefined ? Number(config.step) : 1
    const defaultValue = config.defaultValue !== undefined ? Number(config.defaultValue) : (config.value !== undefined ? Number(config.value) : 0)
    const isDisabled = config.disabled === true
    const isReadOnly = config.readOnly === true
    const allowMouseWheel = config.allowMouseWheel !== false
    const clampValueOnBlur = config.clampValueOnBlur !== false

    // State
    el._numberInputState = {
      value: defaultValue
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, value) => {
      if (element && !element.style[prop]) {
        element.style[prop] = value
      }
    }

    // Root styles
    setDefault(el, 'display', 'inline-flex')
    setDefault(el, 'flexDirection', 'column')
    setDefault(el, 'gap', '4px')

    // Control styles
    if (control) {
      setDefault(control, 'display', 'flex')
      setDefault(control, 'alignItems', 'center')
      setDefault(control, 'gap', '0')
      setDefault(control, 'border', '1px solid #333')
      setDefault(control, 'borderRadius', '6px')
      setDefault(control, 'overflow', 'hidden')
      setDefault(control, 'background', '#1a1a1a')
    }

    // Input styles
    setDefault(input, 'flex', '1')
    setDefault(input, 'minWidth', '60px')
    setDefault(input, 'padding', '8px 12px')
    setDefault(input, 'border', 'none')
    setDefault(input, 'background', 'transparent')
    setDefault(input, 'color', '#e0e0e0')
    setDefault(input, 'fontSize', '14px')
    setDefault(input, 'textAlign', 'center')
    setDefault(input, 'outline', 'none')

    // Button styles helper
    const styleButton = (btn) => {
      if (!btn) return
      setDefault(btn, 'display', 'flex')
      setDefault(btn, 'alignItems', 'center')
      setDefault(btn, 'justifyContent', 'center')
      setDefault(btn, 'width', '32px')
      setDefault(btn, 'height', '36px')
      setDefault(btn, 'border', 'none')
      setDefault(btn, 'background', '#252525')
      setDefault(btn, 'color', '#888')
      setDefault(btn, 'cursor', 'pointer')
      setDefault(btn, 'transition', 'background 0.15s, color 0.15s')
    }

    styleButton(decrement)
    styleButton(increment)

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const clamp = (value) => Math.min(max, Math.max(min, value))

    const formatValue = (value) => {
      if (config.formatOptions) {
        try {
          const locale = config.locale || 'en-US'
          return new Intl.NumberFormat(locale, config.formatOptions).format(value)
        } catch (e) {
          return String(value)
        }
      }
      return String(value)
    }

    const parseValue = (str) => {
      const cleaned = str.replace(/[^\d.\-]/g, '')
      const num = parseFloat(cleaned)
      return isNaN(num) ? el._numberInputState.value : num
    }

    const updateDisplay = () => {
      input.value = formatValue(el._numberInputState.value)
      updateButtonStates()
    }

    const updateButtonStates = () => {
      if (decrement) {
        const atMin = el._numberInputState.value <= min
        decrement.disabled = atMin || isDisabled
        decrement.style.opacity = atMin ? '0.5' : '1'
        decrement.style.cursor = atMin || isDisabled ? 'not-allowed' : 'pointer'
      }
      if (increment) {
        const atMax = el._numberInputState.value >= max
        increment.disabled = atMax || isDisabled
        increment.style.opacity = atMax ? '0.5' : '1'
        increment.style.cursor = atMax || isDisabled ? 'not-allowed' : 'pointer'
      }
    }

    const setValue = (newValue) => {
      const clamped = clamp(newValue)
      if (clamped !== el._numberInputState.value) {
        el._numberInputState.value = clamped
        updateDisplay()
        el.dispatchEvent(new CustomEvent('change', { detail: { value: clamped } }))
      }
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    // Increment button
    if (increment) {
      increment.addEventListener('click', () => {
        if (!isDisabled && !isReadOnly) {
          setValue(el._numberInputState.value + step)
        }
      })

      // Hover effect
      increment.addEventListener('mouseenter', () => {
        if (!increment.disabled) {
          increment.style.background = '#333'
          increment.style.color = '#fff'
        }
      })
      increment.addEventListener('mouseleave', () => {
        increment.style.background = '#252525'
        increment.style.color = '#888'
      })
    }

    // Decrement button
    if (decrement) {
      decrement.addEventListener('click', () => {
        if (!isDisabled && !isReadOnly) {
          setValue(el._numberInputState.value - step)
        }
      })

      // Hover effect
      decrement.addEventListener('mouseenter', () => {
        if (!decrement.disabled) {
          decrement.style.background = '#333'
          decrement.style.color = '#fff'
        }
      })
      decrement.addEventListener('mouseleave', () => {
        decrement.style.background = '#252525'
        decrement.style.color = '#888'
      })
    }

    // Input events
    input.addEventListener('input', () => {
      // Allow typing but don't validate yet
    })

    input.addEventListener('blur', () => {
      const parsed = parseValue(input.value)
      if (clampValueOnBlur) {
        setValue(clamp(parsed))
      } else {
        setValue(parsed)
      }
    })

    input.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp') {
        e.preventDefault()
        setValue(el._numberInputState.value + step)
      } else if (e.key === 'ArrowDown') {
        e.preventDefault()
        setValue(el._numberInputState.value - step)
      } else if (e.key === 'Enter') {
        input.blur()
      }
    })

    // Mouse wheel
    if (allowMouseWheel) {
      input.addEventListener('wheel', (e) => {
        if (document.activeElement === input && !isDisabled && !isReadOnly) {
          e.preventDefault()
          if (e.deltaY < 0) {
            setValue(el._numberInputState.value + step)
          } else {
            setValue(el._numberInputState.value - step)
          }
        }
      }, { passive: false })
    }

    // Focus styling
    input.addEventListener('focus', () => {
      if (control) {
        control.style.borderColor = '#4a9eff'
      }
      el.setAttribute('data-focus', 'true')
    })

    input.addEventListener('blur', () => {
      if (control) {
        control.style.borderColor = '#333'
      }
      el.removeAttribute('data-focus')
    })

    // ========================================
    // DISABLED STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
      el.style.opacity = '0.5'
      el.style.pointerEvents = 'none'
      input.disabled = true
    }

    if (isReadOnly) {
      el.setAttribute('data-readonly', 'true')
      input.readOnly = true
    }

    // ========================================
    // INITIAL RENDER
    // ========================================

    updateDisplay()
  },

  // ========================================
  // TAGS INPUT COMPONENT
  // ========================================
  initTagsInputComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const control = el.querySelector('[data-slot="Control"]')
    const input = el.querySelector('[data-slot="Input"]')

    if (!control || !input) return

    // Configuration
    const defaultValue = config.defaultValue || config.value || []
    const maxTags = config.maxTags !== undefined ? Number(config.maxTags) : Infinity
    const allowDuplicate = config.allowDuplicate === true
    const addOnPaste = config.addOnPaste !== false
    const addOnBlur = config.addOnBlur === true
    const delimiter = config.delimiter || ','
    const isDisabled = config.disabled === true
    const isReadOnly = config.readOnly === true
    const placeholder = config.placeholder || 'Add tag...'

    // State
    el._tagsInputState = {
      tags: Array.isArray(defaultValue) ? [...defaultValue] : [],
      highlightedIndex: -1
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, value) => {
      if (element && !element.style[prop]) {
        element.style[prop] = value
      }
    }

    // Root styles
    setDefault(el, 'display', 'inline-flex')
    setDefault(el, 'flexDirection', 'column')
    setDefault(el, 'gap', '4px')

    // Control styles (container for tags + input)
    setDefault(control, 'display', 'flex')
    setDefault(control, 'flexWrap', 'wrap')
    setDefault(control, 'alignItems', 'center')
    setDefault(control, 'gap', '4px')
    setDefault(control, 'padding', '6px 8px')
    setDefault(control, 'border', '1px solid #333')
    setDefault(control, 'borderRadius', '6px')
    setDefault(control, 'background', '#1a1a1a')
    setDefault(control, 'minHeight', '40px')
    setDefault(control, 'cursor', 'text')

    // Input styles
    setDefault(input, 'flex', '1')
    setDefault(input, 'minWidth', '80px')
    setDefault(input, 'padding', '4px')
    setDefault(input, 'border', 'none')
    setDefault(input, 'background', 'transparent')
    setDefault(input, 'color', '#e0e0e0')
    setDefault(input, 'fontSize', '14px')
    setDefault(input, 'outline', 'none')

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const createTagElement = (tagValue, index) => {
      const tag = document.createElement('span')
      tag.dataset.slot = 'Tag'
      tag.dataset.index = String(index)
      tag.dataset.value = tagValue
      tag.style.cssText = `
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        background: #333;
        color: #e0e0e0;
        border-radius: 4px;
        font-size: 13px;
        user-select: none;
      `

      const text = document.createElement('span')
      text.dataset.slot = 'TagText'
      text.textContent = tagValue
      tag.appendChild(text)

      if (!isReadOnly && !isDisabled) {
        const deleteBtn = document.createElement('button')
        deleteBtn.dataset.slot = 'TagDeleteTrigger'
        deleteBtn.type = 'button'
        deleteBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
        deleteBtn.style.cssText = `
          display: flex;
          align-items: center;
          justify-content: center;
          width: 16px;
          height: 16px;
          padding: 0;
          border: none;
          background: transparent;
          color: #888;
          cursor: pointer;
          border-radius: 2px;
        `
        deleteBtn.addEventListener('mouseenter', () => {
          deleteBtn.style.background = '#444'
          deleteBtn.style.color = '#fff'
        })
        deleteBtn.addEventListener('mouseleave', () => {
          deleteBtn.style.background = 'transparent'
          deleteBtn.style.color = '#888'
        })
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation()
          removeTag(index)
        })
        tag.appendChild(deleteBtn)
      }

      return tag
    }

    const renderTags = () => {
      // Remove existing tags
      const existingTags = control.querySelectorAll('[data-slot="Tag"]')
      existingTags.forEach(t => t.remove())

      // Create new tags (insert before input)
      el._tagsInputState.tags.forEach((tagValue, index) => {
        const tag = createTagElement(tagValue, index)
        control.insertBefore(tag, input)
      })

      // Update placeholder
      input.placeholder = el._tagsInputState.tags.length > 0 ? '' : placeholder
    }

    const addTag = (value) => {
      const trimmed = value.trim()
      if (!trimmed) return false

      // Check duplicate
      if (!allowDuplicate && el._tagsInputState.tags.includes(trimmed)) {
        return false
      }

      // Check max tags
      if (el._tagsInputState.tags.length >= maxTags) {
        return false
      }

      el._tagsInputState.tags.push(trimmed)
      renderTags()
      el.dispatchEvent(new CustomEvent('change', { detail: { tags: [...el._tagsInputState.tags] } }))
      return true
    }

    const removeTag = (index) => {
      if (index < 0 || index >= el._tagsInputState.tags.length) return
      el._tagsInputState.tags.splice(index, 1)
      renderTags()
      el.dispatchEvent(new CustomEvent('change', { detail: { tags: [...el._tagsInputState.tags] } }))
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    // Click on control focuses input
    control.addEventListener('click', () => {
      if (!isDisabled) {
        input.focus()
      }
    })

    // Input keydown
    input.addEventListener('keydown', (e) => {
      if (isDisabled || isReadOnly) return

      if (e.key === 'Enter' || e.key === delimiter) {
        e.preventDefault()
        if (addTag(input.value)) {
          input.value = ''
        }
      } else if (e.key === 'Backspace' && input.value === '' && el._tagsInputState.tags.length > 0) {
        removeTag(el._tagsInputState.tags.length - 1)
      }
    })

    // Blur handling
    if (addOnBlur) {
      input.addEventListener('blur', () => {
        if (input.value.trim()) {
          if (addTag(input.value)) {
            input.value = ''
          }
        }
      })
    }

    // Paste handling
    if (addOnPaste) {
      input.addEventListener('paste', (e) => {
        if (isDisabled || isReadOnly) return
        const pasteData = e.clipboardData?.getData('text') || ''
        if (pasteData.includes(delimiter)) {
          e.preventDefault()
          const values = pasteData.split(delimiter)
          values.forEach(v => addTag(v))
        }
      })
    }

    // Focus styling
    input.addEventListener('focus', () => {
      control.style.borderColor = '#4a9eff'
      el.setAttribute('data-focus', 'true')
    })

    input.addEventListener('blur', () => {
      control.style.borderColor = '#333'
      el.removeAttribute('data-focus')
    })

    // ========================================
    // DISABLED STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
      el.style.opacity = '0.5'
      el.style.pointerEvents = 'none'
      input.disabled = true
    }

    if (isReadOnly) {
      el.setAttribute('data-readonly', 'true')
      input.readOnly = true
    }

    // ========================================
    // INITIAL RENDER
    // ========================================

    renderTags()
  },

  // ========================================
  // EDITABLE COMPONENT
  // ========================================
  initEditableComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const area = el.querySelector('[data-slot="Area"]')
    const preview = el.querySelector('[data-slot="Preview"]')
    const input = el.querySelector('[data-slot="Input"]')

    if (!area || !preview || !input) return

    // Configuration
    const defaultValue = config.defaultValue || config.value || ''
    const placeholder = config.placeholder || 'Click to edit...'
    const activationMode = config.activationMode || 'click' // 'click', 'dblclick', 'focus'
    const submitMode = config.submitMode || 'enter' // 'enter', 'blur', 'both'
    const selectOnFocus = config.selectOnFocus !== false
    const isDisabled = config.disabled === true
    const isReadOnly = config.readOnly === true

    // State
    el._editableState = {
      value: defaultValue,
      editing: false
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, value) => {
      if (element && !element.style[prop]) {
        element.style[prop] = value
      }
    }

    // Root styles
    setDefault(el, 'display', 'inline-flex')
    setDefault(el, 'alignItems', 'center')

    // Area styles
    setDefault(area, 'position', 'relative')
    setDefault(area, 'display', 'inline-flex')
    setDefault(area, 'alignItems', 'center')
    setDefault(area, 'minWidth', '100px')

    // Preview styles
    setDefault(preview, 'display', 'inline-block')
    setDefault(preview, 'padding', '4px 8px')
    setDefault(preview, 'color', '#e0e0e0')
    setDefault(preview, 'fontSize', '14px')
    setDefault(preview, 'cursor', isDisabled || isReadOnly ? 'default' : 'pointer')
    setDefault(preview, 'borderRadius', '4px')
    setDefault(preview, 'transition', 'background 0.15s')

    // Input styles
    setDefault(input, 'padding', '4px 8px')
    setDefault(input, 'border', '1px solid #4a9eff')
    setDefault(input, 'borderRadius', '4px')
    setDefault(input, 'background', '#1a1a1a')
    setDefault(input, 'color', '#e0e0e0')
    setDefault(input, 'fontSize', '14px')
    setDefault(input, 'outline', 'none')
    setDefault(input, 'minWidth', '100px')

    // Initially hide input
    input.style.display = 'none'

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const enterEditMode = () => {
      if (isDisabled || isReadOnly || el._editableState.editing) return

      el._editableState.editing = true
      preview.style.display = 'none'
      input.style.display = 'inline-block'
      input.value = el._editableState.value
      input.focus()

      if (selectOnFocus) {
        input.select()
      }

      el.setAttribute('data-editing', 'true')
      el.dispatchEvent(new CustomEvent('edit', { detail: { value: el._editableState.value } }))
    }

    const exitEditMode = (save = true) => {
      if (!el._editableState.editing) return

      el._editableState.editing = false

      if (save) {
        const newValue = input.value
        if (newValue !== el._editableState.value) {
          el._editableState.value = newValue
          el.dispatchEvent(new CustomEvent('change', { detail: { value: newValue } }))
          el.dispatchEvent(new CustomEvent('submit', { detail: { value: newValue } }))
        }
      } else {
        // Reset input to previous value
        input.value = el._editableState.value
        el.dispatchEvent(new CustomEvent('cancel', { detail: { value: el._editableState.value } }))
      }

      // Update preview
      preview.textContent = el._editableState.value || placeholder
      if (!el._editableState.value) {
        preview.style.color = '#666'
      } else {
        preview.style.color = '#e0e0e0'
      }

      preview.style.display = 'inline-block'
      input.style.display = 'none'
      el.removeAttribute('data-editing')
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    // Activation
    if (activationMode === 'click') {
      preview.addEventListener('click', enterEditMode)
    } else if (activationMode === 'dblclick') {
      preview.addEventListener('dblclick', enterEditMode)
    }

    // Preview hover effect
    if (!isDisabled && !isReadOnly) {
      preview.addEventListener('mouseenter', () => {
        preview.style.background = '#252525'
      })
      preview.addEventListener('mouseleave', () => {
        preview.style.background = 'transparent'
      })
    }

    // Input events
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (submitMode === 'enter' || submitMode === 'both')) {
        e.preventDefault()
        exitEditMode(true)
      } else if (e.key === 'Escape') {
        e.preventDefault()
        exitEditMode(false)
      }
    })

    input.addEventListener('blur', () => {
      if (submitMode === 'blur' || submitMode === 'both') {
        exitEditMode(true)
      }
    })

    // ========================================
    // DISABLED STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
      el.style.opacity = '0.5'
      preview.style.cursor = 'default'
    }

    if (isReadOnly) {
      el.setAttribute('data-readonly', 'true')
      preview.style.cursor = 'default'
    }

    // ========================================
    // INITIAL RENDER
    // ========================================

    preview.textContent = el._editableState.value || placeholder
    if (!el._editableState.value) {
      preview.style.color = '#666'
    }
  },

  // ========================================
  // CHECKBOX COMPONENT
  // ========================================
  initCheckboxComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}

    // Get elements
    const hiddenInput = el.querySelector('[data-slot="HiddenInput"]')
    const control = el.querySelector('[data-slot="Control"]')
    const indicator = el.querySelector('[data-slot="Indicator"]')
    const label = el.querySelector('[data-slot="Label"]')

    if (!control) return

    // Configuration
    const defaultChecked = config.defaultChecked === true || config.checked === true
    const isDisabled = config.disabled === true
    const isReadOnly = config.readOnly === true
    const isInvalid = config.invalid === true
    const isRequired = config.required === true
    const isIndeterminate = config.defaultChecked === 'indeterminate' || config.indeterminate === true

    // State
    el._checkboxState = {
      checked: isIndeterminate ? 'indeterminate' : defaultChecked,
      focused: false
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, value) => {
      if (element && !element.style[prop]) {
        element.style[prop] = value
      }
    }

    // Root (label) styles
    setDefault(el, 'display', 'inline-flex')
    setDefault(el, 'alignItems', 'center')
    setDefault(el, 'gap', '8px')
    setDefault(el, 'cursor', isDisabled ? 'not-allowed' : 'pointer')
    setDefault(el, 'userSelect', 'none')
    setDefault(el, 'position', 'relative')

    // Control styles (the checkbox box)
    setDefault(control, 'display', 'flex')
    setDefault(control, 'alignItems', 'center')
    setDefault(control, 'justifyContent', 'center')
    setDefault(control, 'width', '18px')
    setDefault(control, 'height', '18px')
    setDefault(control, 'borderRadius', '4px')
    setDefault(control, 'border', '2px solid #555')
    setDefault(control, 'background', 'transparent')
    setDefault(control, 'transition', 'all 0.15s ease')
    setDefault(control, 'flexShrink', '0')

    // Indicator styles (checkmark) and load icon
    if (indicator) {
      setDefault(indicator, 'display', 'flex')
      setDefault(indicator, 'alignItems', 'center')
      setDefault(indicator, 'justifyContent', 'center')
      setDefault(indicator, 'color', '#fff')
      setDefault(indicator, 'opacity', '0')
      setDefault(indicator, 'transform', 'scale(0.8)')
      setDefault(indicator, 'transition', 'all 0.15s ease')

      // Load icon (from data-icon attribute or default 'check')
      const iconName = indicator.dataset.icon || 'check'
      this.loadIcon(indicator, iconName)
    }

    // Label styles
    if (label) {
      setDefault(label, 'fontSize', '14px')
      setDefault(label, 'color', '#e0e0e0')
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const updateDisplay = () => {
      const isChecked = el._checkboxState.checked === true
      const isIndet = el._checkboxState.checked === 'indeterminate'

      // Update data attributes
      el.setAttribute('data-state', isIndet ? 'indeterminate' : (isChecked ? 'checked' : 'unchecked'))
      control.setAttribute('data-state', isIndet ? 'indeterminate' : (isChecked ? 'checked' : 'unchecked'))

      // Update hidden input
      if (hiddenInput) {
        hiddenInput.checked = isChecked
        hiddenInput.indeterminate = isIndet
      }

      // Update visual state
      if (isChecked || isIndet) {
        if (!control.style.background || control.style.background === 'transparent') {
          control.style.background = '#5BA8F5'
        }
        if (!control.style.borderColor || control.style.borderColor === '#555' || control.style.borderColor === 'rgb(85, 85, 85)') {
          control.style.borderColor = '#5BA8F5'
        }
        if (indicator) {
          indicator.style.opacity = '1'
          indicator.style.transform = 'scale(1)'
          // Show minus for indeterminate
          if (isIndet) {
            indicator.innerHTML = _runtime._icons.minus(12)
          } else {
            indicator.innerHTML = _runtime._icons.check(12, 3)
          }
        }
      } else {
        control.style.background = 'transparent'
        control.style.borderColor = '#555'
        if (indicator) {
          indicator.style.opacity = '0'
          indicator.style.transform = 'scale(0.8)'
        }
      }
    }

    const toggle = () => {
      if (isDisabled || isReadOnly) return

      // Indeterminate becomes checked when clicked
      if (el._checkboxState.checked === 'indeterminate') {
        el._checkboxState.checked = true
      } else {
        el._checkboxState.checked = !el._checkboxState.checked
      }
      updateDisplay()

      // Dispatch change event
      el.dispatchEvent(new CustomEvent('change', {
        detail: { checked: el._checkboxState.checked },
        bubbles: true
      }))
    }

    // ========================================
    // EVENT HANDLERS
    // ========================================

    // Click handler (on root label)
    el.addEventListener('click', (e) => {
      if (e.target === hiddenInput) return // Let native input handle its clicks
      e.preventDefault()
      toggle()
    })

    // Keyboard handler
    el.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault()
        toggle()
      }
    })

    // Focus/blur for hidden input
    if (hiddenInput) {
      hiddenInput.addEventListener('focus', () => {
        el._checkboxState.focused = true
        el.setAttribute('data-focus', 'true')
        control.style.boxShadow = '0 0 0 2px rgba(59, 130, 246, 0.3)'
      })

      hiddenInput.addEventListener('blur', () => {
        el._checkboxState.focused = false
        el.removeAttribute('data-focus')
        control.style.boxShadow = ''
      })
    }

    // Hover effects
    if (!isDisabled) {
      el.addEventListener('mouseenter', () => {
        el.setAttribute('data-hover', 'true')
        if (el._checkboxState.checked !== true && el._checkboxState.checked !== 'indeterminate') {
          control.style.borderColor = '#888'
        }
      })

      el.addEventListener('mouseleave', () => {
        el.removeAttribute('data-hover')
        if (el._checkboxState.checked !== true && el._checkboxState.checked !== 'indeterminate') {
          control.style.borderColor = '#555'
        }
      })
    }

    // ========================================
    // DISABLED/INVALID STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
      control.setAttribute('data-disabled', 'true')
      el.style.opacity = '0.5'
      el.style.cursor = 'not-allowed'
      if (hiddenInput) hiddenInput.disabled = true
    }

    if (isInvalid) {
      el.setAttribute('data-invalid', 'true')
      control.setAttribute('data-invalid', 'true')
      control.style.borderColor = '#ef4444'
    }

    if (isRequired) {
      el.setAttribute('data-required', 'true')
      if (hiddenInput) hiddenInput.required = true
    }

    if (isReadOnly) {
      el.setAttribute('data-readonly', 'true')
    }

    // Make focusable
    el.setAttribute('tabindex', isDisabled ? '-1' : '0')

    // ========================================
    // INITIAL RENDER
    // ========================================

    updateDisplay()
  },

  // ========================================
  // ACCORDION COMPONENT
  // ========================================
  initAccordionComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}
    const itemsConfig = el._zagConfig.items || []

    // Get all items
    const items = el.querySelectorAll('[data-slot="Item"]')
    if (items.length === 0) return

    // Configuration
    const defaultValue = config.defaultValue || config.value || []
    const multiple = config.multiple === true
    const collapsible = config.collapsible !== false // default true
    const isDisabled = config.disabled === true
    const orientation = config.orientation || 'vertical'

    // State
    el._accordionState = {
      expandedItems: Array.isArray(defaultValue) ? [...defaultValue] : (defaultValue ? [defaultValue] : [])
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, value) => {
      if (element && !element.style[prop]) {
        element.style[prop] = value
      }
    }

    // Root styles
    setDefault(el, 'display', 'flex')
    setDefault(el, 'flexDirection', 'column')
    setDefault(el, 'width', '100%')

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const isExpanded = (value) => el._accordionState.expandedItems.includes(value)

    const updateItemState = (item, value, expanded) => {
      const trigger = item.querySelector('[data-slot="ItemTrigger"]')
      const content = item.querySelector('[data-slot="ItemContent"]')
      const indicator = item.querySelector('[data-slot="ItemIndicator"]')

      item.setAttribute('data-state', expanded ? 'open' : 'closed')

      if (trigger) {
        trigger.setAttribute('data-state', expanded ? 'open' : 'closed')
        trigger.setAttribute('aria-expanded', String(expanded))
      }

      if (content) {
        content.setAttribute('data-state', expanded ? 'open' : 'closed')
        if (expanded) {
          content.style.display = ''
          content.style.height = 'auto'
        } else {
          content.style.display = 'none'
          content.style.height = '0'
        }
      }

      if (indicator) {
        indicator.setAttribute('data-state', expanded ? 'open' : 'closed')
        indicator.style.transform = expanded ? 'rotate(180deg)' : 'rotate(0deg)'
      }
    }

    const toggle = (value) => {
      if (isDisabled) return

      const currentlyExpanded = isExpanded(value)

      if (currentlyExpanded) {
        // Collapse
        if (collapsible || el._accordionState.expandedItems.length > 1) {
          el._accordionState.expandedItems = el._accordionState.expandedItems.filter(v => v !== value)
        }
      } else {
        // Expand
        if (multiple) {
          el._accordionState.expandedItems.push(value)
        } else {
          el._accordionState.expandedItems = [value]
        }
      }

      // Update all items
      items.forEach(item => {
        const itemValue = item.dataset.value
        updateItemState(item, itemValue, isExpanded(itemValue))
      })

      // Dispatch change event
      el.dispatchEvent(new CustomEvent('change', {
        detail: { value: multiple ? [...el._accordionState.expandedItems] : (el._accordionState.expandedItems[0] || null) },
        bubbles: true
      }))
    }

    // ========================================
    // SETUP ITEMS
    // ========================================

    items.forEach((item, index) => {
      const value = item.dataset.value || `item-${index}`
      const trigger = item.querySelector('[data-slot="ItemTrigger"]')
      const content = item.querySelector('[data-slot="ItemContent"]')
      const indicator = item.querySelector('[data-slot="ItemIndicator"]')
      const isItemDisabled = item.hasAttribute('data-disabled')

      // Default item styles
      setDefault(item, 'borderBottom', '1px solid #333')

      // Default trigger styles
      if (trigger) {
        setDefault(trigger, 'display', 'flex')
        setDefault(trigger, 'alignItems', 'center')
        setDefault(trigger, 'justifyContent', 'space-between')
        setDefault(trigger, 'width', '100%')
        setDefault(trigger, 'padding', '12px 16px')
        setDefault(trigger, 'border', 'none')
        setDefault(trigger, 'background', 'transparent')
        setDefault(trigger, 'color', '#e0e0e0')
        setDefault(trigger, 'fontSize', '14px')
        setDefault(trigger, 'fontWeight', '500')
        setDefault(trigger, 'cursor', isItemDisabled ? 'not-allowed' : 'pointer')
        setDefault(trigger, 'textAlign', 'left')
        setDefault(trigger, 'transition', 'background 0.15s')

        // Click handler
        if (!isItemDisabled) {
          trigger.addEventListener('click', () => toggle(value))
        }

        // Hover effect
        if (!isItemDisabled) {
          trigger.addEventListener('mouseenter', () => {
            trigger.style.background = '#1a1a1a'
          })
          trigger.addEventListener('mouseleave', () => {
            trigger.style.background = 'transparent'
          })
        }
      }

      // Default content styles
      if (content) {
        setDefault(content, 'padding', '0 16px 12px')
        setDefault(content, 'fontSize', '14px')
        setDefault(content, 'color', '#999')
        setDefault(content, 'overflow', 'hidden')
        setDefault(content, 'transition', 'height 0.2s ease')
      }

      // Default indicator styles
      if (indicator) {
        setDefault(indicator, 'display', 'flex')
        setDefault(indicator, 'alignItems', 'center')
        setDefault(indicator, 'justifyContent', 'center')
        setDefault(indicator, 'transition', 'transform 0.2s ease')
        setDefault(indicator, 'color', '#888')
        setDefault(indicator, 'flexShrink', '0')
        setDefault(indicator, 'marginLeft', '8px')

        // Load icon (from data-icon attribute or default 'chevron-down')
        const iconName = indicator.dataset.icon || 'chevron-down'
        this.loadIcon(indicator, iconName)
      }

      // Set initial state
      const expanded = isExpanded(value)
      updateItemState(item, value, expanded)
    })

    // ========================================
    // KEYBOARD NAVIGATION
    // ========================================

    el.addEventListener('keydown', (e) => {
      const triggers = Array.from(el.querySelectorAll('[data-slot="ItemTrigger"]:not([disabled])'))
      const currentIndex = triggers.indexOf(document.activeElement)

      if (currentIndex === -1) return

      let nextIndex = currentIndex

      switch (e.key) {
        case 'ArrowDown':
        case 'ArrowRight':
          e.preventDefault()
          nextIndex = (currentIndex + 1) % triggers.length
          break
        case 'ArrowUp':
        case 'ArrowLeft':
          e.preventDefault()
          nextIndex = (currentIndex - 1 + triggers.length) % triggers.length
          break
        case 'Home':
          e.preventDefault()
          nextIndex = 0
          break
        case 'End':
          e.preventDefault()
          nextIndex = triggers.length - 1
          break
      }

      if (nextIndex !== currentIndex) {
        triggers[nextIndex].focus()
      }
    })

    // ========================================
    // DISABLED STATE
    // ========================================

    if (isDisabled) {
      el.setAttribute('data-disabled', 'true')
      el.style.opacity = '0.5'
      el.style.pointerEvents = 'none'
    }

    // Set orientation
    el.setAttribute('data-orientation', orientation)
  },

  // ========================================
  // LISTBOX COMPONENT
  // ========================================
  initListboxComponent(el) {
    if (!el || !el._zagConfig) return

    const config = el._zagConfig.machineConfig || {}
    const itemsConfig = el._zagConfig.items || []

    // Get all items
    const content = el.querySelector('[data-slot="Content"]')
    const items = content ? content.querySelectorAll('[data-slot="Item"]') : []
    if (items.length === 0) return

    // Configuration
    const defaultValue = config.defaultValue || config.value || []
    const multiple = config.multiple === true
    const isDisabled = config.disabled === true
    const isInvalid = config.invalid === true
    const isReadOnly = config.readOnly === true
    const isRequired = config.required === true
    const orientation = config.orientation || 'vertical'
    const loopFocus = config.loopFocus !== false // default true

    // State
    el._listboxState = {
      selectedValues: Array.isArray(defaultValue) ? [...defaultValue] : (defaultValue ? [defaultValue] : []),
      highlightedValue: null
    }

    // ========================================
    // DEFAULT STYLES
    // ========================================

    const setDefault = (element, prop, value) => {
      if (element && !element.style[prop]) {
        element.style[prop] = value
      }
    }

    // Root styles
    setDefault(el, 'display', 'flex')
    setDefault(el, 'flexDirection', 'column')
    setDefault(el, 'width', '100%')

    // Content styles
    if (content) {
      setDefault(content, 'display', 'flex')
      setDefault(content, 'flexDirection', 'column')
      setDefault(content, 'gap', '2px')
      setDefault(content, 'outline', 'none')
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================

    const isSelected = (value) => el._listboxState.selectedValues.includes(value)

    const updateItemState = (item, value, selected, highlighted) => {
      const indicator = item.querySelector('[data-slot="ItemIndicator"]')

      item.setAttribute('data-state', selected ? 'checked' : 'unchecked')
      item.setAttribute('aria-selected', String(selected))

      if (highlighted) {
        item.setAttribute('data-highlighted', 'true')
      } else {
