<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adressverwaltung - Mirror</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/mirror-defaults.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
    }
    #app { width: 100%; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">Loading...</div>
  </div>
  <script src="../dist/browser/index.global.js"></script>
  <script>
    fetch('address-manager.mirror')
      .then(response => response.text())
      .then(mirrorCode => {
        try {
          const compiled = MirrorLang.compile(mirrorCode);
          const execCode = compiled.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          // ui can be an HTMLElement directly or an object with a root property
          const root = ui instanceof HTMLElement ? ui : ui?.root;
          if (root) {
            document.getElementById('app').innerHTML = '';
            document.getElementById('app').appendChild(root);
          }
        } catch (e) {
          document.getElementById('app').innerHTML = '<pre style="color:red;padding:20px;">' + e.message + '</pre>';
        }
      });
  </script>
</body>
</html>
