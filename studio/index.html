<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror Studio</title>

  <!-- CodeMirror 6 -->
  <script type="importmap">
  {
    "imports": {
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.4",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.39.12?deps=@codemirror/state@6.5.4",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.12.1?deps=@codemirror/state@6.5.4,@codemirror/view@6.39.12",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.10.2?deps=@codemirror/state@6.5.4,@codemirror/view@6.39.12,@codemirror/language@6.12.1",
      "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.20.0?deps=@codemirror/state@6.5.4,@codemirror/view@6.39.12,@codemirror/language@6.12.1"
    }
  }
  </script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>
          <img src="../docs/assets/Logo.png" alt="Mirror" style="height: 28px; margin-left: -6px; padding-bottom: 4px; vertical-align: middle; display: block;">
        </h1>
      </div>
      <div class="header-project" id="header-project" title="Projekt wechseln">
        <span id="header-project-name">Demo Project</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
        <!-- Project Dropdown -->
        <div id="project-dropdown" class="project-dropdown">
          <div class="project-dropdown-content" id="project-dropdown-list"></div>
          <div class="project-dropdown-footer">
            <button class="project-dropdown-new" id="project-dropdown-new">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Neues Projekt
            </button>
            <button class="project-dropdown-template" id="project-dropdown-template">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="9" rx="1"></rect>
                <rect x="14" y="3" width="7" height="5" rx="1"></rect>
                <rect x="14" y="12" width="7" height="9" rx="1"></rect>
                <rect x="3" y="16" width="7" height="5" rx="1"></rect>
              </svg>
              Starter Template
            </button>
          </div>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <div id="status" class="status">Ready</div>
        <button id="settings-button" class="settings-button" title="Einstellungen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
        <div style="position: relative;">
          <button id="user-button" class="user-button" title="Account">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span id="user-label" class="user-label">Demo</span>
          </button>
          <div id="user-menu" class="user-menu">
            <button class="user-menu-item" id="user-login-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
              </svg>
              Anmelden
            </button>
            <button class="user-menu-item danger" id="user-logout-btn" style="display: none;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              Abmelden
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="sidebar">
      <div class="sidebar-header">Files</div>

      <!-- Files Content -->
      <div class="sidebar-content" id="files-content">
        <div class="file-tree" id="file-tree">
          <div class="folder">
            <div class="folder-header" id="sidebar-project">
              <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="#71717A" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              </svg>
              <span class="folder-name" id="sidebar-project-name">Demo Project</span>
              <div class="folder-actions">
                <button id="sidebar-project-rename" title="Umbenennen">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                  </svg>
                </button>
                <button id="sidebar-project-delete" class="danger" title="Löschen">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
              </div>
            </div>
            <div class="folder-children" id="file-list"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="divider" id="sidebar-divider"></div>

    <div class="panel editor-panel" style="position: relative;">
      <div id="editor-container"></div>
      <div class="prompt-bar">
        <div class="prompt-input-wrapper">
          <input type="text" id="prompt-input" class="prompt-input" placeholder="Describe UI... (e.g., 'Add a blue button with icon')">
          <button id="generate-btn" class="btn-generate" title="Generate">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
      <div id="drop-overlay" class="drop-overlay">
        <div class="drop-message">
          <span class="drop-icon">photo</span>
          <span>Bild hier ablegen</span>
        </div>
      </div>
    </div>

    <div class="divider" id="editor-divider"></div>

    <!-- Components Panel -->
    <div class="components-panel" id="components-panel">
      <div class="components-panel-header">Components</div>
      <div class="component-palette" id="component-palette">
        <div class="component-palette-section">
          <div class="component-palette-section-title">Primitives</div>
          <div class="component-palette-items" id="primitives-palette"></div>
        </div>
        <div class="component-palette-section" id="user-components-section" style="display: none;">
          <div class="component-palette-section-title">Your Components</div>
          <div class="component-palette-items" id="user-components-palette"></div>
        </div>
      </div>
    </div>

    <div class="divider" id="components-divider"></div>

    <div class="panel preview-panel">
      <div id="preview"></div>
    </div>

    <!-- Property Panel -->
    <aside class="property-panel" id="property-panel"></aside>
  </div>

  <!-- Initial code template (outside grid container) -->
  <script type="text/plain" id="initial-code">// Design Tokens
primary: #3B82F6
surface: #1a1a23
text: #e4e4e7

// Components
Card as frame:
  pad 20, gap 12, bg surface, rad 8

Title as text:
  col text, weight 600, font-size 18

Button as button:
  pad 10 20, bg primary, rad 6
  col white, weight 500
  hover
    bg #2563eb

// Instance
Card
  Title "Welcome to Mirror"
  Button "Get Started"
</script>

  <!-- Token Panel -->
  <div id="token-panel" class="token-panel">
    <div id="token-panel-tokens" class="token-panel-section">
      <div class="token-panel-label">Tokens</div>
      <div id="token-list" class="token-list"></div>
    </div>
    <div id="token-panel-picker" class="token-panel-section">
      <div class="token-panel-label">Farben</div>
      <div id="token-color-grid" class="color-picker-grid"></div>
    </div>
  </div>

  <!-- Color Picker -->
  <div id="color-picker" class="color-picker">
    <div id="color-picker-grid" class="color-picker-grid"></div>
    <div class="color-picker-footer">
      <div id="color-preview" class="color-preview"></div>
      <span id="color-hex" class="color-hex"></span>
    </div>
  </div>

  <!-- Icon Picker -->
  <div id="icon-picker" class="icon-picker">
    <div id="icon-picker-recent" class="icon-picker-section" style="display: none;">
      <div class="icon-picker-section-label">Zuletzt verwendet</div>
      <div id="icon-picker-recent-grid" class="icon-picker-grid recent"></div>
    </div>
    <div id="icon-picker-all" class="icon-picker-section">
      <div id="icon-picker-grid" class="icon-picker-grid">
        <div class="icon-picker-loading">Icons laden...</div>
      </div>
    </div>
  </div>

  <!-- Upload Indicator -->
  <div id="upload-indicator" class="upload-indicator">
    <div class="upload-spinner"></div>
    <span>Bild wird hochgeladen...</span>
  </div>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="settings-overlay">
    <div class="settings-modal">
      <div class="settings-header">
        <div class="settings-title">Einstellungen</div>
        <button id="settings-close" class="settings-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="settings-section">
        <label class="settings-label" for="imgbb-key">imgbb API Key</label>
        <input type="text" id="imgbb-key" class="settings-input" placeholder="Dein API Key...">
        <div class="settings-hint">
          Fur Bild-Upload per Drag & Drop.
          <a href="https://api.imgbb.com/" target="_blank">Kostenlosen Key holen</a>
        </div>
        <div id="imgbb-status" class="settings-status"></div>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-modal">
      <div class="auth-header">
        <div class="auth-title">Anmelden</div>
        <button id="auth-close" class="auth-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Registrieren</button>
      </div>
      <div id="auth-error" class="auth-error"></div>
      <form id="auth-form" class="auth-form">
        <div class="auth-field">
          <label for="auth-email">E-Mail</label>
          <input type="email" id="auth-email" required placeholder="name@example.com">
        </div>
        <div class="auth-field">
          <label for="auth-password">Passwort</label>
          <input type="password" id="auth-password" required placeholder="Min. 6 Zeichen" minlength="6">
        </div>
        <button type="submit" id="auth-submit" class="auth-submit">Anmelden</button>
      </form>
      <div class="auth-demo">
        <button id="auth-demo-btn" class="auth-demo-btn">Ohne Account fortfahren</button>
      </div>
    </div>
  </div>

  <script src="../dist/browser/index.global.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
