<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror Studio</title>

  <!-- CodeMirror 6 -->
  <script type="importmap">
  {
    "imports": {
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.4",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.39.12?deps=@codemirror/state@6.5.4",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.12.1?deps=@codemirror/state@6.5.4,@codemirror/view@6.39.12",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.10.2?deps=@codemirror/state@6.5.4,@codemirror/view@6.39.12,@codemirror/language@6.12.1",
      "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.20.0?deps=@codemirror/state@6.5.4,@codemirror/view@6.39.12,@codemirror/language@6.12.1",
      "@codemirror/lint": "https://esm.sh/@codemirror/lint@6.8.5?deps=@codemirror/state@6.5.4,@codemirror/view@6.39.12",
      "tom-select": "https://esm.sh/tom-select@2.4.3"
    }
  }
  </script>

  <!-- Tom Select CSS -->
  <link rel="stylesheet" href="https://esm.sh/tom-select@2.4.3/dist/css/tom-select.default.min.css">
  <link rel="stylesheet" href="styles.css?v=207">
  <!-- Mirror Default Styles (for preview) -->
  <link rel="stylesheet" href="dist/mirror-defaults.css?v=1">
</head>
<body>
  <div class="container">
    <!-- Hidden View Menu (controlled by native menu) -->
    <div id="view-menu" class="view-menu" style="display: none;">
      <label class="view-menu-item" data-panel="files"><input type="checkbox" checked><span>Files</span></label>
      <label class="view-menu-item" data-panel="code"><input type="checkbox" checked><span>Code</span></label>
      <label class="view-menu-item" data-panel="components"><input type="checkbox" checked><span>Components</span></label>
      <label class="view-menu-item" data-panel="preview"><input type="checkbox" checked><span>Preview</span></label>
      <label class="view-menu-item" data-panel="property"><input type="checkbox" checked><span>Property</span></label>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">

    <!-- Activity Bar - Panel Toggles -->
    <div id="activity-bar-container" class="activity-bar-container"></div>

    <div class="sidebar" id="explorer-panel">
      <!-- File Explorer Panel -->
      <!-- Project Toolbar -->
      <div id="project-toolbar-container"></div>
      <!-- File Tree Container -->
      <div id="file-tree-container" class="file-tree"></div>
    </div>

    <div class="divider" id="sidebar-divider"></div>

    <!-- Components Panel (separate from File Explorer) -->
    <div class="components-panel" id="components-panel">
      <div id="components-panel-container"></div>
    </div>

    <div class="divider" id="components-divider"></div>

    <div class="panel editor-panel" style="position: relative;">
      <div class="editor-header">
        <div class="editor-actions">
          <a href="https://ux-strategy.ch/mirror/tutorial/" target="_blank" class="tutorial-link" title="Mirror Tutorial öffnen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
          </a>
          <div class="editor-action-spacer"></div>
          <button id="undo-btn" class="editor-action-btn" title="Undo (Cmd+Z)" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7v6h6"></path>
              <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
            </svg>
          </button>
          <button id="redo-btn" class="editor-action-btn" title="Redo (Cmd+Shift+Z)" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 7v6h-6"></path>
              <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path>
            </svg>
          </button>
        </div>
      </div>
      <div id="editor-container"></div>
      <div id="drop-overlay" class="drop-overlay">
        <div class="drop-message">
          <span class="drop-icon">photo</span>
          <span>Bild hier ablegen</span>
        </div>
      </div>
    </div>

    <div class="divider" id="editor-divider"></div>

    <div class="panel preview-panel">
      <div class="preview-toolbar">
        <div id="preview-breadcrumb" class="preview-breadcrumb"></div>
        <div class="preview-toolbar-actions">
          <select id="device-select" class="device-select" title="Device Simulation">
            <option value="">Responsive</option>
            <option value="iPhone SE">iPhone SE (375×667)</option>
            <option value="iPhone 14">iPhone 14 (390×844)</option>
            <option value="iPhone 14 Pro Max">iPhone 14 Pro Max (430×932)</option>
            <option value="iPad Mini">iPad Mini (768×1024)</option>
            <option value="iPad Pro">iPad Pro (1024×1366)</option>
            <option value="Desktop">Desktop (1440×900)</option>
          </select>
          <button class="play-toolbar-btn" id="play-reset-btn" title="Reset States (recompile)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
              <path d="M21 3v5h-5"></path>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
              <path d="M3 21v-5h5"></path>
            </svg>
          </button>
          <button class="play-btn" id="play-btn" title="Play Mode (Test Components)">
            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
              <polygon points="5,3 19,12 5,21"></polygon>
            </svg>
          </button>
        </div>
      </div>
      <div id="preview"></div>
    </div>

    <!-- Property Panel -->
    <aside class="property-panel" id="property-panel"></aside>

    </div><!-- /.main-content -->

    <!-- Settings Dialog (outside main-content for proper overlay) -->
    <div class="settings-dialog-overlay" id="settings-panel"></div>
  </div>

  <!-- Initial code template (outside grid container) -->
  <script type="text/plain" id="initial-code">// Theme Tokens

// Typography
font: Inter, system-ui, -apple-system, sans-serif
s.fs: 12
m.fs: 14
l.fs: 18
xl.fs: 24

// Background Colors
accent.bg: #3b82f6
surface.bg: #27272a
canvas.bg: #18181b
input.bg: #1f1f1f

// Text Colors
text.col: #ffffff
muted.col: #a1a1aa

// Border Colors
border.boc: #333333
focus.boc: #3b82f6

// Spacing
s.pad: 4
m.pad: 8
l.pad: 16
s.gap: 4
m.gap: 8
l.gap: 16

// Radius
s.rad: 4
m.rad: 8
l.rad: 12

// Components
Button:
  pad $s $m, bg $accent, rad $s, col white, cursor pointer
  hover bg #2563eb

Card:
  bg $surface, pad $m, rad $m, gap $s

Input:
  pad $s, bg $input, rad $s, bor 1, boc $border
  col $text
  focus boc $focus

// Layout
App bg $canvas, pad $l, gap $m
  Text "Welcome to Mirror", fs $xl, weight bold, col $text
  Text "Edit this code to get started", fs $m, col $muted

  Card
    Text "Your first component", col $muted
    Button "Click Me"

  Select placeholder "Choose an option..."
    Item "Option 1"
    Item "Option 2"
    Item "Option 3"
</script>

  <!-- Token Panel -->
  <div id="token-panel" class="token-panel">
    <div id="token-panel-tokens" class="token-panel-section">
      <div class="token-panel-label">Tokens</div>
      <div id="token-list" class="token-list"></div>
    </div>
    <div id="token-panel-picker" class="token-panel-section">
      <div class="token-panel-label">Farben</div>
      <div id="token-color-grid" class="color-picker-grid"></div>
    </div>
  </div>

  <!-- Color Picker: HTML generated by FullColorPicker module -->
  <div id="color-picker" class="color-picker"></div>

  <!-- Icon Picker: dynamically created by IconPicker class -->

  <!-- Upload Indicator -->
  <div id="upload-indicator" class="upload-indicator">
    <div class="upload-spinner"></div>
    <span>Bild wird hochgeladen...</span>
  </div>

  <!-- Settings and Auth modals removed - Desktop app uses native system -->

  <script src="dist/browser/index.global.js?v=92"></script>
  <script type="module" src="dist/dialog.js?v=1"></script>
  <script type="module" src="dist/tauri-bridge.js?v=1"></script>
  <script type="module" src="dist/desktop-files.js?v=1"></script>
  <script type="module" src="dist/app.js?v=1"></script>
</body>
</html>
