<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror Studio</title>

  <!-- CodeMirror 6 -->
  <script type="importmap">
  {
    "imports": {
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.4",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.39.12?deps=@codemirror/state@6.5.4",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.12.1?deps=@codemirror/state@6.5.4,@codemirror/view@6.39.12",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.10.2?deps=@codemirror/state@6.5.4,@codemirror/view@6.39.12,@codemirror/language@6.12.1",
      "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.20.0?deps=@codemirror/state@6.5.4,@codemirror/view@6.39.12,@codemirror/language@6.12.1",
      "tom-select": "https://esm.sh/tom-select@2.4.3"
    }
  }
  </script>

  <!-- Tom Select CSS -->
  <link rel="stylesheet" href="https://esm.sh/tom-select@2.4.3/dist/css/tom-select.default.min.css">
  <link rel="stylesheet" href="styles.css?v=109">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>
          <img src="logo.png" alt="Mirror" style="height: 28px; vertical-align: middle;">
        </h1>
      </div>
      <div class="header-project" id="header-project" title="Projekt wechseln">
        <span id="header-project-name">Demo Project</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
        <!-- Project Dropdown -->
        <div id="project-dropdown" class="project-dropdown">
          <div class="project-dropdown-content" id="project-dropdown-list"></div>
          <div class="project-dropdown-footer">
            <button class="project-dropdown-new" id="project-dropdown-new">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Neues Projekt
            </button>
            <button class="project-dropdown-template" id="project-dropdown-template">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="9" rx="1"></rect>
                <rect x="14" y="3" width="7" height="5" rx="1"></rect>
                <rect x="14" y="12" width="7" height="9" rx="1"></rect>
                <rect x="3" y="16" width="7" height="5" rx="1"></rect>
              </svg>
              Starter Template
            </button>
          </div>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <div id="status" class="status">Ready</div>
        <!-- View Menu -->
        <div class="view-menu-container">
          <button id="view-menu-button" class="view-menu-button" title="Ansicht">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
          </button>
          <div id="view-menu" class="view-menu">
            <div class="view-menu-title">Ansicht</div>
            <label class="view-menu-item" data-panel="prompt">
              <input type="checkbox" checked>
              <span>Prompt</span>
            </label>
            <label class="view-menu-item" data-panel="files">
              <input type="checkbox" checked>
              <span>Files</span>
            </label>
            <label class="view-menu-item" data-panel="code">
              <input type="checkbox" checked>
              <span>Code</span>
            </label>
            <label class="view-menu-item" data-panel="components">
              <input type="checkbox" checked>
              <span>Components</span>
            </label>
            <label class="view-menu-item" data-panel="preview">
              <input type="checkbox" checked>
              <span>Preview</span>
            </label>
            <label class="view-menu-item" data-panel="property">
              <input type="checkbox" checked>
              <span>Property</span>
            </label>
          </div>
        </div>
        <button id="settings-button" class="settings-button" title="Einstellungen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
        <div style="position: relative;">
          <button id="user-button" class="user-button" title="Account">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span id="user-label" class="user-label">Demo</span>
          </button>
          <div id="user-menu" class="user-menu">
            <button class="user-menu-item" id="user-login-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
              </svg>
              Anmelden
            </button>
            <button class="user-menu-item danger" id="user-logout-btn" style="display: none;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              Abmelden
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <div class="main-content">

    <!-- AI Chat Panel (left) -->
    <aside id="chat-panel" class="chat-panel-left">
      <div class="chat-panel-content" id="chat-panel-content">
        <!-- Content rendered by JS -->
      </div>
    </aside>

    <div class="sidebar">
      <div class="sidebar-header">
        <button class="mode-tab active" data-mode="mirror">MIRROR</button>
        <button class="mode-tab" data-mode="react">REACT</button>
      </div>

      <!-- Files Content -->
      <div class="sidebar-content" id="files-content">
        <div class="file-tree" id="file-tree">
          <div class="folder">
            <div class="folder-header" id="sidebar-project">
              <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="#71717A" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              </svg>
              <span class="folder-name" id="sidebar-project-name">Demo Project</span>
              <div class="folder-actions">
                <button id="sidebar-project-rename" title="Umbenennen">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                  </svg>
                </button>
                <button id="sidebar-project-delete" class="danger" title="Löschen">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
              </div>
            </div>
            <div class="folder-children" id="file-list"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="divider" id="sidebar-divider"></div>

    <div class="panel editor-panel" style="position: relative;">
      <div class="editor-header">
        <div class="editor-actions">
          <button id="extract-btn" class="editor-action-btn" title="Als Komponente extrahieren" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"></rect>
              <line x1="12" y1="8" x2="12" y2="16"></line>
              <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
          </button>
          <div class="editor-action-divider"></div>
          <button id="undo-btn" class="editor-action-btn" title="Undo (Cmd+Z)" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7v6h6"></path>
              <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
            </svg>
          </button>
          <button id="redo-btn" class="editor-action-btn" title="Redo (Cmd+Shift+Z)" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 7v6h-6"></path>
              <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path>
            </svg>
          </button>
        </div>
      </div>
      <div id="editor-container"></div>
      <div id="drop-overlay" class="drop-overlay">
        <div class="drop-message">
          <span class="drop-icon">photo</span>
          <span>Bild hier ablegen</span>
        </div>
      </div>
    </div>

    <div class="divider" id="editor-divider"></div>

    <!-- Components Panel -->
    <div class="components-panel" id="components-panel">
      <div class="components-panel-header">Components</div>
      <div class="component-palette" id="component-palette">
        <div class="component-palette-items" id="components-palette"></div>
      </div>
    </div>

    <div class="divider" id="components-divider"></div>

    <div class="panel preview-panel">
      <div class="preview-toolbar">
        <div id="preview-breadcrumb" class="preview-breadcrumb"></div>
        <div id="preview-zoom" class="preview-zoom">
          <button class="zoom-btn" id="zoom-out" title="Zoom out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
          </button>
          <span id="zoom-level" class="zoom-level">100%</span>
          <button class="zoom-btn" id="zoom-in" title="Zoom in">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              <line x1="11" y1="8" x2="11" y2="14"></line>
              <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
          </button>
          <button class="zoom-btn" id="zoom-reset" title="Reset zoom">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
              <path d="M3 3v5h5"></path>
            </svg>
          </button>
        </div>
      </div>
      <div id="preview"></div>
    </div>

    <!-- Property Panel -->
    <aside class="property-panel" id="property-panel"></aside>

    </div><!-- /.main-content -->
  </div>

  <!-- Initial code template (outside grid container) -->
  <script type="text/plain" id="initial-code">// Design Tokens
primary: #3B82F6
surface: #1a1a23
text: #e4e4e7

// Components
Card as frame:
  pad 20, gap 12, bg surface, rad 8

Title as text:
  col text, weight 600, font-size 18

Button as button:
  pad 10 20, bg primary, rad 6
  col white, weight 500
  hover
    bg #2563eb

// Instance
Card
  Title "Welcome to Mirror"
  Button "Get Started"
</script>

  <!-- Token Panel -->
  <div id="token-panel" class="token-panel">
    <div id="token-panel-tokens" class="token-panel-section">
      <div class="token-panel-label">Tokens</div>
      <div id="token-list" class="token-list"></div>
    </div>
    <div id="token-panel-picker" class="token-panel-section">
      <div class="token-panel-label">Farben</div>
      <div id="token-color-grid" class="color-picker-grid"></div>
    </div>
  </div>

  <!-- Color Picker -->
  <div id="color-picker" class="color-picker">
    <!-- Token Colors Section -->
    <div id="color-picker-tokens" class="color-picker-section">
      <div class="color-picker-label">Tokens</div>
      <div id="color-picker-token-grid" class="color-picker-token-grid"></div>
    </div>

    <!-- Tabs -->
    <div class="color-picker-tabs">
      <button class="color-picker-tab active" data-tab="custom">Custom</button>
      <button class="color-picker-tab" data-tab="tailwind">Tailwind</button>
      <button class="color-picker-tab" data-tab="open">Open</button>
      <button class="color-picker-tab" data-tab="material">Material</button>
    </div>

    <!-- Tab Content: Custom -->
    <div id="color-picker-custom" class="color-picker-content active">
      <canvas id="color-picker-area" class="color-picker-area" width="236" height="140"></canvas>
      <div class="color-picker-slider-row">
        <div id="color-picker-hue" class="color-picker-hue-slider">
          <div id="color-picker-hue-thumb" class="color-picker-slider-thumb"></div>
        </div>
      </div>
      <div class="color-picker-slider-row">
        <svg class="color-picker-eyedropper" id="color-picker-eyedropper" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m2 22 1-1h3l9-9M3 21v-3l9-9M14.5 5.5 19 1l4 4-4.5 4.5M12 8l4 4"/>
        </svg>
        <div id="color-picker-alpha" class="color-picker-alpha-slider">
          <div id="color-picker-alpha-thumb" class="color-picker-slider-thumb"></div>
        </div>
      </div>
      <div class="color-picker-inputs">
        <select id="color-picker-format" class="color-picker-format">
          <option value="hex">Hex</option>
        </select>
        <input id="color-picker-hex-input" class="color-picker-hex-input" type="text" value="" />
        <input id="color-picker-opacity-input" class="color-picker-opacity-input" type="text" value="100%" />
      </div>
    </div>

    <!-- Tab Content: Tailwind -->
    <div id="color-picker-tailwind" class="color-picker-content">
      <div id="color-picker-tailwind-grid" class="color-picker-grid"></div>
    </div>

    <!-- Tab Content: Open Color -->
    <div id="color-picker-open" class="color-picker-content">
      <div id="color-picker-grid" class="color-picker-grid"></div>
    </div>

    <!-- Tab Content: Material -->
    <div id="color-picker-material" class="color-picker-content">
      <div id="color-picker-material-grid" class="color-picker-grid"></div>
    </div>

    <!-- Footer -->
    <div class="color-picker-footer">
      <div id="color-preview" class="color-preview"></div>
      <span id="color-hex" class="color-hex"></span>
    </div>
  </div>

  <!-- Icon Picker: dynamically created by IconPicker class -->

  <!-- Animation Picker Container -->
  <div id="animation-picker-container"></div>

  <!-- Upload Indicator -->
  <div id="upload-indicator" class="upload-indicator">
    <div class="upload-spinner"></div>
    <span>Bild wird hochgeladen...</span>
  </div>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="settings-overlay">
    <div class="settings-modal">
      <div class="settings-header">
        <div class="settings-title">Einstellungen</div>
        <button id="settings-close" class="settings-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="settings-section">
        <label class="settings-label" for="imgbb-key">imgbb API Key</label>
        <input type="text" id="imgbb-key" class="settings-input" placeholder="Dein API Key...">
        <div class="settings-hint">
          Fur Bild-Upload per Drag & Drop.
          <a href="https://api.imgbb.com/" target="_blank">Kostenlosen Key holen</a>
        </div>
        <div id="imgbb-status" class="settings-status"></div>
      </div>
      <div class="settings-section">
        <label class="settings-label" for="openrouter-key">OpenRouter API Key</label>
        <input type="password" id="openrouter-key" class="settings-input" placeholder="sk-or-v1-...">
        <div class="settings-hint">
          Für AI Assistant (Mirror AI).
          <a href="https://openrouter.ai/settings/keys" target="_blank">Key holen</a>
        </div>
        <div id="openrouter-status" class="settings-status"></div>
      </div>
      <div class="settings-footer">
        <button id="settings-save" class="settings-save-button">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-modal">
      <div class="auth-header">
        <div class="auth-title">Anmelden</div>
        <button id="auth-close" class="auth-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Registrieren</button>
      </div>
      <div id="auth-error" class="auth-error"></div>
      <form id="auth-form" class="auth-form">
        <div class="auth-field">
          <label for="auth-email">E-Mail</label>
          <input type="email" id="auth-email" required placeholder="name@example.com">
        </div>
        <div class="auth-field">
          <label for="auth-password">Passwort</label>
          <input type="password" id="auth-password" required placeholder="Min. 6 Zeichen" minlength="6">
        </div>
        <button type="submit" id="auth-submit" class="auth-submit">Anmelden</button>
      </form>
      <div class="auth-demo">
        <button id="auth-demo-btn" class="auth-demo-btn">Ohne Account fortfahren</button>
      </div>
    </div>
  </div>

  <script src="../dist/browser/index.global.js?v=64"></script>
  <script type="module" src="app.js?v=119"></script>
</body>
</html>
