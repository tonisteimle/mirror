<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  }

  .player {
    width: 280px;
    background: #111;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* Album art — square, no padding, flush */
  .album-art {
    width: 280px;
    height: 280px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .album-art canvas {
    display: block;
    width: 280px;
    height: 280px;
  }

  .album-art-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 55%, rgba(17,17,17,0.85) 100%);
    pointer-events: none;
  }

  /* Track info */
  .track-info {
    padding: 16px 20px 12px;
  }

  .track-title {
    font-size: 15px;
    font-weight: 600;
    color: #f5f5f5;
    letter-spacing: -0.02em;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-artist {
    font-size: 12px;
    font-weight: 400;
    color: #666;
    margin-top: 3px;
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Progress */
  .progress-section {
    padding: 4px 20px 0;
  }

  .progress-bar-wrap {
    position: relative;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    cursor: pointer;
  }

  .progress-bar-fill {
    height: 100%;
    background: #e8e8e8;
    border-radius: 99px;
    pointer-events: none;
    transition: width 0.1s linear;
  }

  .progress-bar-wrap:hover .progress-knob {
    opacity: 1;
    transform: translateY(-50%) scale(1);
  }

  .progress-knob {
    position: absolute;
    top: 50%;
    transform: translateY(-50%) scale(0.6);
    width: 11px;
    height: 11px;
    background: #fff;
    border-radius: 50%;
    margin-left: -5.5px;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
    pointer-events: none;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 10px;
    color: #444;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.03em;
  }

  /* Playback controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 20px 10px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    border-radius: 8px;
    transition: color 0.12s;
    padding: 6px;
    width: 36px;
    height: 36px;
  }

  .ctrl-btn:hover { color: #ccc; }
  .ctrl-btn:active { color: #fff; }

  .ctrl-btn svg { display: block; }

  .play-btn {
    width: 44px;
    height: 44px;
    background: #f0f0f0;
    color: #0a0a0a;
    border-radius: 50%;
    padding: 0;
    transition: background 0.12s, transform 0.1s;
  }

  .play-btn:hover { background: #fff; }
  .play-btn:active { transform: scale(0.94); }

  /* Action row */
  .actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 20px 18px;
  }

  .action-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #444;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    letter-spacing: 0.02em;
    padding: 4px 2px;
    border-radius: 6px;
    transition: color 0.12s;
  }

  .action-btn svg { display: block; }
  .action-btn:hover { color: #999; }
  .action-btn.active { color: #e44; }
  .action-btn.active:hover { color: #f55; }

  .action-label {
    font-size: 10px;
    color: inherit;
  }
</style>
</head>
<body>

<div class="player">
  <div class="album-art">
    <canvas id="art" width="280" height="280"></canvas>
    <div class="album-art-overlay"></div>
  </div>

  <div class="track-info">
    <div class="track-title" id="trackTitle">Interlude (Weightless)</div>
    <div class="track-artist" id="trackArtist">Floating Points</div>
  </div>

  <div class="progress-section">
    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      <div class="progress-knob" id="progressKnob" style="left:0%"></div>
    </div>
    <div class="time-row">
      <span id="timeElapsed">0:00</span>
      <span id="timeRemain">−3:47</span>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="prevBtn" aria-label="Previous">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="19 20 9 12 19 4 19 20"></polygon>
        <line x1="5" y1="19" x2="5" y2="5"></line>
      </svg>
    </button>

    <button class="ctrl-btn play-btn" id="playBtn" aria-label="Play">
      <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
      <svg id="pauseIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none">
        <rect x="6" y="4" width="4" height="16" rx="1"></rect>
        <rect x="14" y="4" width="4" height="16" rx="1"></rect>
      </svg>
    </button>

    <button class="ctrl-btn" id="nextBtn" aria-label="Next">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 4 15 12 5 20 5 4"></polygon>
        <line x1="19" y1="5" x2="19" y2="19"></line>
      </svg>
    </button>
  </div>

  <div class="actions">
    <button class="action-btn" id="favBtn" aria-label="Favorite">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
      <span class="action-label">Like</span>
    </button>

    <button class="action-btn" id="queueBtn" aria-label="Add to queue">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"></line>
        <line x1="8" y1="12" x2="21" y2="12"></line>
        <line x1="8" y1="18" x2="21" y2="18"></line>
        <line x1="3" y1="6" x2="3.01" y2="6"></line>
        <line x1="3" y1="12" x2="3.01" y2="12"></line>
        <line x1="3" y1="18" x2="3.01" y2="18"></line>
      </svg>
      <span class="action-label">Queue</span>
    </button>

    <button class="action-btn" id="shareBtn" aria-label="Share">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"></circle>
        <circle cx="6" cy="12" r="3"></circle>
        <circle cx="18" cy="19" r="3"></circle>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
      </svg>
      <span class="action-label">Share</span>
    </button>
  </div>
</div>

<script>
(() => {
  // --- Generative album art ---
  const canvas = document.getElementById('art');
  const ctx = canvas.getContext('2d');
  const W = 280, H = 280;

  function drawArt(seed) {
    ctx.clearRect(0, 0, W, H);
    // Deep background
    ctx.fillStyle = '#0d0d18';
    ctx.fillRect(0, 0, W, H);

    // Gradient wash
    const g = ctx.createRadialGradient(W * 0.35, H * 0.4, 0, W * 0.5, H * 0.5, W * 0.75);
    g.addColorStop(0, 'rgba(80, 40, 160, 0.55)');
    g.addColorStop(0.5, 'rgba(30, 20, 80, 0.3)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Concentric rings
    const cx = W * 0.5, cy = H * 0.46;
    for (let i = 14; i >= 1; i--) {
      const r = i * 11;
      const alpha = 0.025 + i * 0.005;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(180,160,255,${alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Waveform bars
    const bars = 48;
    const barW = 2;
    const gap = (W - bars * barW) / (bars + 1);
    ctx.save();
    ctx.globalAlpha = 0.55;
    for (let i = 0; i < bars; i++) {
      const x = gap + i * (barW + gap);
      const t = (i / bars) * Math.PI * 4 + seed;
      const h = 12 + Math.abs(Math.sin(t) * 55 + Math.sin(t * 1.7) * 25);
      const y = H * 0.82 - h;
      const gr = ctx.createLinearGradient(0, y, 0, y + h);
      gr.addColorStop(0, 'rgba(160,120,255,0.9)');
      gr.addColorStop(1, 'rgba(80,40,160,0.15)');
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.roundRect(x, y, barW, h, 1);
      ctx.fill();
    }
    ctx.restore();

    // Bright center glow
    const glow = ctx.createRadialGradient(cx, cy - 10, 0, cx, cy - 10, 60);
    glow.addColorStop(0, 'rgba(200,180,255,0.18)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
  }

  let artSeed = 0;
  drawArt(artSeed);

  // --- State ---
  const DURATION = 227; // 3:47
  let elapsed = 0;
  let playing = false;
  let favActive = false;
  let interval = null;

  const tracks = [
    { title: 'Interlude (Weightless)', artist: 'Floating Points', duration: 227 },
    { title: 'Cascade', artist: 'Tycho', duration: 194 },
    { title: 'LVL', artist: 'ASAP Rocky', duration: 204 },
    { title: 'Nikes', artist: 'Frank Ocean', duration: 311 },
    { title: 'Motion', artist: 'Four Tet', duration: 253 },
  ];
  let trackIdx = 0;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function updateUI() {
    const dur = tracks[trackIdx].duration;
    const pct = dur > 0 ? (elapsed / dur) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressKnob').style.left = pct + '%';
    document.getElementById('timeElapsed').textContent = fmt(elapsed);
    document.getElementById('timeRemain').textContent = '−' + fmt(dur - elapsed);
  }

  function loadTrack(idx) {
    trackIdx = ((idx % tracks.length) + tracks.length) % tracks.length;
    elapsed = 0;
    const t = tracks[trackIdx];
    document.getElementById('trackTitle').textContent = t.title;
    document.getElementById('trackArtist').textContent = t.artist;
    artSeed = Math.random() * Math.PI * 2;
    drawArt(artSeed);
    updateUI();
  }

  function tick() {
    const dur = tracks[trackIdx].duration;
    elapsed = Math.min(elapsed + 1, dur);
    if (elapsed >= dur) {
      pause();
      loadTrack(trackIdx + 1);
      play();
    }
    updateUI();
    // Animate art slightly
    artSeed += 0.012;
    drawArt(artSeed);
  }

  function play() {
    playing = true;
    document.getElementById('playIcon').style.display = 'none';
    document.getElementById('pauseIcon').style.display = 'block';
    interval = setInterval(tick, 1000);
  }

  function pause() {
    playing = false;
    document.getElementById('playIcon').style.display = 'block';
    document.getElementById('pauseIcon').style.display = 'none';
    clearInterval(interval);
  }

  document.getElementById('playBtn').addEventListener('click', () => {
    if (playing) pause(); else play();
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (elapsed > 3) { elapsed = 0; updateUI(); }
    else { const wasPlaying = playing; if (playing) pause(); loadTrack(trackIdx - 1); if (wasPlaying) play(); }
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    const wasPlaying = playing;
    if (playing) pause();
    loadTrack(trackIdx + 1);
    if (wasPlaying) play();
  });

  // Progress scrub
  const wrap = document.getElementById('progressWrap');
  let scrubbing = false;

  function scrubTo(e) {
    const rect = wrap.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    elapsed = Math.floor(pct * tracks[trackIdx].duration);
    updateUI();
  }

  wrap.addEventListener('mousedown', e => { scrubbing = true; scrubTo(e); });
  document.addEventListener('mousemove', e => { if (scrubbing) scrubTo(e); });
  document.addEventListener('mouseup', () => { scrubbing = false; });

  // Favorite
  const favBtn = document.getElementById('favBtn');
  favBtn.addEventListener('click', () => {
    favActive = !favActive;
    favBtn.classList.toggle('active', favActive);
    const path = favBtn.querySelector('path');
    path.setAttribute('fill', favActive ? 'currentColor' : 'none');
  });

  // Queue — subtle pulse feedback
  document.getElementById('queueBtn').addEventListener('click', function() {
    const btn = this;
    const prev = btn.style.color;
    btn.style.color = '#888';
    setTimeout(() => { btn.style.color = prev; }, 220);
  });

  // Share — no-op visual
  document.getElementById('shareBtn').addEventListener('click', function() {
    const btn = this;
    btn.style.color = '#aaa';
    setTimeout(() => { btn.style.color = ''; }, 300);
  });

  updateUI();
})();
</script>
</body>
</html>
