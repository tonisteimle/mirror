<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>
<style>
  :root {
    --accent: #2563eb;
    --accent-muted: #dbeafe;
    --surface: #ffffff;
    --surface-subtle: #f8f8f8;
    --border: #e5e5e5;
    --text-primary: #0a0a0a;
    --text-secondary: #6b6b6b;
    --text-accent: #2563eb;
    --avatar-bg: #1e293b;
    --avatar-col: #ffffff;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-full: 9999px;
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  /* card: profile */
  .profile-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    width: 296px;
    padding: var(--space-xl) var(--space-lg);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* avatar */
  .profile-avatar {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-full);
    background: var(--avatar-bg);
    color: var(--avatar-col);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }

  /* identity */
  .profile-identity {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-xs);
    margin-top: var(--space-md);
  }

  .profile-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
    line-height: 1.2;
  }

  .profile-role {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.4;
  }

  /* meta */
  .profile-meta {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: var(--space-xs);
    margin-top: var(--space-md);
  }

  .profile-meta-text {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 400;
    letter-spacing: 0;
    line-height: 1;
  }

  .profile-meta-dot {
    width: 3px;
    height: 3px;
    border-radius: var(--radius-full);
    background: var(--text-secondary);
    flex-shrink: 0;
  }

  /* divider */
  .profile-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin-top: var(--space-lg);
  }

  /* actions */
  .profile-actions {
    display: flex;
    flex-direction: row;
    gap: var(--space-sm);
    margin-top: var(--space-lg);
    width: 100%;
  }

  /* base button */
  .btn {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    padding: 9px 0;
    flex: 1;
    line-height: 1;
    outline: none;
  }

  /* primary action: follow */
  .btn-follow {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
  }

  .btn-follow:hover {
    background: #1d4ed8;
    border-color: #1d4ed8;
  }

  .btn-follow:active {
    background: #1e40af;
    border-color: #1e40af;
  }

  .btn-follow.is-on {
    background: var(--accent-muted);
    color: var(--text-accent);
    border-color: #bfdbfe;
  }

  .btn-follow.is-on:hover {
    background: #bfdbfe;
    border-color: #93c5fd;
  }

  /* secondary action: message */
  .btn-message {
    background: var(--surface-subtle);
    color: var(--text-primary);
    border-color: var(--border);
  }

  .btn-message:hover {
    background: #ebebeb;
    border-color: #d4d4d4;
  }

  .btn-message:active {
    background: #e0e0e0;
  }

  /* icon */
  .icon {
    display: block;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- card: profile -->
<div class="profile-card">

  <!-- avatar -->
  <div class="profile-avatar">MK</div>

  <!-- identity -->
  <div class="profile-identity">
    <span class="profile-name">Maya Kovalenko</span>
    <span class="profile-role">Product Designer · Figma</span>
  </div>

  <!-- metadata -->
  <div class="profile-meta">
    <span class="profile-meta-text">234 followers</span>
    <span class="profile-meta-dot"></span>
    <span class="profile-meta-text">joined 2024</span>
  </div>

  <!-- divider -->
  <div class="profile-divider"></div>

  <!-- actions -->
  <div class="profile-actions">

    <!-- primary action: follow -->
    <button class="btn btn-follow" id="btn-follow" onclick="toggleFollow()">
      <svg class="icon icon-user-plus" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <line x1="19" y1="8" x2="19" y2="14"/>
        <line x1="22" y1="11" x2="16" y2="11"/>
      </svg>
      <span id="follow-label">Follow</span>
    </button>

    <!-- secondary action: message -->
    <button class="btn btn-message" onclick="openMessage()">
      <svg class="icon icon-message-circle" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Message</span>
    </button>

  </div>

</div>

<script>
  function toggleFollow() {
    var btn = document.getElementById('btn-follow');
    var label = document.getElementById('follow-label');
    var isOn = btn.classList.contains('is-on');
    if (isOn) {
      btn.classList.remove('is-on');
      label.textContent = 'Follow';
    } else {
      btn.classList.add('is-on');
      label.textContent = 'Following';
    }
  }

  function openMessage() {
    // no-op placeholder
  }
</script>

</body>
</html>
