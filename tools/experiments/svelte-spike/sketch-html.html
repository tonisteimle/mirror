<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stat Card</title>
<style>
  :root {
    --surface: #ffffff;
    --border: #e4e4e7;
    --muted: #71717a;
    --foreground: #09090b;
    --positive: #16a34a;
    --positive-bg: #f0fdf4;
    --space-xs: 4px;
    --space-sm: 6px;
    --space-md: 12px;
    --space-lg: 24px;
    --radius-md: 12px;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #f4f4f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  /* Stat card */
  .stat-card {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
    background: var(--surface);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    padding: var(--space-lg);
    width: 280px;
  }

  /* Label row */
  .stat-label {
    display: flex;
    align-items: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    line-height: 1;
  }

  /* Primary value */
  .stat-value {
    display: flex;
    align-items: baseline;
    font-size: 36px;
    font-weight: 700;
    color: var(--foreground);
    letter-spacing: -0.03em;
    line-height: 1;
  }

  /* Delta row */
  .stat-delta {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: var(--space-sm);
    margin-top: var(--space-xs);
  }

  /* Delta icon */
  .icon {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Delta percent */
  .stat-delta-pct {
    display: flex;
    align-items: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--positive);
    line-height: 1;
  }

  /* Delta context */
  .stat-delta-context {
    display: flex;
    align-items: center;
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    line-height: 1;
  }

  /* Distinctive touch: a tight positive pill behind the icon + pct */
  .stat-delta-pill {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: var(--space-sm);
    background: var(--positive-bg);
    border-radius: 6px;
    padding: 3px 8px 3px 4px;
  }
</style>
</head>
<body>

<!-- Stat card widget -->
<div class="stat-card">

  <!-- Label -->
  <span class="stat-label">Monthly revenue</span>

  <!-- Primary value -->
  <span class="stat-value">$48,217</span>

  <!-- Delta row -->
  <div class="stat-delta">
    <!-- Positive pill: icon + percentage -->
    <div class="stat-delta-pill">
      <!-- Icon: arrow-up (Lucide) -->
      <svg class="icon icon-arrow-up" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--positive)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
      <span class="stat-delta-pct">+12%</span>
    </div>
    <span class="stat-delta-context">vs last month</span>
  </div>

</div>

</body>
</html>
