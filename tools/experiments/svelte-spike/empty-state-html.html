<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empty State</title>
  <style>
    :root {
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --surface: #ffffff;
      --surface-muted: #f8f8f8;
      --text-primary: #0f0f0f;
      --text-muted: #6b7280;
      --text-link: #2563eb;
      --icon-muted: #d1d5db;
      --border: #e5e7eb;
      --radius-sm: 6px;
      --radius-md: 10px;
      --space-xs: 8px;
      --space-sm: 12px;
      --space-md: 20px;
      --space-lg: 32px;
      --space-xl: 48px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--surface-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* empty state container */
    .empty-state {
      width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-xl) var(--space-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* icon wrapper */
    .empty-icon-wrap {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-lg);
    }

    .icon.icon-inbox {
      color: var(--icon-muted);
      display: block;
    }

    /* text block */
    .empty-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-xs);
      margin-bottom: var(--space-lg);
    }

    .empty-headline {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      text-align: center;
    }

    .empty-body {
      font-size: 14px;
      line-height: 22px;
      color: var(--text-muted);
      text-align: center;
      max-width: 280px;
    }

    /* actions */
    .empty-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
      width: 100%;
    }

    /* primary button */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      width: 100%;
    }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-primary:active {
      background: #1e40af;
    }

    .btn-primary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-icon {
      display: block;
      flex-shrink: 0;
    }

    /* secondary link */
    .link-secondary {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 4px 0;
    }

    .link-secondary:hover {
      color: var(--text-primary);
    }

    .link-secondary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 2px;
    }
  </style>
</head>
<body>

<!-- empty state: no messages -->
<div class="empty-state">

  <!-- illustrative icon -->
  <div class="empty-icon-wrap">
    <svg class="icon icon-inbox" width="64" height="64" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
      <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
    </svg>
  </div>

  <!-- headline + description -->
  <div class="empty-text">
    <span class="empty-headline">No messages yet</span>
    <p class="empty-body">Messages you send and receive will appear here. Start a conversation to get things moving.</p>
  </div>

  <!-- actions -->
  <div class="empty-actions">

    <!-- primary action -->
    <button class="btn btn-primary" onclick="handleCompose()">
      <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Compose first message
    </button>

    <!-- secondary link -->
    <button class="link-secondary" onclick="handleBrowseContacts()">Browse contacts</button>

  </div>
</div>

<script>
  function handleCompose() {
    alert("Compose new message");
  }

  function handleBrowseContacts() {
    alert("Browse contacts");
  }
</script>

</body>
</html>
