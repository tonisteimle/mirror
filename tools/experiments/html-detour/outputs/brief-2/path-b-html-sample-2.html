<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calm Forest — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #e9e4d4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .serif { font-family: 'Fraunces', serif; font-optical-sizing: auto; }

  .phone {
    width: 375px;
    height: 812px;
    overflow: hidden;
    position: relative;
    border-radius: 44px;
    box-shadow:
      0 40px 80px -20px rgba(20, 50, 30, 0.35),
      0 8px 24px -8px rgba(20, 50, 30, 0.18);
  }

  /* layered forest gradient backdrop */
  .bg-forest {
    background:
      radial-gradient(120% 60% at 50% 0%, #d8e6c8 0%, transparent 60%),
      radial-gradient(80% 50% at 100% 100%, #5d7d52 0%, transparent 55%),
      radial-gradient(80% 60% at 0% 100%, #3a5742 0%, transparent 55%),
      linear-gradient(180deg, #f3eedb 0%, #e6e2cb 35%, #b8c8a4 65%, #4a6a4f 100%);
  }

  /* soft fog overlay */
  .fog::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(60% 40% at 50% 35%, rgba(255,255,255,0.55), transparent 70%),
      radial-gradient(40% 25% at 80% 20%, rgba(255,255,255,0.35), transparent 70%);
    pointer-events: none;
  }

  /* tree silhouettes (decorative) */
  .trees {
    position: absolute;
    left: 0; right: 0; bottom: 36%;
    height: 90px;
    background-repeat: repeat-x;
    background-size: 240px 90px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='90' viewBox='0 0 240 90'><g fill='%234a6a4f' opacity='0.55'><polygon points='10,90 25,40 40,90'/><polygon points='35,90 55,20 75,90'/><polygon points='70,90 85,50 100,90'/><polygon points='95,90 115,15 135,90'/><polygon points='130,90 145,45 160,90'/><polygon points='155,90 175,25 195,90'/><polygon points='190,90 205,50 220,90'/><polygon points='215,90 230,35 245,90'/></g></svg>");
    opacity: 0.7;
    filter: blur(0.5px);
  }
  .trees.back {
    bottom: 40%;
    opacity: 0.35;
    transform: scaleY(0.8);
    filter: blur(1.5px);
  }

  .glass {
    background: rgba(255, 253, 245, 0.78);
    backdrop-filter: blur(18px) saturate(1.1);
    -webkit-backdrop-filter: blur(18px) saturate(1.1);
    border: 1px solid rgba(255,255,255,0.6);
  }

  .input-field {
    background: rgba(255,255,255,0.65);
    border: 1px solid rgba(74, 106, 79, 0.15);
    transition: all 0.2s ease;
  }
  .input-field:focus-within {
    background: rgba(255,255,255,0.95);
    border-color: rgba(74, 106, 79, 0.45);
    box-shadow: 0 0 0 4px rgba(74, 106, 79, 0.08);
  }
  .input-field input {
    background: transparent;
    outline: none;
    width: 100%;
  }

  .btn-primary {
    background: linear-gradient(180deg, #6a8c5e 0%, #4a6a4f 100%);
    box-shadow:
      0 10px 24px -8px rgba(74, 106, 79, 0.55),
      inset 0 1px 0 rgba(255,255,255,0.25);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow:
      0 14px 28px -8px rgba(74, 106, 79, 0.6),
      inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .btn-social {
    background: rgba(255,255,255,0.75);
    border: 1px solid rgba(74, 106, 79, 0.18);
    transition: all 0.18s ease;
  }
  .btn-social:hover {
    background: rgba(255,255,255,0.95);
    border-color: rgba(74, 106, 79, 0.35);
  }

  /* subtle floating leaf */
  .leaf {
    position: absolute;
    color: rgba(74, 106, 79, 0.35);
  }

  /* notch */
  .notch {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 28px;
    background: #1a1a1a;
    border-radius: 18px;
    z-index: 30;
  }

  .status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px 0 28px;
    font-size: 14px;
    font-weight: 600;
    color: #2d3e2f;
    z-index: 20;
  }
</style>
</head>
<body>

<div class="phone bg-forest fog">

  <!-- Status bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <i data-lucide="signal" class="w-4 h-4"></i>
      <i data-lucide="wifi" class="w-4 h-4"></i>
      <i data-lucide="battery-full" class="w-5 h-5"></i>
    </div>
  </div>
  <div class="notch"></div>

  <!-- Decorative trees -->
  <div class="trees back"></div>
  <div class="trees"></div>

  <!-- Floating leaves -->
  <i data-lucide="leaf" class="leaf w-5 h-5" style="top: 90px; right: 38px; transform: rotate(25deg);"></i>
  <i data-lucide="leaf" class="leaf w-4 h-4" style="top: 140px; left: 32px; transform: rotate(-15deg); opacity: 0.6;"></i>

  <!-- Logo / Brand -->
  <div class="absolute top-[70px] left-0 right-0 flex flex-col items-center z-10">
    <div class="w-16 h-16 rounded-2xl flex items-center justify-center"
         style="background: linear-gradient(145deg, #6a8c5e, #3a5742);
                box-shadow: 0 12px 28px -8px rgba(58, 87, 66, 0.55), inset 0 1px 0 rgba(255,255,255,0.25);">
      <i data-lucide="trees" class="w-8 h-8 text-white"></i>
    </div>
    <h1 class="serif text-[22px] font-medium mt-3 tracking-wide" style="color: #2d3e2f;">
      Calm Forest
    </h1>
    <p class="text-[11px] uppercase tracking-[0.25em] mt-0.5" style="color: #6a8c5e;">
      finde deine ruhe
    </p>
  </div>

  <!-- Glass card with form -->
  <div class="absolute left-5 right-5 bottom-5 rounded-[28px] glass p-6 z-10"
       style="box-shadow: 0 20px 50px -15px rgba(20,50,30,0.3);">

    <!-- Greeting -->
    <div class="mb-5">
      <h2 class="serif text-[26px] leading-tight font-medium" style="color: #2d3e2f;">
        Willkommen zurück
      </h2>
      <p class="text-[13px] mt-1" style="color: #6a7a68;">
        Atme tief ein. Schön, dass du da bist.
      </p>
    </div>

    <!-- Email -->
    <label class="input-field flex items-center gap-3 px-4 py-3 rounded-2xl mb-3">
      <i data-lucide="mail" class="w-4 h-4" style="color: #6a8c5e;"></i>
      <input type="email" placeholder="deine@email.de" class="text-[14px] placeholder:text-[#9ca896]" style="color:#2d3e2f;"/>
    </label>

    <!-- Password -->
    <label class="input-field flex items-center gap-3 px-4 py-3 rounded-2xl mb-2">
      <i data-lucide="lock" class="w-4 h-4" style="color: #6a8c5e;"></i>
      <input type="password" placeholder="Passwort" value="••••••••" class="text-[14px] placeholder:text-[#9ca896]" style="color:#2d3e2f;"/>
      <i data-lucide="eye-off" class="w-4 h-4" style="color: #9ca896;"></i>
    </label>

    <!-- Forgot password -->
    <div class="flex justify-end mb-4">
      <a href="#" class="text-[12px] font-medium hover:underline" style="color: #4a6a4f;">
        Passwort vergessen?
      </a>
    </div>

    <!-- Login button -->
    <button class="btn-primary w-full py-3.5 rounded-2xl text-white text-[14px] font-semibold tracking-wide flex items-center justify-center gap-2">
      Anmelden
      <i data-lucide="arrow-right" class="w-4 h-4"></i>
    </button>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-4">
      <div class="flex-1 h-px" style="background: linear-gradient(90deg, transparent, rgba(74,106,79,0.25), transparent);"></div>
      <span class="text-[11px] uppercase tracking-[0.2em]" style="color: #9ca896;">oder</span>
      <div class="flex-1 h-px" style="background: linear-gradient(90deg, transparent, rgba(74,106,79,0.25), transparent);"></div>
    </div>

    <!-- Social buttons -->
    <div class="grid grid-cols-2 gap-2.5">
      <button class="btn-social flex items-center justify-center gap-2 py-2.5 rounded-2xl text-[13px] font-medium" style="color: #2d3e2f;">
        <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="btn-social flex items-center justify-center gap-2 py-2.5 rounded-2xl text-[13px] font-medium" style="color: #2d3e2f;">
        <i data-lucide="apple" class="w-4 h-4" style="color: #2d3e2f;"></i>
        Apple
      </button>
    </div>

    <!-- Register footer -->
    <p class="text-center text-[12px] mt-5" style="color: #6a7a68;">
      Noch keinen Account?
      <a href="#" class="font-semibold hover:underline" style="color: #4a6a4f;">Registrieren</a>
    </p>
  </div>

</div>

<script>
  lucide.createIcons();
</script>
</body>
</html>
