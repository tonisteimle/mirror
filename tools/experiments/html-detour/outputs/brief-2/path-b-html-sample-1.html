<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calm Forest — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          serif: ['Fraunces', 'serif'],
          sans: ['Inter', 'system-ui', 'sans-serif'],
        },
        colors: {
          forest: {
            50:  '#f3f7f1',
            100: '#e3ede0',
            200: '#c8dcc2',
            300: '#a3c399',
            400: '#7aa472',
            500: '#5a8a52',
            600: '#456e3f',
            700: '#365632',
            800: '#2a4327',
            900: '#1f3120',
          },
          moss: '#3d5a3a',
          cream: '#f7f4ec',
          sand:  '#e9e1cf',
        },
        boxShadow: {
          soft: '0 10px 30px -12px rgba(54, 86, 50, 0.25)',
          inset_soft: 'inset 0 1px 2px rgba(0,0,0,0.04), inset 0 -1px 0 rgba(255,255,255,0.6)',
        },
      }
    }
  }
</script>
<style>
  html, body { background: #ece7da; }
  .device {
    width: 375px;
    height: 812px;
  }
  /* Soft fog gradient backdrop with sun glow */
  .forest-bg {
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(255, 240, 200, 0.55) 0%, rgba(255, 240, 200, 0) 55%),
      radial-gradient(80% 50% at 80% 10%, rgba(255, 220, 160, 0.35) 0%, rgba(255, 220, 160, 0) 60%),
      linear-gradient(180deg, #eaf1e3 0%, #d9e6cf 38%, #c6d8b8 72%, #b6cba6 100%);
  }
  /* Distant tree silhouettes */
  .trees::before {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 38%;
    height: 90px;
    background:
      radial-gradient(8px 18px at 10% 80%, #6a8c5e 99%, transparent 100%),
      radial-gradient(10px 24px at 18% 70%, #5a7d50 99%, transparent 100%),
      radial-gradient(7px 16px at 26% 82%, #6a8c5e 99%, transparent 100%),
      radial-gradient(12px 28px at 36% 65%, #4f7146 99%, transparent 100%),
      radial-gradient(9px 20px at 46% 78%, #5a7d50 99%, transparent 100%),
      radial-gradient(11px 26px at 58% 68%, #4a6c42 99%, transparent 100%),
      radial-gradient(8px 18px at 68% 80%, #6a8c5e 99%, transparent 100%),
      radial-gradient(13px 30px at 78% 64%, #436339 99%, transparent 100%),
      radial-gradient(9px 20px at 88% 78%, #5a7d50 99%, transparent 100%),
      radial-gradient(8px 18px at 96% 82%, #6a8c5e 99%, transparent 100%);
    filter: blur(0.5px);
    opacity: 0.85;
    pointer-events: none;
  }
  /* Closer tree row */
  .trees::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 30%;
    height: 70px;
    background:
      radial-gradient(14px 32px at 8% 70%, #2f4a2c 99%, transparent 100%),
      radial-gradient(11px 26px at 22% 82%, #38593432 99%, transparent 100%),
      radial-gradient(16px 36px at 35% 64%, #2c4528 99%, transparent 100%),
      radial-gradient(12px 28px at 50% 78%, #355132 99%, transparent 100%),
      radial-gradient(15px 34px at 65% 66%, #2a4325 99%, transparent 100%),
      radial-gradient(13px 30px at 80% 80%, #355132 99%, transparent 100%),
      radial-gradient(15px 34px at 95% 70%, #2c4528 99%, transparent 100%);
    filter: blur(0.3px);
    pointer-events: none;
  }
  .glass {
    background: rgba(247, 244, 236, 0.78);
    backdrop-filter: blur(14px) saturate(115%);
    -webkit-backdrop-filter: blur(14px) saturate(115%);
  }
  .field {
    background: rgba(255,255,255,0.7);
    transition: all .25s ease;
  }
  .field:focus-within {
    background: rgba(255,255,255,0.95);
    box-shadow: 0 0 0 3px rgba(122, 164, 114, 0.25), 0 1px 2px rgba(0,0,0,0.04);
    border-color: #7aa472;
  }
  .leaf-pulse {
    animation: leafPulse 4.5s ease-in-out infinite;
  }
  @keyframes leafPulse {
    0%,100% { transform: rotate(-4deg) scale(1); }
    50%     { transform: rotate(2deg) scale(1.04); }
  }
  .firefly {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 9999px;
    background: radial-gradient(circle, #fff6c8 0%, rgba(255,246,200,0) 70%);
    filter: blur(0.5px);
    animation: drift 7s ease-in-out infinite;
    opacity: 0.85;
  }
  @keyframes drift {
    0%,100% { transform: translate(0,0); opacity: .4; }
    50%     { transform: translate(8px,-10px); opacity: 1; }
  }
  .divider-line {
    background: linear-gradient(90deg, transparent, rgba(54,86,50,0.25), transparent);
  }
  .btn-primary {
    background: linear-gradient(180deg, #5a8a52 0%, #456e3f 100%);
    box-shadow:
      0 8px 20px -8px rgba(69, 110, 63, 0.55),
      inset 0 1px 0 rgba(255,255,255,0.25);
    transition: transform .15s ease, box-shadow .2s ease;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 26px -10px rgba(69,110,63,.6), inset 0 1px 0 rgba(255,255,255,.25); }
  .btn-primary:active { transform: translateY(0); }
  .social {
    background: rgba(255,255,255,0.85);
    transition: all .2s ease;
  }
  .social:hover { background: #fff; transform: translateY(-1px); }
</style>
</head>
<body class="font-sans text-forest-900 flex items-center justify-center min-h-screen p-6">

  <div class="device relative rounded-[44px] overflow-hidden shadow-soft ring-1 ring-forest-900/10 forest-bg">

    <!-- Atmospheric tree silhouettes -->
    <div class="trees absolute inset-0 pointer-events-none"></div>

    <!-- Fireflies -->
    <span class="firefly" style="top: 14%; left: 22%; animation-delay: 0s;"></span>
    <span class="firefly" style="top: 18%; left: 78%; animation-delay: 1.4s;"></span>
    <span class="firefly" style="top: 26%; left: 60%; animation-delay: 2.8s;"></span>
    <span class="firefly" style="top: 9%;  left: 50%; animation-delay: 3.6s;"></span>

    <!-- Status bar mock -->
    <div class="relative flex items-center justify-between px-7 pt-4 text-[12px] font-medium text-forest-900/70">
      <span>9:41</span>
      <div class="flex items-center gap-1">
        <i data-lucide="signal" class="w-3.5 h-3.5"></i>
        <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
        <i data-lucide="battery-full" class="w-4 h-4"></i>
      </div>
    </div>

    <!-- Logo block -->
    <div class="relative flex flex-col items-center pt-8 pb-2">
      <div class="relative w-16 h-16 rounded-2xl bg-gradient-to-br from-forest-100 to-forest-300 flex items-center justify-center shadow-soft ring-1 ring-white/60">
        <div class="absolute inset-0 rounded-2xl bg-white/20"></div>
        <i data-lucide="trees" class="relative w-8 h-8 text-forest-700 leaf-pulse"></i>
      </div>
      <div class="mt-3 text-center">
        <h1 class="font-serif text-[22px] tracking-tight text-forest-800 leading-none">Calm Forest</h1>
        <p class="mt-1 text-[11px] uppercase tracking-[0.22em] text-forest-700/70">breathe · rest · return</p>
      </div>
    </div>

    <!-- Card -->
    <div class="relative mx-5 mt-5 rounded-3xl glass shadow-soft ring-1 ring-white/60 px-6 pt-6 pb-5">

      <!-- Greeting -->
      <div class="mb-5">
        <h2 class="font-serif text-[24px] leading-tight text-forest-900">Willkommen<br/><span class="italic text-forest-700">zurück.</span></h2>
        <p class="mt-1.5 text-[13px] text-forest-800/70">Atme ein. Setz dich. Die Lichtung wartet.</p>
      </div>

      <!-- Email field -->
      <label class="block">
        <span class="text-[11px] font-medium uppercase tracking-wider text-forest-700/70">Email</span>
        <div class="field mt-1 flex items-center gap-2 rounded-xl border border-forest-200 px-3.5 h-11">
          <i data-lucide="mail" class="w-4 h-4 text-forest-600"></i>
          <input type="email" placeholder="du@calmforest.app"
                 class="flex-1 bg-transparent outline-none text-[14px] placeholder:text-forest-700/40 text-forest-900" />
        </div>
      </label>

      <!-- Password field -->
      <label class="block mt-3">
        <div class="flex items-center justify-between">
          <span class="text-[11px] font-medium uppercase tracking-wider text-forest-700/70">Passwort</span>
          <a href="#" class="text-[11px] font-medium text-forest-700 hover:text-forest-900 underline-offset-2 hover:underline">Vergessen?</a>
        </div>
        <div class="field mt-1 flex items-center gap-2 rounded-xl border border-forest-200 px-3.5 h-11">
          <i data-lucide="lock" class="w-4 h-4 text-forest-600"></i>
          <input type="password" placeholder="••••••••••"
                 class="flex-1 bg-transparent outline-none text-[14px] placeholder:text-forest-700/40 text-forest-900 tracking-widest" />
          <button type="button" class="text-forest-600 hover:text-forest-800" aria-label="Passwort anzeigen">
            <i data-lucide="eye" class="w-4 h-4"></i>
          </button>
        </div>
      </label>

      <!-- Primary button -->
      <button class="btn-primary mt-5 w-full h-12 rounded-xl text-white font-medium text-[14px] flex items-center justify-center gap-2">
        <span>Anmelden</span>
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>

      <!-- Divider -->
      <div class="my-5 flex items-center gap-3">
        <div class="flex-1 h-px divider-line"></div>
        <span class="text-[11px] uppercase tracking-[0.2em] text-forest-700/60">oder</span>
        <div class="flex-1 h-px divider-line"></div>
      </div>

      <!-- Social buttons -->
      <div class="grid grid-cols-2 gap-2.5">
        <button class="social h-11 rounded-xl ring-1 ring-forest-200 flex items-center justify-center gap-2 text-[13px] font-medium text-forest-900">
          <svg class="w-4 h-4" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6.1s2.7-6.1 6-6.1c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.7 3.5 14.6 2.5 12 2.5 6.8 2.5 2.6 6.7 2.6 12s4.2 9.5 9.4 9.5c5.4 0 9-3.8 9-9.2 0-.6-.07-1.1-.16-1.6H12z"/>
            <path fill="#FBBC05" d="M3.6 7.4l3.1 2.3C7.6 8 9.6 6.5 12 6.5c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.7 3.5 14.6 2.5 12 2.5 8.2 2.5 5 4.5 3.6 7.4z" opacity=".0"/>
          </svg>
          <span>Google</span>
        </button>
        <button class="social h-11 rounded-xl ring-1 ring-forest-200 flex items-center justify-center gap-2 text-[13px] font-medium text-forest-900">
          <i data-lucide="apple" class="w-4 h-4 text-forest-900"></i>
          <span>Apple</span>
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div class="absolute left-0 right-0 bottom-7 flex flex-col items-center gap-1.5">
      <p class="text-[12.5px] text-forest-800/80">
        Noch keinen Account?
        <a href="#" class="font-semibold text-forest-700 hover:text-forest-900 underline-offset-2 hover:underline">Registrieren</a>
      </p>
      <div class="flex items-center gap-1.5 text-[10px] uppercase tracking-[0.25em] text-forest-700/50">
        <i data-lucide="leaf" class="w-3 h-3"></i>
        <span>since the quiet years</span>
        <i data-lucide="leaf" class="w-3 h-3 -scale-x-100"></i>
      </div>
    </div>

    <!-- Home indicator -->
    <div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1 rounded-full bg-forest-900/30"></div>
  </div>

<script>
  lucide.createIcons();
</script>
</body>
</html>
