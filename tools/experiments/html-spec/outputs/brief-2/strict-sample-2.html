<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calm Forest — Anmelden</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="w-[375px] h-[812px] bg-gradient-to-b from-[#f4f7ee] via-[#e8f0dc] to-[#d6e4c2] font-sans antialiased overflow-hidden relative">

  <!-- Ambient blobs for forest mood -->
  <div class="absolute -top-24 -left-20 w-72 h-72 rounded-full bg-[#a8c98a]/40 blur-3xl pointer-events-none"></div>
  <div class="absolute top-40 -right-24 w-80 h-80 rounded-full bg-[#cfe0a8]/50 blur-3xl pointer-events-none"></div>
  <div class="absolute -bottom-32 left-10 w-72 h-72 rounded-full bg-[#9ab87a]/30 blur-3xl pointer-events-none"></div>

  <main class="relative z-10 w-full h-full flex flex-col px-7 pt-14 pb-8">

    <!-- Status bar mock -->
    <div class="flex items-center justify-between text-[11px] font-semibold text-[#3d4d2c]/70 mb-8">
      <span>9:41</span>
      <div class="flex items-center gap-1.5">
        <i data-lucide="signal" class="w-3.5 h-3.5"></i>
        <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
        <i data-lucide="battery-full" class="w-4 h-4"></i>
      </div>
    </div>

    <!-- Logo + Brand -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 rounded-3xl bg-gradient-to-br from-[#5d8a3a] to-[#3d6324] flex items-center justify-center shadow-lg shadow-[#5d8a3a]/30 ring-4 ring-white/40 mb-4">
        <i data-lucide="trees" class="w-8 h-8 text-white"></i>
      </div>
      <h1 class="text-[22px] font-semibold tracking-tight text-[#2d3b1f]">Calm Forest</h1>
      <p class="text-[11px] uppercase tracking-[0.22em] text-[#6b7d4f] mt-1">Atme. Sei. Werde still.</p>
    </div>

    <!-- Greeting -->
    <div class="mb-7">
      <h2 class="text-[26px] leading-tight font-semibold text-[#1f2c14]">Willkommen zurück</h2>
      <p class="text-sm text-[#5b6b44] mt-1.5">Dein Wald wartet auf dich.</p>
    </div>

    <!-- Form -->
    <div class="flex flex-col gap-3.5">

      <!-- Email -->
      <label class="block">
        <span class="sr-only">Email</span>
        <div class="flex items-center gap-3 bg-white/70 backdrop-blur-sm rounded-2xl px-4 h-[52px] border border-white/80 shadow-sm shadow-[#7a9d52]/10 focus-within:border-[#5d8a3a] focus-within:ring-2 focus-within:ring-[#5d8a3a]/20 transition">
          <i data-lucide="mail" class="w-4 h-4 text-[#6b7d4f]"></i>
          <input type="email" placeholder="Email" class="flex-1 bg-transparent outline-none text-sm text-[#1f2c14] placeholder:text-[#8a9a6f]" />
        </div>
      </label>

      <!-- Password -->
      <label class="block">
        <span class="sr-only">Passwort</span>
        <div class="flex items-center gap-3 bg-white/70 backdrop-blur-sm rounded-2xl px-4 h-[52px] border border-white/80 shadow-sm shadow-[#7a9d52]/10 focus-within:border-[#5d8a3a] focus-within:ring-2 focus-within:ring-[#5d8a3a]/20 transition">
          <i data-lucide="lock" class="w-4 h-4 text-[#6b7d4f]"></i>
          <input type="password" placeholder="Passwort" value="••••••••" class="flex-1 bg-transparent outline-none text-sm text-[#1f2c14] placeholder:text-[#8a9a6f] tracking-widest" />
          <i data-lucide="eye-off" class="w-4 h-4 text-[#6b7d4f]"></i>
        </div>
      </label>

      <!-- Forgot password -->
      <a href="#" class="self-end text-xs font-medium text-[#3d6324] hover:text-[#2d4a18] hover:underline underline-offset-4 mt-0.5">Passwort vergessen?</a>

      <!-- Primary button -->
      <button class="mt-3 h-[54px] w-full rounded-2xl bg-gradient-to-br from-[#5d8a3a] to-[#3d6324] text-white text-[15px] font-semibold tracking-wide shadow-lg shadow-[#3d6324]/30 hover:shadow-xl hover:shadow-[#3d6324]/40 hover:scale-[1.01] active:scale-[0.99] transition flex items-center justify-center gap-2">
        Anmelden
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-6">
      <div class="flex-1 h-px bg-gradient-to-r from-transparent to-[#5d8a3a]/30"></div>
      <span class="text-[11px] uppercase tracking-[0.2em] text-[#6b7d4f]">oder</span>
      <div class="flex-1 h-px bg-gradient-to-l from-transparent to-[#5d8a3a]/30"></div>
    </div>

    <!-- Social Login -->
    <div class="flex flex-col gap-2.5">
      <button class="h-[48px] w-full rounded-2xl bg-white/80 backdrop-blur-sm border border-white text-[14px] font-medium text-[#1f2c14] shadow-sm hover:bg-white hover:shadow-md transition flex items-center justify-center gap-2.5">
        <i data-lucide="chrome" class="w-4 h-4 text-[#5d8a3a]"></i>
        Mit Google fortfahren
      </button>
      <button class="h-[48px] w-full rounded-2xl bg-[#1f2c14] text-[14px] font-medium text-white shadow-sm hover:bg-[#2d3b1f] hover:shadow-md transition flex items-center justify-center gap-2.5">
        <i data-lucide="apple" class="w-4 h-4 text-white"></i>
        Mit Apple fortfahren
      </button>
    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Sign up footer -->
    <p class="text-center text-[13px] text-[#5b6b44]">
      Noch keinen Account?
      <a href="#" class="font-semibold text-[#3d6324] hover:underline underline-offset-4 ml-1">Registrieren</a>
    </p>
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
