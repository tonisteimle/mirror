<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Layout Combinations Test</title>
  <link rel="stylesheet" href="../../dist/mirror-defaults.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app {
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { compile } from '../../dist/index.js';

    const mirrorCode = await fetch('./flex-combinations.mirror').then(r => r.text());
    const result = compile(mirrorCode, { target: 'dom' });

    if (result.errors && result.errors.length > 0) {
      console.error('Compilation errors:', result.errors);
      document.getElementById('app').innerHTML = '<pre style="color:red;padding:20px">' +
        result.errors.map(e => e.message).join('\n') + '</pre>';
    } else {
      // Execute the compiled code
      const fn = new Function('container', result.code + '\nreturn render(container);');
      fn(document.getElementById('app'));
    }
  </script>
</body>
</html>
