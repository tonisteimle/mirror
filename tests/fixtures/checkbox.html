<!DOCTYPE html>
<html>
<head>
  <title>Checkbox Component Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: start;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 60px;
      display: flex;
      align-items: center;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / Checkbox
  </div>
  <h1>Checkbox Component</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "BASIC": [
        `Checkbox label "Accept terms"`,

        `Checkbox label "Newsletter subscription"`,

        `Checkbox label "Remember me", checked`,
      ],

      "STATES": [
        `Checkbox label "Unchecked"`,

        `Checkbox label "Checked", checked`,

        `Checkbox label "Indeterminate", indeterminate`,

        `Checkbox label "Disabled", disabled`,

        `Checkbox label "Disabled checked", disabled, checked`,

        `Checkbox label "Invalid", invalid`,

        `Checkbox label "Read-only", readOnly, checked`,

        `Checkbox label "Required", required`,
      ],

      "STYLING CONTROL": [
        `Checkbox label "Green checked"
  Control: bg #22c55e`,

        `Checkbox label "Red border"
  Control: bor 2 #ef4444`,

        `Checkbox label "Large checkbox"
  Control: w 24, h 24, rad 6`,

        `Checkbox label "Square checkbox"
  Control: rad 0`,
      ],

      "STYLING LABEL": [
        `Checkbox label "Bold label"
  Label: weight bold`,

        `Checkbox label "Small label"
  Label: fs 12`,

        `Checkbox label "Colored label"
  Label: col #3b82f6`,
      ],

      "STYLING INDICATOR": [
        `Checkbox label "Green check", checked
  Indicator: col #22c55e`,

        `Checkbox label "Large check", checked
  Indicator: w 16, h 16`,
      ],

      "CUSTOM ICONS": [
        `Checkbox label "Star icon", checked, icon "star"`,

        `Checkbox label "Heart icon", checked, icon "heart"`,

        `Checkbox label "Circle icon", checked, icon "circle"`,
      ],

      "IN CONTEXT - FORMS": [
        `Box ver, gap 16
  Text "Account Settings" weight bold, fs 14
  Box ver, gap 12
    Checkbox label "Email notifications", checked
    Checkbox label "SMS alerts"
    Checkbox label "Push notifications", checked`,

        `Box ver, gap 12, pad 16, bg #111, rad 8
  Text "Terms & Conditions" weight bold
  Box ver, gap 8
    Checkbox label "I agree to the Terms of Service", required
    Checkbox label "I agree to the Privacy Policy", required
    Checkbox label "Subscribe to marketing emails"`,

        `Box ver, gap 12
  Text "Select features" fs 12, col #888
  Checkbox label "Feature A", checked
  Checkbox label "Feature B"
  Checkbox label "Feature C", disabled`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
