<!DOCTYPE html>
<html>
<head>
  <title>DatePicker Component Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: start;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 60px;
      display: flex;
      align-items: flex-start;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / DatePicker
  </div>
  <h1>DatePicker Component</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "BASIC": [
        `DatePicker placeholder "Select a date..."`,

        `DatePicker placeholder "With default value", defaultValue "2024-06-15"`,

        `DatePicker placeholder "Disabled", disabled`,
      ],

      "SELECTION MODES": [
        `DatePicker placeholder "Single date (default)"`,

        `DatePicker placeholder "Multiple dates", mode multiple`,

        `DatePicker placeholder "Date range", mode range`,
      ],

      "LOCALIZATION": [
        `DatePicker placeholder "English (US)", locale "en-US"`,

        `DatePicker placeholder "German", locale "de-DE"`,

        `DatePicker placeholder "French", locale "fr-FR"`,

        `DatePicker placeholder "Week starts Monday", startOfWeek 1`,
      ],

      "DATE CONSTRAINTS": [
        `DatePicker placeholder "Min date 2024-01-01", min "2024-01-01"`,

        `DatePicker placeholder "Max date 2024-12-31", max "2024-12-31"`,

        `DatePicker placeholder "Date range constraint", min "2024-06-01", max "2024-06-30"`,
      ],

      "INLINE CALENDAR": [
        `DatePicker inline`,

        `DatePicker inline, locale "de-DE", startOfWeek 1`,
      ],

      "IN CONTEXT": [
        `Box ver, gap 16
  Text "Event Details" weight bold, fs 14
  Box ver, gap 8
    Text "Start Date" fs 12, col #888
    DatePicker placeholder "Select start date..."
  Box ver, gap 8
    Text "End Date" fs 12, col #888
    DatePicker placeholder "Select end date..."`,

        `Box ver, gap 12, pad 16, bg #111, rad 8
  Text "Book a Stay" weight bold
  DatePicker placeholder "Check-in - Check-out", mode range
  Button "Search Availability"`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
