<!DOCTYPE html>
<html>
<head>
  <title>Tooltip Component Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: center;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / Tooltip
  </div>
  <h1>Tooltip Component</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "BASIC": [
        `Tooltip
  Trigger: Button "Hover me"
  Content: Text "This is a tooltip"`,

        `Tooltip
  Trigger: Icon "info"
  Content: Text "Helpful information"`,

        `Tooltip
  Trigger: Text "Hover for details" underline
  Content: Text "More details here"`,
      ],

      "POSITIONING": [
        `Tooltip positioning "top"
  Trigger: Button "Top"
  Content: Text "Tooltip on top"`,

        `Tooltip positioning "bottom"
  Trigger: Button "Bottom"
  Content: Text "Tooltip on bottom"`,

        `Tooltip positioning "left"
  Trigger: Button "Left"
  Content: Text "Tooltip on left"`,

        `Tooltip positioning "right"
  Trigger: Button "Right"
  Content: Text "Tooltip on right"`,
      ],

      "OPEN DELAY": [
        `Tooltip openDelay 0
  Trigger: Button "Instant"
  Content: Text "Shows immediately"`,

        `Tooltip openDelay 500
  Trigger: Button "Delayed"
  Content: Text "Shows after 500ms"`,
      ],

      "CLOSE DELAY": [
        `Tooltip closeDelay 0
  Trigger: Button "Quick close"
  Content: Text "Closes immediately"`,

        `Tooltip closeDelay 500
  Trigger: Button "Slow close"
  Content: Text "Stays 500ms after leaving"`,
      ],

      "STYLING CONTENT": [
        `Tooltip
  Trigger: Button "Styled"
  Content: Text "Custom styled", bg #3b82f6, pad 8 12, rad 6`,

        `Tooltip
  Trigger: Button "Dark"
  Content: Box pad 12, bg #000, rad 8
    Text "Dark tooltip" col #fff`,

        `Tooltip
  Trigger: Button "Multi-line"
  Content: Box ver, gap 4, pad 8
    Text "Title" weight bold
    Text "Description here" col #888, fs 12`,
      ],

      "IN CONTEXT - ICON BAR": [
        `Box hor, gap 8
  Tooltip positioning "bottom"
    Trigger: Box pad 8, rad 4, bg #222, cursor pointer
      Icon "home"
    Content: Text "Home" fs 12
  Tooltip positioning "bottom"
    Trigger: Box pad 8, rad 4, bg #222, cursor pointer
      Icon "settings"
    Content: Text "Settings" fs 12
  Tooltip positioning "bottom"
    Trigger: Box pad 8, rad 4, bg #222, cursor pointer
      Icon "user"
    Content: Text "Profile" fs 12`,
      ],

      "IN CONTEXT - FORM HELP": [
        `Box ver, gap 8, w 300
  Box hor, gap 8, align center
    Label "Email"
    Tooltip
      Trigger: Icon "help-circle" col #666
      Content: Text "We'll never share your email" fs 12
  Input placeholder "Enter email"`,
      ],

      "IN CONTEXT - TRUNCATED TEXT": [
        `Box w 200
  Tooltip
    Trigger: Text "This is a very long text that gets truncated" truncate
    Content: Text "This is a very long text that gets truncated"`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
