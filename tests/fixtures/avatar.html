<!DOCTYPE html>
<html>
<head>
  <title>Avatar Component Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: start;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 60px;
      display: flex;
      align-items: center;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / Avatar
  </div>
  <h1>Avatar Component</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "BASIC": [
        `Avatar`,

        `Avatar name "John Doe"`,

        `Avatar name "Alice"`,

        `Avatar fallback "JD"`,
      ],

      "WITH IMAGE": [
        `Avatar src "https://i.pravatar.cc/150?img=1"`,

        `Avatar src "https://i.pravatar.cc/150?img=2", name "Jane Smith"`,

        `Avatar src "https://i.pravatar.cc/150?img=3"`,
      ],

      "FALLBACK ON ERROR": [
        `Avatar src "invalid-url.jpg", name "Error Test"`,

        `Avatar src "https://invalid-domain-xyz.com/image.jpg", fallback "?"`,
      ],

      "STYLING ROOT": [
        `Avatar name "AB"
  Root: w 64, h 64`,

        `Avatar name "CD"
  Root: w 80, h 80, bg #3b82f6`,

        `Avatar name "EF"
  Root: rad 8`,

        `Avatar name "GH"
  Root: bor 2 #3b82f6`,
      ],

      "STYLING IMAGE": [
        `Avatar src "https://i.pravatar.cc/150?img=4"
  Image: rad 8`,

        `Avatar src "https://i.pravatar.cc/150?img=5"
  Image: bor 2 #22c55e`,
      ],

      "STYLING FALLBACK": [
        `Avatar name "John Doe"
  Fallback: fs 20, weight bold`,

        `Avatar name "Jane Smith"
  Fallback: col #3b82f6`,

        `Avatar fallback "AB"
  Fallback: bg #1a1a1a`,
      ],

      "SIZES": [
        `Avatar name "SM"
  Root: w 32, h 32
  Fallback: fs 12`,

        `Avatar name "MD"
  Root: w 48, h 48`,

        `Avatar name "LG"
  Root: w 64, h 64
  Fallback: fs 20`,

        `Avatar name "XL"
  Root: w 96, h 96
  Fallback: fs 28`,
      ],

      "IN CONTEXT - USER LIST": [
        `Box hor, gap 12
  Avatar src "https://i.pravatar.cc/150?img=10"
    Root: w 40, h 40
  Box ver, gap 2
    Text "John Doe" weight bold, fs 14
    Text "john@example.com" fs 12, col #888`,

        `Box hor, gap 8
  Avatar name "Alice Brown"
    Root: w 36, h 36
    Fallback: fs 12
  Avatar name "Bob Wilson"
    Root: w 36, h 36
    Fallback: fs 12
  Avatar name "Carol Davis"
    Root: w 36, h 36
    Fallback: fs 12`,
      ],

      "IN CONTEXT - PROFILE CARD": [
        `Box ver, gap 16, pad 16, bg #111, rad 8, center
  Avatar src "https://i.pravatar.cc/150?img=15"
    Root: w 80, h 80, bor 3 #3b82f6
  Text "Sarah Johnson" weight bold, fs 16
  Text "Product Designer" fs 12, col #888`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
