<!DOCTYPE html>
<html>
<head>
  <title>FileUpload Component Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: start;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 100px;
      display: flex;
      align-items: flex-start;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / FileUpload
  </div>
  <h1>FileUpload Component</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "BASIC": [
        `FileUpload`,

        `FileUpload label "Upload Files"`,
      ],

      "CONFIGURATION": [
        `FileUpload accept "image/*"`,

        `FileUpload accept ".pdf,.doc,.docx"`,

        `FileUpload maxFiles 3`,

        `FileUpload maxSize 5242880`,
      ],

      "STYLING ROOT": [
        `FileUpload
  Root: w 400`,

        `FileUpload
  Root: pad 16, bg #1a1a1a, rad 12`,
      ],

      "STYLING DROPZONE": [
        `FileUpload
  Dropzone: bg #0a0a0a, bor 2 #3b82f6`,

        `FileUpload
  Dropzone: pad 48, rad 16`,

        `FileUpload
  Dropzone: bor 3 #22c55e`,
      ],

      "STYLING TRIGGER": [
        `FileUpload
  Trigger: bg #22c55e, rad 8`,

        `FileUpload
  Trigger: bg #ef4444, fs 16`,

        `FileUpload
  Trigger: pad 12 24, bg #8b5cf6`,
      ],

      "STYLING CONTENT": [
        `FileUpload
  Content: col #3b82f6`,

        `FileUpload
  Content: fs 16`,
      ],

      "STYLING LABEL": [
        `FileUpload label "Documents"
  Label: fs 16, weight bold`,

        `FileUpload label "Images"
  Label: col #3b82f6`,
      ],

      "STYLING ITEM GROUP": [
        `FileUpload
  ItemGroup: gap 12`,

        `FileUpload
  ItemGroup: pad 8, bg #0a0a0a, rad 8`,
      ],

      "IN CONTEXT - FORM": [
        `Box ver, gap 16, w 400
  Text "Submit Document" weight bold, fs 18
  FileUpload label "Document" accept ".pdf,.doc,.docx"
    Dropzone: pad 24
  Button "Submit" bg #3b82f6, col #fff, pad 12 24, rad 6`,

        `Box ver, gap 16, pad 20, bg #111, rad 8
  Text "Profile Photo" weight bold, fs 14
  FileUpload accept "image/*" maxFiles 1
    Trigger: bg #22c55e`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
