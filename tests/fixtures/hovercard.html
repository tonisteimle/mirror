<!DOCTYPE html>
<html>
<head>
  <title>HoverCard Component Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: center;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / HoverCard
  </div>
  <h1>HoverCard Component</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "BASIC": [
        `HoverCard
  Trigger: Text "Hover over me" underline, cursor pointer
  Content: Text "HoverCard content"`,

        `HoverCard
  Trigger: Link "Learn more" href "#"
  Content: Text "Additional information about this link"`,
      ],

      "POSITIONING": [
        `HoverCard positioning "top"
  Trigger: Text "Top" underline
  Content: Text "Card on top"`,

        `HoverCard positioning "bottom"
  Trigger: Text "Bottom" underline
  Content: Text "Card on bottom"`,

        `HoverCard positioning "left"
  Trigger: Text "Left" underline
  Content: Text "Card on left"`,

        `HoverCard positioning "right"
  Trigger: Text "Right" underline
  Content: Text "Card on right"`,
      ],

      "OPEN DELAY": [
        `HoverCard openDelay 0
  Trigger: Text "Instant" underline
  Content: Text "Shows immediately"`,

        `HoverCard openDelay 500
  Trigger: Text "Delayed" underline
  Content: Text "Shows after 500ms"`,
      ],

      "CLOSE DELAY": [
        `HoverCard closeDelay 0
  Trigger: Text "Quick" underline
  Content: Text "Closes immediately"`,

        `HoverCard closeDelay 500
  Trigger: Text "Slow" underline
  Content: Text "Stays 500ms after leaving"`,
      ],

      "STYLING CONTENT": [
        `HoverCard
  Trigger: Text "Styled" underline
  Content: Box pad 16, bg #1a1a1a, rad 8, bor 1 #333
    Text "Custom styled card"`,

        `HoverCard
  Trigger: Text "Rich" underline
  Content: Box ver, gap 8, pad 12, bg #0d0d0d, rad 8, w 200
    Text "Title" weight bold
    Text "Description text here" col #888, fs 12`,
      ],

      "IN CONTEXT - USER PREVIEW": [
        `Text hor, gap 4
  Text "Created by"
  HoverCard positioning "bottom"
    Trigger: Text "@johndoe" col #3b82f6, underline, cursor pointer
    Content: Box ver, gap 12, pad 16, bg #1a1a1a, rad 12, bor 1 #333, w 280
      Box hor, gap 12
        Avatar "JD" size 48
        Box ver
          Text "John Doe" weight 600, fs 16
          Text "@johndoe" col #666, fs 14
      Text "Software engineer passionate about UI design and great developer experiences." fs 14, col #888
      Box hor, gap 12
        Box hor, gap 4
          Text "1.2k" weight 600
          Text "followers" col #666
        Box hor, gap 4
          Text "500" weight 600
          Text "following" col #666`,
      ],

      "IN CONTEXT - LINK PREVIEW": [
        `HoverCard positioning "bottom"
  Trigger: Link "Check out this article" href "#", col #3b82f6
  Content: Box ver, gap 8, pad 12, bg #1a1a1a, rad 8, bor 1 #333, w 300
    Box h 120, bg #333, rad 4
    Text "Article Title" weight bold, fs 14
    Text "A brief description of what this article is about..." col #888, fs 12, truncate`,
      ],

      "IN CONTEXT - PRODUCT PREVIEW": [
        `Box hor, gap 8
  HoverCard positioning "bottom"
    Trigger: Box w 60, h 60, bg #222, rad 8, cursor pointer
    Content: Box ver, gap 8, pad 12, bg #1a1a1a, rad 8, bor 1 #333, w 200
      Box h 100, bg #333, rad 4
      Text "Product Name" weight 600
      Text "$99.00" col #22c55e
      Text "In stock" fs 12, col #666
  HoverCard positioning "bottom"
    Trigger: Box w 60, h 60, bg #222, rad 8, cursor pointer
    Content: Box ver, gap 8, pad 12, bg #1a1a1a, rad 8, bor 1 #333, w 200
      Box h 100, bg #333, rad 4
      Text "Another Product" weight 600
      Text "$149.00" col #22c55e
      Text "Limited availability" fs 12, col #f59e0b`,
      ],

      "IN CONTEXT - GLOSSARY TERM": [
        `Text hor, gap 4, wrap
  Text "The"
  HoverCard
    Trigger: Text "API" underline, col #8b5cf6, cursor pointer
    Content: Box ver, gap 4, pad 12, bg #1a1a1a, rad 8, bor 1 #333, w 250
      Text "API" weight bold
      Text "Application Programming Interface - a set of protocols for building software applications." col #888, fs 13
  Text "allows communication between services."`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
