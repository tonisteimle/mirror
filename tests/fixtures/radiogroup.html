<!DOCTYPE html>
<html>
<head>
  <title>RadioGroup Component Test</title>
  <link rel="stylesheet" href="../../assets/mirror-defaults.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e0e0;
    }

    .breadcrumb {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .breadcrumb a {
      color: #888;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #aaa;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 16px;
      background: #111;
      border-radius: 6px;
      align-items: start;
    }

    .example-code {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #888;
      white-space: pre;
      overflow-x: auto;
      padding: 12px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .example-preview {
      min-height: 60px;
      display: flex;
      align-items: flex-start;
    }

    .error {
      color: #f55;
      font-size: 11px;
      padding: 8px;
      background: #1a0a0a;
      border-radius: 4px;
    }

    .stats {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 11px;
      color: #444;
      background: #111;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .stats.success { color: #4a4; }
    .stats.failure { color: #a44; }
  </style>
</head>
<body>
  <div class="breadcrumb">
    <a href="../index.html">Tests</a> / <a href="./">Components</a> / RadioGroup
  </div>
  <h1>RadioGroup Component</h1>
  <div class="stats" id="stats"></div>
  <div class="examples" id="examples"></div>

  <script src="../../dist/browser/index.global.js"></script>
  <script>
    const sections = {
      "BASIC": [
        `RadioGroup
  RadioItem "Option A"
  RadioItem "Option B"
  RadioItem "Option C"`,

        `RadioGroup
  Radio "Small"
  Radio "Medium"
  Radio "Large"`,
      ],

      "WITH DEFAULT VALUE": [
        `RadioGroup defaultValue "option-b"
  RadioItem "Option A" value "option-a"
  RadioItem "Option B" value "option-b"
  RadioItem "Option C" value "option-c"`,
      ],

      "ORIENTATION": [
        `RadioGroup orientation "horizontal"
  RadioItem "Left"
  RadioItem "Center"
  RadioItem "Right"`,

        `RadioGroup orientation "vertical"
  RadioItem "Top"
  RadioItem "Middle"
  RadioItem "Bottom"`,
      ],

      "STATES": [
        `RadioGroup disabled
  RadioItem "Disabled A"
  RadioItem "Disabled B"`,

        `RadioGroup invalid
  RadioItem "Invalid A"
  RadioItem "Invalid B"`,

        `RadioGroup required
  RadioItem "Required A"
  RadioItem "Required B"`,

        `RadioGroup
  RadioItem "Enabled"
  RadioItem "Disabled" disabled
  RadioItem "Also enabled"`,
      ],

      "STYLING ROOT": [
        `RadioGroup
  RadioItem "Option A"
  RadioItem "Option B"
  Root: gap 16`,

        `RadioGroup
  RadioItem "Option A"
  RadioItem "Option B"
  Root: pad 16, bg #1a1a1a, rad 8`,
      ],

      "STYLING ITEM": [
        `RadioGroup
  RadioItem "Styled A"
  RadioItem "Styled B"
  Item: pad 8, bg #222, rad 4`,

        `RadioGroup
  RadioItem "Large gap"
  RadioItem "Between items"
  Item: gap 12`,
      ],

      "STYLING CONTROL": [
        `RadioGroup
  RadioItem "Green radio"
  RadioItem "Another"
  ItemControl: bor 2 #22c55e`,

        `RadioGroup
  RadioItem "Large radio"
  RadioItem "Another"
  ItemControl: w 24, h 24`,

        `RadioGroup
  RadioItem "Red border"
  RadioItem "Another"
  ItemControl: bor 2 #ef4444`,
      ],

      "STYLING TEXT": [
        `RadioGroup
  RadioItem "Bold text"
  RadioItem "Another"
  ItemText: weight bold`,

        `RadioGroup
  RadioItem "Large text"
  RadioItem "Another"
  ItemText: fs 16`,

        `RadioGroup
  RadioItem "Blue text"
  RadioItem "Another"
  ItemText: col #3b82f6`,
      ],

      "IN CONTEXT - FORM": [
        `Box ver, gap 16, w 300
  Text "Shipping Method" weight bold, fs 14
  RadioGroup
    RadioItem "Standard (5-7 days)"
    RadioItem "Express (2-3 days)"
    RadioItem "Overnight (1 day)"`,

        `Box ver, gap 12, pad 16, bg #111, rad 8
  Text "Select size" fs 12, col #888
  RadioGroup orientation "horizontal"
    Radio "S"
    Radio "M"
    Radio "L"
    Radio "XL"`,
      ],
    };

    const { compile } = MirrorLang;
    const container = document.getElementById('examples');
    let total = 0;
    let success = 0;
    let failed = 0;

    Object.entries(sections).forEach(([sectionName, examples]) => {
      const heading = document.createElement('h2');
      heading.textContent = sectionName;
      container.appendChild(heading);

      examples.forEach(code => {
        total++;
        const row = document.createElement('div');
        row.className = 'example';

        const codeDiv = document.createElement('div');
        codeDiv.className = 'example-code';
        codeDiv.textContent = code;

        const previewDiv = document.createElement('div');
        previewDiv.className = 'example-preview';

        try {
          const jsCode = compile(code);
          const execCode = jsCode.replace('export function createUI', 'function createUI');
          const fn = new Function(execCode + '\nreturn createUI();');
          const ui = fn();
          if (ui && ui.root) {
            previewDiv.appendChild(ui.root);
          }
          success++;
        } catch (err) {
          previewDiv.innerHTML = `<div class="error">${err.message}</div>`;
          failed++;
          console.error('Compilation error:', err);
        }

        row.appendChild(codeDiv);
        row.appendChild(previewDiv);
        container.appendChild(row);
      });
    });

    // Update stats
    const statsEl = document.getElementById('stats');
    statsEl.textContent = `${success}/${total} passed` + (failed > 0 ? ` (${failed} failed)` : '');
    statsEl.className = 'stats ' + (failed > 0 ? 'failure' : 'success');
  </script>
</body>
</html>
